<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>זיכרון · Impact SO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.mem-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
  perspective:1000px;
}
.mem-card {
  aspect-ratio:1; cursor:pointer;
  transition:transform .5s; transform-style:preserve-3d;
  position:relative;
}
.mem-card.flipped { transform:rotateY(180deg); }
.mem-card.matched { transform:rotateY(180deg); cursor:default; }
.mem-face {
  position:absolute; inset:0;
  border-radius:12px;
  display:grid; place-items:center;
  text-align:center; padding:8px;
  font-family:'Heebo',sans-serif;
  font-weight:700; font-size:13px;
  backface-visibility:hidden;
  line-height:1.3;
}
.mem-front {
  background:linear-gradient(135deg, var(--primary), var(--secondary));
  color:white; font-size:32px;
}
.mem-back {
  background:white; border:2px solid var(--border); color:var(--text);
  transform:rotateY(180deg);
  overflow:hidden;
}
.mem-card.matched .mem-back {
  background:var(--green-l); border-color:var(--green); color:var(--green);
}
@media (max-width:600px) {
  .mem-grid { grid-template-columns:repeat(3,1fr); }
  .mem-face { font-size:11px; }
  .mem-front { font-size:24px; }
}
</style>
</head>
<body>

<div id="topbar"></div>
<div class="game-shell"><div id="root" class="loading"><div class="spinner"></div><div>טוען...</div></div></div>

<script src="shared.js"></script>
<script>
(function(){
  const CONTENT = IGS.getParam('content', 'content.json');
  const KIT_TITLE = IGS.getParam('kit', '');
  const BACK = IGS.getParam('back', '../index.html');

  let cfg, cards=[], firstCard=null, locked=false, matched=0, totalPairs=0;
  let studentName='', studentClass='';

  document.getElementById('topbar').innerHTML = IGS.topbarHtml({
    gameType:'memory', title:'זיכרון', kitTitle:KIT_TITLE, backHref:BACK
  });

  IGS.loadContent(CONTENT).then(data => {
    cfg = data;
    document.getElementById('root').innerHTML = IGS.welcomeHtml({
      gameType:'memory', title: cfg.title || 'זיכרון',
      subtitle: cfg.subtitle || 'מצאו זוגות תואמים',
      classes: cfg.classes,
    });
    IGS.wireWelcomeForm(s => { studentName=s.studentName; studentClass=s.studentClass; startGame(); });
  }).catch(err => {
    document.getElementById('root').innerHTML = '<div class="card"><h2 style="color:var(--red)">שגיאה</h2><p>'+IGS.escapeHtml(err.message)+'</p></div>';
  });

  function startGame(){
    totalPairs = cfg.items.length;
    cards = [];
    cfg.items.forEach((it, i) => {
      cards.push({ pairId:i, text:it.front });
      cards.push({ pairId:i, text:it.back });
    });
    cards = IGS.shuffle(cards);
    firstCard = null; locked = false; matched = 0;
    render();
  }

  function render(){
    document.getElementById('root').innerHTML =
      IGS.progressHtml(matched, totalPairs, 'זוגות') +
      '<div class="card">' +
        '<div class="mem-grid">' +
          cards.map((c,i) =>
            '<div class="mem-card" data-i="'+i+'" data-pair="'+c.pairId+'">' +
              '<div class="mem-face mem-front">?</div>' +
              '<div class="mem-face mem-back">'+IGS.escapeHtml(c.text)+'</div>' +
            '</div>'
          ).join('') +
        '</div>' +
      '</div>';

    document.querySelectorAll('.mem-card').forEach(el => {
      el.addEventListener('click', () => flip(el));
    });
  }

  function flip(el){
    if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
    el.classList.add('flipped');
    if (!firstCard) {
      firstCard = el;
      return;
    }
    locked = true;
    if (firstCard.dataset.pair === el.dataset.pair && firstCard !== el) {
      // match
      setTimeout(() => {
        firstCard.classList.add('matched');
        el.classList.add('matched');
        matched++;
        firstCard = null; locked = false;
        // update progress
        const pf = document.querySelector('.progress-fill');
        const pm = document.querySelector('.progress-meta span:last-child');
        if (pf) pf.style.width = Math.round(matched/totalPairs*100)+'%';
        if (pm) pm.textContent = matched+' / '+totalPairs;
        if (matched >= totalPairs) setTimeout(finish, 600);
      }, 300);
    } else {
      // wrong — flip back
      setTimeout(() => {
        firstCard.classList.remove('flipped');
        el.classList.remove('flipped');
        firstCard = null; locked = false;
      }, 900);
    }
  }

  function finish(){
    IGS.showResult({
      gameType:'memory',
      gameTitle: cfg.title || 'זיכרון',
      studentName, studentClass,
      correctItems: matched, totalItems: totalPairs,
      percentage: 100,
      teacherEmail: cfg.teacherEmail,
    });
  }
})();
</script>

</body>
</html>
