<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>קבוצות · Impact SO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.grp-lives { display:flex; gap:6px; align-items:center; margin-bottom:14px; justify-content:center; font-size:24px; }
.grp-lives .heart { transition:transform .2s; }
.grp-lives .heart.lost { opacity:.2; transform:scale(.7); }
.grp-solved {
  margin-bottom:14px; display:flex; flex-direction:column; gap:8px;
}
.grp-solved-item {
  border-radius:12px; padding:12px 16px;
  text-align:center;
  animation:fadeUp .35s var(--ease);
}
.grp-solved-item.c0 { background:#CFFAFE; color:#0E7490; }
.grp-solved-item.c1 { background:var(--primary-l); color:var(--primary-d); }
.grp-solved-item.c2 { background:var(--orange-l); color:var(--orange); }
.grp-solved-item.c3 { background:var(--blue-l); color:#1E40AF; }
.grp-solved-name { font-weight:800; font-size:14px; margin-bottom:4px; }
.grp-solved-items { font-size:12px; opacity:.85; }
.grp-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
}
.grp-tile {
  background:white; border:2px solid var(--border); border-radius:10px;
  padding:14px 6px; text-align:center;
  font-family:'Heebo',sans-serif;
  font-size:13px; font-weight:600; color:var(--text);
  cursor:pointer; transition:all .15s;
  min-height:60px; display:grid; place-items:center;
  word-break:break-word; line-height:1.3;
}
.grp-tile:hover { border-color:#D1D5DB; }
.grp-tile.selected {
  background:var(--primary-bg); border-color:var(--primary); color:var(--primary);
  transform:scale(1.02);
}
.grp-tile.shake { animation:shake .35s; }
.grp-actions { display:flex; gap:8px; margin-top:14px; justify-content:center; }
.grp-game-over {
  background:var(--red-l); color:var(--red); padding:14px;
  border-radius:12px; text-align:center; font-weight:700;
  margin-bottom:14px;
}
@media (max-width:600px) {
  .grp-grid { gap:6px; }
  .grp-tile { font-size:11px; padding:10px 4px; }
}
</style>
</head>
<body>

<div id="topbar"></div>
<div class="game-shell"><div id="root" class="loading"><div class="spinner"></div><div>טוען...</div></div></div>

<script src="shared.js"></script>
<script>
(function(){
  const CONTENT = IGS.getParam('content', 'content.json');
  const KIT_TITLE = IGS.getParam('kit', '');
  const BACK = IGS.getParam('back', '../index.html');

  let cfg, groups=[], tiles=[], selected=[], solved=[], lives=4, gameOver=false;
  let studentName='', studentClass='';

  document.getElementById('topbar').innerHTML = IGS.topbarHtml({
    gameType:'groups', title:'קבוצות', kitTitle:KIT_TITLE, backHref:BACK
  });

  IGS.loadContent(CONTENT).then(data => {
    cfg = data;
    document.getElementById('root').innerHTML = IGS.welcomeHtml({
      gameType:'groups', title: cfg.title || 'קבוצות',
      subtitle: cfg.subtitle || 'מצאו 4 פריטים שמשותף להם משהו',
      classes: cfg.classes,
    });
    IGS.wireWelcomeForm(s => { studentName=s.studentName; studentClass=s.studentClass; startGame(); });
  }).catch(err => {
    document.getElementById('root').innerHTML = '<div class="card"><h2 style="color:var(--red)">שגיאה</h2><p>'+IGS.escapeHtml(err.message)+'</p></div>';
  });

  function startGame(){
    groups = cfg.items.slice(0,4); // exactly 4 groups
    tiles = [];
    groups.forEach((g, gi) => {
      g.items.forEach(t => tiles.push({ text:t, group:gi }));
    });
    tiles = IGS.shuffle(tiles);
    selected = []; solved = []; lives = 4; gameOver = false;
    render();
  }

  function render(){
    document.getElementById('root').innerHTML =
      '<div class="card">' +
        '<div class="grp-lives">' +
          [0,1,2,3].map(i => '<span class="heart '+(i < (4-lives) ? 'lost' : '')+'">❤️</span>').join('') +
        '</div>' +
        '<div class="grp-solved">' +
          solved.map(gi => '<div class="grp-solved-item c'+gi+'"><div class="grp-solved-name">'+IGS.escapeHtml(groups[gi].name)+'</div><div class="grp-solved-items">'+groups[gi].items.map(IGS.escapeHtml).join(' · ')+'</div></div>').join('') +
        '</div>' +
        (gameOver ? '<div class="grp-game-over">המשחק נגמר. הקבוצות נחשפו.</div>' : '') +
        '<div class="grp-grid">' +
          tiles.filter(t => !solved.includes(t.group)).map((t,i) =>
            '<div class="grp-tile ' + (selected.includes(t) ? 'selected' : '') + '" data-i="'+tiles.indexOf(t)+'">' + IGS.escapeHtml(t.text) + '</div>'
          ).join('') +
        '</div>' +
        (gameOver ? '' :
        '<div class="grp-actions">' +
          '<button class="btn-primary" id="checkBtn" '+(selected.length === 4 ? '' : 'disabled')+'>בדקו ('+selected.length+'/4)</button>' +
          '<button class="btn-secondary" id="clearBtn">נקה</button>' +
        '</div>') +
        (gameOver || solved.length === groups.length ? '<div style="margin-top:14px;text-align:center"><button class="btn-primary" id="finishBtn">סיום ←</button></div>' : '') +
      '</div>';

    document.querySelectorAll('.grp-tile').forEach(el => {
      el.addEventListener('click', () => toggle(parseInt(el.dataset.i,10)));
    });
    if (!gameOver) {
      document.getElementById('checkBtn').addEventListener('click', check);
      document.getElementById('clearBtn').addEventListener('click', () => { selected = []; render(); });
    }
    if (gameOver || solved.length === groups.length) {
      document.getElementById('finishBtn').addEventListener('click', finish);
    }
  }

  function toggle(idx){
    const t = tiles[idx];
    if (solved.includes(t.group)) return;
    const i = selected.indexOf(t);
    if (i >= 0) selected.splice(i,1);
    else if (selected.length < 4) selected.push(t);
    render();
  }

  function check(){
    if (selected.length !== 4) return;
    const g = selected[0].group;
    const allSame = selected.every(t => t.group === g);
    if (allSame) {
      solved.push(g);
      selected = [];
      if (solved.length === groups.length) {
        // win
      }
      render();
    } else {
      // wrong — lose a life
      lives--;
      const tilesEls = document.querySelectorAll('.grp-tile.selected');
      tilesEls.forEach(el => el.classList.add('shake'));
      setTimeout(() => {
        selected = [];
        if (lives <= 0) {
          gameOver = true;
          // reveal all
          for (let i = 0; i < groups.length; i++) if (!solved.includes(i)) solved.push(i);
        }
        render();
      }, 450);
    }
  }

  function finish(){
    IGS.showResult({
      gameType:'groups',
      gameTitle: cfg.title || 'קבוצות',
      studentName, studentClass,
      correctItems: gameOver ? solved.length - (groups.length - (4-lives)) : groups.length,
      totalItems: groups.length,
      percentage: gameOver ? IGS.pct(Math.max(0, solved.length - (groups.length - (4-lives))), groups.length) : 100,
      teacherEmail: cfg.teacherEmail,
    });
  }
})();
</script>

</body>
</html>
