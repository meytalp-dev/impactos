<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>חדר בריחה · Impact SO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.esc-room-num {
  display:inline-block; padding:4px 12px;
  background:var(--purple-l); color:var(--purple);
  border-radius:8px; font-weight:700; font-size:12px;
  margin-bottom:10px;
}
.esc-title { font-size:20px; font-weight:800; margin-bottom:10px; line-height:1.3; }
.esc-story {
  font-size:14px; line-height:1.7; color:var(--text2);
  margin-bottom:14px;
}
.esc-riddle {
  background:var(--orange-l); border:2px solid var(--orange);
  border-radius:12px; padding:14px 18px;
  font-size:15px; font-weight:700; color:#92400E;
  line-height:1.5; margin-bottom:14px;
}
.esc-riddle::before { content:"🔍 "; }
.esc-input {
  width:100%; padding:14px 16px;
  border:2px solid var(--border); border-radius:12px;
  font-family:'Heebo',sans-serif; font-size:15px;
  direction:rtl; background:white; color:var(--text);
  transition:border-color .15s; margin-bottom:10px;
}
.esc-input:focus { outline:none; border-color:var(--primary); }
.esc-input.shake { animation:shake .35s; border-color:var(--red); }
.esc-actions { display:flex; gap:8px; flex-wrap:wrap; }
.esc-hint-box {
  background:var(--blue-l); color:#1E40AF;
  padding:10px 14px; border-radius:10px;
  font-size:13px; line-height:1.5; margin-top:12px;
  display:none;
}
.esc-hint-box.show { display:block; }
.esc-hint-box::before { content:"💡 רמז: "; font-weight:700; }
</style>
</head>
<body>

<div id="topbar"></div>
<div class="game-shell"><div id="root" class="loading"><div class="spinner"></div><div>טוען...</div></div></div>

<script src="shared.js"></script>
<script>
(function(){
  const CONTENT = IGS.getParam('content', 'content.json');
  const KIT_TITLE = IGS.getParam('kit', '');
  const BACK = IGS.getParam('back', '../index.html');

  let cfg, items, current=0, score=0, hintUsed=false;
  let studentName='', studentClass='';

  document.getElementById('topbar').innerHTML = IGS.topbarHtml({
    gameType:'escape', title:'חדר בריחה', kitTitle:KIT_TITLE, backHref:BACK
  });

  IGS.loadContent(CONTENT).then(data => {
    cfg = data;
    document.getElementById('root').innerHTML = IGS.welcomeHtml({
      gameType:'escape', title: cfg.title || 'חדר בריחה',
      subtitle: cfg.subtitle || 'פתרו את החידות כדי להשתחרר!',
      classes: cfg.classes,
    });
    IGS.wireWelcomeForm(s => { studentName=s.studentName; studentClass=s.studentClass; startGame(); });
  }).catch(err => {
    document.getElementById('root').innerHTML = '<div class="card"><h2 style="color:var(--red)">שגיאה</h2><p>'+IGS.escapeHtml(err.message)+'</p></div>';
  });

  function startGame(){
    items = cfg.settings && cfg.settings.shuffleItems ? IGS.shuffle(cfg.items) : cfg.items.slice();
    current=0; score=0;
    renderRoom();
  }

  function renderRoom(){
    hintUsed = false;
    const r = items[current];
    document.getElementById('root').innerHTML =
      IGS.progressHtml(current+1, items.length, 'חדר') +
      '<div class="card">' +
        '<div class="esc-room-num">חדר '+(current+1)+' / '+items.length+'</div>' +
        '<div class="esc-title">'+IGS.escapeHtml(r.title)+'</div>' +
        '<div class="esc-story">'+IGS.escapeHtml(r.story)+'</div>' +
        '<div class="esc-riddle">'+IGS.escapeHtml(r.riddle)+'</div>' +
        '<input type="text" class="esc-input" id="ans" placeholder="הכניסו תשובה..." autocomplete="off">' +
        '<div class="esc-actions">' +
          '<button class="btn-primary" id="checkBtn">בדקו</button>' +
          '<button class="btn-secondary" id="hintBtn">💡 רמז</button>' +
        '</div>' +
        '<div class="esc-hint-box" id="hintBox">'+IGS.escapeHtml(r.hint || '')+'</div>' +
      '</div>';

    const ans = document.getElementById('ans');
    ans.focus();
    ans.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    document.getElementById('checkBtn').addEventListener('click', check);
    document.getElementById('hintBtn').addEventListener('click', () => {
      hintUsed = true;
      document.getElementById('hintBox').classList.add('show');
      document.getElementById('hintBtn').disabled = true;
    });
  }

  function check(){
    const r = items[current];
    const input = document.getElementById('ans');
    const val = input.value.trim().toLowerCase();
    const expected = String(r.answer || '').trim().toLowerCase();
    if (!val) return;
    if (val === expected || val.includes(expected) || expected.includes(val)) {
      // correct
      score += hintUsed ? 0.5 : 1;
      input.style.background = 'var(--green-l)';
      input.style.borderColor = 'var(--green)';
      input.disabled = true;
      document.getElementById('checkBtn').textContent = current === items.length - 1 ? 'סיום ←' : 'החדר הבא ←';
      document.getElementById('checkBtn').onclick = next;
      document.getElementById('hintBtn').disabled = true;
    } else {
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 400);
      input.select();
    }
  }

  function next(){
    current++;
    if (current >= items.length) finish();
    else renderRoom();
  }

  function finish(){
    IGS.showResult({
      gameType:'escape',
      gameTitle: cfg.title || 'חדר בריחה',
      studentName, studentClass,
      correctItems: Math.round(score), totalItems: items.length,
      percentage: IGS.pct(score, items.length),
      teacherEmail: cfg.teacherEmail,
    });
  }
})();
</script>

</body>
</html>
