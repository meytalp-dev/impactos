<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7CC4FF">
  <title>אי 14 · להאזין ולענות</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    :root {
      --isle14-indigo: #4F46E5;
      --isle14-indigo-deep: #3730A3;
      --isle14-violet: #8B5CF6;
      --isle14-bg: linear-gradient(180deg, #C7E9FF 0%, #7CC4FF 60%, #4A9CE8 100%);
      --isle14-card: #FFFFFF;
      --isle14-text: #1E1B4B;
      --isle14-text-soft: #475569;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--isle14-bg);
      color: var(--isle14-text);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2 { font-family: 'Rubik', sans-serif; line-height: 1.2; }

    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 16px 60px;
    }

    /* Top bar */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
    }
    .icon-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.92); border: 1.5px solid rgba(255,255,255,0.95);
      box-shadow: 0 6px 16px rgba(38,80,92,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--isle14-text); text-decoration: none;
    }
    .icon-btn:active { transform: scale(0.92); }
    .title-pill {
      background: rgba(255,255,255,0.92);
      padding: 8px 22px; border-radius: 999px;
      font-weight: 900; font-size: 18px; color: var(--isle14-indigo-deep);
      box-shadow: 0 6px 16px rgba(38,80,92,0.15);
    }

    /* Level picker (intro) */
    .intro-card {
      background: var(--isle14-card);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 20px 50px rgba(30,27,75,0.18);
      text-align: center;
      animation: fade-up 600ms ease-out;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .intro-title { font-size: 26px; color: var(--isle14-indigo-deep); margin-bottom: 8px; }
    .intro-sub { color: var(--isle14-text-soft); font-size: 16px; margin-bottom: 22px; }
    .level-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px;
    }
    .level-card {
      background: linear-gradient(135deg, var(--isle14-indigo), var(--isle14-violet));
      color: #fff; border: none;
      border-radius: 18px; padding: 18px 14px;
      font-family: inherit; font-weight: 800; font-size: 17px;
      cursor: pointer; box-shadow: 0 8px 20px rgba(139,92,246,0.32);
      transition: transform 180ms ease;
    }
    .level-card:hover { transform: translateY(-2px); }
    .level-card .lc-num { font-family: 'Rubik', sans-serif; font-size: 30px; display: block; margin-bottom: 4px; }
    .level-card .lc-desc { font-weight: 500; font-size: 13px; opacity: 0.9; }

    /* Mechanic styles */
    .mechanic-listen-mcq { animation: fade-up 600ms ease-out; }
    .mlmcq-wrap > * + * { margin-top: 16px; }

    .mlmcq-progress {
      font-family: 'Rubik', sans-serif; font-weight: 700; font-size: 16px;
      color: var(--isle14-indigo-deep); text-align: center;
      background: rgba(255,255,255,0.85);
      padding: 6px 18px; border-radius: 999px; display: inline-block;
      box-shadow: 0 4px 12px rgba(38,80,92,0.1);
      margin: 0 auto 12px; align-self: center;
    }
    .mlmcq-wrap { display: flex; flex-direction: column; align-items: stretch; }
    .mlmcq-wrap .mlmcq-progress { align-self: center; }

    .mlmcq-passage-card, .mlmcq-question-card {
      background: var(--isle14-card);
      border-radius: 22px;
      padding: 22px 22px;
      box-shadow: 0 16px 40px rgba(30,27,75,0.14);
    }

    .mlmcq-passage-text {
      font-family: 'Rubik', sans-serif;
      font-size: clamp(20px, 4vw, 24px);
      line-height: 1.85;
      background: #fff7ed;
      border: 2px solid #fdba74;
      border-radius: 16px;
      padding: 18px 22px;
      direction: rtl;
      text-align: right;
    }
    .mlmcq-question-text {
      font-family: 'Rubik', sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 4vw, 24px);
      color: var(--isle14-indigo-deep);
      margin-bottom: 6px;
      direction: rtl;
      text-align: right;
    }
    .mlmcq-audio-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--isle14-indigo), var(--isle14-violet));
      color: #fff; border: none;
      padding: 12px 22px;
      border-radius: 999px;
      font-family: inherit; font-weight: 800; font-size: 15px;
      cursor: pointer; box-shadow: 0 6px 14px rgba(139,92,246,0.32);
      margin-top: 12px;
    }
    .mlmcq-audio-btn:hover { transform: translateY(-1px); }
    .mlmcq-audio-btn .mlmcq-icon { font-size: 17px; }

    .mlmcq-options {
      display: grid; gap: 12px;
      margin-top: 18px;
    }
    .mlmcq-option {
      background: #f8fafc;
      border: 2.5px solid #cbd5e1;
      border-radius: 16px;
      padding: 16px 22px;
      font-family: 'Rubik', sans-serif; font-weight: 700;
      font-size: clamp(18px, 3.5vw, 22px);
      color: var(--isle14-text);
      cursor: pointer;
      transition: transform 150ms ease, border-color 180ms ease, background 180ms ease;
      direction: rtl; text-align: right;
    }
    .mlmcq-option:hover:not(:disabled) {
      border-color: var(--isle14-violet);
      background: #f5f3ff;
      transform: translateY(-1px);
    }
    .mlmcq-option:disabled { cursor: default; }
    .mlmcq-option--correct {
      border-color: #16a34a; background: #dcfce7; color: #14532d;
    }
    .mlmcq-option--wrong {
      border-color: #dc2626; background: #fee2e2; color: #7f1d1d;
    }
    .mlmcq-feedback {
      min-height: 22px;
      font-family: 'Rubik', sans-serif; font-weight: 700; font-size: 17px;
      text-align: center; margin-top: 14px;
    }
    .mlmcq-feedback--ok   { color: #15803d; }
    .mlmcq-feedback--miss { color: #b45309; }
    .mlmcq-error {
      background: #fef3c7; border: 1px dashed #f59e0b; border-radius: 12px;
      padding: 16px; color: #92400e; text-align: center; font-weight: 600;
    }

    /* Summary card */
    .summary-card {
      background: var(--isle14-card);
      border-radius: 24px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(30,27,75,0.14);
      animation: fade-up 600ms ease-out;
    }
    .summary-title { font-size: 24px; color: var(--isle14-indigo-deep); margin-bottom: 8px; }
    .summary-score { font-family: 'Rubik', sans-serif; font-size: 48px; font-weight: 900; color: var(--isle14-violet); margin: 12px 0; }
    .summary-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
    .summary-btn {
      background: linear-gradient(135deg, var(--isle14-indigo), var(--isle14-violet));
      color: #fff; border: none; padding: 14px 26px; border-radius: 999px;
      font-family: inherit; font-weight: 800; font-size: 16px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(139,92,246,0.3);
      text-decoration: none; display: inline-block;
    }
    .summary-btn--ghost {
      background: transparent; color: var(--isle14-indigo-deep);
      border: 2px solid var(--isle14-indigo);
      box-shadow: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .intro-card, .mechanic-listen-mcq, .summary-card { animation: none !important; }
    }
  </style>
<script src="../../demo/journey.js" defer></script>
</head>
<body>

<header class="top-bar">
  <a href="stage-14-island.html" class="icon-btn" aria-label="חזרה לאי 14">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <div class="title-pill">להאזין ולענות</div>
  <div style="width:52px;height:52px;" aria-hidden="true"></div>
</header>

<main class="page-wrap">

  <!-- Intro: level picker -->
  <section id="introSection" class="intro-card">
    <h1 class="intro-title">בַּחֲרוּ רָמָה</h1>
    <p class="intro-sub">כָּל רָמָה — סִפּוּרִים שׁוֹנִים. אֶפְשָׁר לִשְׁמֹעַ כָּל סִפּוּר פַּעֲמַיִם.</p>
    <div class="level-grid" role="group" aria-label="בחירת רמה">
      <button class="level-card" data-level="1" type="button">
        <span class="lc-num">1</span>
        <span class="lc-desc">סִפּוּרִים קְצָרִים · שְׁאֵלָה אַחַת</span>
      </button>
      <button class="level-card" data-level="2" type="button">
        <span class="lc-num">2</span>
        <span class="lc-desc">סִפּוּרִים בֵּינוֹנִיִּים · 2-3 שְׁאֵלוֹת</span>
      </button>
      <button class="level-card" data-level="3" type="button">
        <span class="lc-num">3</span>
        <span class="lc-desc">סִפּוּרִים אֲרֻכִּים · שְׁאֵלַת הֲסָקָה</span>
      </button>
    </div>
  </section>

  <!-- Game mount root -->
  <section id="gameRoot" style="display:none;"></section>

  <!-- Summary -->
  <section id="summarySection" class="summary-card" style="display:none;">
    <h1 class="summary-title">סִיַּמְתֶּם אֶת הַסֵּבֶב!</h1>
    <div class="summary-score" id="summaryScore">— / —</div>
    <p id="summaryMsg" style="color:var(--isle14-text-soft);">סֵבֶב חָזָק! רוֹצִים לְנַסּוֹת שׁוּב?</p>
    <div class="summary-actions">
      <button class="summary-btn" id="playAgainBtn" type="button">סֵבֶב חָדָשׁ</button>
      <a class="summary-btn summary-btn--ghost" href="stage-14-island.html">חֲזָרָה לְאִי 14</a>
    </div>
  </section>

</main>

<!-- Scripts -->
<script src="js/state.js"></script>
<script src="js/shared/bkt.js"></script>
<script src="js/shared/oral-skill-adapter.js"></script>
<script src="js/templates/mechanic-listen-mcq.js"></script>

<script>
  (function () {
    const studentId = localStorage.getItem('avnei-yesod-current-student') || 'local';
    const intro   = document.getElementById('introSection');
    const root    = document.getElementById('gameRoot');
    const summary = document.getElementById('summarySection');
    const score   = document.getElementById('summaryScore');
    const msg     = document.getElementById('summaryMsg');
    const again   = document.getElementById('playAgainBtn');

    let currentLevel = null;

    // אם querystring כולל ?level=1 → דלג על picker.
    const params = new URLSearchParams(location.search);
    const presetLevel = parseInt(params.get('level'), 10);
    if ([1,2,3].includes(presetLevel)) {
      startLevel(presetLevel);
    }

    document.querySelectorAll('.level-card').forEach(btn => {
      btn.addEventListener('click', () => startLevel(parseInt(btn.dataset.level, 10)));
    });

    function startLevel(level) {
      currentLevel = level;
      intro.style.display = 'none';
      summary.style.display = 'none';
      root.style.display = '';
      root.innerHTML = '';

      window.AvneiMechanicListenMCQ.init({
        studentId,
        level,
        batchSize: 5,
        mountRoot: root,
        onComplete: (payload) => {
          root.style.display = 'none';
          summary.style.display = '';
          const pct = payload.total > 0 ? Math.round((payload.correct / payload.total) * 100) : 0;
          score.textContent = payload.correct + ' / ' + payload.total;
          if (pct >= 70) {
            msg.textContent = 'כָּל הַכָּבוֹד! הִצְלַחְתֶּם בְּ-' + pct + '% מֵהַשְּׁאֵלוֹת.';
          } else {
            msg.textContent = 'עֲנִיתֶם עַל ' + pct + '% מֵהַשְּׁאֵלוֹת. נְנַסֶּה שׁוּב?';
          }
        },
      });
      window.AvneiMechanicListenMCQ.start();
    }

    again.addEventListener('click', () => {
      if (currentLevel) startLevel(currentLevel);
      else {
        summary.style.display = 'none';
        intro.style.display = '';
      }
    });
  })();
</script>

</body>
</html>
