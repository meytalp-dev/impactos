<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" class="noni" role="img" aria-label="נוני התמנון">
  <defs>
    <!-- שיפועי גוף -->
    <radialGradient id="body-grad" cx="42%" cy="38%" r="62%">
      <stop offset="0%"  stop-color="#EFE9FF"/>
      <stop offset="55%" stop-color="#D9D2FF"/>
      <stop offset="100%" stop-color="#BFB4F2"/>
    </radialGradient>

    <radialGradient id="belly-grad" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#FFE7EA"/>
      <stop offset="70%" stop-color="#FFD3D8"/>
      <stop offset="100%" stop-color="#F5B8C0"/>
    </radialGradient>

    <radialGradient id="eye-shine" cx="32%" cy="28%" r="60%">
      <stop offset="0%"  stop-color="#3A3556"/>
      <stop offset="100%" stop-color="#1E1A38"/>
    </radialGradient>

    <!-- clip לבטן -->
    <clipPath id="belly-clip">
      <ellipse cx="200" cy="215" rx="92" ry="74"/>
    </clipPath>

    <!-- clip לעין שמאלית (לצורך עפעף) -->
    <clipPath id="eye-l-clip">
      <circle cx="158" cy="175" r="22"/>
    </clipPath>
    <clipPath id="eye-r-clip">
      <circle cx="242" cy="175" r="22"/>
    </clipPath>
  </defs>

  <!-- ===== זרועות (מתחת לגוף, יוצאות כקשת) ===== -->
  <!-- כל זרוע: <g class="arm aN" style="--arm-origin-x:..; --arm-origin-y:..">
       מסודרות מהאחורית-שמאלית עד האחורית-ימנית -->

  <!-- אחורית רחוקה שמאל -->
  <g class="arm a1" style="transform-box: fill-box; --arm-origin-x:50%; --arm-origin-y:8%;">
    <path d="M 132 270
             C 90 305, 65 340, 60 380
             C 60 392, 78 396, 88 386
             C 96 360, 112 335, 138 318 Z"
          fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- צדדית שמאל -->
  <g class="arm a2" style="transform-box: fill-box; --arm-origin-x:50%; --arm-origin-y:8%;">
    <path d="M 142 280
             C 122 330, 108 360, 110 400
             C 110 412, 128 414, 134 402
             C 140 370, 148 340, 162 312 Z"
          fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- קדמית-שמאל מורמת מעט (זרוע פעולה) -->
  <g class="arm a3" style="transform-box: fill-box; --arm-origin-x:50%; --arm-origin-y:8%;">
    <path d="M 162 296
             C 158 342, 156 372, 168 402
             C 172 412, 188 410, 188 398
             C 186 366, 188 336, 182 304 Z"
          fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- קדמית-מרכז-שמאל -->
  <g class="arm a4" style="transform-box: fill-box; --arm-origin-x:50%; --arm-origin-y:8%;">
    <path d="M 188 302
             C 196 348, 200 380, 210 408
             C 214 418, 230 416, 228 404
             C 224 374, 216 344, 208 308 Z"
          fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- קדמית-מרכז-ימין -->
  <g class="arm a5" style="transform-box: fill-box; --arm-origin-x:50%; --arm-origin-y:8%;">
    <path d="M 212 302
             C 220 348, 226 380, 238 408
             C 242 418, 258 416, 256 404
             C 252 374, 244 344, 236 308 Z"
          fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- קדמית-ימין מורמת מעט -->
  <g class="arm a6" style="transform-box: fill-box; --arm-origin-x:50%; --arm-origin-y:8%;">
    <path d="M 238 296
             C 242 342, 244 372, 232 402
             C 228 412, 212 410, 212 398
             C 214 366, 212 336, 218 304 Z"
          fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- צדדית ימין -->
  <g class="arm a7" style="transform-box: fill-box; --arm-origin-x:50%; --arm-origin-y:8%;">
    <path d="M 258 280
             C 278 330, 292 360, 290 400
             C 290 412, 272 414, 266 402
             C 260 370, 252 340, 238 312 Z"
          fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- אחורית רחוקה ימין -->
  <g class="arm a8" style="transform-box: fill-box; --arm-origin-x:50%; --arm-origin-y:8%;">
    <path d="M 268 270
             C 310 305, 335 340, 340 380
             C 340 392, 322 396, 312 386
             C 304 360, 288 335, 262 318 Z"
          fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- ===== גוף (ראש-גוף תמנון) ===== -->

  <!-- ראש -->
  <path d="M 200 70
           C 130 70, 90 130, 90 200
           C 90 250, 110 285, 130 300
           L 270 300
           C 290 285, 310 250, 310 200
           C 310 130, 270 70, 200 70 Z"
        fill="url(#body-grad)" stroke="#9D90D8" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- בטן רכה (clip ל-ellipse) -->
  <g clip-path="url(#belly-clip)">
    <rect x="100" y="140" width="200" height="180" fill="url(#belly-grad)"/>
    <!-- שלוש נקודות זוהר עדינות -->
    <circle cx="178" cy="245" r="3.5" fill="#FFF" opacity="0.7"/>
    <circle cx="208" cy="262" r="2.5" fill="#FFF" opacity="0.6"/>
    <circle cx="232" cy="240" r="3" fill="#FFF" opacity="0.65"/>
  </g>
  <ellipse cx="200" cy="215" rx="92" ry="74" fill="none"
           stroke="#E8C8CE" stroke-width="1.5" opacity="0.6"/>

  <!-- ברק עליון על הראש -->
  <ellipse cx="158" cy="118" rx="22" ry="12"
           fill="#FFFFFF" opacity="0.55" transform="rotate(-22 158 118)"/>
  <ellipse cx="138" cy="138" rx="8" ry="5"
           fill="#FFFFFF" opacity="0.4" transform="rotate(-22 138 138)"/>

  <!-- ===== לחיים ===== -->
  <circle cx="138" cy="200" r="14" fill="#FFD3D8" opacity="0.7"/>
  <circle cx="262" cy="200" r="14" fill="#FFD3D8" opacity="0.7"/>

  <!-- ===== עיניים ===== -->
  <!-- שמאלית -->
  <g>
    <circle cx="158" cy="175" r="22" fill="#FFFFFF"/>
    <circle cx="158" cy="175" r="20" fill="url(#eye-shine)"/>
    <circle cx="152" cy="168" r="6.5" fill="#FFFFFF"/>
    <circle cx="164" cy="180" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <!-- עפעף -->
    <g clip-path="url(#eye-l-clip)">
      <rect class="eyelid left" x="134" y="151" width="48" height="26" fill="#D9D2FF"/>
    </g>
  </g>

  <!-- ימנית -->
  <g>
    <circle cx="242" cy="175" r="22" fill="#FFFFFF"/>
    <circle cx="242" cy="175" r="20" fill="url(#eye-shine)"/>
    <circle cx="236" cy="168" r="6.5" fill="#FFFFFF"/>
    <circle cx="248" cy="180" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <g clip-path="url(#eye-r-clip)">
      <rect class="eyelid right" x="218" y="151" width="48" height="26" fill="#D9D2FF"/>
    </g>
  </g>

  <!-- ===== פה רך — חיוך פתוח קטן ===== -->
  <path d="M 188 232 Q 200 246 212 232"
        fill="none" stroke="#9D6B73" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- לשון קטנטנה (אופציונלי, רך מאוד) -->
  <path d="M 196 238 Q 200 243 204 238 Q 204 242 200 242 Q 196 242 196 238 Z"
        fill="#FFB0B8" opacity="0.85"/>
</svg>
