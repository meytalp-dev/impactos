<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="שונית גלי הצליל — רקע אי 2">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#CDF3FF"/>
      <stop offset="0.35" stop-color="#A8E8FF"/>
      <stop offset="0.72" stop-color="#73D9D1"/>
      <stop offset="1"    stop-color="#5FC8C6"/>
    </linearGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBEDE0"/>
      <stop offset="1" stop-color="#F0D9C4"/>
    </linearGradient>
    <radialGradient id="coralA" cx="0.4" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#FFC8AE"/>
      <stop offset="1" stop-color="#FF9E7F"/>
    </radialGradient>
    <radialGradient id="coralB" cx="0.4" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#FFE0E4"/>
      <stop offset="1" stop-color="#FFB9C2"/>
    </radialGradient>
    <radialGradient id="coralC" cx="0.4" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#E7E1FF"/>
      <stop offset="1" stop-color="#C9BEFF"/>
    </radialGradient>
  </defs>

  <!-- Water -->
  <rect width="1200" height="800" fill="url(#water)"/>

  <!-- Light rays from surface -->
  <g opacity="0.5">
    <polygon points="180,-40 320,-40 200,520 120,520" fill="url(#ray)"/>
    <polygon points="520,-40 610,-40 560,440 470,440" fill="url(#ray)"/>
    <polygon points="860,-40 1010,-40 940,500 820,500" fill="url(#ray)"/>
  </g>

  <!-- Distant reef silhouette -->
  <g opacity="0.22" fill="#4FB8C9">
    <path d="M0 640 q120 -90 240 -30 q120 -80 250 -10 q140 -70 280 0 q120 -60 240 -10 q100 -40 190 0 V800 H0 Z"/>
  </g>

  <!-- Sandy floor -->
  <path d="M0 690 q150 -46 320 -20 q210 34 430 4 q220 -30 450 8 V800 H0 Z" fill="url(#sand)"/>
  <path d="M0 690 q150 -46 320 -20 q210 34 430 4 q220 -30 450 8" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="4"/>

  <!-- ===== Left coral cluster ===== -->
  <g>
    <!-- seaweed -->
    <path d="M120 700 q-26 -70 6 -140 q-28 -66 6 -132" fill="none" stroke="#8ED9B8" stroke-width="16" stroke-linecap="round"/>
    <path d="M150 704 q22 -60 -4 -120 q22 -56 0 -110" fill="none" stroke="#7CD0AE" stroke-width="13" stroke-linecap="round"/>
    <!-- coral fans -->
    <circle cx="90"  cy="672" r="52" fill="url(#coralB)"/>
    <circle cx="150" cy="690" r="60" fill="url(#coralA)"/>
    <circle cx="60"  cy="706" r="40" fill="url(#coralC)"/>
    <g fill="#FFFFFF" opacity="0.5">
      <circle cx="80" cy="660" r="6"/><circle cx="150" cy="676" r="7"/><circle cx="120" cy="700" r="5"/>
    </g>
  </g>

  <!-- ===== Right coral cluster ===== -->
  <g>
    <path d="M1090 706 q30 -74 -4 -150 q30 -60 2 -122" fill="none" stroke="#8ED9B8" stroke-width="17" stroke-linecap="round"/>
    <path d="M1058 702 q-24 -60 2 -120" fill="none" stroke="#7CD0AE" stroke-width="12" stroke-linecap="round"/>
    <circle cx="1120" cy="678" r="58" fill="url(#coralA)"/>
    <circle cx="1055" cy="694" r="64" fill="url(#coralB)"/>
    <circle cx="1150" cy="712" r="42" fill="url(#coralC)"/>
    <g fill="#FFFFFF" opacity="0.5">
      <circle cx="1120" cy="664" r="7"/><circle cx="1060" cy="682" r="6"/><circle cx="1140" cy="706" r="5"/>
    </g>
  </g>

  <!-- ===== Center-low coral tuft ===== -->
  <g>
    <circle cx="600" cy="726" r="46" fill="url(#coralC)"/>
    <circle cx="648" cy="736" r="34" fill="url(#coralA)"/>
    <circle cx="556" cy="738" r="30" fill="url(#coralB)"/>
    <path d="M600 726 q-14 -50 4 -96" fill="none" stroke="#8ED9B8" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- Floating bubbles -->
  <g fill="#FFFFFF">
    <circle cx="240" cy="200" r="7"  opacity="0.5"/>
    <circle cx="300" cy="150" r="4"  opacity="0.4"/>
    <circle cx="470" cy="280" r="6"  opacity="0.45"/>
    <circle cx="720" cy="180" r="5"  opacity="0.4"/>
    <circle cx="780" cy="240" r="8"  opacity="0.5"/>
    <circle cx="960" cy="150" r="5"  opacity="0.4"/>
    <circle cx="1020" cy="220" r="6" opacity="0.45"/>
    <circle cx="150" cy="320" r="5"  opacity="0.4"/>
    <circle cx="560" cy="120" r="4"  opacity="0.4"/>
    <circle cx="860" cy="330" r="6"  opacity="0.4"/>
  </g>
</svg>
