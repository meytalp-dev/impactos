  <circle cx="30" cy="30" r="5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="212" cy="46" r="4" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="196" cy="26" r="3" fill="#FFFFFF" opacity="0.5"/>
