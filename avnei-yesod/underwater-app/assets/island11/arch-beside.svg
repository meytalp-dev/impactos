  </g>
  <path d="M56 68 Q88 94 118 68" fill="none" stroke="#C89257" stroke-width="2.4" stroke-linecap="round" opacity="0.8"/>
  <!-- fish BESIDE the bridge (to the right, outside) -->
  <g transform="translate(196,100)">
    <path d="M14 0 L31 -12 L31 12 Z" fill="#FFCE9E" stroke="#E07B3E" stroke-width="2.4" stroke-linejoin="round"/>
    <ellipse cx="0" cy="0" rx="20" ry="13" fill="#FFAE6B" stroke="#E07B3E" stroke-width="2.6"/>
    <path d="M-3 12 Q2 20 10 14" fill="none" stroke="#E07B3E" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="-11" cy="-3" r="2.8" fill="#26505C"/>
  </g>
</svg>
