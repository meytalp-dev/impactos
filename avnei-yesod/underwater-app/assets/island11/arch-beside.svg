<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 168" role="img" aria-label="הַדָּג לְיַד הַגֶּשֶׁר">
  <rect x="0" y="0" width="240" height="168" rx="18" fill="#EAF7FB"/>
  <circle cx="30" cy="30" r="5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="150" cy="30" r="4" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="134" cy="16" r="3" fill="#FFFFFF" opacity="0.5"/>
  <path d="M0 150 Q60 138 120 148 Q180 158 240 146 L240 168 L0 168 Z" fill="#F3E3C7" stroke="#E4CFA6" stroke-width="2"/>
  <!-- bridge pushed left so the fish sits clearly to its side -->
  <g stroke="#C89257" stroke-width="3" stroke-linejoin="round">
    <rect x="30" y="66" width="24" height="80" rx="9" fill="#E9C7A0"/>
    <rect x="120" y="66" width="24" height="80" rx="9" fill="#E9C7A0"/>
