<html lang="he" dir="rtl">
<head>

  <!-- ============================================================================
       stage-6-fast-fish.html — אי 6 · "דָּג מָהִיר" (הבזק מתקצר, אדפטיבי)
       לוח בניית האיים N6 · 7.7.2026
       ליבה: mechanic-flash-word דרך js/shared/island6-game.js (bootFast).
       מדידה: response_time_ms על תשובה נכונה · primary_island_id=6 · המילה ב-item_id.
       ============================================================================ -->
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100dvh;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      color: var(--text-main, #26505C); direction: rtl; overflow-x: hidden;
    }
    .scene-bg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center bottom; z-index: 0; pointer-events: none;
    }
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 12px 18px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }
    .top-bar a.back {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.85); color: var(--text-main, #26505C);
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 20px; font-weight: 900;
      box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    .top-bar .title { font-size: clamp(15px, 3.4vw, 19px); font-weight: 800; }
    .top-bar .counter {
      height: 40px; padding: 0 14px; border-radius: var(--radius-pill, 999px);
      background: rgba(255,255,255,0.85); display: inline-flex; align-items: center;
      font-size: 14px; font-weight: 700; box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    main { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; padding: 14px 18px 30px; }

    .pearls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 4px auto 12px; }
    .pearl {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.7);
      box-shadow: inset 0 -2px 4px rgba(38,80,92,0.12); transition: all 0.35s ease;
    }
    .pearl.filled {
      background: radial-gradient(circle at 35% 30%, #FFF 0%, #CFEFF6 45%, #8FD6E6 100%);
      border-color: #FFF; box-shadow: 0 0 10px rgba(143,214,230,0.8);
    }
    .pearl.just-added { transform: scale(1.6); box-shadow: 0 0 16px 4px rgba(255,231,168,0.9); }

    .noni-row { display: flex; align-items: flex-end; gap: 10px; max-width: 620px; margin: 0 auto 10px; min-height: 64px; }
    .noni-row img { width: clamp(64px, 13vw, 96px); flex: 0 0 auto; filter: drop-shadow(0 6px 10px rgba(38,80,92,0.25)); }
    .bubble {
      position: relative; flex: 1;
      background: rgba(255,255,255,0.92); border-radius: var(--radius-lg, 28px);
      padding: 12px 16px; font-size: clamp(16px, 3.6vw, 20px); font-weight: 700;
      line-height: 1.5; box-shadow: 0 4px 16px rgba(38,80,92,0.14);
      display: flex; align-items: center; gap: 10px;
    }
    .bubble::before {
      content: ''; position: absolute; inset-inline-start: -8px; bottom: 16px;
      border: 9px solid transparent; border-inline-end-color: rgba(255,255,255,0.92);
    }
    .noni-row[hidden] { display: none; }

    #mountRoot { position: relative; min-height: 46vh; }

    /* ---------- ליבת mechanic-flash-word ---------- */
    .mechanic-flash-word { display: flex; flex-direction: column; align-items: center; }
    .fw-stage {
      position: relative;
      min-height: 150px; width: 100%;
      display: flex; align-items: center; justify-content: center;
      margin: 6px 0 18px;
    }
    .fw-fish {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 190px; min-height: 108px; padding: 20px 42px 20px 30px;
      background: radial-gradient(circle at 72% 42%, #FFF6DF 0%, #FFE9A8 55%, #FFD36B 100%);
      border-radius: 50% 46% 46% 50% / 60% 60% 40% 40%;
      box-shadow: 0 12px 26px rgba(38,80,92,0.22), inset 0 3px 10px rgba(255,255,255,0.7);
      animation: fw-swim 2.6s ease-in-out infinite;
    }
    /* זנב הדג */
    .fw-fish::after {
      content: ''; position: absolute; inset-inline-start: -22px; top: 50%;
      width: 0; height: 0; transform: translateY(-50%);
      border-top: 26px solid transparent; border-bottom: 26px solid transparent;
      border-inline-end: 30px solid #FFD36B;
    }
    /* עין */
    .fw-fish::before {
      content: ''; position: absolute; inset-inline-end: 20px; top: 30px;
      width: 9px; height: 9px; border-radius: 50%; background: #2B4A54;
    }
    @keyframes fw-swim { 0%,100% { transform: translateX(0) rotate(-1.5deg); } 50% { transform: translateX(-10px) rotate(1.5deg); } }
    .fw-word { font-size: clamp(34px, 9vw, 56px); font-weight: 900; color: var(--deep, #1E3D47); letter-spacing: 1px; }
    .fw-fish.is-diving { animation: fw-dive 0.42s ease-in forwards; }
    @keyframes fw-dive { to { transform: translateY(70px) scale(0.6); opacity: 0; } }
    .fw-fish.is-hidden { visibility: hidden; }
    .fw-fish.is-won { animation: fw-won 0.9s ease-in-out; }
    @keyframes fw-won { 0%,100% { transform: translateY(0) scale(1); } 40% { transform: translateY(-14px) scale(1.08); } }

    .fw-replay {
      position: absolute; bottom: -4px; inset-inline-end: 6px;
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.92); border: none; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; font-size: 22px;
      box-shadow: 0 4px 12px rgba(38,80,92,0.2);
    }
    .fw-replay:active { transform: scale(0.94); }

    .fw-options {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      width: 100%; max-width: 640px;
      opacity: 0; transform: translateY(10px); pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .fw-options.is-revealed { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .fw-option {
      min-height: 92px; padding: 14px 10px;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.95);
      border: 3px solid rgba(143,214,230,0.55); border-radius: var(--radius-lg, 26px);
      cursor: pointer; font-family: inherit;
      box-shadow: 0 8px 20px rgba(38,80,92,0.14);
      transition: transform 0.14s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .fw-option:active { transform: scale(0.96); }
    .fw-option__label { font-size: clamp(26px, 6.4vw, 38px); font-weight: 800; color: var(--deep, #1E3D47); }
    .fw-option.picked { background: #E9FBF2; border-color: var(--success, #7CE7B4); }
    .fw-option.hint-glow { border-color: var(--gold-hint, #FFC94D); box-shadow: 0 0 0 4px rgba(255,201,77,0.35), 0 8px 20px rgba(38,80,92,0.14); }
    .fw-option.wrong-sway { animation: fw-sway 0.65s ease; }
    @keyframes fw-sway { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-9px) rotate(-3deg);} 60%{transform:translateX(9px) rotate(3deg);} }

    .fw-feedback { min-height: 30px; margin-top: 12px; font-size: 22px; font-weight: 900; text-align: center; }
    .fw-feedback--ok { color: #2E7A66; }

    @media (max-width: 520px) {
      .fw-option__label { font-size: 26px; }
      .fw-options { gap: 8px; }
    }

    /* start veil */
    .start-veil { position: fixed; inset: 0; z-index: 20; background: rgba(38,80,92,0.35); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .start-veil[hidden] { display: none; }
    .start-card { background: #fff; border-radius: var(--radius-lg, 28px); max-width: 420px; width: 100%; padding: 26px 24px; text-align: center; box-shadow: 0 18px 50px rgba(38,80,92,0.3); }
    .start-card img { width: 110px; }
    .start-card h1 { font-size: clamp(20px, 5vw, 26px); font-weight: 900; margin: 8px 0 6px; }
    .start-card p { font-size: 15px; color: var(--text-soft, #4D6F78); margin: 0 0 18px; line-height: 1.55; }
    .start-card button {
      min-height: 60px; width: 100%; border: none; border-radius: var(--radius-pill, 999px);
      background: var(--water-secondary, #73D9D1); color: #fff; cursor: pointer;
      font-family: inherit; font-size: 22px; font-weight: 900; box-shadow: 0 8px 22px rgba(115,217,209,0.55);
    }
    .start-card button:active { transform: scale(0.97); }

    .finish { text-align: center; padding: 30px 10px; }
    .finish img { width: 140px; animation: finishBob 1.6s ease-in-out infinite; }
    @keyframes finishBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    .finish h2 { font-size: clamp(24px, 6vw, 32px); font-weight: 900; margin: 10px 0 4px; }
    .finish p { font-size: 16px; color: var(--text-soft, #4D6F78); margin: 0 0 20px; }
    .finish .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .finish button, .finish a {
      min-height: 56px; padding: 0 26px; border: none; border-radius: var(--radius-pill, 999px);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 18px; font-weight: 800; cursor: pointer; text-decoration: none;
    }
    .finish .again { background: var(--water-secondary, #73D9D1); color: #fff; box-shadow: 0 8px 22px rgba(115,217,209,0.55); }
    .finish .home { background: rgba(255,255,255,0.9); color: var(--text-main, #26505C); box-shadow: 0 4px 14px rgba(38,80,92,0.15); }

    @media (prefers-reduced-motion: reduce) {
      .fw-fish, .finish img { animation: none !important; }
    }
  </style>
</head>
<body>
  <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true" onerror="this.style.display='none'">

  <div class="top-bar">
    <a class="back" href="#" id="backBtn" aria-label="חזרה">→</a>
    <span class="title">דָּג מָהִיר · אִי 6</span>
    <span class="counter" id="counter">—</span>
  </div>

  <main>
    <div class="pearls" id="pearls" aria-hidden="true"></div>
    <div class="noni-row" id="noniRow" hidden>
      <img id="noniImg" src="assets/noni-idle.png" alt="נוני" onerror="this.style.display='none'">
      <div class="bubble"><span id="promptText" lang="he"></span></div>
    </div>
    <div id="mountRoot"></div>
  </main>

  <div class="start-veil" id="startVeil" hidden>
    <div class="start-card">
      <img src="assets/noni-thinking.png" alt="נוני" onerror="this.src='assets/noni-idle.png'">
      <h1>דָּג מָהִיר</h1>
      <p>דָּג נוֹשֵׂא מִילָּה יַבְזִיק וְיִצְלֹל.<br>זַהוּ אֶת הַמִּילָּה מַהֵר — וְהַקִּישׁוּ עָלֶיהָ!</p>
      <button id="startBtn">מַתְחִילִים!</button>
    </div>
  </div>

  <script src="js/state.js?v=2026-07-07"></script>
  <script src="js/shared/audio.js?v=2026-07-07"></script>
  <script src="js/shared/noni.js?v=2026-07-07"></script>
  <script src="js/shared/epa.js?v=2026-07-07"></script>
  <script src="js/shared/bkt.js?v=2026-07-07"></script>
  <script src="js/shared/event-logger.js?v=2026-07-07"></script>
  <script src="js/templates/mechanic-flash-word.js?v=2026-07-07"></script>
  <script src="js/shared/island6-game.js?v=2026-07-07"></script>
  <script>
    AvneiIsland6Game.bootFast();
  </script>
</body>
</html>
