<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>בניית מילים · אי 5</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css?v=2026-05-30c">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <style>
    :root {
      --accent: var(--text-main);
      --accent-2: #4FB8C9;
      --tile-bg: #FFFFFF;
      --tile-border: rgba(38,80,92,0.18);
      --tile-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100dvh;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      color: var(--text-main);
      direction: rtl;
      overflow-x: hidden;
    }
    .scene-bg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center bottom;
      z-index: 0; pointer-events: none;
    }
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .top-bar a {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      color: var(--text-main);
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none;
      box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    .top-bar .title {
      font-weight: 800; font-size: 16px;
      background: rgba(255,255,255,0.85);
      padding: 8px 18px; border-radius: var(--radius-pill);
    }
    main {
      padding: 16px;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* === word-build === */
    .word-build-prompt {
      text-align: center;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 600;
      margin: 14px 0 18px;
      color: var(--accent);
    }
    .word-build-area {
      display: flex; justify-content: center; align-items: center; gap: 8px;
      min-height: 90px;
      padding: 14px;
      margin: 0 auto 14px;
      background: rgba(255,255,255,0.85);
      border-radius: var(--radius-md);
      border: 2px dashed rgba(38,80,92,0.25);
      max-width: 540px;
    }
    .word-build-placeholder {
      color: #c0d0d8;
      font-size: clamp(20px, 4.5vw, 28px);
      font-weight: 700;
    }
    .word-build-part {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 900;
      color: var(--accent);
      animation: pop 0.4s ease-out;
    }
    .word-build-controls {
      display: flex; justify-content: center; gap: 10px;
      margin: 0 0 18px;
      flex-wrap: wrap;
    }
    .word-build-undo, .word-build-play, .word-build-clear {
      height: 48px;
      padding: 0 22px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius-pill);
      background: white;
      color: var(--accent);
      border: 2px solid var(--accent-2);
      cursor: pointer;
      box-shadow: var(--tile-shadow);
    }
    .word-build-play {
      background: var(--accent-2);
      color: white;
    }
    .word-build-vowel-bar {
      display: flex; justify-content: center; gap: 8px;
      margin: 8px 0 14px;
      flex-wrap: wrap;
    }
    .word-build-vowel-btn {
      height: 44px;
      padding: 0 18px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      border-radius: 14px;
      background: white;
      color: var(--accent);
      border: 2px solid rgba(38,80,92,0.18);
      cursor: pointer;
    }
    .word-build-vowel-btn.active {
      background: var(--mint);
      border-color: #6BCB9A;
    }
    .word-build-letter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      gap: 12px;
      margin-top: 8px;
    }
    .word-build-letter-btn {
      aspect-ratio: 1 / 1;
      display: flex; align-items: center; justify-content: center;
      background: var(--tile-bg);
      border: 2px solid var(--tile-border);
      border-radius: var(--radius-md);
      box-shadow: var(--tile-shadow);
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 900;
      color: var(--accent);
      transition: transform 0.15s ease;
    }
    .word-build-letter-btn:hover { transform: scale(1.03); }
    .word-build-letter-btn:active { transform: scale(0.96); }

    @keyframes pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .noni-hint {
      text-align: center;
      margin: 18px auto 0;
      max-width: 480px;
      font-size: 14px;
      color: var(--text-soft);
      background: rgba(255,255,255,0.7);
      border-radius: var(--radius-md);
      padding: 10px 16px;
    }
  </style>
<script src="../../demo/journey.js" defer></script>
</head>
<body>

  <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
       onerror="this.style.display='none'">

  <header class="top-bar">
    <a href="stage-5-island.html" aria-label="חזרה לאי">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="title">בְּנִיַּת מִילִּים</div>
    <div style="width:44px"></div>
  </header>

  <main>
    <div id="gameRoot"></div>
    <p class="noni-hint">
      בָּחֲרוּ נִקּוּד, אַחַר כָּךְ אוֹתִיּוֹת — וְלַחֲצוּ 🔊 לִשְׁמֹעַ מָה בְּנִיתֶם.
    </p>
  </main>

  <script src="js/shared/audio.js" onerror="window._audioMissing=true"></script>
  <script src="js/shared/vowel-adapter.js"></script>
  <script src="js/shared/word-adapter.js"></script>
  <script src="js/templates/mechanic-word-build.js"></script>

  <script>
    (function () {
      'use strict';
      // Auto-unlock audio (iOS)
      document.addEventListener('click', function unlock() {
        if (window.AvneiAudio && typeof window.AvneiAudio.unlock === 'function') {
          try { window.AvneiAudio.unlock(); } catch (e) {}
        }
        document.removeEventListener('click', unlock);
      }, { once: true });

      const impl = window.AvneiMechanics && window.AvneiMechanics['word-build'];
      if (!impl) {
        document.getElementById('gameRoot').textContent = 'mechanic-word-build לא נטען';
        return;
      }
      impl.mount(document.getElementById('gameRoot'), {
        letters: ['מ', 'ב', 'ר', 'ק', 'ת'],
        vowels: ['patach', 'kamatz', 'hiriq'],
        maxParts: 4,
      });
    })();
  </script>
</body>
</html>
