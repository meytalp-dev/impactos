<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>חוֹתֶמֶת הַמִּשְׁפָּחָה · אי 9</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- ==========================================================================
       stage-9-root-stamp.html — אי 9 · משחקון 2: חוֹתֶמֶת הַמִּשְׁפָּחָה
       C9 · 6.7.2026 · מורכב על ליבת mechanic-mcq (config-driven, EPA פר-מסיח)

       נוני מציגה חותמת (3 אותיות, מוצגות ומושמעות כצלילים sound-*.mp3 הקיימים),
       והילדים מקישים על המילה שהחותמת מסתתרת בתוכה (1 מתוך 3). אחרי תשובה
       נכונה: אותיות-החותמת נדלקות בתוך המילה שנבחרה — פידבק ויזואלי בלבד.

       פדגוגיה: מציאת השורש בתוך מילים — זיהוי דמיון, בלי מינוח דקדוקי.
       מאגר: js/shared/island-9-families.js (אפס חפיפות-שורש בין משפחות —
       כל מילה ממשפחה אחרת = מסיח בטוח, מאומת ב-node).

       logging: primary_island_id=9 · characteristic_id='isl9-root-stamp-find'
       (אין פריט שורש/משפחות בבנק — מזהה יציב משלנו; EPA G4 ממפתח לפיו).
       ========================================================================== -->
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100dvh;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      color: var(--text-main); direction: rtl; overflow-x: hidden;
    }
    .scene-bg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center bottom;
      z-index: 0; pointer-events: none;
    }
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 12px 18px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }
    .top-bar a.back {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.85); color: var(--text-main);
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 20px; font-weight: 900;
      box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    .top-bar .title { font-size: clamp(15px, 3.4vw, 19px); font-weight: 800; }
    .top-bar .counter {
      height: 40px; padding: 0 14px; border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.85); display: inline-flex; align-items: center;
      font-size: 14px; font-weight: 700; box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    main {
      position: relative; z-index: 2;
      max-width: 760px; margin: 0 auto;
      padding: 14px 18px 30px;
    }
    .pearls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 4px auto 12px; }
    .pearl {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.7);
      box-shadow: inset 0 -2px 4px rgba(38,80,92,0.12); transition: all 0.35s ease;
    }
    .pearl.filled {
      background: radial-gradient(circle at 35% 30%, #FFF 0%, #CFEFF6 45%, #8FD6E6 100%);
      border-color: #FFF; box-shadow: 0 0 10px rgba(143,214,230,0.8);
    }
    .pearl.just-added { transform: scale(1.6); box-shadow: 0 0 16px 4px rgba(255,231,168,0.9); }

    .noni-row {
      display: flex; align-items: flex-end; gap: 10px;
      max-width: 620px; margin: 0 auto 10px; min-height: 64px;
    }
    .noni-row img { width: clamp(64px, 13vw, 96px); flex: 0 0 auto; filter: drop-shadow(0 6px 10px rgba(38,80,92,0.25)); }
    .noni-row[hidden] { display: none; }
    .bubble {
      position: relative; flex: 1;
      background: rgba(255,255,255,0.92); border-radius: var(--radius-lg);
      padding: 12px 16px; font-size: clamp(16px, 3.6vw, 20px); font-weight: 700;
      line-height: 1.5; box-shadow: 0 4px 16px rgba(38,80,92,0.14);
      display: flex; align-items: center; gap: 10px;
    }
    .bubble::before {
      content: ''; position: absolute; inset-inline-start: -8px; bottom: 16px;
      border: 9px solid transparent; border-inline-end-color: rgba(255,255,255,0.92);
    }
    .bubble .say {
      flex: 0 0 auto; width: 48px; height: 48px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 22px;
      background: var(--water-secondary); color: #fff;
      box-shadow: 0 4px 12px rgba(115,217,209,0.55);
    }
    .bubble .say:active { transform: scale(0.94); }

    #mountRoot { position: relative; min-height: 46vh; }

    /* החותמת — כרטיס-stem בצורת חותמת עגולה עם 3 האותיות */
    .mechanic-mcq .mcq-stem-card--text.stamp-card {
      font-size: clamp(34px, 8vw, 50px);
      font-weight: 900;
      letter-spacing: 0.12em;
      border-radius: 999px;
      border: 4px dashed rgba(199, 120, 0, 0.55);
      background: linear-gradient(180deg, rgba(255,250,235,0.96) 0%, rgba(255,240,214,0.94) 100%);
      padding-inline: clamp(28px, 7vw, 48px);
      box-shadow: 0 10px 26px rgba(38,80,92,0.16), inset 0 0 18px rgba(255, 210, 120, 0.35);
    }

    /* אופציות-המילים — מנוקדות, גדולות */
    .mechanic-mcq .mcq-option--text .mcq-option__label {
      font-size: clamp(24px, 5.6vw, 36px);
      font-weight: 900;
    }
    /* אותיות-החותמת שנדלקות במילה הנכונה אחרי הבחירה */
    .root-glow {
      color: #C77800;
      text-shadow: 0 0 12px rgba(255, 200, 90, 0.8);
    }

    /* מסך פתיחה — שכבת 35% בלבד */
    .start-veil {
      position: fixed; inset: 0; z-index: 20;
      background: rgba(38,80,92,0.35);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .start-veil[hidden] { display: none; }
    .start-card {
      background: #fff; border-radius: var(--radius-lg); max-width: 420px; width: 100%;
      padding: 26px 24px; text-align: center; box-shadow: 0 18px 50px rgba(38,80,92,0.3);
    }
    .start-card img { width: 110px; }
    .start-card h1 { font-size: clamp(20px, 5vw, 26px); font-weight: 900; margin: 8px 0 6px; }
    .start-card p { font-size: 16px; color: var(--text-soft); margin: 0 0 18px; line-height: 1.6; }
    .start-card button {
      min-height: 60px; width: 100%; border: none; border-radius: var(--radius-pill);
      background: var(--water-secondary); color: #fff; cursor: pointer;
      font-family: inherit; font-size: 22px; font-weight: 900;
      box-shadow: 0 8px 22px rgba(115,217,209,0.55);
    }
    .start-card button:active { transform: scale(0.97); }

    /* מסך סיום */
    .finish { text-align: center; padding: 30px 10px; }
    .finish img { width: 140px; animation: finishBob 1.6s ease-in-out infinite; }
    @keyframes finishBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    .finish h2 { font-size: clamp(24px, 6vw, 32px); font-weight: 900; margin: 10px 0 4px; }
    .finish p { font-size: 16px; color: var(--text-soft); margin: 0 0 20px; }
    .finish .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .finish button, .finish a {
      min-height: 56px; padding: 0 26px; border: none; border-radius: var(--radius-pill);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 18px; font-weight: 800; cursor: pointer;
      text-decoration: none;
    }
    .finish .again { background: var(--water-secondary); color: #fff; box-shadow: 0 8px 22px rgba(115,217,209,0.55); }
    .finish .home { background: rgba(255,255,255,0.9); color: var(--text-main); box-shadow: 0 4px 14px rgba(38,80,92,0.15); }

    @media (max-width: 560px) {
      .noni-row { min-height: 56px; }
      .noni-row img { width: 58px; }
    }
  </style>
</head>
<body>
  <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
       onerror="this.style.display='none'">

  <div class="top-bar">
    <a class="back" href="stage-9-island.html" id="backBtn" aria-label="חזרה">→</a>
    <span class="title">חוֹתֶמֶת הַמִּשְׁפָּחָה</span>
    <span class="counter" id="counter">—</span>
  </div>

  <main>
    <div class="pearls" id="pearls" aria-hidden="true"></div>
    <div class="noni-row" id="noniRow" hidden>
      <img id="noniImg" src="assets/noni-idle.png" alt="נוני" onerror="this.style.display='none'">
      <div class="bubble">
        <span id="promptText" lang="he"></span>
        <button class="say" id="sayBtn" aria-label="הַקְשִׁיבוּ שׁוּב" hidden>🔊</button>
      </div>
    </div>
    <div id="mountRoot"></div>
  </main>

  <div class="start-veil" id="startVeil" hidden>
    <div class="start-card">
      <img src="assets/noni-surprised.png" alt="נוני" onerror="this.style.display='none'">
      <h1>חוֹתֶמֶת הַמִּשְׁפָּחָה</h1>
      <p>נוּנִי מָצְאָה חוֹתָמוֹת שֶׁל מִשְׁפְּחוֹת הָאַלְמוֹגִים!<br>
         לְכֹל חוֹתֶמֶת — שָׁלוֹשׁ אוֹתִיּוֹת.<br>
         מִצְאוּ אֶת הַמִּלָּה שֶׁהַחוֹתֶמֶת מִסְתַּתֶּרֶת בְּתוֹכָהּ.</p>
      <button id="startBtn">מַתְחִילִים!</button>
    </div>
  </div>

  <!-- shared engine -->
  <script src="js/state.js?v=2026-07-06"></script>
  <script src="js/shared/audio.js?v=2026-07-06"></script>
  <script src="js/shared/noni.js?v=2026-07-06"></script>
  <script src="js/shared/vowel-adapter.js?v=2026-07-06"></script>
  <script src="js/shared/epa.js?v=2026-07-06"></script>
  <script src="js/shared/bkt.js?v=2026-07-06"></script>
  <script src="js/shared/event-logger.js?v=2026-07-06"></script>
  <script src="js/shared/island-9-families.js?v=2026-07-06"></script>
  <script src="js/templates/mechanic-mcq.js?v=2026-07-06"></script>

  <script>
  (function () {
    'use strict';

    var F = window.Isl9Families;
    var SEP = '־';

    var CID = 'isl9-root-stamp-find';
    var ISLAND = 9;
    var ROUNDS = 6;
    var PROMPT = 'אֵיזוֹ מִלָּה שַׁיֶּכֶת לַמִּשְׁפָּחָה? הַקִּישׁוּ עָלֶיהָ.';
    // טעות = החותמת לא אותרה בתוך המילה
    var EPA_WRONG = { what: 'Comprehension', where: 'isolation', task: 'find' };
    var THEMES = ['treasure', 'shells', 'fish', 'bubbles'];

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    // צלילי אותיות-החותמת (sound-*.mp3 קיימים ועברו QA — אין אודיו חדש כאן)
    function stampSoundKeys(letters) {
      var map = (window.AvneiAudio && window.AvneiAudio.LETTER_TO_SOUND_FILE) || {};
      return letters.map(function (l) { return map[l] || null; }).filter(Boolean);
    }
    function playStamp(letters) {
      try { window.AvneiAudio.playSequence(stampSoundKeys(letters), 250); } catch (e) {}
    }

    function buildQueue() {
      var fams = shuffle(F.FAMILIES).slice(0, ROUNDS);
      return fams.map(function (fam, i) {
        var correct = shuffle(fam.words)[0];
        // מסיחים ממשפחות אחרות — מאומת שאף מילה זרה לא מכילה את רצף-החותמת
        var others = shuffle(F.FAMILIES.filter(function (f) { return f !== fam; })).slice(0, 2)
          .map(function (f) { return shuffle(f.words)[0]; })
          .filter(function (wd) { return !F.containsRoot(wd.w, fam.letters); })
          .slice(0, 2);
        return {
          interaction: 'root_in_word',
          questId: 'isl9-stamp-' + fam.id,
          item_id: 'isl9-stamp-' + fam.id + '-' + correct.audio.replace('isl9-w-', ''),
          characteristic_id: CID,
          primary_island_id: ISLAND,
          promptLine: PROMPT,
          theme: THEMES[i % THEMES.length],
          _letters: fam.letters,
          _word: correct.w,
          stem: { mode: 'text', text_he: fam.letters.join(' ' + SEP + ' ') },
          options: [
            { mode: 'text', label_he: correct.w, is_correct: true, epa: null },
          ].concat(others.map(function (wd) {
            return { mode: 'text', label_he: wd.w, is_correct: false, epa: EPA_WRONG };
          })),
        };
      });
    }

    var $ = function (id) { return document.getElementById(id); };
    var root = $('mountRoot');
    var current = null;
    var queue = [];
    var idx = 0;

    $('backBtn').addEventListener('click', function (e) {
      e.preventDefault();
      if (history.length > 1) history.back(); else location.href = 'stage-9-island.html';
    });

    function renderPearls() {
      var el = $('pearls');
      el.innerHTML = '';
      queue.forEach(function (_, i) {
        var p = document.createElement('span');
        p.className = 'pearl' + (i < idx ? ' filled' : '');
        el.appendChild(p);
      });
    }

    function showFinish() {
      $('noniRow').hidden = true;
      $('counter').textContent = queue.length + ' / ' + queue.length;
      root.innerHTML =
        '<div class="finish">' +
        '<img src="assets/noni-happy.png" alt="נוני שמחה" onerror="this.style.display=\'none\'">' +
        '<h2>מְעוּלֶה!</h2>' +
        '<p>מְצָאתֶם אֶת כֹּל חוֹתְמוֹת הַמִּשְׁפָּחוֹת!</p>' +
        '<div class="btns">' +
        '<button class="again" id="againBtn">עוֹד פַּעַם</button>' +
        '<a class="home" href="stage-9-island.html">חֲזָרָה לָאִי</a>' +
        '</div></div>';
      $('againBtn').addEventListener('click', function () { location.reload(); });
      try { window.AvneiAudio.play(['all-done', 'all-done-2', 'all-done-3'][Math.floor(Math.random() * 3)]); } catch (e) {}
    }

    function mountNext() {
      if (current && current.unmount) { try { current.unmount(); } catch (e) {} }
      current = null;
      renderPearls();
      if (idx >= queue.length) { showFinish(); return; }

      var cfg = queue[idx];
      $('counter').textContent = (idx + 1) + ' / ' + queue.length;
      $('noniRow').hidden = false;
      $('promptText').textContent = cfg.promptLine;

      // 🔊 בבועת נוני — משמיע שוב את צלילי אותיות-החותמת
      var say = $('sayBtn');
      say.hidden = false;
      say.onclick = function () { playStamp(cfg._letters); };

      // אחרי תשובה נכונה: אותיות-החותמת נדלקות בתוך המילה שנבחרה (ויזואלי בלבד)
      cfg.onUnitWon = function () {
        try {
          var label = root.querySelector('.mcq-option.picked .mcq-option__label');
          var html = F.highlightRoot(cfg._word, cfg._letters);
          if (label && html) label.innerHTML = html;
        } catch (e) {}
      };

      cfg.onComplete = function () {
        idx++;
        renderPearls();
        var pearls = document.querySelectorAll('.pearl');
        var p = pearls[idx - 1];
        if (p) { p.classList.add('just-added'); setTimeout(function () { p.classList.remove('just-added'); }, 600); }
        setTimeout(mountNext, 250);
      };

      current = window.AvneiMechanics['mcq'].mount(root, cfg);

      // עיצוב כרטיס-החותמת + השמעת צלילי האותיות פעם אחת ב-mount של הסבב
      var stemCard = root.querySelector('.mcq-stem-card--text');
      if (stemCard) {
        stemCard.classList.add('stamp-card');
        stemCard.setAttribute('role', 'button');
        stemCard.setAttribute('aria-label', 'הַחוֹתֶמֶת: ' + cfg._letters.join(', ') + ' — הַקִּישׁוּ לְהַשְׁמָעָה');
        stemCard.style.cursor = 'pointer';
        stemCard.addEventListener('click', function () { playStamp(cfg._letters); });
      }
      setTimeout(function () {
        try {
          if (!window.AvneiAudio.isUnlocked || window.AvneiAudio.isUnlocked()) playStamp(cfg._letters);
        } catch (e) {}
      }, 350);
    }

    function boot() {
      queue = buildQueue();
      renderPearls();
      $('startVeil').hidden = false;
      $('startBtn').addEventListener('click', function () {
        try { if (window.AvneiAudio.unlock) window.AvneiAudio.unlock(); } catch (e) {}
        $('startVeil').hidden = true;
        idx = 0;
        // בזמן הוראת-המשימה המסך לא ריק — נוני והבועה כבר מוצגות
        $('noniRow').hidden = false;
        $('promptText').textContent = PROMPT;
        // הוראת המשימה — פעם אחת, בפתיחה; הסבב הראשון עולה רק אחריה
        // (השמעת צלילי-החותמת ב-mount הייתה קוטעת אותה), עם גיבוי-זמן אם אין קובץ.
        var started = false;
        function begin() { if (!started) { started = true; mountNext(); } }
        try {
          var m = window.AvneiAudio.preload('mission-isl09-root-stamp');
          m.onended = begin;
          m.onerror = begin;
          window.AvneiAudio.play('mission-isl09-root-stamp');
          setTimeout(begin, 9000);
        } catch (e) { begin(); }
      });
    }

    boot();
  })();
  </script>
</body>
</html>
