<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>אבני יסוד</title>

  <!-- PWA manifest support — allows "Add to Home Screen" on tablet -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="אבני יסוד">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg, #B9F0E8 0%, #7FD8D2 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text-main);
    }
    .center {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .splash {
      font-size: 80px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 36px;
      color: var(--deep);
      margin: 0 0 8px;
      font-weight: 800;
    }
    .subtitle {
      font-size: 18px;
      color: var(--text-soft);
      margin: 0 0 32px;
    }
    .welcome-card {
      background: var(--warm-white);
      border-radius: var(--radius-lg, 28px);
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(38, 80, 92, 0.18);
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .student-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--deep);
      margin: 0 0 8px;
    }
    .class-name {
      font-size: 16px;
      color: var(--text-soft);
      margin: 0 0 24px;
    }
    .start-btn {
      display: inline-block;
      padding: 18px 48px;
      background: var(--water-secondary);
      color: white;
      border: none;
      border-radius: var(--radius-pill, 999px);
      font-family: 'Heebo', sans-serif;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s, background 0.2s;
      box-shadow: 0 8px 24px rgba(115, 217, 209, 0.4);
    }
    .start-btn:hover  { background: #5fc4be; }
    .start-btn:active { transform: scale(0.97); }

    .error-card {
      background: var(--warm-white);
      border-radius: var(--radius-lg, 28px);
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(38, 80, 92, 0.18);
    }
    .error-card .icon {
      font-size: 56px;
      margin-bottom: 12px;
    }
    .error-card h2 {
      font-size: 22px;
      color: var(--deep);
      margin: 0 0 12px;
    }
    .error-card p {
      font-size: 16px;
      color: var(--text-soft);
      line-height: 1.6;
      margin: 0;
    }

    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--water-soft);
      border-top-color: var(--water-secondary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="center">

  <!-- Loading state -->
  <div id="view-loading">
    <div class="loading-spinner"></div>
    <p class="subtitle">רגע אחד...</p>
  </div>

  <!-- Welcome state -->
  <div id="view-welcome" class="welcome-card hidden">
    <div class="splash">🐟</div>
    <p class="subtitle">שלום</p>
    <h2 class="student-name" id="student-name">—</h2>
    <p class="class-name" id="class-name">—</p>
    <button class="start-btn" id="start-btn">בואי נתחיל</button>
  </div>

  <!-- Error state -->
  <div id="view-error" class="error-card hidden">
    <div class="icon">🌊</div>
    <h2 id="error-title">קישור לא תקין</h2>
    <p id="error-message">הקישור הזה כבר לא פעיל. אנא דברו עם המורה.</p>
  </div>

</div>

<!-- SkillUnits + dependencies (needed to restore cloud-pushed targets) -->
<script src="js/state.js"></script>
<script src="js/shared/letter-targets.js"></script>
<script src="js/shared/vowel-adapter.js"></script>
<script src="js/shared/word-adapter.js"></script>
<script src="js/shared/skill-units.js"></script>

<!-- Cloud stack -->
<script src="js/shared/cloud-config.js"></script>
<script src="js/shared/runtime-mode.js"></script>
<script type="module" src="js/shared/cloud-client.js"></script>

<script type="module">
  async function waitForClient(timeout = 5000) {
    const start = Date.now();
    while (!window.AvneiCloudClient) {
      if (Date.now() - start > timeout) throw new Error('Cloud client failed to load');
      await new Promise(r => setTimeout(r, 50));
    }
    return window.AvneiCloudClient;
  }

  const viewLoading = document.getElementById('view-loading');
  const viewWelcome = document.getElementById('view-welcome');
  const viewError   = document.getElementById('view-error');
  const studentNameEl = document.getElementById('student-name');
  const classNameEl   = document.getElementById('class-name');
  const startBtn      = document.getElementById('start-btn');
  const errorTitle    = document.getElementById('error-title');
  const errorMessage  = document.getElementById('error-message');

  function showError(title, message) {
    viewLoading.classList.add('hidden');
    viewWelcome.classList.add('hidden');
    viewError.classList.remove('hidden');
    errorTitle.textContent = title;
    errorMessage.textContent = message;
  }

  function showWelcome(name, className) {
    viewLoading.classList.add('hidden');
    viewError.classList.add('hidden');
    viewWelcome.classList.remove('hidden');
    studentNameEl.textContent = name;
    classNameEl.textContent = className;
  }

  // Get token from URL or localStorage (bookmarked URL persists token)
  const urlParams = new URLSearchParams(window.location.search);
  const urlToken  = urlParams.get('token');

  const client = await waitForClient();

  // If demo mode (presentation/guest/skip-picker), skip cloud entirely
  if (window.AvneiRuntimeMode && window.AvneiRuntimeMode.isDemo) {
    // In demo mode, redirect to existing student-picker / map flow
    window.location.replace('student-picker.html');
    throw new Error('demo redirect');
  }

  // Bind token: prefer URL, then localStorage
  let token = urlToken || client.getStudentToken();
  if (!token) {
    showError(
      'לא מצאנו את הקישור',
      'נראה שלא הגעת לכאן עם הקישור הנכון. דברו עם המורה.'
    );
    throw new Error('no token');
  }

  // If token came from URL, persist it
  if (urlToken && urlToken !== client.getStudentToken()) {
    client.setStudentToken(urlToken);
  }

  // Verify token + fetch profile
  const { data, error } = await client.supabase.rpc('get_student_profile', { p_token: token });
  if (error || !data || data.length === 0) {
    showError(
      'הקישור הזה כבר לא פעיל',
      'אולי הקישור התחדש. אנא דברו עם המורה לקבלת קישור חדש.'
    );
    // Clear bad token so refresh doesn't keep trying
    client.setStudentToken(null);
    throw new Error('invalid token');
  }

  const profile = data[0];
  // profile: { student_id, student_name, class_name }

  // Set the legacy current-student key so existing event-logger / bkt code works
  // student_id from cloud is a UUID; existing localStorage assumed string id — that's fine
  window.localStorage.setItem('avnei-yesod-current-student', profile.student_id);

  // Pull latest BKT state from cloud (best-effort — failures don't block start)
  try {
    const { data: bktData } = await client.supabase.rpc('get_student_bkt', { p_token: token });
    if (bktData && bktData.length > 0) {
      const row = bktData[0];
      // Merge cloud state into localStorage (cloud is source of truth on fresh device)
      if (row.legacy_bkt) {
        const current = JSON.parse(window.localStorage.getItem('avnei-bkt-v1') || '{}');
        current[profile.student_id] = row.legacy_bkt[profile.student_id] || row.legacy_bkt || current[profile.student_id] || {};
        window.localStorage.setItem('avnei-bkt-v1', JSON.stringify(current));
      }
      if (row.strand_bkt) {
        const current = JSON.parse(window.localStorage.getItem('avnei-bkt-strand-v1') || '{}');
        current[profile.student_id] = row.strand_bkt[profile.student_id] || row.strand_bkt || current[profile.student_id] || {};
        window.localStorage.setItem('avnei-bkt-strand-v1', JSON.stringify(current));
      }
    }
  } catch (e) {
    console.warn('[student] Could not fetch BKT state from cloud:', e);
  }

  // Pull teacher-pushed practice targets (2.6.2026) — restore them directly
  // into local SkillUnits storage so the existing game logic picks them up.
  try {
    const { data: targets } = await client.supabase.rpc('get_student_targets', { p_token: token });
    if (targets && targets.length > 0 && window.AvneiSkillUnits) {
      const SU = window.AvneiSkillUnits;
      for (const t of targets) {
        try {
          SU.addTarget(profile.student_id, t.unit_data, t.source || 'cloud-pull');
        } catch (e) {
          console.warn('[student] target restore failed for', t.id, e);
        }
      }
    }
  } catch (e) {
    console.warn('[student] Could not fetch targets from cloud:', e);
  }

  showWelcome(profile.student_name, profile.class_name);

  startBtn.addEventListener('click', () => {
    // Token + student_id are persisted in localStorage.
    // map.html sees the active student in localStorage and skips the picker
    // without us needing ?skip-picker=1 (which would force demo mode).
    window.location.href = 'map.html';
  });

  // Auto-skip welcome screen if URL says so (for daily returns — parent might want this)
  if (urlParams.get('auto') === '1') {
    setTimeout(() => startBtn.click(), 800);
  }
</script>

</body>
</html>
