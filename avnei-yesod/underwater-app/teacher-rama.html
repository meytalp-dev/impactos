  letter_cluster:   { icon: '🎯', label: 'חיזוק אותיות חלשות' }
};

// ============================================================
// B.9 — Morning Group Suggestions (סוכן 18 · 28.5.2026)
// "🌅 בבוקר המורה רואה איזה קבוצות לפתוח היום."
// משלים את B.7+B.8 — שולח studentIds ל-AvneiGroupSuggester שמשתמש
// ב-B.8 matchForStudent כדי לבנות עד 5 קבוצות אופטימליות, ומציג כרטיסים.
// כפתור "פתחי קבוצה" משתמש ב-modal הקיים של B.7 דרך _activeGroups.
// ============================================================
const MG_COLLAPSE_KEY = 'avnei-mg-collapsed-v1';

function _mgReadCollapsed() {
  try { return localStorage.getItem(MG_COLLAPSE_KEY) === '1'; }
  catch (e) { return false; }
}
function _mgWriteCollapsed(c) {
  try { localStorage.setItem(MG_COLLAPSE_KEY, c ? '1' : '0'); }
  catch (e) { /* swallow */ }
}

function renderMorningGroupSuggestions(students) {
  const wrap = document.getElementById('morningGroupSuggestions');
  if (!wrap) return;
  if (!window.AvneiGroupSuggester || !window.AvneiInterventionMatcher) {
    wrap.innerHTML = '';
    return;
  }
  // אל תרענן כש-modal פתוח — שלא לאבד reference ב-_activeGroups
  if (document.querySelector('[data-iv-modal]')) return;

  const studentIds = students.map(function (s) { return s.id; });
  let suggestions;
  // min_confidence:'low' = פיילוט בית הערבה (החלטת מיטל 29.5.2026 · OBS-2).
  // ילדה עם MOY-fail בלי EPA-signal תיכנס לרשימת קבוצת הבוקר — מורה תחליט.
  // לחזור ל-'med' (ברירת המחדל של ה-suggester) אחרי 2-3 שבועות פיילוט.
  try { suggestions = AvneiGroupSuggester.suggestGroups(studentIds, { min_confidence: 'low' }) || []; }
  catch (e) { suggestions = []; }

  if (suggestions.length === 0) {
    wrap.innerHTML = '';
    return;
  }

  const collapsed = _mgReadCollapsed();
  const studentsMap = {};
  students.forEach(function (s) { studentsMap[s.id] = s; });

  const cardsHtml = suggestions.map(function (s, idx) {
    const meta = IV_PATTERN_LABELS[s.pattern_id] || { icon: '📋', label: s.pattern_id };
    const confLabel = s.confidence === 'high' ? 'גבוה' : s.confidence === 'med' ? 'בינוני' : 'נמוך';
    const names = s.students.map(function (st) {
      const sr = studentsMap[st.studentId];
      return sr ? (sr.name || st.studentId) : st.studentId;
    }).join(' · ');
    return '<div class="mg-card" data-mg-idx="' + idx + '" data-pattern="' + escapeHtml(s.pattern_id) + '">' +
      '<div class="mg-card-head">' +
        '<span class="mg-icon">' + meta.icon + '</span>' +
        '<span class="mg-label">' + escapeHtml(meta.label) + '</span>' +
      '</div>' +
      '<div class="mg-meta">' +
        '<span class="mg-count">' + s.students.length + ' ילדות</span>' +
        '<span class="mg-conf-pill mg-conf-' + s.confidence + '">ביטחון ' + confLabel + '</span>' +
      '</div>' +
      '<div class="mg-students">' + escapeHtml(names) + '</div>' +
      '<button type="button" class="mg-open" data-mg-open-idx="' + idx + '" aria-label="פתחי קבוצת בוקר מוצעת">📋 פתחי קבוצה</button>' +
    '</div>';
  }).join('');

  wrap.innerHTML =
    '<div class="mg-section' + (collapsed ? ' mg-collapsed' : '') + '">' +
      '<div class="mg-header">' +
        '<button type="button" class="mg-toggle" aria-expanded="' + (!collapsed) + '" aria-label="כווץ או פתח קבוצות בוקר מוצעות">' +
          '<span class="mg-toggle-icon">' + (collapsed ? '▸' : '▾') + '</span>' +
          '<span class="mg-title">🌅 קבוצות בוקר מוצעות</span>' +
          '<span class="mg-toggle-count">' + suggestions.length + '</span>' +
        '</button>' +
        '<button type="button" class="mg-refresh" title="רענן הצעות" aria-label="רענן הצעות קבוצה">🔄 רענן</button>' +
      '</div>' +
      '<div class="mg-body">' +
        '<div class="mg-cards">' + cardsHtml + '</div>' +
      '</div>' +
    '</div>';

  // hooks
  const sec = wrap.querySelector('.mg-section');
  const toggleBtn = wrap.querySelector('.mg-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function () {
      const newCollapsed = !sec.classList.contains('mg-collapsed');
      sec.classList.toggle('mg-collapsed', newCollapsed);
      _mgWriteCollapsed(newCollapsed);
      const arrow = wrap.querySelector('.mg-toggle-icon');
      if (arrow) arrow.textContent = newCollapsed ? '▸' : '▾';
      toggleBtn.setAttribute('aria-expanded', String(!newCollapsed));
    });
  }
  const refreshBtn = wrap.querySelector('.mg-refresh');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', function () {
      renderMorningGroupSuggestions(getAllStudents());
    });
  }
  wrap.querySelectorAll('button.mg-open').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      const idx = Number(btn.dataset.mgOpenIdx);
      const sug = suggestions[idx];
      if (sug) openMorningGroupModal(sug);
    });
  });
}

// פותח modal של B.7 לקבוצה שהוצעה ע"י B.9.
// בונה virtualGroup ב-shape של _activeGroups, מעשיר details ב-letter_cluster
// ו-groupCommonDetails ב-letter_knowledge מתוך B.7 detectForStudent.
function openMorningGroupModal(suggestion) {
  if (!suggestion || !suggestion.students || suggestion.students.length === 0) return;

  const allStudents = getAllStudents();
  const studentsMap = {};
  allStudents.forEach(function (s) { studentsMap[s.id] = s; });

  // העשרת details פר-ילדה (רק ל-letter_cluster — שאר הדפוסים לא צריכים details פר-ילדה ב-modal)
  const groupStudents = suggestion.students.map(function (ms) {
    const rec = studentsMap[ms.studentId] || {};
    const out = { id: ms.studentId, name: rec.name || ms.studentId };
    if (suggestion.pattern_id === 'letter_cluster' && window.AvneiInterventions) {
      try {
        const triggers = AvneiInterventions.detectForStudent(ms.studentId) || [];
        const lc = triggers.find(function (t) { return t.patternId === 'letter_cluster'; });
        if (lc && lc.details) out.details = lc.details;
      } catch (e) { /* swallow */ }
    }
    return out;
  });

  // groupCommonDetails — ל-letter_knowledge מחפש confused_pair מהילדה הראשונה
  let groupCommonDetails = {};
  if (suggestion.pattern_id === 'letter_knowledge' && window.AvneiInterventions) {
    try {
      const first = suggestion.students[0];
      const triggers = AvneiInterventions.detectForStudent(first.studentId) || [];
      const lk = triggers.find(function (t) { return t.patternId === 'letter_knowledge'; });
      if (lk && lk.details) {
        groupCommonDetails = {
          confused_pair: lk.details.confused_pair,
          example_a: lk.details.example_a,
          example_b: lk.details.example_b,
          distinction: lk.details.distinction
        };
      }
    } catch (e) { /* swallow */ }
  } else if (suggestion.pattern_id === 'decoding' && window.AvneiInterventions) {
    try {
      const first = suggestion.students[0];
      const triggers = AvneiInterventions.detectForStudent(first.studentId) || [];
      const dec = triggers.find(function (t) { return t.patternId === 'decoding'; });
      if (dec && dec.details && dec.details.context_value) {
        groupCommonDetails = { context_value: dec.details.context_value };
      }
    } catch (e) { /* swallow */ }
  }

  // מנע כפילות: אם כבר קיים virtualGroup לאותו pattern מ-MG — השתמשי בו
  let idx = _activeGroups.findIndex(function (g) {
    return g && g._mgSourced && g.patternId === suggestion.pattern_id;
  });
  if (idx === -1) {
    _activeGroups.push({
      patternId: suggestion.pattern_id,
      students: groupStudents,
      groupCommonDetails: groupCommonDetails,
      confidence: suggestion.confidence,
      _mgSourced: true
    });
    idx = _activeGroups.length - 1;
  }
  openInterventionModal(idx);
}

function renderInterventionTriggers(students) {
  const wrap = document.getElementById('interventionTriggers');
  if (!wrap) return;
  if (!window.AvneiInterventions) {
    wrap.innerHTML = '';
    return;
  }
  // אם modal פתוח — דלגי על re-render כדי לא לאבד reference (auto-refresh כל 3 שנ')
  if (document.querySelector('[data-iv-modal]')) return;

  // ניקוי cache (כי students משתנים) + detection
  _activeGroups = AvneiInterventions.detectGroupTriggers(students) || [];

  if (_activeGroups.length === 0) {
    wrap.innerHTML = '';
    return;
  }

  const html = _activeGroups.map((g, idx) => {
    const meta = IV_PATTERN_LABELS[g.patternId] || { icon: '📋', label: g.patternId };
    const names = g.students.map(s => s.name).join(', ');
    let extra = '';
    if (g.patternId === 'letter_knowledge' && g.groupCommonDetails.confused_pair) {
      extra = ' · מבלבלות ' + g.groupCommonDetails.confused_pair.join('↔');
    } else if (g.patternId === 'decoding' && g.groupCommonDetails.context_value) {
      const ctxLabel = {
        initial: 'תחילה', medial: 'אמצע', final: 'סוף', font: 'פונט'
      }[g.groupCommonDetails.context_value] || g.groupCommonDetails.context_value;
      extra = ' · קושי במיקום ' + ctxLabel;
    } else if (g.patternId === 'fluency') {
      extra = ' · קצב איטי בכיתה';
    } else if (g.patternId === 'letter_cluster') {
      extra = ' · 3+ אותיות חלשות פר ילדה';
    } else if (g.patternId === 'phonological') {
      extra = ' · קושי בצלילים';
    }
    const confLabel = g.confidence === 'high' ? 'גבוהה' : g.confidence === 'med' ? 'בינונית' : 'נמוכה';
    return `<div class="iv-banner" data-pattern="${escapeHtml(g.patternId)}" data-group-idx="${idx}">
      <span class="iv-icon">${meta.icon}</span>
      <div class="iv-desc">
        <span>דפוס</span>
        <span class="iv-pattern">${escapeHtml(meta.label)}</span>
        <span>— ${g.students.length} ילדות${escapeHtml(extra)}</span>
        <span class="iv-group-info">${escapeHtml(names)}</span>
      </div>
      <span class="iv-conf-pill" title="רמת ביטחון">ביטחון: ${confLabel}</span>
      <button type="button" class="iv-open-modal" data-group-idx="${idx}" aria-label="פתחי קבוצת תמיכה">📋 פתחי קבוצת תמיכה</button>
    </div>`;
  }).join('');

  wrap.innerHTML = html;

  // hooks
  wrap.querySelectorAll('button.iv-open-modal').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openInterventionModal(Number(btn.dataset.groupIdx));
    });
  });
}

// ============================================================
// MOY × B.7 link (סוכן 16 · 28.5.2026)
// תוויות עברית פשוטה למורה (לפי spec של מיטל) — לא BKT/EPA טכני.
// הבדל מ-IV_PATTERN_LABELS: המפה הזו "שורה תחתונה" קצרה ל-MOY context.
// ============================================================
const MOY_PATTERN_LABELS_HE = {
  phonological:     'מודעות פונולוגית',
  letter_knowledge: 'זיהוי אותיות',
  decoding:         'פענוח',
  fluency:          'שטף קריאה',
  letter_cluster:   'צירופי אותיות'
};

function moyPatternLabel(patternId) {
  return MOY_PATTERN_LABELS_HE[patternId] || patternId;
}

// כמה תלמידות במצב MOY suggested_intervention עם patternId זהה (כולל הנוכחית).
function countStudentsWithMOYPattern(patternId) {
  if (!window.AvneiAssessments || !patternId) return 0;
  const students = getAllStudents();
  let n = 0;
  for (let i = 0; i < students.length; i++) {
    const st = AvneiAssessments.getMOYStatus(students[i].id);
    if (st && st.suggested_intervention && st.suggested_intervention.patternId === patternId) {
      n++;
    }
  }
  return n;
}

// Banner כתום ב-Class View כשמצטברות 3+ תלמידות עם אותו patternId מ-MOY.
// נכתב מעל ה-iv-banners הקיימים (DOM order). אם EPA כבר מצא קבוצה — לא מחליפים.
function renderMOYInterventionBanners(students) {
  const wrap = document.getElementById('moyInterventionBanners');
  if (!wrap) return;
  if (!window.AvneiAssessments) { wrap.innerHTML = ''; return; }
  // אם modal פתוח — דלגי על re-render (לא לפגוע ב-snapshotGroup של iv-modal)
  if (document.querySelector('[data-iv-modal]')) return;

  // קיבוץ ילדות לפי patternId
  const groups = {};
  for (let i = 0; i < students.length; i++) {
    const s = students[i];
    const moy = AvneiAssessments.getMOYStatus(s.id);
    const sug = moy && moy.suggested_intervention;
    if (!sug || !sug.patternId) continue;
    const pid = sug.patternId;
    if (!groups[pid]) groups[pid] = [];
    groups[pid].push({
      id: s.id,
      name: s.name || s.id,
      details: sug.details || {}
    });
  }

  const readyPatterns = Object.keys(groups).filter(p => groups[p].length >= 3);
  if (readyPatterns.length === 0) { wrap.innerHTML = ''; return; }

  const html = readyPatterns.map(pid => {
    const stus = groups[pid];
    const label = moyPatternLabel(pid);
    const names = stus.map(s => s.name).join(', ');
    return `<div class="iv-banner iv-banner-moy" data-moy-pattern="${escapeHtml(pid)}">
      <span class="iv-icon">📋</span>
      <div class="iv-desc">
        <span>קבוצה מוכנה לפתיחה (מתוך MOY-Lite) — </span>
        <span class="iv-pattern">${stus.length} תלמידות צריכות תרגול ב${escapeHtml(label)}</span>
        <span class="iv-group-info">${escapeHtml(names)}</span>
      </div>
      <button type="button" class="iv-open-modal" data-moy-open-pattern="${escapeHtml(pid)}" aria-label="פתחי קבוצת תמיכה לדפוס MOY">📋 פתחי קבוצת תמיכה</button>
    </div>`;
  }).join('');

  wrap.innerHTML = html;

  wrap.querySelectorAll('button[data-moy-open-pattern]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const pid = btn.dataset.moyOpenPattern;
      openMOYInterventionGroup(pid, groups[pid]);
    });
  });
}

// בונה virtualGroup ב-shape של _activeGroups, דוחף ופותח modal קיים של B.7.
// אותו modal — ה-handlers שם משתמשים ב-snapshotGroup, אז שינויים ל-_activeGroups
// אחרי הפתיחה לא יפגעו ב-modal הפתוח.
function openMOYInterventionGroup(patternId, stus) {
  if (!patternId || !stus || stus.length === 0) return;
  // מנע כפילות: אם כבר קיים virtualGroup לאותו pattern — השתמשי בו
  let idx = _activeGroups.findIndex(g => g && g._moySourced && g.patternId === patternId);
  if (idx === -1) {
    const first = stus[0];
    const virtualGroup = {
      patternId: patternId,
      students: stus,
      groupCommonDetails: (first && first.details) ? first.details : {},
      confidence: 'low',
      _moySourced: true
    };
    _activeGroups.push(virtualGroup);
    idx = _activeGroups.length - 1;
  }
  openInterventionModal(idx);
}

// Letter Cluster — top-3 most-shared weak letters across the group (לטקסט הסקריפט בלבד; כרטיסי
// הילדות עדיין מציגים את האותיות פר ילדה). הפונקציה ריקה לסקריפטים אחרים.
function _getGroupSharedLetterDetails(group) {
  if (!group || group.patternId !== 'letter_cluster') return null;
  const counts = {};
  (group.students || []).forEach(function (s) {
    const letters = s && s.details && Array.isArray(s.details.weak_letters) ? s.details.weak_letters : [];
    letters.forEach(function (l) { counts[l] = (counts[l] || 0) + 1; });
  });
  const ranked = Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; });
  if (ranked.length === 0) return null;
  return { weak_letters: ranked.slice(0, 3) };
}

function openInterventionModal(groupIdx) {
  closeInterventionModal();
  const group = _activeGroups[groupIdx];
  if (!group) return;
  const script = AvneiInterventions.loadScript(group.patternId);
  if (!script) {
    alert('שגיאה: לא ניתן לטעון את ה-script של ' + group.patternId);
    return;
  }
  const meta = IV_PATTERN_LABELS[group.patternId] || { icon: '📋', label: group.patternId };

  // התלמידות + פרטים אישיים פר ילדה (לטר-קלאסטר וכו')
  const studentsHtml = group.students.map(s => {
    let letters = '';
    if (group.patternId === 'letter_cluster' && s.details && s.details.weak_letters) {
      letters = '<span class="iv-stu-letters">' + escapeHtml(s.details.weak_letters.join(' · ')) + '</span>';
    }
    return '<li>· ' + escapeHtml(s.name) + letters + '</li>';
  }).join('');

  // אינטרפלציה של ה-script לפי groupCommonDetails (לאינדפנדנט/Personalized — נציג את הקבוצתי).
  // ב-letter_cluster נעביר ב-studentDetails את top-3 האותיות הכי משותפות בקבוצה, כדי ש-placeholders
  // {personalized_letters} / {personalized_first_letter} ב-Materials/HOOK יתמלאו (פר-ילדה נשאר בכרטיסים).
  const sharedDetails = _getGroupSharedLetterDetails(group);
  const interp = AvneiInterventions.interpolateScript(script, group.groupCommonDetails || {}, sharedDetails);

  // היסטוריה: רשומות אחרונות של הקבוצה (לפי studentId הראשון — דוגמה)
  const recentRecs = group.students.length > 0
    ? AvneiInterventions.getInterventionsFor(group.students[0].id).filter(r => r.pattern === group.patternId).slice(-1)
    : [];
  const historyHtml = recentRecs.length > 0
    ? `<div class="iv-history-card">📅 ביצוע אחרון: ${_fmtDate(recentRecs[0].date)} · ${escapeHtml(recentRecs[0].success_check || '')} · ${escapeHtml(recentRecs[0].teacher_note || '')}</div>`
    : '';

  // META row
  const dur = interp.duration_minutes || { total_planned: 12 };
  const grpSize = interp.group_size || { min: 3, max: 4 };
  const metaRow = `<div class="iv-meta-row">
    <span class="iv-tag"><strong>⏱</strong> ${dur.total_planned || (dur.min + '-' + dur.max)} דק'</span>
    <span class="iv-tag"><strong>👧</strong> ${grpSize.min}-${grpSize.max} ילדות</span>
    <span class="iv-tag"><strong>📅</strong> ${escapeHtml(interp.weekly_frequency || '4-5 ימים')}</span>
    <span class="iv-tag"><strong>🏷</strong> ${escapeHtml(interp.tier || 'Tier-2 RTI')}</span>
  </div>`;

  // Materials (משתמש ב-materials אחרי interpolate)
  const matsHtml = (interp.materials || []).map(m => '<li>' + escapeHtml(m) + '</li>').join('');

  // 5 שלבים
  const stagesHtml = (interp.stages || []).map(st => {
    const crit = st.success_criterion
      ? `<div class="iv-stage-criterion">קריטריון: ${escapeHtml(st.success_criterion)}</div>`
      : '';
    return `<div class="iv-stage">
      <div class="iv-stage-head">
        <span class="iv-stage-title">${escapeHtml(st.title || st.id)}</span>
        <span class="iv-stage-dur">${st.duration_minutes != null ? st.duration_minutes + ' דק\'' : ''}</span>
      </div>
      <div class="iv-stage-say">${escapeHtml(st.teacher_say || '')}</div>
      <div class="iv-stage-do">${escapeHtml(st.teacher_do || '')}</div>
      ${st.notes ? `<div class="iv-stage-notes">${escapeHtml(st.notes)}</div>` : ''}
      ${crit}
    </div>`;
  }).join('');

  const evidenceHtml = (interp.evidence || []).length > 0
    ? '<div class="iv-evidence">📚 בסיס מחקרי: ' + (interp.evidence || []).map(e => escapeHtml(e)).join(' · ') + '</div>'
    : '';

  const bodyHtml = `
    ${metaRow}
    <div class="iv-goal"><span class="iv-goal-label">🎯 מטרה:</span>${escapeHtml(interp.goal || '')}</div>
    ${historyHtml}
    <div class="iv-students-card">
      <h4>קבוצה (${group.students.length} ילדות):</h4>
      <ul>${studentsHtml}</ul>
    </div>
    <div class="iv-materials">
      <h4>📦 חומרים:</h4>
      <ul>${matsHtml}</ul>
    </div>
    ${stagesHtml}
    ${evidenceHtml}
    <div class="iv-actions">
      <button type="button" class="iv-btn-print" data-iv-print="${groupIdx}" aria-label="הורד התערבות כ-PDF">📥 הורד / הדפסה ל-PDF</button>
      <button type="button" class="iv-btn-done" data-iv-done="${groupIdx}" aria-label="סמני שביצעתי היום">✓ סמני שביצעתי היום</button>
      <button type="button" class="iv-btn-cancel" data-iv-cancel aria-label="סגירה">× סגירה</button>
    </div>
  `;

  const backdrop = document.createElement('div');
  backdrop.className = 'iv-modal-backdrop';
  backdrop.setAttribute('data-iv-modal', '1');
  backdrop.innerHTML = `
    <div class="iv-modal" role="dialog" aria-modal="true" aria-labelledby="ivModalTitle">
      <div class="iv-head">
        <div>
          <div class="iv-title" id="ivModalTitle">${meta.icon} ${escapeHtml(interp.title || meta.label)}</div>
          <div class="iv-sub">${group.students.length} ילדות · ${dur.total_planned || dur.min + '-' + dur.max} דק' · יעד: ${escapeHtml(interp.weekly_frequency || '4-5 ימים השבוע')}</div>
        </div>
        <button type="button" class="iv-close" aria-label="סגור" data-iv-close>×</button>
      </div>
      <div class="iv-body">${bodyHtml}</div>
    </div>
  `;
  document.body.appendChild(backdrop);

  // hooks — סנאפ-שוט של group ב-closure כדי שלא יתפוסס מ-auto-refresh
  const snapshotGroup = group;
  backdrop.querySelector('[data-iv-close]').addEventListener('click', closeInterventionModal);
  backdrop.querySelector('[data-iv-cancel]').addEventListener('click', closeInterventionModal);
  backdrop.querySelector('[data-iv-print]').addEventListener('click', () => {
    printInterventionGroup(snapshotGroup);
  });
  backdrop.querySelector('[data-iv-done]').addEventListener('click', () => {
    promptInterventionDoneForGroup(snapshotGroup);
  });
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) closeInterventionModal();
  });
  document.addEventListener('keydown', _ivModalEscHandler);
}

function _ivModalEscHandler(e) {
  if (e.key === 'Escape') closeInterventionModal();
}

function closeInterventionModal() {
  const existing = document.querySelector('[data-iv-modal]');
  if (existing) existing.remove();
  document.removeEventListener('keydown', _ivModalEscHandler);
}

function _fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.getDate() + '/' + (d.getMonth() + 1);
}

// ============================================================
// Print flow — window.print() עם print stylesheet
// ============================================================
function printInterventionGroup(group) {
  if (!group) return;
  const script = AvneiInterventions.loadScript(group.patternId);
  if (!script) return;
  const sharedDetails = _getGroupSharedLetterDetails(group);
  const interp = AvneiInterventions.interpolateScript(script, group.groupCommonDetails || {}, sharedDetails);
  const meta = IV_PATTERN_LABELS[group.patternId] || { icon: '📋', label: group.patternId };

  const today = new Date();
  const dd = String(today.getDate()).padStart(2, '0');
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const yyyy = today.getFullYear();

  const dur = interp.duration_minutes || { total_planned: 12 };
  const grpSize = interp.group_size || { min: 3, max: 4 };

  // students + (לטר-קלאסטר: אותיות פר ילדה)
  const studentsLine = group.students.map(s => {
    let extra = '';
    if (group.patternId === 'letter_cluster' && s.details && s.details.weak_letters) {
      extra = ' (' + s.details.weak_letters.join(' · ') + ')';
    }
    return s.name + extra;
  }).join(' · ');

  const matsHtml = (interp.materials || []).map(m => '<li>' + escapeHtml(m) + '</li>').join('');

  const stagesHtml = (interp.stages || []).map(st => `
    <div class="iv-pstage">
      <div class="iv-pstage-title">${escapeHtml(st.title || st.id)}${st.duration_minutes != null ? ' · ' + st.duration_minutes + ' דק\'' : ''}</div>
      <div class="iv-pstage-say"><strong>💬 המורה אומרת:</strong> ${escapeHtml(st.teacher_say || '')}</div>
      <div class="iv-pstage-do"><strong>👉 פעולה:</strong> ${escapeHtml(st.teacher_do || '')}</div>
      ${st.notes ? '<div class="iv-pstage-notes">' + escapeHtml(st.notes) + '</div>' : ''}
      ${st.success_criterion ? '<div class="iv-pstage-notes">קריטריון: ' + escapeHtml(st.success_criterion) + '</div>' : ''}
    </div>
  `).join('');

  const printArea = document.getElementById('iv-print-area');
  printArea.innerHTML = `
    <h1>${meta.icon} ${escapeHtml(interp.title || meta.label)}</h1>
    <div class="iv-pmeta">
      תאריך הדפסה: ${dd}/${mm}/${yyyy} ·
      קבוצה ${grpSize.min}-${grpSize.max} ילדות · משך ${dur.total_planned || dur.min + '-' + dur.max} דק' ·
      תדירות: ${escapeHtml(interp.weekly_frequency || '4-5 ימים')} · ${escapeHtml(interp.tier || 'Tier-2 RTI')}
    </div>
    <div class="iv-pgoal"><strong>🎯 מטרה:</strong> ${escapeHtml(interp.goal || '')}</div>
    <div class="iv-pstu"><strong>👧 קבוצה:</strong> ${escapeHtml(studentsLine)}</div>
    <div class="iv-pmat"><strong>📦 חומרים:</strong><ul>${matsHtml}</ul></div>
    ${stagesHtml}
    <div class="iv-pfoot">
      אבני יסוד · אינטרבנציה ${escapeHtml(meta.label)} · בסיס מחקרי: ${(interp.evidence || []).map(e => escapeHtml(e)).join(' · ')}
    </div>
  `;

  document.body.classList.add('iv-printing');
  // משהה למסגרת אחת — חלק מהדפדפנים דורשים שה-DOM יעודכן לפני print
  setTimeout(() => {
    window.print();
    document.body.classList.remove('iv-printing');
    printArea.innerHTML = '';
  }, 60);
}

// ============================================================
// "סמני שביצעתי" — prompt קצר ושמירה ב-state.interventions
// ============================================================
function promptInterventionDoneForGroup(group) {
  if (!group) return;

  const successCheck = prompt('כמה ילדות עברו את ה-Success Check? (לדוגמה "4/5", "3 מתוך 4", "מאיה+נועה")', '4/5');
  if (successCheck === null) return;  // ביטלה
  const durationStr = prompt('כמה דקות בפועל?', '12');
  if (durationStr === null) return;
  const note = prompt('הערה קצרה לתיעוד (אופציונלי):', '') || '';

  const duration = parseInt(durationStr, 10);
  const studentIds = group.students.map(s => s.id);
  const payload = {
    pattern_details: group.groupCommonDetails || {},
    duration_minutes: isNaN(duration) ? null : duration,
    success_check: successCheck.trim(),
    teacher_note: note.trim()
  };

  // הוספת פרטים פר-ילדה (Letter Cluster — אותיות פר ילדה)
  if (group.patternId === 'letter_cluster') {
    payload.pattern_details = Object.assign({}, payload.pattern_details, {
      per_student_letters: group.students.reduce((acc, s) => {
        if (s.details && s.details.weak_letters) acc[s.id] = s.details.weak_letters;
        return acc;
      }, {})
    });
  }

  const ok = AvneiInterventions.recordIntervention(studentIds, group.patternId, payload);
  if (ok) {
    alert('✓ נשמר ב-' + studentIds.length + ' תלמידות.\nאפשר לסגור את החלון.');
    closeInterventionModal();
    render();
  } else {
    alert('שגיאה בשמירת התיעוד.');
  }
}
</script>

</body>
</html>
