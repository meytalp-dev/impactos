<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד מורה — מבדק ראמ"ה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Assistant', system-ui, sans-serif;
    background: #f7fafc;
    color: #1a2332;
    line-height: 1.5;
    font-size: 14px;
  }
  .container { max-width: 1240px; margin: 0 auto; padding: 22px 16px 80px; }

  /* ===== Header ===== */
  header.top {
    background: linear-gradient(135deg, #2c7a7b 0%, #4fd1c5 100%);
    color: white;
    padding: 22px 26px;
    border-radius: 16px;
    margin-bottom: 18px;
  }
  header.top h1 { font-size: 26px; margin-bottom: 4px; font-weight: 800; }
  header.top .sub { font-size: 15px; opacity: 0.95; }
  header.top .meta {
    margin-top: 10px;
    display: flex; gap: 8px; flex-wrap: wrap;
    font-size: 13px;
  }
  header.top .meta span {
    background: rgba(255,255,255,0.18);
    padding: 4px 12px;
    border-radius: 12px;
  }
  header.top .pulse-current { background: rgba(255,255,255,0.32); font-weight: 700; }
  header.top .top-actions { float: left; display: flex; gap: 8px; }
  header.top .top-actions button {
    background: rgba(255,255,255,0.22);
    color: white; border: 0;
    padding: 6px 12px; border-radius: 8px;
    font-family: inherit; font-size: 13px; cursor: pointer;
  }
  header.top .top-actions button:hover { background: rgba(255,255,255,0.32); }

  /* ===== Toggle bars ===== */
  .toggle-bar {
    display: flex; gap: 6px; align-items: center;
    background: white; padding: 8px;
    border-radius: 12px; margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    flex-wrap: wrap;
  }
  .toggle-bar .toggle-btn {
    background: transparent; color: #4a5568;
    border: 0; padding: 8px 18px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    border-radius: 8px; cursor: pointer;
    transition: all .15s;
  }
  .toggle-bar .toggle-btn:hover { background: #edf2f7; }
  .toggle-bar .toggle-btn.active {
    background: #2c7a7b; color: white;
  }
  .toggle-bar .sep { width: 1px; height: 24px; background: #e2e8f0; margin: 0 6px; }
  .toggle-bar .pulse-pick {
    display: flex; gap: 4px; align-items: center;
    font-size: 13px; color: #4a5568;
  }
  .toggle-bar .pulse-pick button {
    background: transparent; border: 1px solid #cbd5e0;
    padding: 4px 10px; border-radius: 6px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    color: #4a5568;
  }
  .toggle-bar .pulse-pick button.active {
    background: #2c7a7b; color: white; border-color: #2c7a7b;
  }
  .toggle-bar .pulse-pick button.disabled {
    opacity: 0.4; cursor: not-allowed;
  }

  /* ===== Section card ===== */
  .section {
    background: white;
    padding: 20px 22px;
    border-radius: 14px;
    margin-bottom: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  .section h2 {
    font-size: 18px; margin-bottom: 14px;
    color: #2c7a7b; font-weight: 700;
  }
  .empty {
    text-align: center; padding: 28px;
    color: #718096; font-size: 15px;
  }
  .empty .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.4; }

  /* ===== Class view table ===== */
  .table-wrap {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    border-radius: 10px; border: 1px solid #e2e8f0;
  }
  table.rama {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    font-size: 13px;
    min-width: 880px;
  }
  table.rama thead tr.pulse-row th {
    background: #edf2f7;
    color: #4a5568; font-weight: 700;
    padding: 8px 6px; text-align: center;
    border-bottom: 1px solid #cbd5e0;
    font-size: 12px;
  }
  table.rama thead tr.pulse-row th.pulse-1 { background: #b2f5ea; color: #234e52; }
  table.rama thead tr.pulse-row th.pulse-2 { background: #e2e8f0; }
  table.rama thead tr.pulse-row th.pulse-3 { background: #f7fafc; }
  table.rama thead tr.task-row th {
    background: white;
    padding: 10px 8px; text-align: center;
    font-weight: 700; color: #1a2332;
    border-bottom: 2px solid #cbd5e0;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  table.rama thead tr.task-row th:hover { background: #f7fafc; }
  table.rama thead tr.task-row th.task-num {
    color: #2c7a7b; font-size: 14px;
  }
  table.rama thead tr.task-row th .thr {
    font-size: 11px; color: #718096;
    font-weight: 500; display: block;
  }
  table.rama thead .student-col {
    background: white;
    text-align: right;
    padding: 10px 12px;
    border-bottom: 2px solid #cbd5e0;
    position: sticky; right: 0; z-index: 3;
    box-shadow: -1px 0 0 #cbd5e0;
    min-width: 140px;
  }
  table.rama tbody td.student-col {
    background: white;
    text-align: right;
    padding: 10px 12px;
    border-bottom: 1px solid #e2e8f0;
    position: sticky; right: 0; z-index: 2;
    box-shadow: -1px 0 0 #e2e8f0;
    font-weight: 700;
    cursor: pointer;
  }
  table.rama tbody tr:hover td.student-col { background: #f7fafc; }
  table.rama tbody td.student-col .conf {
    font-size: 14px; margin-right: 6px;
  }
  table.rama tbody td.cell {
    padding: 8px 6px; text-align: center;
    border-bottom: 1px solid #e2e8f0;
    border-right: 1px solid #f0f3f6;
    font-weight: 700;
    cursor: pointer; position: relative;
  }
  table.rama tbody td.cell.pulse-1-bg { background: #f0fdfa; }
  table.rama tbody td.cell.pulse-2-bg { background: #fafbfc; }
  table.rama tbody td.cell.pulse-3-bg { background: #fafafa; }
  table.rama tbody td.cell.status-pass { background: #d1fae5; color: #064e3b; }
  table.rama tbody td.cell.status-near { background: #fef3c7; color: #78350f; }
  table.rama tbody td.cell.status-fail { background: #fee2e2; color: #7f1d1d; }
  table.rama tbody td.cell.status-cold { color: #a0aec0; }
  table.rama tbody td.cell .cell-icon { font-size: 14px; display: inline-block; margin-left: 3px; }
  table.rama tbody td.cell .cell-val  { font-size: 11px; }
  table.rama tbody td.cell.low-conf .cell-val { opacity: 0.55; }
  table.rama tbody td.cell.low-conf::after {
    content: ''; position: absolute; top: 4px; left: 4px;
    width: 6px; height: 6px; border-radius: 50%;
    background: #cbd5e0;
  }

  .pulse-summary {
    margin-top: 14px;
    padding: 14px 18px;
    background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
    border-radius: 10px;
    border-right: 4px solid #2c7a7b;
  }
  .pulse-summary .row {
    display: flex; gap: 10px; flex-wrap: wrap;
    font-size: 14px; margin-bottom: 6px; color: #1a2332;
  }
  .pulse-summary .row strong { color: #2c7a7b; }
  .pulse-summary .urgent {
    background: #fee2e2; color: #7f1d1d;
    padding: 8px 14px; border-radius: 8px;
    font-weight: 700; margin-top: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .pulse-summary .urgent button {
    background: #c53030; color: white; border: 0;
    padding: 5px 12px; border-radius: 6px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    margin-right: auto;
  }

  .legend {
    margin-top: 12px; padding: 10px 14px;
    background: #f7fafc; border-radius: 8px;
    font-size: 12px; color: #4a5568;
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .legend strong { color: #1a2332; }

  /* ===== Snapshot mode ===== */
  .snapshot-block { margin-bottom: 22px; }
  .snapshot-block h3 {
    font-size: 16px; margin-bottom: 10px;
    color: #1a2332; font-weight: 700;
  }
  .snapshot-bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 90px;
    gap: 10px; align-items: center;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .snapshot-bar-row .label { color: #4a5568; }
  .snapshot-bar-row .bar-bg {
    background: #edf2f7; border-radius: 8px;
    height: 22px; overflow: hidden; position: relative;
  }
  .snapshot-bar-row .bar-fill {
    height: 100%; border-radius: 8px;
    transition: width .3s ease;
  }
  .snapshot-bar-row.status-pass .bar-fill { background: #38a169; }
  .snapshot-bar-row.status-near .bar-fill { background: #ecc94b; }
  .snapshot-bar-row.status-fail .bar-fill { background: #e53e3e; }
  .snapshot-bar-row.status-cold .bar-fill { background: #a0aec0; }
  .snapshot-bar-row .num { text-align: left; color: #1a2332; font-weight: 700; }

  /* ===== Student view ===== */
  .student-head {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; background: white;
    border-radius: 12px; margin-bottom: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  .student-head .back {
    background: #edf2f7; border: 0; padding: 8px 14px;
    border-radius: 8px; font-family: inherit; font-size: 14px;
    cursor: pointer; color: #2c7a7b; font-weight: 700;
  }
  .student-head .back:hover { background: #cbd5e0; }
  .student-head .name { font-size: 22px; font-weight: 800; color: #1a2332; }
  .student-head .summary { color: #4a5568; font-size: 14px; }
  .student-head .stale-warn {
    margin-right: auto;
    background: #fef5e7; color: #744210;
    padding: 8px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 700;
    border: 1px solid #f6ad55;
  }

  /* 5 strands */
  .strand-row {
    display: grid;
    grid-template-columns: 130px 1fr 90px 130px;
    gap: 12px; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #edf2f7;
    font-size: 14px;
  }
  .strand-row .name { font-weight: 700; color: #1a2332; }
  .strand-row .bar-bg {
    background: #edf2f7; border-radius: 8px;
    height: 14px; overflow: hidden;
  }
  .strand-row .bar-fill {
    background: linear-gradient(90deg, #4fd1c5, #2c7a7b);
    height: 100%; border-radius: 8px;
    transition: width .3s ease;
  }
  .strand-row.cold .bar-fill { background: #cbd5e0; }
  .strand-row .pct { text-align: left; font-weight: 700; }
  .strand-row .meta {
    font-size: 12px; color: #718096;
    text-align: left;
  }
  .conf-badge {
    display: inline-block;
    padding: 2px 8px; border-radius: 8px;
    font-size: 12px; font-weight: 700;
    margin-right: 4px;
  }
  .conf-high { background: #c6f6d5; color: #22543d; }
  .conf-med  { background: #fef3c7; color: #78350f; }
  .conf-low  { background: #edf2f7; color: #4a5568; }

  /* A.5 — Cold-start: badge "חדשה" ליד שם בטבלה */
  .badge-new {
    display: inline-block;
    background: #ffd97d; color: #744210;
    padding: 2px 6px; border-radius: 4px;
    font-size: 11px; font-weight: 700;
    margin-right: 6px;
  }
  /* A.5 — Cold-start: banner בראש Student View */
  .cold-start-banner {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    border-right: 4px solid #f59e0b;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #744210;
  }
  .cold-start-banner strong { color: #5c3500; }
  .cold-start-banner .counter {
    font-weight: 700; color: #5c3500;
    display: block; margin-bottom: 4px; font-size: 15px;
  }
  /* קאונטר ב-pulse summary */
  .pulse-summary .cold-count {
    color: #744210;
  }

  /* 22 letters */
  .letters-grid {
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    gap: 4px; margin-bottom: 10px;
  }
  .letters-grid .letter {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    border-radius: 8px;
    font-weight: 800; font-size: 18px;
    cursor: pointer;
    transition: transform .12s;
  }
  .letters-grid .letter:hover { transform: scale(1.05); }
  .letters-grid .letter.mastered    { background: #c6f6d5; color: #22543d; }
  .letters-grid .letter.in_progress { background: #fef3c7; color: #78350f; }
  .letters-grid .letter.weak        { background: #fee2e2; color: #7f1d1d; }
  .letters-grid .letter.untouched   { background: #edf2f7; color: #a0aec0; }
  .letters-summary {
    font-size: 13px; color: #4a5568;
    background: #f7fafc; padding: 8px 12px; border-radius: 8px;
  }
  .letters-summary .pass { color: #22543d; font-weight: 700; }

  /* EPA */
  .epa-block {
    padding: 14px 18px; border-radius: 10px;
    border-right: 4px solid #cbd5e0;
    background: #f7fafc;
    font-size: 14px;
  }
  .epa-block.pattern {
    border-right-color: #d69e2e;
    background: #fffaf0;
  }
  .epa-block h4 {
    margin-bottom: 6px; color: #1a2332;
    font-size: 15px;
  }
  .epa-block .intervention {
    margin-top: 10px;
    padding: 10px 14px; background: white;
    border-radius: 8px; border: 1px dashed #d69e2e;
    color: #744210; font-size: 13px;
  }

  /* RAMA tasks per pulse */
  .pulse-group {
    background: #f7fafc; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .pulse-group h4 {
    color: #2c7a7b; margin-bottom: 8px;
    font-size: 15px; font-weight: 700;
  }
  .pulse-group.active {
    background: #b2f5ea;
  }
  .pulse-group.active h4 { color: #234e52; }
  .rama-task-row {
    display: grid;
    grid-template-columns: 32px 1fr 100px 80px;
    gap: 10px; align-items: center;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 13px;
  }
  .rama-task-row:hover { background: rgba(255,255,255,0.5); }
  .rama-task-row .num {
    background: #2c7a7b; color: white;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 12px;
  }
  .rama-task-row .name { color: #1a2332; }
  .rama-task-row .thr { font-size: 11px; color: #718096; display: block; }
  .rama-task-row .status {
    text-align: left; font-weight: 700;
  }
  .rama-task-row.status-pass .status { color: #22543d; }
  .rama-task-row.status-near .status { color: #78350f; }
  .rama-task-row.status-fail .status { color: #7f1d1d; }
  .rama-task-row.status-cold .status { color: #a0aec0; }

  /* Flags */
  .flag-card {
    background: #fef5e7; border-right: 4px solid #ed8936;
    padding: 10px 14px; border-radius: 8px;
    margin-bottom: 8px; font-size: 14px;
  }
  .flag-card .flag-type {
    background: #ed8936; color: white;
    font-size: 11px; padding: 2px 8px;
    border-radius: 6px; font-weight: 700;
    margin-left: 6px;
  }

  /* Parent view link (disabled) */
  .parent-link {
    display: inline-block; margin-top: 10px;
    padding: 10px 16px; background: #edf2f7;
    color: #a0aec0; border-radius: 8px;
    font-size: 13px; cursor: not-allowed;
  }

  /* ===== Tooltip ===== */
  .tip {
    position: fixed; z-index: 9000;
    background: #1a2332; color: white;
    padding: 8px 14px; border-radius: 8px;
    font-size: 13px; max-width: 280px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    pointer-events: none;
    transition: opacity .15s;
  }

  /* ===== Modal (drill-down on task column) ===== */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 9100;
    background: rgba(26, 35, 50, 0.6);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: white; border-radius: 14px;
    max-width: 520px; width: 100%;
    padding: 22px 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { font-size: 18px; margin-bottom: 12px; color: #2c7a7b; }
  .modal .close {
    float: left; background: #edf2f7; border: 0;
    padding: 6px 14px; border-radius: 8px;
    font-family: inherit; cursor: pointer; color: #4a5568;
  }
  .modal ul { list-style: none; padding: 0; margin: 10px 0; }
  .modal li {
    padding: 8px 12px; border-radius: 6px;
    background: #f7fafc; margin-bottom: 4px;
    display: flex; gap: 10px; align-items: center;
    font-size: 14px;
  }
  .modal li .stat { color: #4a5568; font-size: 12px; margin-right: auto; }

  /* ===== PIN gate ===== */
  .gate-backdrop {
    position: fixed; inset: 0; z-index: 9500;
    background: linear-gradient(135deg, #2c7a7b 0%, #4fd1c5 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .gate-card {
    background: white; border-radius: 18px;
    max-width: 380px; width: 100%;
    padding: 32px 28px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .gate-card .lock { font-size: 48px; margin-bottom: 12px; }
  .gate-card h2 { font-size: 22px; margin-bottom: 8px; color: #1a2332; }
  .gate-card .gate-sub { color: #4a5568; font-size: 14px; margin-bottom: 22px; }
  .gate-card input[type=tel] {
    font-family: inherit; font-size: 24px;
    text-align: center; letter-spacing: 8px;
    padding: 12px 16px; width: 200px;
    border: 2px solid #cbd5e0; border-radius: 10px;
    direction: ltr;
  }
  .gate-card input[type=tel]:focus {
    outline: none; border-color: #2c7a7b;
  }
  .gate-card button {
    display: block; margin: 14px auto 0;
    background: linear-gradient(135deg, #2c7a7b, #4fd1c5);
    color: white; border: 0;
    padding: 12px 32px; border-radius: 10px;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer;
  }
  .gate-card .err {
    color: #c53030; margin-top: 10px;
    font-size: 13px; min-height: 18px;
  }
  .gate-card .hint {
    margin-top: 18px; color: #a0aec0;
    font-size: 12px;
  }

  @media (max-width: 768px) {
    .container { padding: 14px 10px 60px; }
    header.top { padding: 18px 18px; }
    header.top h1 { font-size: 20px; }
    .strand-row { grid-template-columns: 110px 1fr 70px; }
    .strand-row .meta { display: none; }
    .letters-grid { grid-template-columns: repeat(8, 1fr); }
    .rama-task-row { grid-template-columns: 28px 1fr 90px; }
    .rama-task-row .thr { display: inline; }
    .rama-task-row > :nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<!-- ============ PIN GATE ============ -->
<div class="gate-backdrop" id="pinGate">
  <div class="gate-card">
    <div class="lock">🔒</div>
    <h2>דשבורד מורה — מבדק ראמ"ה</h2>
    <p class="gate-sub">המסך מציג ציוני תלמידות. נא הזיני PIN.</p>
    <form id="pinForm" autocomplete="off">
      <input type="tel" id="pinInput" inputmode="numeric" maxlength="4" pattern="[0-9]*" placeholder="••••" required>
      <div class="err" id="pinErr"></div>
      <button type="submit">כניסה</button>
    </form>
    <div class="hint">PIN נשמר רק עד סגירת הלשונית הזו</div>
  </div>
</div>

<!-- ============ MAIN CONTENT (hidden until PIN ok) ============ -->
<div class="container" id="mainContent" style="display:none;">

<header class="top">
  <div class="top-actions">
    <button id="exitBtn" title="יציאה מהדשבורד">← יציאה</button>
  </div>
  <h1>דשבורד מורה — מבדק ראמ"ה</h1>
  <div class="sub" id="subHead">טוען…</div>
  <div class="meta" id="metaBar"></div>
</header>

<!-- View toggle -->
<div class="toggle-bar">
  <button class="toggle-btn active" data-view="class">מבט כיתה</button>
  <button class="toggle-btn" data-view="student">מבט תלמידה</button>
  <div class="sep" id="pulseToggleSep"></div>
  <button class="toggle-btn active" data-pulse-mode="daily">מבט יומי</button>
  <button class="toggle-btn" data-pulse-mode="snapshot">Snapshot פעימה</button>
  <div class="sep"></div>
  <div class="pulse-pick" id="pulsePick"></div>
</div>

<!-- ============ CLASS VIEW ============ -->
<div id="classView">
  <div class="section">
    <h2>טבלת כיתה — תלמידות × 10 משימות ראמ"ה</h2>
    <div id="classViewBody"></div>
    <div class="legend" id="classLegend"></div>
  </div>
</div>

<!-- ============ STUDENT VIEW ============ -->
<div id="studentView" style="display:none;"></div>

</div>

<!-- ============ Scripts ============ -->
<script src="js/state.js"></script>
<script src="js/shared/bkt.js"></script>
<script src="js/shared/epa.js"></script>
<script src="js/shared/event-logger.js"></script>
<script src="js/shared/mastery-check.js"></script>

<script>
// ============================================================
// F.21A — teacher-rama.html
// מסך מורה בשפת ראמ"ה (10 משימות × 3 פעימות).
// spec: _handoff/2026-05-27-F21A-ux-spec.md
// ============================================================

// ===== PIN gate =====
// המלצת spec §6: SHA-256 של PIN hardcoded. ב-MVP אנחנו עושים השוואה ישירה —
// אותה רמת אבטחה בדיוק (PIN חשוף בקוד בכל מקרה) אבל פחות קוד. זה "שער UX"
// למניעת קריאה בטעות ע"י תלמידה. ב-post-pilot — Apps Script + token חתום (§6).
const TEACHER_PIN = '4521';
const SESSION_AUTH_KEY = 'teacher_authed';

(function initPinGate() {
  const gate = document.getElementById('pinGate');
  const main = document.getElementById('mainContent');
  const form = document.getElementById('pinForm');
  const input = document.getElementById('pinInput');
  const err = document.getElementById('pinErr');

  // bypass אם כבר מאומתת בלשונית הזו
  if (sessionStorage.getItem(SESSION_AUTH_KEY) === '1') {
    gate.style.display = 'none';
    main.style.display = 'block';
    boot();
    return;
  }

  setTimeout(() => input.focus(), 100);

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (input.value === TEACHER_PIN) {
      sessionStorage.setItem(SESSION_AUTH_KEY, '1');
      gate.style.display = 'none';
      main.style.display = 'block';
      boot();
    } else {
      err.textContent = 'PIN שגוי. נסי שוב.';
      input.value = '';
      input.focus();
    }
  });
})();

document.getElementById('exitBtn').addEventListener('click', () => {
  sessionStorage.removeItem(SESSION_AUTH_KEY);
  location.href = 'map.html';
});

// ============================================================
// State
// ============================================================
// STATE_KEY כבר מוגדר ב-state.js — לא להגדיר שוב (SyntaxError).
const STUDENTS_KEY = 'avnei-yesod-students';

// תאריכי פעימות — מקור: spec §8, אישור מיטל 27.5.2026
const PULSE_RANGES = {
  1: { start: '2026-09-01', end: '2026-10-31', label: 'ספט-אוק' },
  2: { start: '2027-01-01', end: '2027-02-28', label: 'ינו-פבר' },
  3: { start: '2027-05-01', end: '2027-06-30', label: 'מאי-יוני' },
};

// ספי "ישן" ל-Confidence downgrade — spec §9, אישור מיטל
const STALE_WARN_DAYS = 7;
const STALE_ALERT_DAYS = 14;

let viewState = {
  view: 'class',          // 'class' | 'student'
  pulseMode: 'daily',     // 'daily' | 'snapshot'
  pulse: null,            // null = current; 1/2/3 = chosen snapshot
  selectedStudent: null,  // student id when view='student'
};

function readJson(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}

function getAllStudents() {
  return readJson(STUDENTS_KEY, []);
}

function getEvents() {
  const state = readJson(STATE_KEY, { events: [], teacherFlags: [] });
  return state.events || [];
}

function getTeacherFlags() {
  const state = readJson(STATE_KEY, { events: [], teacherFlags: [] });
  return state.teacherFlags || [];
}

function escapeHtml(str) {
  return String(str == null ? '' : str).replace(/[&<>"']/g,
    c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// ============================================================
// Pulse helpers
// ============================================================
function currentPulse() {
  // מחזיר את הפעימה שמכילה את התאריך הנוכחי, או null אם בין פעימות.
  const today = new Date().toISOString().slice(0, 10);
  for (const [k, range] of Object.entries(PULSE_RANGES)) {
    if (today >= range.start && today <= range.end) return Number(k);
  }
  // אם בין פעימות — להחזיר את הפעימה הקרובה ביותר שכבר התחילה
  let lastStarted = 1;
  for (const [k, range] of Object.entries(PULSE_RANGES)) {
    if (today >= range.start) lastStarted = Number(k);
  }
  return lastStarted;
}

function pulseStartedYet(pulseNum) {
  const today = new Date().toISOString().slice(0, 10);
  return today >= PULSE_RANGES[pulseNum].start;
}

function pulseHasTask(pulseNum) {
  // אילו משימות שייכות לפעימה נתונה
  if (!window.AvneiMasteryCheck || !AvneiMasteryCheck.RAMA_TASKS) return [];
  return Object.entries(AvneiMasteryCheck.RAMA_TASKS)
    .filter(([_, spec]) => spec.pulse === pulseNum)
    .map(([k]) => Number(k));
}

// ============================================================
// Confidence + stale-data
// ============================================================
function daysSinceLastEvent(studentId) {
  const events = getEvents().filter(e => (e.student_id || 'local') === studentId);
  if (events.length === 0) return null;
  const last = Math.max.apply(null, events.map(e => e.timestamp));
  return Math.floor((Date.now() - last) / (1000 * 60 * 60 * 24));
}

function classifyConfidence(attemptCount, staleDays) {
  // §7 — ניתוח ב-spec
  if (attemptCount == null || attemptCount < 10) return 'low';
  if (staleDays != null && staleDays > STALE_WARN_DAYS) return 'med';
  if (attemptCount < 30) return 'med';
  return 'high';
}

function confidenceIcon(conf) {
  return conf === 'high' ? '✅' : conf === 'med' ? '🟡' : '⚫';
}

// בסיס Confidence ברמת תלמידה — מינימום על פני 5 הסטרנדים
function studentOverallConfidence(studentId) {
  if (!window.AvneiBKT) return 'low';
  const stale = daysSinceLastEvent(studentId);
  let minConf = 'high';
  const order = { high: 3, med: 2, low: 1 };
  for (let s = 1; s <= 5; s++) {
    try {
      const strand = AvneiBKT.getStrandState(studentId, s);
      const c = classifyConfidence(strand.attempts || 0, stale);
      if (order[c] < order[minConf]) minConf = c;
    } catch (e) {}
  }
  return minConf;
}

// A.5 — Cold-start helper. שכבת UI דקה מעל AvneiMasteryCheck.isInColdStart.
// מחזירה גם תווית counter מוכנה לתצוגה.
function coldStartFor(studentId) {
  if (!window.AvneiMasteryCheck || typeof AvneiMasteryCheck.isInColdStart !== 'function') {
    return { inColdStart: false };
  }
  const r = AvneiMasteryCheck.isInColdStart(studentId);
  if (!r.inColdStart) return r;
  // יום X/3 · Y/30 ניסיונות — לפי spec של מיטל
  const dayDisplay = Math.min(r.daysSince + 1, AvneiMasteryCheck.COLD_START_DAYS);
  r.counterText = `יום ${dayDisplay}/${AvneiMasteryCheck.COLD_START_DAYS} · ${r.attemptsTotal}/${AvneiMasteryCheck.COLD_START_ATTEMPTS} ניסיונות`;
  return r;
}

// ============================================================
// Boot + render loop
// ============================================================
function boot() {
  // התחלה — סימון פעימה נוכחית כברירת מחדל
  viewState.pulse = currentPulse();
  bindToggles();
  render();
  // auto-refresh כל 3 שניות (זהה ל-teacher-live)
  setInterval(render, 3000);
}

function bindToggles() {
  // view toggle
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      viewState.view = btn.dataset.view;
      document.querySelectorAll('[data-view]').forEach(b =>
        b.classList.toggle('active', b.dataset.view === viewState.view)
      );
      if (viewState.view === 'student' && !viewState.selectedStudent) {
        const students = getAllStudents();
        if (students.length > 0) viewState.selectedStudent = students[0].id;
      }
      render();
    });
  });
  // pulse-mode toggle
  document.querySelectorAll('[data-pulse-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      viewState.pulseMode = btn.dataset.pulseMode;
      document.querySelectorAll('[data-pulse-mode]').forEach(b =>
        b.classList.toggle('active', b.dataset.pulseMode === viewState.pulseMode)
      );
      render();
    });
  });
}

function render() {
  renderHeader();
  // pulse-mode + pulse-picker רלוונטיים רק ב-Class View (spec §3.3 — Snapshot mode הוא feature של מבט כיתה)
  const inClass = viewState.view === 'class';
  document.querySelectorAll('[data-pulse-mode]').forEach(b => { b.style.display = inClass ? '' : 'none'; });
  document.getElementById('pulseToggleSep').style.display = inClass ? '' : 'none';
  document.getElementById('pulsePick').style.display = inClass ? '' : 'none';
  renderPulsePicker();
  if (inClass) {
    document.getElementById('classView').style.display = '';
    document.getElementById('studentView').style.display = 'none';
    renderClassView();
  } else {
    document.getElementById('classView').style.display = 'none';
    document.getElementById('studentView').style.display = '';
    renderStudentView();
  }
}

function renderHeader() {
  const students = getAllStudents();
  const events = getEvents();
  const pulse = currentPulse();
  const range = PULSE_RANGES[pulse];

  document.getElementById('subHead').textContent =
    `פעימה נוכחית: ${pulse} (${range.label}) · ${students.length} ילדות · עודכן עכשיו`;

  let last = events.length ? Math.max.apply(null, events.map(e => e.timestamp)) : null;
  const lastTxt = last ? (function () {
    const m = Math.floor((Date.now() - last) / (1000 * 60));
    if (m < 1) return 'לפני פחות מדקה';
    if (m < 60) return `לפני ${m} דקות`;
    return `לפני ${Math.floor(m/60)} שעות`;
  })() : 'אין דאטה';

  document.getElementById('metaBar').innerHTML = `
    <span class="pulse-current">פעימה ${pulse} פעילה</span>
    <span>${escapeHtml(students.length)} ילדות</span>
    <span>${escapeHtml(events.length)} אירועים</span>
    <span>אירוע אחרון: ${escapeHtml(lastTxt)}</span>
  `;
}

function renderPulsePicker() {
  const wrap = document.getElementById('pulsePick');
  if (viewState.pulseMode !== 'snapshot') {
    wrap.innerHTML = `<span>פעימה ${currentPulse()} ●</span>`;
    return;
  }
  wrap.innerHTML = '<span>בחרי פעימה:</span>' + [1, 2, 3].map(p => {
    const started = pulseStartedYet(p);
    const cls = (viewState.pulse === p ? 'active ' : '') + (!started ? 'disabled' : '');
    return `<button class="${cls}" data-pick="${p}" ${!started ? 'disabled' : ''}>פעימה ${p}</button>`;
  }).join('');
  wrap.querySelectorAll('[data-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      viewState.pulse = Number(btn.dataset.pick);
      render();
    });
  });
}

// ============================================================
// CLASS VIEW
// ============================================================
function renderClassView() {
  const body = document.getElementById('classViewBody');
  const students = getAllStudents();

  if (students.length === 0) {
    body.innerHTML = `<div class="empty">
      <div class="icon">○</div>
      אין תלמידות במערכת.<br>
      פתחי <a href="../engine/onboarding-profile.html" style="color:#2c7a7b; font-weight:700;">כלי הניהול</a>
      להוספת כיתה.
    </div>`;
    document.getElementById('classLegend').innerHTML = '';
    return;
  }

  if (viewState.pulseMode === 'snapshot') {
    body.innerHTML = renderSnapshotView(students);
    document.getElementById('classLegend').innerHTML = renderLegend();
    return;
  }

  // ===== Daily mode — full table =====
  if (!window.AvneiMasteryCheck || !AvneiMasteryCheck.RAMA_TASKS) {
    body.innerHTML = `<div class="empty">המודול AvneiMasteryCheck.RAMA_TASKS לא נטען.</div>`;
    return;
  }
  const tasks = AvneiMasteryCheck.RAMA_TASKS;
  const taskIds = Object.keys(tasks).map(Number).sort((a, b) => a - b);

  let html = `<div class="table-wrap"><table class="rama">`;

  // pulse band row
  let pulseHtml = `<tr class="pulse-row"><th class="student-col">פעימה</th>`;
  let lastPulse = null, span = 0;
  const pulseSpans = [];
  taskIds.forEach(tid => {
    const p = tasks[tid].pulse;
    if (p !== lastPulse) {
      if (lastPulse !== null) pulseSpans.push({ pulse: lastPulse, span });
      lastPulse = p; span = 1;
    } else { span++; }
  });
  pulseSpans.push({ pulse: lastPulse, span });
  pulseSpans.forEach(ps => {
    const range = PULSE_RANGES[ps.pulse];
    pulseHtml += `<th class="pulse-${ps.pulse}" colspan="${ps.span}">פעימה ${ps.pulse} · ${range.label}${ps.pulse === currentPulse() ? ' (פעילה)' : ''}</th>`;
  });
  pulseHtml += `</tr>`;

  // task header row
  let taskHtml = `<tr class="task-row"><th class="student-col">תלמידה</th>`;
  taskIds.forEach(tid => {
    const t = tasks[tid];
    taskHtml += `<th class="task-num" data-task="${tid}" title="${escapeHtml(t.name)}">
      מ${tid}
      <span class="thr">${t.value_threshold}/${t.value_max}${t.time_threshold_sec ? `·${t.time_threshold_sec}שנ` : ''}</span>
    </th>`;
  });
  taskHtml += `</tr>`;

  // body — one row per student
  let bodyHtml = '';
  const aggregates = {}; // taskId -> [statuses]
  taskIds.forEach(tid => { aggregates[tid] = { pass: 0, near: 0, fail: 0, cold: 0 }; });

  students.forEach(stu => {
    const overallConf = studentOverallConfidence(stu.id);
    const cs = coldStartFor(stu.id);
    bodyHtml += `<tr><td class="student-col" data-student="${stu.id}">
      <span class="conf" title="ביטחון מדידה">${confidenceIcon(overallConf)}</span>
      ${escapeHtml(stu.name || stu.id)}
      ${cs.inColdStart ? `<span class="badge-new" title="${escapeHtml(cs.counterText)}">חדשה</span>` : ''}
    </td>`;
    taskIds.forEach(tid => {
      const t = tasks[tid];
      const r = AvneiMasteryCheck.checkRamaTaskStatus(stu.id, tid);
      aggregates[tid][r.status]++;
      const pulseClass = `pulse-${t.pulse}-bg`;
      const statusClass = `status-${r.status}`;
      const lowConf = r.confidence === 'low' && r.status !== 'cold';
      const icon = r.status === 'pass' ? '✓' : r.status === 'near' ? '~' : r.status === 'fail' ? '✗' : '○';
      const val = r.status === 'cold' ? '' :
        (r.value != null ? `<span class="cell-val">${r.value}/${t.value_max}</span>` : '');
      bodyHtml += `<td class="cell ${pulseClass} ${statusClass}${lowConf ? ' low-conf' : ''}"
                       data-student="${stu.id}" data-task="${tid}"
                       title="${escapeHtml(r.reason || '')}">
        <span class="cell-icon">${icon}</span>${val}
      </td>`;
    });
    bodyHtml += `</tr>`;
  });

  html += `<thead>${pulseHtml}${taskHtml}</thead><tbody>${bodyHtml}</tbody></table></div>`;

  // Summary for current pulse
  const curPulse = currentPulse();
  const curTasks = pulseHasTask(curPulse);
  const summary = curTasks.map(tid => aggregates[tid]).reduce((a, b) => ({
    pass: a.pass + b.pass, near: a.near + b.near, fail: a.fail + b.fail, cold: a.cold + b.cold
  }), { pass: 0, near: 0, fail: 0, cold: 0 });
  // A.5 — ספירת תלמידות ב-cold-start בפעימה הפעילה
  const coldStartCount = students.filter(s => coldStartFor(s.id).inColdStart).length;
  html += `<div class="pulse-summary">
    <div class="row"><strong>פעימה ${curPulse} (${PULSE_RANGES[curPulse].label})</strong> · משימות: ${curTasks.map(t => 'מ' + t).join(' + ')}</div>
    <div class="row">סטטוס: ✓ ${summary.pass} תקין · ~ ${summary.near} קרוב · ✗ ${summary.fail} לא תקין · ○ ${summary.cold} לא נמדד${coldStartCount > 0 ? ` · <span class="cold-count">📚 ${coldStartCount} ילדות חדשות</span>` : ''}</div>
    ${summary.fail > 0 ? `<div class="urgent">דחוף: ${summary.fail} סטטוסים מתחת לרף בפעימה הפעילה
      <button onclick="showFailingStudents(${curPulse})">ראי שמות</button></div>` : ''}
  </div>`;

  body.innerHTML = html;

  // hook clicks
  body.querySelectorAll('[data-student]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (el.tagName === 'TD' && el.classList.contains('cell')) {
        // tooltip already shown via title; could expand to modal later
        return;
      }
      if (el.classList.contains('student-col')) {
        viewState.selectedStudent = el.dataset.student;
        viewState.view = 'student';
        document.querySelectorAll('[data-view]').forEach(b =>
          b.classList.toggle('active', b.dataset.view === viewState.view)
        );
        render();
      }
    });
  });
  body.querySelectorAll('[data-task]').forEach(th => {
    if (th.tagName === 'TH') {
      th.addEventListener('click', () => showTaskDrillDown(Number(th.dataset.task)));
    }
  });

  document.getElementById('classLegend').innerHTML = renderLegend();
}

function renderLegend() {
  return `
    <div><strong>סטטוס:</strong> ✓ תקין · ~ קרוב לרף · ✗ לא תקין · ○ לא נמדד</div>
    <div><strong>ביטחון:</strong> ✅ גבוה (30+ נ') · 🟡 בינוני (10-29) · ⚫ &lt;10</div>
    <div><strong>טיפ:</strong> לחיצה על שם → מבט תלמידה · לחיצה על כותרת משימה → drill</div>
  `;
}

// ===== Snapshot mode (single-pulse summary) =====
function renderSnapshotView(students) {
  if (!window.AvneiMasteryCheck) return '<div class="empty">המודול לא נטען.</div>';
  const tasks = AvneiMasteryCheck.RAMA_TASKS;
  const pulse = viewState.pulse || currentPulse();
  const range = PULSE_RANGES[pulse];
  const taskIds = pulseHasTask(pulse);

  if (!pulseStartedYet(pulse)) {
    return `<div class="empty">פעימה ${pulse} עוד לא התחילה (${range.label}). אין דאטה להצגה.</div>`;
  }

  let html = `<div class="snapshot-block">
    <h3>פעימה ${pulse} · ${range.label}</h3>`;

  taskIds.forEach(tid => {
    const t = tasks[tid];
    const buckets = { pass: 0, near: 0, fail: 0, cold: 0 };
    const names = { pass: [], near: [], fail: [], cold: [] };
    students.forEach(stu => {
      const r = AvneiMasteryCheck.checkRamaTaskStatus(stu.id, tid);
      buckets[r.status]++;
      names[r.status].push(stu.name || stu.id);
    });
    const N = students.length;
    html += `<div style="margin-bottom:18px; padding:10px 14px; background:#f7fafc; border-radius:10px;">
      <div style="margin-bottom:8px;">
        <strong>משימה ${tid} — ${escapeHtml(t.name)}</strong>
        <span style="color:#718096; font-size:12px;">(רף ${t.value_threshold}/${t.value_max}${t.time_threshold_sec ? `·${t.time_threshold_sec}שנ` : ''})</span>
      </div>`;
    ['pass', 'near', 'fail', 'cold'].forEach(b => {
      const pct = N > 0 ? Math.round(100 * buckets[b] / N) : 0;
      const lbl = { pass: '✓ תקין', near: '~ קרוב', fail: '✗ מתחת', cold: '○ לא נמדד' }[b];
      const urgent = b === 'fail' && buckets[b] > 0 ? ' ← דחוף' : '';
      html += `<div class="snapshot-bar-row status-${b}">
        <div class="label">${lbl}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="num">${buckets[b]}/${N}${urgent}</div>
      </div>`;
    });
    if (buckets.fail > 0) {
      html += `<div style="margin-top:8px;">
        <button onclick="showStudentList('מי לא תקין במשימה ${tid}', ${JSON.stringify(names.fail).replace(/"/g, '&quot;')})"
                style="background:#fee2e2; color:#7f1d1d; border:0; padding:6px 12px; border-radius:6px; font-family:inherit; font-size:13px; cursor:pointer;">
          ראי שמות (${buckets.fail})
        </button>
      </div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

// ===== Drill-down + modal helpers =====
function showStudentList(title, names) {
  const html = `<div class="modal-backdrop" onclick="this.remove()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close" onclick="this.closest('.modal-backdrop').remove()">סגירה</button>
      <h3>${escapeHtml(title)}</h3>
      <ul>${names.map(n => `<li><span>${escapeHtml(n)}</span></li>`).join('')}</ul>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function showFailingStudents(pulse) {
  if (!window.AvneiMasteryCheck) return;
  const tasks = AvneiMasteryCheck.RAMA_TASKS;
  const taskIds = pulseHasTask(pulse);
  const students = getAllStudents();
  const failing = {};
  students.forEach(stu => {
    taskIds.forEach(tid => {
      const r = AvneiMasteryCheck.checkRamaTaskStatus(stu.id, tid);
      if (r.status === 'fail') {
        if (!failing[stu.id]) failing[stu.id] = { name: stu.name || stu.id, tasks: [] };
        failing[stu.id].tasks.push(tid);
      }
    });
  });
  const rows = Object.entries(failing).map(([id, info]) =>
    `<li><span>${escapeHtml(info.name)}</span>
      <span class="stat">לא תקין במשימות: ${info.tasks.map(t => 'מ' + t).join(', ')}</span></li>`
  ).join('');
  const html = `<div class="modal-backdrop" onclick="this.remove()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close" onclick="this.closest('.modal-backdrop').remove()">סגירה</button>
      <h3>תלמידות שדורשות תשומת לב — פעימה ${pulse}</h3>
      ${rows ? `<ul>${rows}</ul>` : '<div class="empty">אין תלמידות מתחת לרף בפעימה הזו.</div>'}
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function showTaskDrillDown(taskId) {
  if (!window.AvneiMasteryCheck) return;
  const t = AvneiMasteryCheck.RAMA_TASKS[taskId];
  const students = getAllStudents();
  const rows = students.map(stu => {
    const r = AvneiMasteryCheck.checkRamaTaskStatus(stu.id, taskId);
    const icon = r.status === 'pass' ? '✓' : r.status === 'near' ? '~' : r.status === 'fail' ? '✗' : '○';
    return { name: stu.name || stu.id, icon, status: r.status, value: r.value, conf: r.confidence };
  });
  const order = { fail: 0, near: 1, cold: 2, pass: 3 };
  rows.sort((a, b) => order[a.status] - order[b.status]);
  const html = `<div class="modal-backdrop" onclick="this.remove()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="close" onclick="this.closest('.modal-backdrop').remove()">סגירה</button>
      <h3>משימה ${taskId} — ${escapeHtml(t.name)}</h3>
      <p style="color:#4a5568; font-size:13px;">רף: ${t.value_threshold}/${t.value_max}${t.time_threshold_sec ? ` · ≤${t.time_threshold_sec}שנ` : ''} · איים תורמים: ${t.islands.join(', ')}</p>
      <ul>${rows.map(r => `<li>
        <span style="font-size:18px; width:24px;">${r.icon}</span>
        <span>${escapeHtml(r.name)}</span>
        <span class="stat">${r.value != null ? r.value + '/' + t.value_max : 'לא נמדד'} · ${confidenceIcon(r.conf)}</span>
      </li>`).join('')}</ul>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

// ============================================================
// STUDENT VIEW
// ============================================================
function renderStudentView() {
  const wrap = document.getElementById('studentView');
  const students = getAllStudents();

  if (students.length === 0) {
    wrap.innerHTML = `<div class="section"><div class="empty">אין תלמידות במערכת.</div></div>`;
    return;
  }

  if (!viewState.selectedStudent || !students.find(s => s.id === viewState.selectedStudent)) {
    viewState.selectedStudent = students[0].id;
  }

  const stu = students.find(s => s.id === viewState.selectedStudent);
  const stale = daysSinceLastEvent(stu.id);
  const overallConf = studentOverallConfidence(stu.id);
  const cs = coldStartFor(stu.id);

  // student switcher
  const switcher = `<select id="studentSwitcher" style="font-family:inherit; font-size:14px; padding:6px 10px; border-radius:8px; border:1px solid #cbd5e0;">
    ${students.map(s => `<option value="${s.id}" ${s.id === stu.id ? 'selected' : ''}>${escapeHtml(s.name || s.id)}</option>`).join('')}
  </select>`;

  const staleWarn = (stale != null && stale >= STALE_ALERT_DAYS)
    ? `<div class="stale-warn">⚠ לא תורגלה ${stale} ימים · נתונים מ-${new Date(Date.now() - stale*86400000).toISOString().slice(0,10)}</div>`
    : (stale != null && stale >= STALE_WARN_DAYS)
      ? `<div class="stale-warn" style="background:#fffaf0; border-color:#fbd38d;">⏰ נמדד לפני ${stale} ימים</div>`
      : '';

  // A.5 — Cold-start banner (החלטה 4: בולט, לא opacity 0.5)
  const coldStartBanner = cs.inColdStart ? `
    <div class="cold-start-banner">
      <span class="counter">📚 ${escapeHtml(cs.counterText)}</span>
      <strong>המערכת עוד לומדת את הילדה.</strong>
      נציג ציונים מלאים אחרי שתעמוד בשני התנאים: ${AvneiMasteryCheck.COLD_START_DAYS}+ ימים מהצטרפות וגם ${AvneiMasteryCheck.COLD_START_ATTEMPTS}+ ניסיונות.
    </div>
  ` : '';

  // ===== Section 1: 5 strands =====
  const strandsHtml = window.AvneiBKT ? (function () {
    return AvneiBKT.STRAND_IDS.map(sId => {
      const s = AvneiBKT.getStrandState(stu.id, sId);
      const conf = classifyConfidence(s.attempts || 0, stale);
      const confLabel = conf === 'high' ? 'יציב' : conf === 'med' ? 'אומדן ראשוני' : 'טרם נמדד';
      const name = strandNameHe(sId);
      const pct = Math.round((s.pKnown || 0) * 100);
      const cold = (s.attempts || 0) < 10;
      return `<div class="strand-row${cold ? ' cold' : ''}">
        <div class="name">${confidenceIcon(conf)} ${escapeHtml(name)}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${cold ? 0 : pct}%"></div></div>
        <div class="pct">${cold ? '—' : pct + '%'}</div>
        <div class="meta">${s.attempts || 0} ניסיונות · ${confLabel}</div>
      </div>`;
    }).join('');
  })() : '<div class="empty">AvneiBKT לא נטען.</div>';

  // ===== Section 2: 22 letters =====
  const dist = window.AvneiBKT ? AvneiBKT.getLetterMasteryDistribution(stu.id) : null;
  const lettersHtml = dist ? (function () {
    const allLetters = AvneiBKT.ALL_HEBREW_LETTERS_22;
    const statusFor = (letter) => {
      if (dist.by_bucket.mastered.includes(letter)) return 'mastered';
      if (dist.by_bucket.in_progress.includes(letter)) return 'in_progress';
      if (dist.by_bucket.weak.includes(letter)) return 'weak';
      return 'untouched';
    };
    let grid = `<div class="letters-grid">`;
    allLetters.forEach(l => {
      const st = statusFor(l);
      const ls = AvneiBKT.getLetterState(stu.id, l);
      const tooltip = ls && ls.attempts > 0
        ? `${l} — p=${Math.round(ls.pKnown * 100)}% · ${ls.attempts} ניס'`
        : `${l} — לא תורגלה`;
      grid += `<div class="letter ${st}" title="${escapeHtml(tooltip)}">${l}</div>`;
    });
    grid += `</div>`;
    const ramaThr = 18;
    const passOk = dist.mastered >= ramaThr;
    return grid + `<div class="letters-summary">
      <span class="pass">${dist.mastered}/22 שולטת</span> ·
      ${dist.in_progress}/22 בהתפתחות ·
      ${dist.weak}/22 חלשה ·
      ${dist.untouched}/22 לא תורגלה ·
      רף משימה 1: ${ramaThr}+/22 ${passOk ? '✓' : ''}
    </div>`;
  })() : '<div class="empty">אין דאטה.</div>';

  // ===== Section 3: EPA =====
  let epaHtml = '<div class="empty">EPA לא נטען.</div>';
  if (window.AvneiEPA) {
    const pattern = AvneiEPA.getDominantPattern(stu.id, 3, 0.4)
      || AvneiEPA.getDominantPattern(stu.id, null, 0.4);
    if (pattern) {
      const axisLabel = { failure: 'סוג טעות', context: 'הקשר', task: 'משימה' }[pattern.axis] || pattern.axis;
      epaHtml = `<div class="epa-block pattern">
        <h4>🟡 דפוס דומיננטי — ${escapeHtml(axisLabel)}: ${escapeHtml(pattern.value)}</h4>
        <div>${Math.round(pattern.percent * 100)}% מהטעויות (${pattern.count}/${pattern.total})</div>
        <div class="intervention">
          הצעה: אינטרבנציה ממוקדת לדפוס "${escapeHtml(pattern.value)}".
          ייפתח ב-B.8 (intervention matcher).
        </div>
      </div>`;
    } else {
      epaHtml = `<div class="epa-block">
        <h4>🟢 אין דפוס דומיננטי</h4>
        <div>טעויות מפוזרות — אין צורך באינטרבנציה ייעודית.</div>
      </div>`;
    }
  }

  // ===== Section 4: 10 RAMA tasks per pulse =====
  let ramaHtml = '<div class="empty">RAMA_TASKS לא נטען.</div>';
  if (window.AvneiMasteryCheck && AvneiMasteryCheck.RAMA_TASKS) {
    const cur = currentPulse();
    ramaHtml = [1, 2, 3].map(p => {
      const range = PULSE_RANGES[p];
      const tIds = pulseHasTask(p);
      const isActive = p === cur;
      return `<div class="pulse-group${isActive ? ' active' : ''}">
        <h4>פעימה ${p} (${range.label})${isActive ? ' — פעילה' : ''}</h4>
        ${tIds.map(tid => {
          const t = AvneiMasteryCheck.RAMA_TASKS[tid];
          const r = AvneiMasteryCheck.checkRamaTaskStatus(stu.id, tid);
          const icon = r.status === 'pass' ? '✓' : r.status === 'near' ? '~' : r.status === 'fail' ? '✗' : '○';
          const stTxt = r.status === 'pass' ? 'תקין' : r.status === 'near' ? 'קרוב' : r.status === 'fail' ? 'לא תקין' : 'לא נמדד';
          const valTxt = r.value != null ? `${r.value}/${t.value_max}` : '—';
          return `<div class="rama-task-row status-${r.status}">
            <div class="num">${tid}</div>
            <div class="name">${escapeHtml(t.name)} <span class="thr">רף ${t.value_threshold}/${t.value_max}${t.time_threshold_sec ? `·${t.time_threshold_sec}שנ` : ''}</span></div>
            <div>${valTxt}</div>
            <div class="status">${icon} ${stTxt} ${confidenceIcon(r.confidence)}</div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  }

  // ===== Section 5: Flags =====
  // A.5 — החלטה 5: דגלים אוטומטיים חסומים ב-cold-start (אין מספיק דאטה לדפוס אמיתי).
  // TODO: A.5 flag block when teacherFlags exists — להרחיב כשייווסף מנוע flags חי. כרגע הסקציה ריקה במציאות.
  const flagsRaw = cs.inColdStart
    ? []
    : getTeacherFlags().filter(f => !f.student_id || f.student_id === stu.id);
  const flagsHtml = flagsRaw.length > 0 ? flagsRaw.slice().reverse().map(f => `
    <div class="flag-card">
      <span class="flag-type">${escapeHtml(f.type)}</span>
      <strong>${escapeHtml(f.target_letter || '')}</strong> ${escapeHtml(f.note_template || '')}
      <span style="color:#718096; font-size:12px;">(${f.evidence_count || '?'} ראיות)</span>
    </div>
  `).join('') : '';

  // ===== Assemble =====
  wrap.innerHTML = `
    <div class="student-head">
      <button class="back" onclick="goBackToClass()">← מבט כיתה</button>
      ${switcher}
      <div>
        <div class="name">${confidenceIcon(overallConf)} ${escapeHtml(stu.name || stu.id)}</div>
        <div class="summary">${escapeHtml(stu.profile ? 'פרופיל: ' + stu.profile : 'אין פרופיל מוגדר')}${stu.entry_date ? ' · מתאריך ' + escapeHtml(stu.entry_date) : ''}</div>
      </div>
      ${staleWarn}
    </div>

    ${coldStartBanner}

    <div class="section">
      <h2>5 הסטרנדים (BKT)</h2>
      ${strandsHtml}
    </div>

    <div class="section">
      <h2>22 אותיות (Sub-BKT פר אות)</h2>
      ${lettersHtml}
    </div>

    <div class="section">
      <h2>דפוס טעויות דומיננטי (EPA)</h2>
      ${epaHtml}
    </div>

    <div class="section">
      <h2>10 משימות ראמ"ה — מצב פר פעימה</h2>
      ${ramaHtml}
      <span class="parent-link" title="תצוגת הורה — בבנייה (F.21B)">תצוגת הורה ↗ (בקרוב)</span>
    </div>

    ${flagsRaw.length > 0 ? `<div class="section"><h2>דגלים פעילים</h2>${flagsHtml}</div>` : ''}
  `;

  document.getElementById('studentSwitcher').addEventListener('change', (e) => {
    viewState.selectedStudent = e.target.value;
    render();
  });
}

function strandNameHe(strandId) {
  const names = {
    1: 'פונולוגיה',
    2: 'מורפולוגיה',
    3: 'שפה דבורה',
    4: 'קריאה והבנה',
    5: 'כתיבה',
  };
  return names[strandId] || ('סטרנד ' + strandId);
}

function goBackToClass() {
  viewState.view = 'class';
  document.querySelectorAll('[data-view]').forEach(b =>
    b.classList.toggle('active', b.dataset.view === viewState.view)
  );
  render();
}
</script>
