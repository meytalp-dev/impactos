<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>נוני מלווה אתכם · אבני יסוד</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    :root{
      --acc:#5D4CB0; --acc-deep:#48388f; --pink:#E08FAF; --teal:#0F7E72;
      --card-solid:#FFFFFF; --r-lg:22px; --r-pill:999px;
    }
    *{box-sizing:border-box;}
    body{font-family:'Heebo',sans-serif;color:var(--text-main,#26505C);background:var(--water-main,#A8E8FF);margin:0;
      overflow-x:hidden;-webkit-text-size-adjust:100%;}
    .scene-bg{position:fixed;inset:0;z-index:-2;width:100%;height:100%;object-fit:cover;object-position:center;}
    .veil{position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(240,251,255,.12),rgba(240,251,255,.35) 50%,rgba(240,251,255,.6));}

    .stage{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:clamp(10px,2.5vh,18px);padding:64px 18px 40px;text-align:center;}

    /* top bar */
    .brand{position:fixed;top:14px;inset-inline-end:16px;display:flex;align-items:center;gap:8px;font-weight:800;color:var(--deep,#1E3D47);font-size:14px;opacity:.92;z-index:5;}
    .brand .g{width:30px;height:30px;border-radius:9px;background:#DDF3EC;display:grid;place-items:center;}
    .brand .g svg{width:17px;height:17px;}
    .sound{position:fixed;top:12px;inset-inline-start:14px;z-index:5;width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
      background:var(--card-solid);box-shadow:0 6px 16px rgba(38,80,92,.16);font-size:18px;line-height:1;display:grid;place-items:center;}
    .skip-btn{position:fixed;top:60px;inset-inline-start:14px;z-index:5;border:none;cursor:pointer;font-family:inherit;font-weight:800;
      font-size:13px;color:var(--acc-deep);background:var(--card-solid);box-shadow:0 6px 16px rgba(38,80,92,.14);padding:8px 15px;border-radius:var(--r-pill);}

    .hat{min-height:18px;font-size:12px;font-weight:800;letter-spacing:.05em;color:var(--acc-deep);opacity:0;transition:opacity .3s;}
    .hat.show{opacity:1;}

    /* speech bubble */
    .bubble{position:relative;width:100%;max-width:min(92vw,540px);background:var(--card-solid);border-radius:var(--r-lg);
      padding:18px clamp(18px,4vw,26px);box-shadow:0 14px 36px rgba(38,80,92,.18);min-height:58px;}
    .bubble p{margin:0;font-size:clamp(15px,3.5vw,19px);font-weight:700;line-height:1.5;color:var(--text-main,#26505C);
      word-break:normal;overflow-wrap:break-word;}
    .bubble::after{content:'';position:absolute;bottom:-11px;inset-inline-start:50%;transform:translateX(50%);
      width:22px;height:22px;background:var(--card-solid);border-radius:0 0 40% 0;box-shadow:5px 5px 12px rgba(38,80,92,.07);}
    .caret{display:inline-block;width:2px;height:1em;background:var(--acc);vertical-align:-2px;margin-inline-start:1px;animation:blink 1s steps(2) infinite;}
    @keyframes blink{50%{opacity:0;}}

    /* noni */
    .noni{width:min(44vw,180px);height:auto;display:block;cursor:pointer;
      filter:drop-shadow(0 14px 22px rgba(38,80,92,.22));animation:breathe 4.2s ease-in-out infinite;transform-origin:50% 62%;}
    @keyframes breathe{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.03) translateY(-6px);}}
    .noni.pop{animation:breathe 4.2s ease-in-out infinite, pop .4s ease-out;}
    @keyframes pop{0%{transform:scale(.94);}60%{transform:scale(1.04);}100%{transform:scale(1);}}
    .noni.talking{animation:noni-talk .5s ease-in-out infinite;}
    @keyframes noni-talk{0%{transform:translateY(0) rotate(-2.2deg) scale(1);}25%{transform:translateY(-5px) rotate(1.6deg) scale(1.03);}50%{transform:translateY(0) rotate(-1deg) scale(1.01);}75%{transform:translateY(-4px) rotate(2.2deg) scale(1.03);}100%{transform:translateY(0) rotate(-2.2deg) scale(1);}}
    .tap-hint{font-size:12px;color:var(--text-soft,#4D6F78);font-weight:600;min-height:16px;}

    /* ctas */
    .ctas{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:560px;}
    .cta{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;border:none;
      padding:12px 22px;border-radius:var(--r-pill);text-decoration:none;transition:transform .3s cubic-bezier(.32,.72,0,1);}
    .cta:hover{transform:translateY(-3px);}
    .cta.go{background:var(--acc);color:#fff;box-shadow:0 10px 24px rgba(93,76,176,.32);}
    .cta.out{background:var(--card-solid);color:var(--acc-deep);box-shadow:0 7px 16px rgba(38,80,92,.14);}
    .cta.wa{background:#25AE63;color:#fff;box-shadow:0 9px 20px rgba(37,174,99,.3);}
    .cta.mini{background:transparent;color:var(--text-soft);box-shadow:none;padding:12px 14px;}

    .dots{display:flex;gap:6px;justify-content:center;}
    .dots i{width:7px;height:7px;border-radius:50%;background:rgba(93,76,176,.26);transition:all .3s;}
    .dots i.on{background:var(--acc);width:20px;border-radius:var(--r-pill);}

    @media(prefers-reduced-motion:reduce){.noni,.caret{animation:none !important;}.cta:hover{transform:none !important;}}
  </style>
</head>
<body>
  <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true" onerror="this.style.display='none'">
  <div class="veil" aria-hidden="true"></div>

  <button class="sound" id="sound" title="קול נוני" aria-label="הפעלת/כיבוי קול">🔊</button>
  <button class="skip-btn" id="skipBtn" title="דלג על ההקדמה">דלג ›</button>
  <div class="brand">
    <span class="g"><svg viewBox="0 0 24 24" fill="none" stroke="#0F7E72" stroke-width="2.4" stroke-linecap="round"><path d="M6 18v-5"/><path d="M12 18V7"/><path d="M18 18v-8"/></svg></span>
    אבני יסוד
  </div>

  <main class="stage">
    <div class="hat" id="hat"></div>
    <div class="bubble" id="bubble" aria-live="polite"><p id="line"></p></div>
    <img class="noni" id="noni" src="assets/noni-hero-transparent.png" alt="נוני התמנון" title="געו בי כדי להמשיך">
    <div class="tap-hint" id="tapHint">🔊 געו בנוני כדי שתדבר ›</div>
    <div class="ctas" id="ctas"></div>
    <div class="dots" id="dots" aria-hidden="true"></div>
  </main>

  <audio id="voice" preload="none"></audio>

  <script>
  (function(){
    var A='assets/', AUD='assets/audio/sandbox/', PULSE='../../pulse-grade1/',
        WA='https://wa.me/972536256653?text=%D7%94%D7%99%D7%99!%20%D7%94%D7%AA%D7%A0%D7%A1%D7%99%D7%A0%D7%95%20%D7%91%D7%90%D7%91%D7%A0%D7%99%20%D7%99%D7%A1%D7%95%D7%93';

    // נוני = הדמות. כל שורה: הבעה + טקסט + קליפ-קול (אם קיים) + כפתורי-פעולה.
    // קישורים נפתחים בלשונית חדשה — נוני נשארת פתוחה כמלווה.
    var SCRIPT=[
      {s:'happy',    t:'שלום! אני נוני 🐙 ברוכים הבאים לשונית שלי.'},
      {s:'happy',    t:'אני אהיה איתכם לאורך כל ההתנסות — צעד אחרי צעד, בתוך המערכת עצמה.'},
      {s:'hint',     t:'הכי חשוב אצלנו: כל ילד לומד את אותו נושא של הכיתה — ואני עוזרת לכל אחד בקצב שלו. הכלה, לא הסללה.'},
      {s:'thinking', t:'תלבשו שלושה כובעים — מנהלת, מורה ותלמיד — ותראו איך תרגול של ילד הופך לתובנה אצל המורה.'},
      {s:'happy',    t:'מוכנים? אני איתכם בכל מסך. איך נתחיל?', last:true, ctas:[
          {label:'🧭 בואו נתחיל, אני איתכם', kind:'go', start:true},
          {label:'⚡ כניסה מהירה — תלמידים מוכנים', kind:'mini', quick:true} ]}
    ];

    // כל גיליון-המצבים (happy/hint/thinking…) off-model — עיניים טורקיז. הנכס היחיד התואם = noni-hero-transparent.
    var CANON='noni-hero-transparent.png';
    var STATE_IMG={happy:CANON,hint:CANON,thinking:CANON,idle:CANON,surprised:CANON};
    var i=0, typing=false, typer=null, reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
    var elLine=document.getElementById('line'), elHat=document.getElementById('hat'), elNoni=document.getElementById('noni'),
        elCtas=document.getElementById('ctas'), elDots=document.getElementById('dots'), elTap=document.getElementById('tapHint'),
        elVoice=document.getElementById('voice'), elSound=document.getElementById('sound');

    var voiceOn = localStorage.getItem('noni-voice')!=='off';
    var audioUnlocked=false;
    function paintSound(){ elSound.textContent = voiceOn?'🔊':'🔇'; }
    paintSound();
    elSound.addEventListener('click',function(){ voiceOn=!voiceOn; localStorage.setItem('noni-voice',voiceOn?'on':'off'); paintSound(); if(voiceOn) playClip(); else{ try{elVoice.pause();}catch(e){} } });

    document.getElementById('skipBtn').addEventListener('click',function(){
      audioUnlocked=true; try{elVoice.pause();}catch(e){}
      go(SCRIPT.length-1); this.style.display='none';
    });
    elVoice.addEventListener('ended',function(){ elNoni.classList.remove('talking'); });

    SCRIPT.forEach(function(){elDots.appendChild(document.createElement('i'));});
    var dots=elDots.children;

    function setNoni(state){ elNoni.src=A+(STATE_IMG[state]||STATE_IMG.happy);
      elNoni.classList.remove('pop'); void elNoni.offsetWidth; elNoni.classList.add('pop'); }

    // קול נוני: מנגן assets/audio/sandbox/s{i}.mp3 אם קיים; אם לא — מתעלם בשקט.
    function playClip(){ if(!voiceOn) return;
      try{ elVoice.pause(); elVoice.src=AUD+'s'+i+'.mp3?t='+Date.now(); var p=elVoice.play(); if(p&&p.catch)p.catch(function(){}); }catch(e){} }

    function stopTalkIfNoAudio(){ if(!(voiceOn&&audioUnlocked)) elNoni.classList.remove('talking'); }
    function type(text){ if(typer)clearInterval(typer); typing=true; elLine.innerHTML=''; elNoni.classList.add('talking');
      if(reduce){ elLine.textContent=text; typing=false; stopTalkIfNoAudio(); renderCtas(); return; }
      var span=document.createElement('span'), caret=document.createElement('span'); caret.className='caret';
      elLine.appendChild(span); elLine.appendChild(caret); var n=0;
      typer=setInterval(function(){ n++; span.textContent=text.slice(0,n);
        if(n>=text.length){ clearInterval(typer); typing=false; if(caret.parentNode)caret.remove(); stopTalkIfNoAudio(); renderCtas(); } }, 22);
    }
    function finishType(text){ if(typer)clearInterval(typer); elLine.textContent=text; typing=false; stopTalkIfNoAudio(); renderCtas(); }

    function renderCtas(){ elCtas.innerHTML=''; var line=SCRIPT[i];
      (line.ctas||[]).forEach(function(c){
        var b=document.createElement(c.href?'a':'button');
        b.className='cta '+(c.kind||'out'); b.textContent=c.label;
        if(c.href){ b.href=c.href; b.target='_blank'; b.rel='noopener'; }
        b.addEventListener('click',function(e){
          if(c.next){e.preventDefault();go(i+1);}
          else if(c.restart){e.preventDefault();go(0);}
          else if(c.start){e.preventDefault();try{localStorage.setItem('noni-guide','on');}catch(_){} location.href='setup.html?noni=1';}
          else if(c.free){e.preventDefault();try{localStorage.removeItem('noni-guide');}catch(_){} location.href='setup.html';}
          else if(c.quick){e.preventDefault(); location.href='sandbox-quick.html';}
        });
        elCtas.appendChild(b);
      });
      var forcesChoice=(line.ctas||[]).some(function(c){return c.next;});
      elTap.style.visibility=(line.last||forcesChoice)?'hidden':'visible';
    }

    function go(n){ i=Math.max(0,Math.min(SCRIPT.length-1,n)); var line=SCRIPT[i];
      elHat.textContent=line.hat||''; elHat.classList.toggle('show',!!line.hat);
      setNoni(line.s);
      for(var k=0;k<dots.length;k++)dots[k].classList.toggle('on',k===i);
      type(line.t); playClip();
    }

    function advance(){ var line=SCRIPT[i];
      if(!audioUnlocked){ audioUnlocked=true; playClip(); elTap.textContent='געו בי כדי להמשיך ›'; if(typing){ finishType(line.t); } return; }
      if(typing){ finishType(line.t); return; }
      if(line.last) return;
      if((line.ctas||[]).some(function(c){return c.next;})) return;
      go(i+1);
    }

    elNoni.addEventListener('click',advance);
    document.getElementById('bubble').addEventListener('click',advance);
    document.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();advance();} });

    go(0);
  })();
  </script>
</body>
</html>
