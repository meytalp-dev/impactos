<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>שביל החזרה · עומק הים המואר</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/stage-3.css">
  <link rel="stylesheet" href="css/journey-quest.css">
</head>
<body>

  <main class="stage-scene">
    <div class="scene-frame">
      <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
           onerror="this.style.display='none'">

      <!-- Rising bubbles for atmosphere -->
      <div class="journey-bubbles" id="journeyBubbles" aria-hidden="true"></div>

      <!-- Journey header — progress dots + mission bubble -->
      <section class="journey-header">
        <div class="path-progress" id="pathProgress" aria-label="התקדמות בשביל">
          <span class="path-step" data-i="0"></span>
          <span class="path-step" data-i="1"></span>
          <span class="path-step" data-i="2"></span>
          <span class="path-step" data-i="3"></span>
          <span class="path-step" data-i="4"></span>
        </div>
        <div class="instruction-bubble" id="missionBubble">
          <button class="mission-speaker" id="missionSpeaker" aria-label="שמע את ההוראה">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor"/>
              <path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
          </button>
          <span>הקש/י על האבן עם <strong class="mem-letter">מ</strong></span>
        </div>
      </section>

      <!-- Home target — visible the whole game, grows per step -->
      <div class="home-target" id="homeTarget" aria-label="הבית של נוני">
        <!-- PNG attempt; on error we swap in the inline SVG fallback below -->
        <img id="homeImg" src="assets/island-03/journey-game/home-closed.png" alt=""
             onerror="this.style.display='none'; document.getElementById('homeFallback').style.display='block';">
        <svg id="homeFallback" style="display:none" viewBox="0 0 100 100" aria-hidden="true">
          <defs>
            <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#FFE7A8"/>
              <stop offset="55%" stop-color="#FFA98D"/>
              <stop offset="100%" stop-color="#E27F66"/>
            </linearGradient>
            <radialGradient id="windowGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#FFF4C2"/>
              <stop offset="80%" stop-color="#FFC97A"/>
            </radialGradient>
          </defs>
          <!-- Coral base -->
          <ellipse cx="50" cy="86" rx="38" ry="6" fill="rgba(38,80,92,0.18)"/>
          <!-- House body (organic coral house) -->
          <path d="M22 84 Q18 50 30 38 Q34 22 50 18 Q66 22 70 38 Q82 50 78 84 Z"
                fill="url(#houseGrad)" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
          <!-- Door (closed) -->
          <path id="houseDoor" d="M40 84 L40 62 Q50 56 60 62 L60 84 Z"
                fill="#7A4A3A" stroke="#FFFFFF" stroke-width="1.8" stroke-linejoin="round"/>
          <!-- Window -->
          <circle cx="50" cy="42" r="9" fill="url(#windowGrad)" stroke="#FFFFFF" stroke-width="2"/>
          <circle cx="50" cy="42" r="3.5" fill="#FFFFFF" opacity="0.8"/>
          <!-- Coral sparkle highlights -->
          <circle cx="36" cy="32" r="2" fill="#FFFFFF" opacity="0.85"/>
          <circle cx="64" cy="50" r="1.5" fill="#FFFFFF" opacity="0.75"/>
        </svg>
      </div>

      <!-- Stones area — 3 stones per round (JS builds them) -->
      <section class="stones-area" id="stonesArea"></section>
    </div>
  </main>

  <!-- Noni (src swapped by JS based on state) -->
  <img class="noni-fixed" id="noniImg" src="assets/noni-idle.png" alt="נוני">

  <!-- בועת פידבק (מוסתרת בכוונה — ילדים לא קוראים) -->
  <div class="feedback-bubble" id="feedbackBubble"></div>

  <!-- Top bar -->
  <header class="top-bar">
    <a href="map.html" class="icon-btn" aria-label="חזרה למפה">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="journey-counter" id="journeyCounter">
      <span class="jc-letter">מ</span>
      <span id="stepCountDisplay">0/5 אבנים</span>
    </div>
    <div class="pearl-counter" aria-label="פנינים">
      <span class="pearl" aria-hidden="true"></span>
      <span class="count" id="pearlCount">0</span>
    </div>
  </header>

  <!-- Start overlay -->
  <div class="tap-to-start" id="tapToStart">
    <h2>שביל החזרה</h2>
    <button class="intro-speaker" id="introSpeaker" aria-label="שמע את ההסבר">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M11 5L6 9H3v6h3l5 4V5z" fill="#FFFFFF"/>
        <path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <span>הקש/י לשמוע</span>
    </button>
    <p>נוני הלך לאיבוד. הוא רואה את הבית רחוק.</p>
    <p>בדרך יש אבנים — רק על אבנים עם <strong>מ</strong> אפשר לנחות!</p>
    <button class="start-btn" id="startBtn">בוא/י נחזור הביתה</button>
  </div>

  <!-- Completion overlay -->
  <div class="completion" id="completion">
    <h2>הגענו הביתה!</h2>
    <svg class="completion-home" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <linearGradient id="houseGradFinal" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFE7A8"/>
          <stop offset="55%" stop-color="#FFA98D"/>
          <stop offset="100%" stop-color="#E27F66"/>
        </linearGradient>
        <radialGradient id="windowGradFinal" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="100%" stop-color="#FFE7A8"/>
        </radialGradient>
        <radialGradient id="doorwayGlow" cx="50%" cy="50%" r="55%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="40%" stop-color="#FFE7A8"/>
          <stop offset="100%" stop-color="#FFA98D"/>
        </radialGradient>
      </defs>
      <ellipse cx="50" cy="88" rx="38" ry="6" fill="rgba(38,80,92,0.18)"/>
      <path d="M22 84 Q18 50 30 38 Q34 22 50 18 Q66 22 70 38 Q82 50 78 84 Z"
            fill="url(#houseGradFinal)" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Open doorway with glow -->
      <path d="M40 84 L40 62 Q50 56 60 62 L60 84 Z"
            fill="url(#doorwayGlow)" stroke="#FFFFFF" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- Window with light -->
      <circle cx="50" cy="42" r="9" fill="url(#windowGradFinal)" stroke="#FFFFFF" stroke-width="2"/>
      <circle cx="50" cy="42" r="3.5" fill="#FFFFFF" opacity="0.9"/>
    </svg>
    <p id="completionMsg">נוני חזר הביתה. אבן זוהרת מהשביל הצטרפה לבית.</p>
    <a href="map.html" class="btn-primary">חזרה למפה</a>
  </div>

  <!-- SVG defs — stone shape, used by all stones in stones-area -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- Sea stone — organic blob with gradient and gentle shading.
           color is currentColor so each .stone--variant tints it. -->
      <symbol id="stoneSymbol" viewBox="0 0 120 100">
        <defs>
          <radialGradient id="stoneSheen" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
            <stop offset="40%" stop-color="rgba(255,255,255,0.25)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <linearGradient id="stoneShade" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
            <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="100%" stop-color="rgba(38,80,92,0.32)"/>
          </linearGradient>
        </defs>
        <!-- Organic stone body (slightly irregular) -->
        <path d="M14 56
                 C 10 32, 32 12, 56 10
                 C 86 8, 110 28, 110 50
                 C 112 78, 86 92, 60 92
                 C 32 92, 18 82, 14 56 Z"
              fill="currentColor"
              stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
        <!-- Gentle top sheen -->
        <path d="M14 56
                 C 10 32, 32 12, 56 10
                 C 86 8, 110 28, 110 50
                 C 112 78, 86 92, 60 92
                 C 32 92, 18 82, 14 56 Z"
              fill="url(#stoneSheen)"/>
        <!-- Soft bottom shadow -->
        <path d="M14 56
                 C 10 32, 32 12, 56 10
                 C 86 8, 110 28, 110 50
                 C 112 78, 86 92, 60 92
                 C 32 92, 18 82, 14 56 Z"
              fill="url(#stoneShade)"/>
        <!-- Tiny highlight dots -->
        <circle cx="36" cy="32" r="2.5" fill="#FFFFFF" opacity="0.7"/>
        <circle cx="84" cy="44" r="1.5" fill="#FFFFFF" opacity="0.55"/>
      </symbol>

      <!-- Souvenir: a glowing stone with מ׳ engraved -->
      <symbol id="souvenirStone" viewBox="0 0 120 100">
        <use href="#stoneSymbol"/>
      </symbol>
    </defs>
  </svg>

  <!-- Shared modules — load order matters -->
  <script src="js/state.js"></script>
  <script src="js/shared/audio.js"></script>
  <script src="js/shared/noni.js"></script>
  <script src="js/shared/feedback.js"></script>

  <!-- ====== OVERRIDE: noni facial expressions via src swap ====== -->
  <script>
  (function noniExpressions() {
    const EXPR = {
      idle:    'assets/noni-idle.png',
      help:    'assets/noni-thinking.png',
      hint:    'assets/noni-surprised.png',
      cheer:   'assets/noni-happy.png',
      dance:   'assets/noni-kiss.png',
    };
    Object.values(EXPR).forEach(src => { const i = new Image(); i.src = src; });

    if (!window.AvneiNoni) return;
    const origSetState = AvneiNoni.setState;
    AvneiNoni.setState = function(state) {
      origSetState.call(this, state);
      const img = document.getElementById('noniImg');
      if (!img) return;
      const src = EXPR[state] || EXPR.idle;
      if (img.src.indexOf(src.split('/').pop()) === -1) {
        img.src = src;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const img = document.getElementById('noniImg');
      if (img) img.src = EXPR.idle;
    });
  })();
  </script>

  <!-- ====== OVERRIDE: hide built-in feedback bubble (לקח: ילדים לא קוראים) ====== -->
  <script>
  (function overrideFeedbackBubble() {
    if (!window.AvneiFeedback) return;
    AvneiFeedback.show = function() {
      const fb = document.getElementById('feedbackBubble');
      if (fb) fb.style.display = 'none';
    };
    const origHide = AvneiFeedback.hide;
    AvneiFeedback.hide = function() {
      if (origHide) origHide.call(this);
      const fb = document.getElementById('feedbackBubble');
      if (fb) fb.style.display = 'none';
    };
  })();
  </script>

  <!-- ============================================================
       Journey controller — שביל החזרה
       5 rounds · each: 3 stones (1 with מ׳, 2 distractors)
       ============================================================ -->
  <script>
  (function () {
    const ISLAND_ID = 3;
    const LETTER = 'מ';
    const TOTAL_STEPS = 5;
    const STONES_PER_ROUND = 3;

    // Distractors — only letters we have sound-XXX.mp3 audio for
    // (so the hint/feedback layer stays consistent)
    const DISTRACTOR_LETTERS = ['ר', 'ב', 'ק', 'ת', 'ל', 'נ', 'ש', 'ד', 'ה', 'ע'];
    const STONE_VARIANTS = ['mint', 'peach', 'lavender', 'sky', 'sand'];

    const state = {
      stepIdx: 0,
      stepsCompleted: 0,
      locked: false,
      hintTimer: null,
    };

    const elStonesArea  = document.getElementById('stonesArea');
    const elNoni        = document.getElementById('noniImg');
    const elStepCount   = document.getElementById('stepCountDisplay');
    const elTapToStart  = document.getElementById('tapToStart');
    const elCompletion  = document.getElementById('completion');
    const elStartBtn    = document.getElementById('startBtn');
    const elIntroSpkr   = document.getElementById('introSpeaker');
    const elMissionSpkr = document.getElementById('missionSpeaker');
    const elHome        = document.getElementById('homeTarget');
    const elBubblesBg   = document.getElementById('journeyBubbles');

    // ============================================================
    // Helpers
    // ============================================================
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickDistractors(n) {
      return shuffle(DISTRACTOR_LETTERS).slice(0, n);
    }

    function pickVariant() {
      return STONE_VARIANTS[Math.floor(Math.random() * STONE_VARIANTS.length)];
    }

    function updateStepCounter() {
      if (elStepCount) {
        elStepCount.textContent = state.stepsCompleted + '/' + TOTAL_STEPS + ' אבנים';
      }
      // Light up dots
      document.querySelectorAll('.path-step').forEach((dot, idx) => {
        dot.classList.toggle('completed', idx < state.stepsCompleted);
        dot.classList.toggle('current', idx === state.stepsCompleted);
      });
      // Grow the home target — נראה מתקרב
      elHome.classList.remove('step-1','step-2','step-3','step-4','step-5');
      if (state.stepsCompleted >= 1) elHome.classList.add('step-' + state.stepsCompleted);
    }

    function updatePearlDisplay() {
      if (typeof getPearls === 'function') {
        const el = document.getElementById('pearlCount');
        if (el) el.textContent = getPearls();
      }
    }

    function spawnBackgroundBubbles() {
      // Subtle ambient bubbles rising for ocean feel
      for (let i = 0; i < 10; i++) {
        const b = document.createElement('span');
        const size = 6 + Math.random() * 14;
        b.style.width  = size + 'px';
        b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + 'vw';
        b.style.animationDuration = (10 + Math.random() * 10) + 's';
        b.style.animationDelay = (Math.random() * 12) + 's';
        elBubblesBg.appendChild(b);
      }
    }

    // ============================================================
    // Build one round — 3 stones, 1 correct + 2 distractors
    // ============================================================
    function buildRound() {
      if (state.hintTimer) { clearTimeout(state.hintTimer); state.hintTimer = null; }
      elStonesArea.innerHTML = '';
      state.locked = false;

      const distractors = pickDistractors(STONES_PER_ROUND - 1);
      const allLetters = shuffle([LETTER, ...distractors]);

      allLetters.forEach((letter) => {
        const stone = document.createElement('button');
        stone.type = 'button';
        const variant = pickVariant();
        stone.className = 'stone stone--' + variant;
        stone.dataset.letter = letter;
        stone.dataset.correct = (letter === LETTER) ? 'true' : 'false';
        stone.setAttribute('aria-label', 'אבן עם האות ' + letter);

        stone.innerHTML = `
          <svg class="stone__shape" viewBox="0 0 120 100" preserveAspectRatio="xMidYMid meet">
            <use href="#stoneSymbol"/>
          </svg>
          <span class="stone__letter">${letter}</span>
        `;

        stone.addEventListener('click', () => handleStoneTap(stone));
        elStonesArea.appendChild(stone);
      });

      // Reset noni to idle for new round
      if (window.AvneiNoni) AvneiNoni.setState('idle');

      // Auto-play prompt audio (sound-mem) — לקח: ילדים לא קוראים
      if (window.AvneiAudio && AvneiAudio.isUnlocked && AvneiAudio.isUnlocked()) {
        setTimeout(() => AvneiAudio.playLetterSound(LETTER), 300);
      }

      // Auto-hint after 9s of no taps
      state.hintTimer = setTimeout(triggerHint, 9000);
    }

    function triggerHint() {
      state.hintTimer = null;
      if (state.locked) return;
      if (window.AvneiNoni) AvneiNoni.setState('hint');
      document.querySelectorAll('.stone[data-correct="true"]').forEach(s => {
        s.classList.add('hint-glow');
      });
      if (window.AvneiAudio) AvneiAudio.playLetterSound(LETTER);
    }

    // ============================================================
    // Handle a stone tap
    // ============================================================
    function handleStoneTap(stone) {
      if (state.locked) return;
      if (state.hintTimer) { clearTimeout(state.hintTimer); state.hintTimer = null; }

      const isCorrect = stone.dataset.correct === 'true';
      if (isCorrect) {
        state.locked = true;
        doCorrect(stone);
      } else {
        doWrong(stone);
      }
    }

    function doWrong(stone) {
      stone.classList.add('wrong-sway');
      if (window.AvneiNoni) AvneiNoni.setState('help');
      if (window.AvneiAudio) AvneiAudio.play('try-again');

      setTimeout(() => {
        stone.classList.remove('wrong-sway');
        if (window.AvneiNoni) AvneiNoni.setState('idle');
      }, 800);
    }

    function doCorrect(stone) {
      // Stone lifts; noni hops in place toward it
      stone.classList.add('correct-lift');
      // Dim & disable the other stones (without harsh styling)
      elStonesArea.querySelectorAll('.stone').forEach(s => {
        if (s !== stone) {
          s.style.opacity = '0.42';
          s.style.pointerEvents = 'none';
          s.style.filter = 'grayscale(0.2)';
        }
      });

      // Noni hops + cheer expression
      if (window.AvneiNoni) AvneiNoni.setState('cheer');
      elNoni.classList.add('hopping');
      setTimeout(() => elNoni.classList.remove('hopping'), 720);

      // Audio: gentle praise (warm, not robotic) — לקח 18: שילוב חיבה
      if (window.AvneiAudio) {
        AvneiAudio.playSequence(['good'], 0);
      }

      // Award pearl
      if (typeof addPearl === 'function') {
        addPearl(1);
        updatePearlDisplay();
      }

      // Advance after the hop completes
      setTimeout(() => {
        state.stepsCompleted++;
        updateStepCounter();

        if (state.stepsCompleted >= TOTAL_STEPS) {
          // Final step — Noni flies home
          setTimeout(startFinale, 700);
        } else {
          // Pause between rounds — לקח 8: לפחות 2.4s
          state.stepIdx++;
          setTimeout(buildRound, 2400);
        }
      }, 1100);
    }

    // ============================================================
    // Finale — Noni flies home, door opens, celebration
    // ============================================================
    function startFinale() {
      // Clear stones — path is done
      elStonesArea.innerHTML = '';

      // Reset noni keyframe so flying-home starts clean
      if (window.AvneiNoni) AvneiNoni.setState('cheer');
      elNoni.classList.remove('hopping');

      // Noni flies toward the home
      elNoni.classList.add('flying-home');

      // After Noni reaches the home: door opens (visual pop)
      setTimeout(() => {
        elHome.classList.add('opened');
        // Swap home image to "open" variant if available
        const homeImg = document.getElementById('homeImg');
        if (homeImg && homeImg.style.display !== 'none') {
          const openSrc = 'assets/island-03/journey-game/home-open.png';
          const tester = new Image();
          tester.onload = () => { homeImg.src = openSrc; };
          tester.src = openSrc;
        }
        // Tint the inline-SVG doorway glow if PNG missing
        const door = document.getElementById('houseDoor');
        if (door) {
          door.setAttribute('fill', '#FFE7A8');
          door.setAttribute('stroke', '#FFA98D');
        }
        if (window.AvneiAudio) {
          AvneiAudio.playSequence(['great', 'finale-found-treasure'], 600);
        }
        spawnConfetti(80);
        spawnKisses(8);
      }, 1100);

      // Show completion overlay a beat after the door pop
      setTimeout(showCompletion, 2600);
    }

    function spawnConfetti(count) {
      const container = document.getElementById('confettiLayer') || (() => {
        const c = document.createElement('div');
        c.id = 'confettiLayer';
        c.className = 'confetti-layer';
        document.body.appendChild(c);
        return c;
      })();
      const colors = ['#FFE7A8', '#FFA98D', '#B8F2CF', '#A8E8FF', '#D9D2FF', '#FFD3D8'];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('span');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = (Math.random() * 0.8) + 's';
        piece.style.animationDuration = (2.4 + Math.random() * 2.2) + 's';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (10 + Math.random() * 14) + 'px';
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        container.appendChild(piece);
        setTimeout(() => piece.remove(), 5000);
      }
    }

    function spawnKisses(count) {
      const container = document.getElementById('kissesLayer') || (() => {
        const c = document.createElement('div');
        c.id = 'kissesLayer';
        c.className = 'kisses-layer';
        document.body.appendChild(c);
        return c;
      })();
      for (let i = 0; i < count; i++) {
        const k = document.createElement('span');
        k.className = 'kiss-heart';
        // Kisses rise from where Noni was (bottom-center area)
        k.style.left = (38 + Math.random() * 24) + 'vw';
        k.style.bottom = (10 + Math.random() * 8) + 'vh';
        k.style.animationDelay = (Math.random() * 1.2) + 's';
        k.innerHTML = `
          <svg viewBox="0 0 32 32">
            <path d="M16 28 C 6 20, 2 14, 6 9 C 10 4, 14 8, 16 12 C 18 8, 22 4, 26 9 C 30 14, 26 20, 16 28 Z"
                  fill="#FF6B9D" stroke="#FFFFFF" stroke-width="1.5"/>
          </svg>
        `;
        container.appendChild(k);
        setTimeout(() => k.remove(), 5000);
      }
    }

    function showCompletion() {
      if (typeof completeStage === 'function') completeStage(ISLAND_ID);
      if (typeof addSouvenir === 'function') addSouvenir('אבן שביל זוהרת');
      elCompletion.classList.add('show');
      spawnConfetti(40);
    }

    // ============================================================
    // Intro / mission speakers
    // ============================================================
    if (elIntroSpkr) {
      elIntroSpkr.addEventListener('click', () => {
        if (window.AvneiAudio) AvneiAudio.unlock();
        elIntroSpkr.classList.add('playing');
        // Until we record intro-journey MP3s, fall back to the letter sound twice
        if (window.AvneiAudio) {
          AvneiAudio.playSequence(['sound-mem', 'find-mem'], 1200);
        }
        setTimeout(() => elIntroSpkr.classList.remove('playing'), 4000);
      });
    }

    if (elMissionSpkr) {
      elMissionSpkr.addEventListener('click', () => {
        if (window.AvneiAudio) {
          AvneiAudio.unlock();
          AvneiAudio.playLetterSound(LETTER);
        }
      });
    }

    // ============================================================
    // Bootstrap
    // ============================================================
    if (elStartBtn) {
      elStartBtn.addEventListener('click', () => {
        if (window.AvneiAudio) AvneiAudio.unlock();
        elTapToStart.classList.add('hidden');
        if (window.AvneiNoni) AvneiNoni.ready();
        spawnBackgroundBubbles();
        updateStepCounter();
        updatePearlDisplay();
        buildRound();
      });
    }

    // Dev shortcuts
    const params = new URLSearchParams(window.location.search);
    if (params.get('reset') === '1') {
      localStorage.removeItem('underwater-app:v1');
      console.log('localStorage reset.');
    }
    if (params.get('skip') === '1') {
      // Jump straight to finale for design QA
      setTimeout(() => {
        elTapToStart && elTapToStart.classList.add('hidden');
        spawnBackgroundBubbles();
        state.stepsCompleted = TOTAL_STEPS;
        updateStepCounter();
        startFinale();
      }, 500);
    }
  })();
  </script>

</body>
</html>
