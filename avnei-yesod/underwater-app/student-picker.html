<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>מי משחק היום? · עומק הים המואר</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Heebo', system-ui, sans-serif;
      background: linear-gradient(180deg, #A8E8FF 0%, #73D9D1 100%);
      color: #1E3D47;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
    }

    .greeting {
      text-align: center;
      animation: fade-in 600ms ease-out;
    }
    .greeting h1 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      color: #1E3D47;
      margin-bottom: 8px;
    }
    .greeting p {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #2c5560;
      opacity: 0.85;
    }

    .students-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      max-width: 800px;
      width: 100%;
      max-height: 60vh;
      overflow-y: auto;
      padding: 12px;
      animation: fade-in 700ms ease-out 150ms backwards;
    }

    .student-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 24px 14px;
      text-align: center;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all .18s ease;
      box-shadow: 0 4px 16px rgba(38, 80, 92, 0.12);
    }
    .student-card:hover, .student-card:focus {
      transform: translateY(-4px);
      border-color: #FFA98D;
      box-shadow: 0 8px 24px rgba(255, 169, 141, 0.3);
      outline: none;
    }
    .student-card:active { transform: translateY(-2px) scale(0.97); }

    .avatar {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: var(--av-tint, #FFEDE3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    .avatar svg { width: 72px; height: 72px; display: block; overflow: visible; }
    .student-name {
      font-size: 18px;
      font-weight: 700;
      color: #1E3D47;
    }

    .empty-state {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(38, 80, 92, 0.12);
    }
    .empty-state h2 {
      font-size: 22px;
      color: #1E3D47;
      margin-bottom: 10px;
    }
    .empty-state p {
      color: #2c5560;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .empty-state .btn-demo {
      display: inline-block;
      padding: 12px 24px;
      background: #FFA98D;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }
    .empty-state .btn-demo:hover { background: #ee9577; }

    .teacher-link {
      position: fixed;
      bottom: 18px;
      left: 18px;
      background: rgba(255, 255, 255, 0.7);
      color: #1E3D47;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      text-decoration: none;
      backdrop-filter: blur(8px);
      font-weight: 600;
    }
    .teacher-link:hover { background: rgba(255, 255, 255, 0.95); }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="stage">
  <div class="greeting">
    <h1>מי משחק היום? 🐚</h1>
    <p id="subtitle">בחרו את עצמכם כדי להתחיל</p>
  </div>

  <div id="content"></div>
</div>

<a href="../engine/onboarding-profile.html" class="teacher-link">מורה? עברי לכלי הניהול</a>

<!-- state.js (classic) נטען לפני המודול כדי ש-window.applyPlacement יהיה זמין בבחירת תלמיד.ה -->
<script src="js/state.js"></script>
<script type="module">
  import { StudentsStore } from './js/shared/profile-classifier.js';

  const CURRENT_KEY = 'avnei-yesod-current-student';

  // אווטארים ייחודיים — חיות-ים מצוירות (סגנון נוני: גוף עגול, עיניים גדולות, לחיים, חיוך).
  // וקטור מלא, בלי אימוג'י · תמנון שמור לנוני בלבד. נבחר דטרמיניסטית לפי השם.
  const _eyes = (a,b,cy,r=8) => [a,b].map(cx =>
    `<ellipse cx="${cx}" cy="${cy}" rx="${r*.78}" ry="${r}" fill="#fff"/><circle cx="${cx}" cy="${cy+r*.18}" r="${r*.52}" fill="#243b57"/><circle cx="${cx-r*.22}" cy="${cy-r*.1}" r="${r*.2}" fill="#fff"/>`).join('');
  const _cheek = (a,b,cy) => [a,b].map(cx => `<ellipse cx="${cx}" cy="${cy}" rx="5.5" ry="3.4" fill="#FF7EA6" opacity=".5"/>`).join('');
  const _smile = (cx,cy,w=12) => `<path d="M${cx-w/2} ${cy} Q${cx} ${cy+w*.7} ${cx+w/2} ${cy}" fill="none" stroke="#243b57" stroke-width="2.4" stroke-linecap="round"/>`;
  const _grad = (id,c1,c2) => `<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>`;
  const _gloss = (cx,cy,rx,ry) => `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="#fff" opacity=".28"/>`;
  const _svg = inner => `<svg viewBox="0 0 100 100">${inner}</svg>`;
  const CREATURES = [
    { tint:'#FFEDE3', svg:_svg(_grad('gf','#FFB98A','#FF8E5E')+'<path d="M78 50c8-9 14-9 20-14-2 7-2 12 0 20-6-5-12-5-20-6Z" fill="#FF8E5E"/><path d="M32 34c-8-6-16-6-22-3 5 4 6 9 5 15 6-5 12-7 17-12Z" fill="#FFA574"/><ellipse cx="48" cy="52" rx="34" ry="28" fill="url(#gf)"/><path d="M46 24c4-6 12-8 16-4-6 1-9 5-10 10Z" fill="#FFA574"/>'+_gloss(38,36,14,9)+_cheek(30,66,60)+_eyes(38,58,48,9)+_smile(48,60,13)) },
    { tint:'#F3E9FB', svg:_svg(_grad('gj','#D3A8EC','#B983DF')+'<path d="M20 54c0-18 13-30 30-30s30 12 30 30v3c-6 5-10-3-15 0s-5 6-15 6-10-3-15-6-9 5-15 0Z" fill="url(#gj)"/><path d="M28 60c-1 10 2 18-2 27M40 63c-1 12 1 20-2 30M60 63c1 12-1 20 2 30M72 60c1 10-2 18 2 27" fill="none" stroke="#C79BE6" stroke-width="4.5" stroke-linecap="round"/>'+_gloss(38,40,14,8)+_cheek(35,65,50)+_eyes(42,58,44,8.5)+_smile(50,52,12)) },
    { tint:'#FFE7E1', svg:_svg(_grad('gc','#FF8C7A','#F0604E')+'<path d="M20 44c-8-8-9-16-6-22 3 6 8 8 13 8-3 4-5 8-7 14Z" fill="#F0604E"/><path d="M80 44c8-8 9-16 6-22-3 6-8 8-13 8 3 4 5 8 7 14Z" fill="#F0604E"/><circle cx="20" cy="30" r="7" fill="#FF8C7A"/><circle cx="80" cy="30" r="7" fill="#FF8C7A"/><ellipse cx="50" cy="58" rx="33" ry="24" fill="url(#gc)"/><path d="M22 74l-8 10M78 74l8 10M34 80l-4 11M66 80l4 11" stroke="#F0604E" stroke-width="5" stroke-linecap="round"/>'+_gloss(40,48,13,7)+_cheek(33,67,62)+_eyes(40,60,52,8.5)+_smile(50,64,13)) },
    { tint:'#FFF4D9', svg:_svg(_grad('gs','#FFD766','#FFB629')+'<path d="M50 8l11 24 26 2-20 17 7 25-24-14-24 14 7-25-20-17 26-2Z" fill="url(#gs)" stroke="#F5A800" stroke-width="1.5" stroke-linejoin="round"/>'+_gloss(40,34,11,6)+_cheek(38,62,52)+_eyes(43,57,46,8)+_smile(50,52,12)) },
    { tint:'#E1F5EC', svg:_svg(_grad('gt','#8BD9B4','#4DB588')+'<ellipse cx="24" cy="70" rx="9" ry="7" fill="#7ACBA2"/><ellipse cx="76" cy="70" rx="9" ry="7" fill="#7ACBA2"/><ellipse cx="34" cy="80" rx="8" ry="6.5" fill="#7ACBA2"/><ellipse cx="66" cy="80" rx="8" ry="6.5" fill="#7ACBA2"/><ellipse cx="50" cy="84" rx="10" ry="9" fill="#8FDCC0"/><ellipse cx="50" cy="50" rx="33" ry="30" fill="url(#gt)"/><path d="M50 22v56M20 44c10 5 40 5 60 0M18 60c12 5 52 5 64 0" fill="none" stroke="#3E9E77" stroke-width="2" stroke-linecap="round" opacity=".7"/>'+_gloss(38,36,14,8)+_cheek(33,67,58)+_eyes(41,59,48,9)+_smile(50,60,13)) },
    { tint:'#E4F1FB', svg:_svg(_grad('gw','#8CC4EC','#5A9AD6')+'<path d="M84 52c9-6 14-4 16-12 1 8 3 12 0 20-6-6-10-6-16-8Z" fill="#5A9AD6"/><path d="M40 22c1-8 8-11 8-11s-2 8 2 12c-4-1-8-1-10-1Z" fill="#BFE0F5"/><ellipse cx="46" cy="54" rx="36" ry="26" fill="url(#gw)"/><path d="M22 66a30 16 0 0 0 44 4 34 20 0 0 1-44-4Z" fill="#CDE8FA"/>'+_gloss(36,38,15,8)+_cheek(30,60,58)+_eyes(38,58,48,9)+_smile(48,60,12)) }
  ];

  function creatureFor(name) {
    let h = 0;
    for (const ch of (name || '')) h = (h * 33 + ch.charCodeAt(0)) >>> 0;
    return CREATURES[h % CREATURES.length];
  }

  function getReturnUrl() {
    const params = new URLSearchParams(location.search);
    return params.get('return') || 'map.html';
  }

  function selectStudent(id) {
    localStorage.setItem(CURRENT_KEY, id);
    // אי פתיחה מהפרופיל האורייני — מזריק רק על מצב טרי, לא דורס התקדמות (ראו state.js).
    try {
      const stu = StudentsStore.get(id);
      const startIsland = stu && stu.placement && stu.placement.start_island;
      if (startIsland && typeof window.applyPlacement === 'function') {
        window.applyPlacement(startIsland, id);
      }
    } catch (e) { /* placement אופציונלי — נכשל בשקט, ברירת מחדל אי 1 */ }
    location.href = getReturnUrl();
  }

  function renderEmpty() {
    document.getElementById('subtitle').textContent = 'אין עדיין תלמידות במערכת';
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <h2>שלום מורה 👋</h2>
        <p>
          עוד לא הוספת תלמידות. כדי שכל ילדה תקבל פרופיל אישי
          ושההצעות האוטומטיות יעבדו — צריך קודם להוסיף את הכיתה בכלי הניהול.
        </p>
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
          <a href="../engine/onboarding-profile.html" class="btn-demo">להוסיף תלמידות לכיתה</a>
          <button class="btn-demo" id="btn-guest" style="background:#A8E8FF; color:#1E3D47;">נסו כאורחים</button>
        </div>
        <p style="font-size:13px; color:#718096; margin-top:16px; margin-bottom:0;">
          "אורחת" = הדאטה תישמר תחת זהות כללית ולא תיוחס לתלמידה ספציפית.
          טוב לבדיקה מהירה, לא לפיילוט.
        </p>
      </div>
    `;
    document.getElementById('btn-guest').addEventListener('click', () => selectStudent('local'));
  }

  function renderList(students) {
    const grid = document.createElement('div');
    grid.className = 'students-grid';
    grid.innerHTML = students.map(s => {
      const creature = creatureFor(s.name);
      return `
        <button class="student-card" data-id="${s.id}" style="background:none; border:3px solid transparent; padding:0;">
          <div style="background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-radius: 20px; padding: 24px 14px;">
            <div class="avatar" style="--av-tint:${creature.tint}">${creature.svg}</div>
            <div class="student-name">${escapeHtml(s.name)}</div>
          </div>
        </button>
      `;
    }).join('');

    document.getElementById('content').appendChild(grid);
    grid.querySelectorAll('.student-card').forEach(btn => {
      btn.addEventListener('click', () => selectStudent(btn.dataset.id));
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Init
  const students = StudentsStore.list();
  if (students.length === 0) {
    renderEmpty();
  } else {
    renderList(students);
  }
</script>
</body>
</html>
