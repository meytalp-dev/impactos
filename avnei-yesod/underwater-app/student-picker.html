<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>מי משחק היום? · עומק הים המואר</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Heebo', system-ui, sans-serif;
      background: linear-gradient(180deg, #A8E8FF 0%, #73D9D1 100%);
      color: #1E3D47;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
    }

    .greeting {
      text-align: center;
      animation: fade-in 600ms ease-out;
    }
    .greeting h1 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      color: #1E3D47;
      margin-bottom: 8px;
    }
    .greeting p {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #2c5560;
      opacity: 0.85;
    }

    .students-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      max-width: 800px;
      width: 100%;
      max-height: 60vh;
      overflow-y: auto;
      padding: 12px;
      animation: fade-in 700ms ease-out 150ms backwards;
    }

    .student-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 24px 14px;
      text-align: center;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all .18s ease;
      box-shadow: 0 4px 16px rgba(38, 80, 92, 0.12);
    }
    .student-card:hover, .student-card:focus {
      transform: translateY(-4px);
      border-color: #FFA98D;
      box-shadow: 0 8px 24px rgba(255, 169, 141, 0.3);
      outline: none;
    }
    .student-card:active { transform: translateY(-2px) scale(0.97); }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--av-from, #FFC8AE) 0%, var(--av-to, #FFA98D) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 38px;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }
    .student-name {
      font-size: 18px;
      font-weight: 700;
      color: #1E3D47;
    }

    .empty-state {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(38, 80, 92, 0.12);
    }
    .empty-state h2 {
      font-size: 22px;
      color: #1E3D47;
      margin-bottom: 10px;
    }
    .empty-state p {
      color: #2c5560;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .empty-state .btn-demo {
      display: inline-block;
      padding: 12px 24px;
      background: #FFA98D;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }
    .empty-state .btn-demo:hover { background: #ee9577; }

    .teacher-link {
      position: fixed;
      bottom: 18px;
      left: 18px;
      background: rgba(255, 255, 255, 0.7);
      color: #1E3D47;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      text-decoration: none;
      backdrop-filter: blur(8px);
      font-weight: 600;
    }
    .teacher-link:hover { background: rgba(255, 255, 255, 0.95); }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="stage">
  <div class="greeting">
    <h1>מי משחק היום? 🐚</h1>
    <p id="subtitle">בחרי את עצמך כדי להתחיל</p>
  </div>

  <div id="content"></div>
</div>

<a href="../engine/onboarding-profile.html" class="teacher-link">מורה? עברי לכלי הניהול</a>

<script type="module">
  import { StudentsStore } from './js/shared/profile-classifier.js';

  const CURRENT_KEY = 'avnei-yesod-current-student';

  // Soft palette of avatar gradients — picks deterministically by name
  const PALETTES = [
    ['#FFC8AE', '#FFA98D'],  // coral
    ['#B8F2CF', '#8ED9B8'],  // mint
    ['#D9D2FF', '#A599E3'],  // lavender
    ['#FFE7A8', '#FFD073'],  // gold
    ['#A8E8FF', '#73D9D1'],  // water
    ['#FFD3D8', '#F19BA8'],  // pink
  ];

  function paletteFor(name) {
    let h = 0;
    for (const ch of name) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
    return PALETTES[h % PALETTES.length];
  }

  function firstLetter(name) {
    return (name || '?').trim().charAt(0) || '?';
  }

  function getReturnUrl() {
    const params = new URLSearchParams(location.search);
    return params.get('return') || 'map.html';
  }

  function selectStudent(id) {
    localStorage.setItem(CURRENT_KEY, id);
    location.href = getReturnUrl();
  }

  function renderEmpty() {
    document.getElementById('subtitle').textContent = 'אין עדיין תלמידות במערכת';
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <h2>שלום מורה 👋</h2>
        <p>
          עוד לא הוספת תלמידות. כדי שכל ילדה תקבל פרופיל אישי
          ושההצעות האוטומטיות יעבדו — צריך קודם להוסיף את הכיתה בכלי הניהול.
        </p>
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
          <a href="../engine/onboarding-profile.html" class="btn-demo">להוסיף תלמידות לכיתה</a>
          <button class="btn-demo" id="btn-guest" style="background:#A8E8FF; color:#1E3D47;">נסי כאורחת</button>
        </div>
        <p style="font-size:13px; color:#718096; margin-top:16px; margin-bottom:0;">
          "אורחת" = הדאטה תישמר תחת זהות כללית ולא תיוחס לתלמידה ספציפית.
          טוב לבדיקה מהירה, לא לפיילוט.
        </p>
      </div>
    `;
    document.getElementById('btn-guest').addEventListener('click', () => selectStudent('local'));
  }

  function renderList(students) {
    const grid = document.createElement('div');
    grid.className = 'students-grid';
    grid.innerHTML = students.map(s => {
      const [from, to] = paletteFor(s.name);
      return `
        <button class="student-card" data-id="${s.id}" style="--av-from:${from}; --av-to:${to}; background:none; border:3px solid transparent; padding:0;">
          <div style="background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-radius: 20px; padding: 24px 14px;">
            <div class="avatar" style="--av-from:${from}; --av-to:${to}">${firstLetter(s.name)}</div>
            <div class="student-name">${escapeHtml(s.name)}</div>
          </div>
        </button>
      `;
    }).join('');

    document.getElementById('content').appendChild(grid);
    grid.querySelectorAll('.student-card').forEach(btn => {
      btn.addEventListener('click', () => selectStudent(btn.dataset.id));
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Init
  const students = StudentsStore.list();
  if (students.length === 0) {
    renderEmpty();
  } else {
    renderList(students);
  }
</script>
</body>
</html>
