<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>עומק הים המואר · נוני</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/ocean.css">
  <link rel="stylesheet" href="css/noni.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    /* ===== Welcome Screen layout ===== */

    .welcome {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: var(--space-l) var(--space-m) var(--space-xl);
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .stage {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      justify-items: center;
      gap: var(--space-l);
      padding: var(--space-l) 0;
    }

    .greeting {
      text-align: center;
      max-width: 30ch;
    }

    .greeting .hello {
      font-size: var(--font-screen-title);
      font-weight: 800;
      color: var(--text-main);
      margin: 0 0 var(--space-xs);
      line-height: 1.1;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.55);
    }

    .greeting .sub {
      font-size: var(--font-instruction);
      font-weight: 500;
      color: var(--text-soft);
      margin: 0;
    }

    /* נוני + בועה צמודה */
    .noni-stage {
      position: relative;
      width: min(58vw, 320px);
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .noni-stage .noni {
      width: 100%;
      height: auto;
      display: block;
    }

    .speech-wrap {
      margin-bottom: -8px;
      transform: translateX(-12px);
      opacity: 0;
      animation: speech-in 800ms cubic-bezier(.2,.8,.25,1) 600ms forwards;
    }

    @keyframes speech-in {
      to { opacity: 1; transform: translateX(0); }
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: var(--space-s);
      padding-bottom: var(--space-m);
    }

    /* בועה אישית-קטנה ביד נוני (סוג של "אביזר") */

    .greeting-pearl {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 30%,
        #FFFFFF 0%, var(--pearl-currency) 45%, #F0DA8E 100%);
      box-shadow: 0 0 6px rgba(255, 244, 194, 0.7);
      vertical-align: middle;
      margin-inline-start: 6px;
    }

    /* כניסה ראשונית — fade in נעים */
    .stage > * { opacity: 0; transform: translateY(8px); }
    .greeting   { animation: stage-in 700ms ease-out 100ms forwards; }
    .noni-stage { animation: stage-in 800ms ease-out 250ms forwards; }
    .actions > * { opacity: 0; transform: translateY(8px);
                   animation: stage-in 700ms ease-out 700ms forwards; }

    @keyframes stage-in {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .stage > *, .actions > *, .speech-wrap {
        opacity: 1 !important; transform: none !important; animation: none !important;
      }
    }

    /* ===== Mobile portrait דחיסה קטנה ===== */
    @media (max-width: 480px) {
      :root { --font-screen-title: 38px; --font-instruction: 22px; }
      .noni-stage { width: 70vw; }
    }
  </style>
</head>
<body>

  <!-- ===== רקע ים ===== -->
  <div class="ocean" aria-hidden="true"></div>
  <div class="light-rays" aria-hidden="true"></div>
  <div class="bubble-stream" id="bubbleStream" aria-hidden="true"></div>
  <div class="plankton" id="plankton" aria-hidden="true"></div>

  <!-- ===== Welcome ===== -->
  <main class="welcome">

    <header class="top-bar">
      <div class="pearl-counter" aria-label="פנינים">
        <span class="pearl" aria-hidden="true"></span>
        <span class="count" id="pearlCount">0</span>
      </div>
    </header>

    <section class="stage">
      <div class="greeting">
        <h1 class="hello">שלום, חבר/ה!</h1>
        <p class="sub">נוני מחכה לך בעומק הים המואר</p>
      </div>

      <div class="noni-stage">
        <div class="speech-wrap">
          <span class="noni-speech">בוא/י נשחה יחד</span>
        </div>
        <div id="noniMount" aria-hidden="false"></div>
      </div>
    </section>

    <div class="actions">
      <a href="map.html" class="btn-primary" id="startBtn">
        נתחיל
      </a>
    </div>

  </main>

  <!-- ===== JS — טעינת נוני + ambient ===== -->
  <script>
    // ===== טעינת נוני inline (כדי שה-CSS של noni.css יחיל אנימציות על העפעפיים/זרועות) =====
    fetch('assets/noni.svg')
      .then(r => r.text())
      .then(svg => {
        document.getElementById('noniMount').innerHTML = svg;
      })
      .catch(() => {
        // fallback: img
        document.getElementById('noniMount').innerHTML =
          '<img src="assets/noni.svg" alt="נוני" style="width:100%;height:auto;"/>';
      });

    // ===== זרם בועות רקע (BubbleStream) =====
    const stream = document.getElementById('bubbleStream');
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const bubbleCount = reduced ? 5 : 14;
    const originPoints = [12, 38, 62, 88]; // 4 נקודות זריקה

    for (let i = 0; i < bubbleCount; i++) {
      const b = document.createElement('div');
      b.className = 'bubble-amb';
      const size = 14 + Math.random() * 38;
      const origin = originPoints[i % originPoints.length] + (Math.random() * 6 - 3);
      const dur = 14 + Math.random() * 14;
      const delay = -Math.random() * dur;
      const drift = (Math.random() * 6 - 3) + 'vw';

      b.style.width = size + 'px';
      b.style.height = size + 'px';
      b.style.left = origin + 'vw';
      b.style.animationDuration = dur + 's';
      b.style.animationDelay = delay + 's';
      b.style.setProperty('--drift', drift);
      stream.appendChild(b);
    }

    // ===== חלקיקי פלנקטון =====
    if (!reduced) {
      const plank = document.getElementById('plankton');
      for (let i = 0; i < 18; i++) {
        const d = document.createElement('div');
        d.className = 'plankton-dot';
        const dur = 18 + Math.random() * 22;
        d.style.left = Math.random() * 100 + 'vw';
        d.style.animationDuration = dur + 's';
        d.style.animationDelay = (-Math.random() * dur) + 's';
        plank.appendChild(d);
      }
    }
  </script>

</body>
</html>
