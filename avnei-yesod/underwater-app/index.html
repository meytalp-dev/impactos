<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>עומק הים המואר · נוני</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    body { background: var(--water-main); overflow: hidden; }

    .scene-bg {
      position: fixed; inset: 0; z-index: -1;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      opacity: 0;
      animation: bg-in 900ms ease-out 0ms forwards;
    }

    @keyframes bg-in {
      from { opacity: 0; transform: scale(1.04); }
      to   { opacity: 1; transform: scale(1); }
    }

    .welcome {
      min-height: 100vh; min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      padding: var(--space-l) var(--space-m) var(--space-xl);
      position: relative;
    }

    .top-bar {
      display: flex; align-items: center; justify-content: flex-start;
      position: relative; z-index: 3;
    }

    .greeting {
      text-align: center;
      max-width: 22ch;
      margin: 0 auto;
      padding-top: var(--space-m);
      position: relative; z-index: 3;
    }

    .greeting .hello {
      font-size: clamp(38px, 9vw, 52px);
      font-weight: 900;
      color: var(--text-main);
      margin: 0 0 var(--space-xs);
      line-height: 1.05;
      letter-spacing: -0.01em;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.7),
        0 8px 20px rgba(38, 80, 92, 0.12);
    }

    .greeting .sub {
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 600;
      color: var(--text-main);
      margin: 0;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    /* ===== Noni overlay ===== */

    .noni-stage {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
      padding: var(--space-m) 0;
    }

    .noni-wrap {
      position: relative;
      width: min(60vw, 260px);
      max-width: 100%;
    }

    .noni-img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 16px 26px rgba(38, 80, 92, 0.22));
      animation: noni-breathe 4.5s ease-in-out infinite;
      transform-origin: 50% 60%;
    }

    @keyframes noni-breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50%      { transform: scale(1.025) translateY(-6px); }
    }

    /* speech bubble — צמודה לראש של נוני */
    .noni-speech-float {
      position: absolute;
      top: -8%;
      right: -22%;
      background: var(--warm-white);
      color: var(--text-main);
      padding: 12px 18px;
      border-radius: var(--radius-lg);
      font-size: clamp(15px, 3.6vw, 18px);
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(38, 80, 92, 0.22);
      opacity: 0;
      animation: speech-in 700ms ease-out 1200ms forwards;
      white-space: nowrap;
      z-index: 5;
    }
    .noni-speech-float::after {
      content: '';
      position: absolute;
      bottom: -10px;
      right: 32%;
      width: 18px;
      height: 18px;
      background: var(--warm-white);
      border-radius: 50%;
      box-shadow: 0 6px 12px rgba(38, 80, 92, 0.12);
    }
    .noni-speech-float::before {
      content: '';
      position: absolute;
      bottom: -20px;
      right: 28%;
      width: 9px;
      height: 9px;
      background: var(--warm-white);
      border-radius: 50%;
    }

    @media (max-width: 480px) {
      .noni-speech-float {
        right: -5%;
        top: -12%;
        font-size: 16px;
        padding: 10px 14px;
      }
    }

    @keyframes speech-in {
      from { opacity: 0; transform: translateY(8px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .actions {
      display: flex; justify-content: center;
      padding-bottom: var(--space-m);
      position: relative; z-index: 3;
    }

    .btn-primary {
      font-size: clamp(20px, 5vw, 26px);
      padding: 0 clamp(48px, 11vw, 72px);
      height: clamp(64px, 14vw, 72px);
      letter-spacing: 0.04em;
    }

    /* כניסה ראשונית */
    .greeting, .actions > *, .noni-img {
      opacity: 0; transform: translateY(10px);
    }
    .greeting   { animation: stage-in 700ms ease-out 350ms forwards; }
    .noni-img   { animation: noni-in 900ms ease-out 600ms forwards,
                              noni-breathe 4.5s ease-in-out 1500ms infinite; }
    .actions > * { animation: stage-in 700ms ease-out 1000ms forwards; }

    @keyframes stage-in {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes noni-in {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .scene-bg, .greeting, .actions > *, .noni-img, .noni-speech-float {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- ===== רקע ים בלי נוני ===== -->
  <img class="scene-bg" src="assets/scene-welcome-bg.png" alt="" aria-hidden="true">

  <!-- ===== UI overlay ===== -->
  <main class="welcome">

    <header class="top-bar">
      <div class="pearl-counter" aria-label="פנינים">
        <span class="pearl" aria-hidden="true"></span>
        <span class="count">0</span>
      </div>
    </header>

    <section class="greeting">
      <h1 class="hello">שלום, חבר/ה!</h1>
      <p class="sub">נוני מחכה לך בעומק הים</p>
    </section>

    <section class="noni-stage">
      <div class="noni-wrap">
        <div class="noni-speech-float">בוא/י נשחה יחד</div>
        <img class="noni-img" src="assets/noni-hero-transparent.png" alt="נוני התמנון">
      </div>
    </section>

    <div class="actions">
      <a href="map.html" class="btn-primary">נתחיל</a>
    </div>

  </main>

  <script src="js/state.js"></script>

</body>
</html>
