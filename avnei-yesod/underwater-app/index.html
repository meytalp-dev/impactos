<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>עומק הים המואר · נוני</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    /* ===== Welcome Screen ===== */

    body {
      background: var(--water-main);
      overflow: hidden;
    }

    .scene-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      /* כניסה רכה */
      opacity: 0;
      animation: bg-in 900ms ease-out 0ms forwards;
    }

    @keyframes bg-in {
      from { opacity: 0; transform: scale(1.04); }
      to   { opacity: 1; transform: scale(1); }
    }

    .welcome {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: var(--space-l) var(--space-m) var(--space-xl);
      position: relative;
    }

    /* כיסוי עדין לקריאות טקסט מעל התמונה */
    .welcome::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 70% 40% at 50% 0%, rgba(255, 249, 244, 0.65) 0%, transparent 70%),
        radial-gradient(ellipse 70% 30% at 50% 100%, rgba(115, 217, 209, 0.45) 0%, transparent 70%);
      pointer-events: none;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      z-index: 2;
    }

    .stage {
      display: grid;
      align-items: start;
      justify-items: center;
      gap: var(--space-l);
      padding-top: var(--space-l);
      position: relative;
      z-index: 2;
      pointer-events: none;
    }

    .greeting {
      text-align: center;
      max-width: 22ch;
    }

    .greeting .hello {
      font-size: clamp(38px, 9vw, 52px);
      font-weight: 900;
      color: var(--text-main);
      margin: 0 0 var(--space-xs);
      line-height: 1.05;
      letter-spacing: -0.01em;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.7),
        0 8px 20px rgba(38, 80, 92, 0.12);
    }

    .greeting .sub {
      font-size: clamp(18px, 4.5vw, 24px);
      font-weight: 600;
      color: var(--text-main);
      margin: 0;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: var(--space-s);
      padding-bottom: var(--space-m);
      position: relative;
      z-index: 2;
    }

    .btn-primary {
      font-size: clamp(20px, 5vw, 26px);
      padding: 0 clamp(40px, 9vw, 64px);
      height: clamp(60px, 14vw, 72px);
      pointer-events: auto;
    }

    /* כניסה ראשונית */
    .greeting, .actions > * {
      opacity: 0;
      transform: translateY(10px);
    }
    .greeting { animation: stage-in 700ms ease-out 350ms forwards; }
    .actions > * { animation: stage-in 700ms ease-out 800ms forwards; }

    @keyframes stage-in {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .scene-bg, .greeting, .actions > * {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- ===== רקע — סצינת ה-Welcome מ-ChatGPT ===== -->
  <img class="scene-bg" src="assets/scene-welcome.png" alt="" aria-hidden="true">

  <!-- ===== UI overlay ===== -->
  <main class="welcome">

    <header class="top-bar">
      <div class="pearl-counter" aria-label="פנינים">
        <span class="pearl" aria-hidden="true"></span>
        <span class="count" id="pearlCount">0</span>
      </div>
    </header>

    <section class="stage">
      <div class="greeting">
        <h1 class="hello">שלום, חבר/ה!</h1>
        <p class="sub">נוני מחכה לך בעומק הים המואר</p>
      </div>
    </section>

    <div class="actions">
      <a href="map.html" class="btn-primary" id="startBtn">
        נתחיל
      </a>
    </div>

  </main>

</body>
</html>
