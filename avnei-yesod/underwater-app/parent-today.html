<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>מה תרגלנו היום · אבני יסוד</title>

  <!-- ═══ מסך הורה — "מה תרגלנו היום" (תרגול בית · 4.7.2026) ═══
       spec: _handoff/2026-07-04-home-practice-spec.md §6.
       קהל = מבוגר.ת ⇒ בלי ניקוד (עקבי עם ה-DNA: ניקוד רק בטקסט-ילד).
       חיובי בלבד: אין ציונים, אין אחוזים, אין צבעי-סטטוס, אין נתוני טעויות,
       אין השוואה כיתתית, אין "חשוב לתרגל כל יום". -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Heebo', sans-serif;
      color: var(--text-main, #26505C);
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      overflow-x: hidden;
    }
    .scene-bg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center bottom;
      z-index: 0; pointer-events: none;
    }
    .wrap {
      position: relative; z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 20px 40px;
      min-height: 100dvh;
      display: flex; flex-direction: column; gap: 16px;
    }
    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 26px 28px;
      box-shadow: 0 14px 36px rgba(38, 80, 92, 0.18);
    }
    .head {
      display: flex; align-items: center; gap: 16px;
    }
    .head img { width: 84px; height: 84px; object-fit: contain; flex-shrink: 0; }
    .head h1 { font-size: 24px; font-weight: 900; line-height: 1.25; }
    .head .sub { font-size: 15px; font-weight: 500; color: var(--text-soft, #4D6F78); margin-top: 4px; }

    .headline { font-size: 19px; font-weight: 700; line-height: 1.5; }

    .letters-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .letter-chip {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 18px;
      font-size: 28px; font-weight: 900;
      background: linear-gradient(135deg, #D9D2FF, #B8F2CF);
      color: var(--deep, #1E3D47);
      box-shadow: 0 6px 14px rgba(38, 80, 92, 0.12);
    }

    .facts { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .fact {
      background: rgba(248, 227, 214, 0.65);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 15px; font-weight: 600;
      color: var(--text-main, #26505C);
    }

    .tip-card { background: rgba(255, 244, 194, 0.92); }
    .tip-card .tip-label { font-size: 13px; font-weight: 800; letter-spacing: 0.04em; color: #8a6d1f; margin-bottom: 6px; }
    .tip-card p { font-size: 17px; font-weight: 600; line-height: 1.55; }

    .empty p { font-size: 18px; font-weight: 600; line-height: 1.6; }

    .close-row { display: flex; justify-content: center; margin-top: 4px; }
    .close-btn {
      min-height: 56px;
      padding: 12px 40px;
      border: none; border-radius: 999px; cursor: pointer;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text-main, #26505C);
      font-family: inherit; font-size: 18px; font-weight: 700;
      box-shadow: 0 8px 20px rgba(38, 80, 92, 0.15);
      text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
    }
    .close-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <img class="scene-bg" src="assets/scene-stage-1-bg.png" alt="" aria-hidden="true"
       onerror="this.style.display='none'">

  <div class="wrap">

    <div class="card head">
      <img src="assets/noni-happy.png" alt="נוני">
      <div>
        <h1 id="title">מה תרגלנו היום</h1>
        <div class="sub" id="dateLine"></div>
      </div>
    </div>

    <div class="card" id="summaryCard">
      <div class="headline" id="headline"></div>
      <div class="letters-row" id="lettersRow"></div>
      <div class="facts" id="factsRow"></div>
    </div>

    <div class="card tip-card" id="tipCard">
      <div class="tip-label">רעיון לשיחה</div>
      <p id="tipText"></p>
    </div>

    <div class="close-row">
      <a class="close-btn" href="map.html">סגירה</a>
    </div>

  </div>

  <script src="js/state.js"></script>
  <script src="js/shared/home-context.js"></script>
  <script>
    (function renderParentToday() {
      const HC = window.AvneiHomeContext;

      // שם הילד.ה — ממאגר התלמידים לפי הנבחר.ת הנוכחי.ת
      let name = '';
      try {
        const sid = localStorage.getItem('avnei-yesod-current-student');
        const students = JSON.parse(localStorage.getItem('avnei-yesod-students') || '[]');
        const rec = Array.isArray(students) ? students.find(s => s && s.id === sid) : null;
        if (rec && rec.name) name = rec.name;
      } catch (e) {}
      if (name) document.getElementById('title').textContent = 'מה ' + name + ' תרגל/ה היום';

      const now = new Date();
      const days = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
      document.getElementById('dateLine').textContent =
        'יום ' + days[now.getDay()] + ' · ' + now.getDate() + '.' + (now.getMonth() + 1);

      const ISLAND_NAMES = {
        1: 'מפרץ הבועות המזמרות', 2: 'שונית גלי הצליל', 3: 'אלמוגי האותיות',
        4: 'השונית השקטה', 5: 'השונית הצדפית', 14: 'הבנת הנשמע', 15: 'נוני מקשיבה',
      };

      const sum = HC ? HC.getTodaySummary() : { items: 0, letters: [], islands: [], minutes: 0 };
      const headline = document.getElementById('headline');
      const lettersRow = document.getElementById('lettersRow');
      const factsRow = document.getElementById('factsRow');

      if (sum.items === 0) {
        // מצב ריק — חיובי, בלי לחץ ("בונוס, לא חובה")
        headline.textContent = 'עוד לא תרגלנו היום — נוני מחכה בסבלנות במפה.';
        document.getElementById('summaryCard').classList.add('empty');
        document.getElementById('tipCard').style.display = 'none';
        return;
      }

      const parts = [];
      if (sum.letters.length === 1) parts.push('היום תרגלנו את האות ' + sum.letters[0]);
      else if (sum.letters.length > 1) parts.push('היום תרגלנו את האותיות ' + sum.letters.join(' · '));
      else parts.push('היום תרגלנו במפת ההרפתקאות של נוני');
      if (sum.missionCompleted) parts.push('והשלמנו את משימת היום של נוני');
      headline.textContent = parts.join(' — ') + '!';

      sum.letters.forEach(l => {
        const chip = document.createElement('div');
        chip.className = 'letter-chip';
        chip.textContent = l;
        lettersRow.appendChild(chip);
      });

      const facts = [];
      facts.push(sum.items + ' תרגילים');
      if (sum.minutes > 0) facts.push('כ-' + sum.minutes + ' דקות');
      sum.islands.forEach(id => { if (ISLAND_NAMES[id]) facts.push(ISLAND_NAMES[id]); });
      facts.forEach(f => {
        const el = document.createElement('div');
        el.className = 'fact';
        el.textContent = f;
        factsRow.appendChild(el);
      });

      // טיפ-שיחה — רוטציה לפי היום בחודש. מחזק שיח, לא בוחן.
      const TIPS = [
        'שאלו בבית: איזו אות פגשנו היום אצל נוני?',
        'בקשו מהילד או הילדה להראות לכם את המפה של נוני ולספר מה יש בה.',
        'חפשו יחד בבית חפץ שמתחיל בצליל של האות שתרגלנו היום.',
        'שאלו: מה נוני התמנון אוהב לעשות? תנו לילד או לילדה לספר בחופשיות.',
        'בקשו מהילד או הילדה ללמד אתכם את מה שתרגלו היום — ללמד מישהו זו הדרך הכי טובה לזכור.',
      ];
      document.getElementById('tipText').textContent = TIPS[now.getDate() % TIPS.length];
    })();
  </script>

</body>
</html>
