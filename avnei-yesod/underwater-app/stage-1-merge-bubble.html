    <div class="ambient-bubble" style="left: 78%; width: 22px; height: 22px; animation-duration: 18s; animation-delay: 3s; --drift: -15px;"></div>
    <div class="ambient-bubble" style="left: 30%; width: 18px; height: 18px; animation-duration: 12s; animation-delay: 6s; --drift: 10px;"></div>
    <div class="ambient-bubble" style="left: 88%; width: 32px; height: 32px; animation-duration: 20s; animation-delay: 9s; --drift: -25px;"></div>

    <div class="merge-stage" id="mergeStage">
      <!-- בועה גדולה (יעד) -->

      <!-- בועות הברה (מקור גרירה) — JS ממלא -->
    </div>

  <header class="stage-1-topbar">
    <a href="stage-1-island.html" class="icon-btn" aria-label="חזרה לתפריט האי">

    </a>

    <div class="word-pill" id="wordPill">
      <img class="pill-img" id="pillImg" src="assets/island-01/parpar.png" alt="">
      <span id="wordPillText">פַּרְפַּר</span>
    </div>

    <button class="replay-btn" id="replayBtn" aria-label="השמע שוב">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">

        <path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
  </header>

  <div class="rise-instruction" id="riseInstruction" style="display:none">
    <div class="rise-instruction__bubble">
      <button class="mini-speaker" id="instructionSpeaker" aria-label="השמע">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor"/>
        </svg>

  <div class="tap-to-start" id="tapToStart">
    <h2>אוֹסְפִים אֶת הַחֲלָקִים</h2>
    <button class="intro-speaker" id="introSpeaker" aria-label="הקישו לשמיעה">

        <path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <span>הַקִּישׁוּ לִשְׁמֹעַ</span>
    </button>
    <p>בַּבּוּעָה הַגְּדוֹלָה יֵשׁ תְּמוּנָה — אֲבָל הִיא בַּעֲרָפֶל.</p>
    <p><strong>גָּרְרוּ אֶת חֶלְקֵי הַמִּלָּה לַבּוּעָה — כָּל חֵלֶק יַבְהִיר אֶת הַתְּמוּנָה עוֹד קְצָת!</strong></p>
    <button class="start-btn" id="startBtn">בּוֹאוּ נַתְחִיל!</button>
  </div>

  <div class="completion" id="completion">
    <h2>אָסַפְנוּ אֶת כָּל הַחֲלָקִים!</h2>
    <button class="intro-speaker" id="completionSpeaker" aria-label="השמיעו">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M11 5L6 9H3v6h3l5 4V5z" fill="#FFFFFF"/>
        <path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <span>הַקִּישׁוּ לִשְׁמֹעַ</span>
    </button>
    <p id="completionMsg">הַמִּלָּה שְׁלֵמָה.</p>
    <div>
      <button class="btn-primary" id="nextWordBtn">מִלָּה נוֹסֶפֶת</button>
      <a href="stage-1-island.html" class="btn-primary btn-secondary">חֲזָרָה לָאִי</a>
    </div>
  </div>

  <div class="feedback-toast" id="feedbackToast"></div>
  <div class="celebrate-particles" id="celebrateParticles" aria-hidden="true"></div>

  <audio id="audioPlayer" preload="auto"></audio>

  <script src="js/state.js"></script>
  <script src="js/shared/bkt.js" onerror="window.AvneiBKT = null"></script>
  <script src="js/shared/event-logger.js" onerror="window.AvneiEventLogger = { logActivityResult: function(){} }"></script>
  <script src="js/shared/mastery.js"></script>
  <script>
  // ============================================================
  // MergeBubble — controller
  // הילדה גוררת בועות-הברה לבועה הגדולה. כל הברה נכונה
  // מתבהרת התמונה. כשכל ההברות נאספו = חגיגה.
  // ============================================================
  const GAME_ID = 'mergeBubble';
  const ISLAND_ID = 1;
  const ACTIVITY_TYPE = 'syllable-blending';

  // דיווח תוצאת סבב לאי 1 → BKT (מודעות פונולוגית · סטרנד 1).
  // אי 1 = הרכבת הברות שמיעתית, בלי אות-יעד/CV → EPA לא רלוונטי (מדולג).
  // תוספתי ל-AvneiMastery המקומי (לא מחליף אותו).
  function logIsland1Result(isCorrect) {
    try {
      if (window.AvneiEventLogger && AvneiEventLogger.logActivityResult) {
        AvneiEventLogger.logActivityResult({
          activity_type: ACTIVITY_TYPE,
          primary_island_id: ISLAND_ID,
          item_id: currentWord ? currentWord.id : null,
          is_correct: isCorrect,
        });
      }
    } catch (e) { /* fail-safe */ }
  }

  const AUDIO_BASE = 'assets/audio/island-01';
  const audio = document.getElementById('audioPlayer');

  let WORDS = [];
  let currentWordIndex = 0;
  let currentWord = null;
  let collectedCount = 0;
  let nextExpectedOrder = 0; // which syllable index the child must collect next (0, 1, 2...)
  let wordMistakeTotal = 0;  // total mistakes in current word (for mastery)
  let started = false;
  let hintTimer = null;

  // ----- Audio helpers -----
  function playAudio(filename, onEnd) {
    // hard-stop any previous audio so they don't overlap
    try {
      audio.pause();
      audio.currentTime = 0;
    } catch (e) { /* ignore */ }
    // Guarantees onEnd fires exactly once — on ended, error, or play-rejection.
    let done = false;
    const finish = () => { if (done) return; done = true; onEnd && onEnd(); };
    audio.onended = finish;
    audio.onerror = () => { console.warn('audio error:', filename); finish(); };
    audio.src = `${AUDIO_BASE}/${filename}.mp3`;
    audio.play().catch(err => {
      console.warn('audio play blocked:', filename, err);
      setTimeout(finish, 800);
    });
  }
  function playSequence(filenames, onAllDone, gapMs = 350) {
    if (!filenames.length) { onAllDone && onAllDone(); return; }
    const [first, ...rest] = filenames;
    playAudio(first, () => {
      if (rest.length === 0) { onAllDone && onAllDone(); return; }
      setTimeout(() => playSequence(rest, onAllDone, gapMs), gapMs);
    });
  }

  async function loadWords() {
    try {
      const res = await fetch('data/island-01-words.json');
      const data = await res.json();
      WORDS = data.words;
    } catch (err) { console.error(err); }
  }

  function pickDistractor(word) {
    const excludeIds = new Set(word.syllable_ids);
    const pool = [];
    WORDS.forEach(w => {
      if (w.id === word.id) return;
      w.syllables.forEach((syl, i) => {
        const sid = w.syllable_ids[i];
        if (excludeIds.has(sid)) return;
        pool.push({
          syllable_id: sid,
          audio: w.syllable_audios[i].split('/').pop().replace('.mp3', '')
        });
      });
    });
    const shuffled = pool.sort(() => Math.random() - 0.5);
    return shuffled[0] || null;
  }

  // ----- Build fragments around the big bubble -----
  function buildFragments() {
    // remove old fragments
    document.querySelectorAll('.merge-fragment').forEach(el => el.remove());

    const stage = document.getElementById('mergeStage');

    const correct = currentWord.syllables.map((syl, i) => ({
      syllable_id: currentWord.syllable_ids[i],
      audio: currentWord.syllable_audios[i].split('/').pop().replace('.mp3', ''),
      correct: true,
      order: i,
    }));
    const distractor = pickDistractor(currentWord);
    const all = [...correct];
    if (distractor) all.push({ syllable_id: distractor.syllable_id, audio: distractor.audio, correct: false, order: -1 });
    all.sort(() => Math.random() - 0.5);

    const positions = pickPositions(all.length);
    const speakerSvg = `<svg class="speaker-icon" viewBox="0 0 24 24"><path d="M11 5L6 9H3v6h3l5 4V5z"/></svg>`;

    all.forEach((c, idx) => {
      const f = document.createElement('div');
      f.className = 'merge-fragment';
      f.dataset.correct = c.correct ? '1' : '0';
      f.dataset.audio = c.audio;
      f.dataset.order = String(c.order);
      f.style.left = positions[idx].left;
      f.style.top = positions[idx].top;
      f.style.animationDelay = `${idx * 0.3}s`;
      f.innerHTML = speakerSvg;
      stage.appendChild(f);
      attachDrag(f);
    });
  }

  function pickPositions(n) {
    // Mobile-safe: left max 66% so the bubble (up to 120px wide) doesn't
    // overflow the right edge on 375px portrait screens.
    const POOL = [
      { left: '6%',  top: '20%' },
      { left: '6%',  top: '64%' },
      { left: '66%', top: '20%' },
      { left: '66%', top: '64%' },
    ];
    return POOL.slice(0, n).sort(() => Math.random() - 0.5);
  }

  // ----- Drag implementation using Pointer Events on document -----
  function attachDrag(el) {
    let startX, startY, originLeft, originTop, originLeftPct, originTopPct;
    let moved = false;

    function onDown(e) {
      if (e.button !== undefined && e.button !== 0) return; // left-click / primary only
      e.preventDefault();
      moved = false;

      const rect = el.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      originLeft = rect.left;
      originTop = rect.top;
      originLeftPct = el.style.left;
      originTopPct = el.style.top;

      // play this fragment's sound on tap
      playAudio(el.dataset.audio);

      // switch to pixel positioning so dragging works
      el.style.left = originLeft + 'px';
      el.style.top = originTop + 'px';
      el.style.right = 'auto';
      el.classList.add('dragging');

      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onUp);
    }

    function onMove(e) {
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
      el.style.left = (originLeft + dx) + 'px';
      el.style.top = (originTop + dy) + 'px';

      // overlap feedback
      const big = document.getElementById('bigBubble').getBoundingClientRect();
      const bigCenter = { x: big.left + big.width / 2, y: big.top + big.height / 2 };
      const dist = Math.hypot(e.clientX - bigCenter.x, e.clientY - bigCenter.y);
      if (dist < big.width * 0.75) {
        document.getElementById('bigBubble').classList.add('drop-target');
      } else {
        document.getElementById('bigBubble').classList.remove('drop-target');
      }
    }

    function onUp(e) {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
      el.classList.remove('dragging');
      document.getElementById('bigBubble').classList.remove('drop-target');

      // If barely moved → it's a tap, leave it where it was
      if (!moved) {
        el.style.left = originLeftPct;
        el.style.top = originTopPct;
        return;
      }

      // Check overlap with big bubble — use generous tolerance
      const big = document.getElementById('bigBubble').getBoundingClientRect();
      const rect = el.getBoundingClientRect();
      const fragCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      const bigCenter = { x: big.left + big.width / 2, y: big.top + big.height / 2 };
      const dist = Math.hypot(fragCenter.x - bigCenter.x, fragCenter.y - bigCenter.y);

      // tolerance: 0.75 of big radius (generous so child doesn't need to be exact)
      const acceptRadius = big.width * 0.75;

      if (dist < acceptRadius) {
        handleDrop(el, rect);
      } else {
        // return home
        el.style.transition = 'left 0.5s cubic-bezier(0.34,1.56,0.64,1), top 0.5s cubic-bezier(0.34,1.56,0.64,1)';
        el.style.left = originLeftPct;
        el.style.top = originTopPct;
        setTimeout(() => { el.style.transition = ''; }, 550);
      }
    }

    el.addEventListener('pointerdown', onDown);
  }

  function handleDrop(el, fragRect) {
    const isCorrectSyllable = el.dataset.correct === '1';
    const fragOrder = parseInt(el.dataset.order, 10);

    // If the next-expected syllable is identical to the dropped one
    // (e.g. פר-פר — both syllables share the same id), accept it regardless of order
    const expectedSylId = currentWord.syllable_ids[nextExpectedOrder];
    const fragSylId = fragOrder >= 0 ? currentWord.syllable_ids[fragOrder] : null;
    const isIdenticalToExpected = isCorrectSyllable && fragSylId === expectedSylId;

    // ===== CASE A: correct syllable AND (correct order OR identical to expected) =====
    if (isCorrectSyllable && (fragOrder === nextExpectedOrder || isIdenticalToExpected)) {
      logIsland1Result(true);
      el.classList.add('absorbed');
      trailParticles(fragRect);

      collectedCount++;
      nextExpectedOrder++;
      const big = document.getElementById('bigBubble');
      ['fog-0','fog-1','fog-2','fog-3'].forEach(c => big.classList.remove(c));
      big.classList.add(`fog-${Math.min(collectedCount, 3)}`);
      big.dataset.fog = collectedCount;

      setTimeout(() => el.remove(), 700);

      if (collectedCount === currentWord.syllable_count) {
        setTimeout(completeWord, 1000);
      } else {
        // hint glow on the NEXT expected fragment (so child knows what's next)
        setTimeout(() => {
          const nextBtn = document.querySelector(`.merge-fragment[data-order="${nextExpectedOrder}"]`);
          if (nextBtn) {
            nextBtn.classList.add('hint');
            setTimeout(() => nextBtn.classList.remove('hint'), 3500);
          }
        }, 800);
      }
      return;
    }

    // ===== CASE B: correct syllable BUT wrong order (and not identical) =====
    // (e.g. dropped "תוּל" when we still need "חָ")
    if (isCorrectSyllable && fragOrder !== nextExpectedOrder && !isIdenticalToExpected) {
      wordMistakeTotal++;
      logIsland1Result(false);
      el.classList.add('wobble');
      returnToHome(el);
      // play order-support, then glow on the expected one
      setTimeout(() => playAudio('support-order'), 350);
      setTimeout(() => {
        const expectedBtn = document.querySelector(`.merge-fragment[data-order="${nextExpectedOrder}"]`);
        if (expectedBtn) {
          expectedBtn.classList.add('hint');
          setTimeout(() => expectedBtn.classList.remove('hint'), 3500);
        }
      }, 600);
      return;
    }

    // ===== CASE C: distractor (wrong syllable entirely) =====
    wordMistakeTotal++;
    logIsland1Result(false);
    el.classList.add('wobble');
    returnToHome(el);
    setTimeout(() => playAudio('support-mistake-1'), 350);
  }

  // Animate fragment back to its origin pool position
  function returnToHome(el) {
    setTimeout(() => {
      el.classList.remove('wobble');
      el.style.transition = 'left 0.5s cubic-bezier(0.34,1.56,0.64,1), top 0.5s cubic-bezier(0.34,1.56,0.64,1)';
      const POOL = [
        { left: '6%',  top: '20%' },
        { left: '6%',  top: '64%' },
        { left: '82%', top: '20%' },
        { left: '82%', top: '64%' },
      ];
      const used = Array.from(document.querySelectorAll('.merge-fragment')).filter(x => x !== el).map(x => `${x.style.left}|${x.style.top}`);
      const free = POOL.find(p => !used.includes(`${p.left}|${p.top}`)) || POOL[0];
      el.style.left = free.left;
      el.style.top = free.top;
      setTimeout(() => { el.style.transition = ''; }, 600);
    }, 600);
  }

  function trailParticles(fromRect) {
    const big = document.getElementById('bigBubble').getBoundingClientRect();
    const start = { x: fromRect.left + fromRect.width / 2, y: fromRect.top + fromRect.height / 2 };
    const end = { x: big.left + big.width / 2, y: big.top + big.height / 2 };
    for (let i = 0; i < 6; i++) {
      const p = document.createElement('div');
      p.className = 'absorb-particle';
      const t = i / 6;
      p.style.left = (start.x + (end.x - start.x) * t) + 'px';
      p.style.top = (start.y + (end.y - start.y) * t) + 'px';
      p.style.animationDelay = `${i * 0.05}s`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 700);
    }
  }

  // ----- Word complete: celebrate -----
  function completeWord() {
    if (window.AvneiMastery) {
      window.AvneiMastery.recordResult(currentWord.id, GAME_ID, wordMistakeTotal);
    }

    const noni = document.getElementById('noniImg');
    noni.src = 'assets/noni-happy.png';
    noni.classList.add('celebrating');
    burstParticles();
    setTimeout(() => {
      playAudio(`word-${currentWord.id}`, () => setTimeout(showCompletion, 700));
    }, 400);
  }

  function burstParticles() {
    const container = document.getElementById('celebrateParticles');
    container.innerHTML = '';
    const colors = ['#FFF7C8', '#FFA98D', '#B981FF', '#A8E8FF', '#73D9D1'];
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (i / 28) * Math.PI * 2;
      const dist = 200 + Math.random() * 120;
      p.style.left = `${50 + (Math.random() - 0.5) * 10}%`;
      p.style.top = `${50 + (Math.random() - 0.5) * 10}%`;
      p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      p.style.setProperty('--dy', `${Math.sin(angle) * dist - 80}px`);
      p.style.background = colors[i % colors.length];
      p.style.boxShadow = `0 0 12px ${colors[i % colors.length]}`;
      p.style.animationDelay = `${(i % 6) * 0.06}s`;
      container.appendChild(p);
    }
    setTimeout(() => { container.innerHTML = ''; }, 3000);
  }

  function showCompletion() {
    document.getElementById('completion').classList.add('visible');
    // play completion audio automatically — children can't read
    setTimeout(() => playAudio('ui-complete-merge'), 400);
  }

  function showInstruction(text) {
    document.getElementById('riseInstruction').style.display = 'flex';
    document.getElementById('instructionText').textContent = text;
  }

  // ----- Word switching -----
  function loadWord(idx) {
    currentWordIndex = (idx + WORDS.length) % WORDS.length;
    currentWord = WORDS[currentWordIndex];
    collectedCount = 0;
    nextExpectedOrder = 0;
    wordMistakeTotal = 0;

    document.getElementById('wordImg').src = currentWord.image;
    document.getElementById('pillImg').src = currentWord.image;
    document.getElementById('wordPillText').textContent = currentWord.display;

    const big = document.getElementById('bigBubble');
    ['fog-0', 'fog-1', 'fog-2', 'fog-3'].forEach(c => big.classList.remove(c));
    big.classList.add('fog-0');
    big.dataset.fog = 0;

    const noni = document.getElementById('noniImg');
    noni.src = 'assets/noni-idle.png';
    noni.classList.remove('celebrating');

    document.getElementById('completion').classList.remove('visible');

    showInstruction('הַקְשִׁיבוּ לַמִּלָּה...');

    // play split + whole
    const syllableKeys = currentWord.syllable_audios.map(p => p.split('/').pop().replace('.mp3', ''));
    setTimeout(() => {
      playSequence(syllableKeys, () => {
        setTimeout(() => {
          playAudio(`word-${currentWord.id}`, () => {
            buildFragments();
            showInstruction('גָּרְרוּ אֶת הַחֲלָקִים — וְהַתְּמוּנָה תִּתְבָּהֵר!');
          });
        }, 500);
      }, 400);
    }, 500);
  }

  function nextWord() {
    const w = window.AvneiMastery ? window.AvneiMastery.pickWord(GAME_ID, WORDS) : null;
    const idx = w ? WORDS.indexOf(w) : (currentWordIndex + 1);
    loadWord(idx);
  }

  async function start() {
    if (started) return;
    started = true;
    document.getElementById('tapToStart').classList.add('hidden');
    if (!WORDS.length) {
      await loadWords();
    }
    if (!WORDS.length) {
      console.error('failed to load words');
      return;
    }
    const w = window.AvneiMastery ? window.AvneiMastery.pickWord(GAME_ID, WORDS) : null;
    const idx = w ? WORDS.indexOf(w) : Math.floor(Math.random() * WORDS.length);
    loadWord(idx);
  }

  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('introSpeaker').addEventListener('click', (e) => {
    e.stopPropagation();
    playAudio('ui-bubble-story');
  });
  document.getElementById('replayBtn').addEventListener('click', () => {
    if (!currentWord) return;
    playAudio(`word-${currentWord.id}`);
  });
  document.getElementById('instructionSpeaker').addEventListener('click', () => {
    if (!currentWord) return;
    playAudio(`word-${currentWord.id}`);
  });
  document.getElementById('nextWordBtn').addEventListener('click', nextWord);
  document.getElementById('completionSpeaker').addEventListener('click', (e) => {
    e.stopPropagation();
    playAudio('ui-complete-merge');
  });

  (async function init() {
    await loadWords();
    audio.src = `${AUDIO_BASE}/ui-bubble-story.mp3`;
  })();
  </script>
</body>
