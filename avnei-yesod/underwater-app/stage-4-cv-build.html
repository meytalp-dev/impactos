<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>אי 4 · הַרְכִּיבוּ צֵרוּף · השונית של נוני</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <script src="../../demo/journey.js" defer></script>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100dvh;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      color: var(--text-main);
      direction: rtl;
      overflow-x: hidden;
    }

    /* רקע שונית (אותה תמונה של אי 3) */
    .scene-bg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center bottom;
      z-index: 0;
      pointer-events: none;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }
    .top-bar a, .top-bar .counter {
      height: 44px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.85);
      color: var(--text-main);
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none;
      box-shadow: 0 2px 10px rgba(38,80,92,0.15);
      padding: 0 14px;
    }
    .top-bar a { width: 44px; padding: 0; border-radius: 50%; }
    .top-bar .counter { font-size: 14px; font-weight: 700; }

    main {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 20px 80px;
    }

    /* כותרת קטנה + ההוראה הקצרה */
    .build-intro {
      text-align: center;
      margin-bottom: 10px;
    }
    .build-intro h1 {
      font-size: clamp(20px, 4.4vw, 26px);
      font-weight: 800;
      color: var(--text-main);
      margin: 0 0 4px;
    }
    .build-intro p {
      font-size: clamp(13px, 2.8vw, 15px);
      color: var(--text-soft);
      margin: 0;
    }

    /* === Target prompt (Task mode · 3-tier scaffolding) === */
    .cv-build-prompt {
      background: rgba(255,255,255,0.92);
      border-radius: var(--radius-lg);
      padding: 14px 22px;
      box-shadow: 0 10px 24px rgba(38,80,92,0.15);
      margin: 6px auto 14px;
      max-width: 540px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px 14px;
    }
    .cv-build-prompt__label {
      font-size: clamp(14px, 3vw, 17px);
      font-weight: 700;
      color: var(--text-soft);
    }
    /* ה-target הוא כפתור גדול עגול — מציג 🔊 או אות או CV לפי scaffold */
    .cv-build-prompt__target {
      min-width: 100px;
      min-height: 72px;
      padding: 8px 18px;
      border-radius: var(--radius-lg);
      background: var(--water-secondary);
      color: white;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(40px, 9vw, 60px);
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 8px 22px rgba(115, 217, 209, 0.55);
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.25s ease;
      justify-self: center;
    }
    .cv-build-prompt__target:active { transform: scale(0.96); }
    /* Tier 0 — audio only, ה-🔊 בולט וגדול */
    .cv-build-prompt__target.audio-only {
      animation: speakerPulse 1.8s ease-in-out infinite;
    }
    .cv-build-prompt__target.audio-only .cv-build-prompt__audio-icon {
      font-size: clamp(34px, 7vw, 44px);
    }
    @keyframes speakerPulse {
      0%, 100% { box-shadow: 0 8px 22px rgba(115, 217, 209, 0.55); }
      50%      { box-shadow: 0 8px 22px rgba(115, 217, 209, 0.55), 0 0 0 8px rgba(255, 231, 168, 0.25); }
    }
    /* Tier 1 — letter visible + placeholder */
    .cv-build-prompt__target.partial-hint {
      background: white;
      color: var(--text-main);
      border: 2px solid var(--water-secondary);
    }
    .cv-build-prompt__placeholder {
      color: rgba(38,80,92,0.35);
      font-weight: 600;
      margin-inline-start: 4px;
    }
    /* Tier 2 — full CV (helpful copy mode) */
    .cv-build-prompt__target.full-hint {
      background: var(--hint);
      color: var(--text-main);
      box-shadow: 0 8px 22px rgba(255, 231, 168, 0.55);
    }
    .cv-build-prompt__counter {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-main);
      background: var(--mint);
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      justify-self: end;
    }

    /* === Display area (the fish + the built CV) === */
    .cv-build-stage {
      background: rgba(255,255,255,0.85);
      border-radius: var(--radius-lg);
      padding: 18px 22px 20px;
      box-shadow: 0 14px 28px rgba(38,80,92,0.18), inset 0 2px 8px rgba(255,255,255,0.95);
      margin: 10px 0 22px;
      text-align: center;
    }
    .cv-build-display {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
      min-height: 180px;
      position: relative;
    }
    .cv-build-fish {
      width: 100px; height: 70px;
      color: #8aacbb;
      filter: grayscale(0.6);
      transition: all 0.4s ease;
    }
    .cv-build-fish svg { width: 100%; height: 100%; }
    .cv-build-display.built .cv-build-fish {
      color: var(--water-secondary);
      filter: grayscale(0) drop-shadow(0 0 16px var(--hint));
      animation: fishHappy 0.7s ease-in-out 2;
    }
    @keyframes fishHappy {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-12px) rotate(4deg); }
    }
    .cv-build-result {
      font-size: clamp(60px, 14vw, 96px);
      font-weight: 900;
      color: var(--text-main);
      line-height: 1;
      min-height: 1em;
    }
    .cv-build-result__placeholder {
      color: rgba(38,80,92,0.3);
      font-weight: 600;
    }
    .cv-build-anchor {
      font-size: clamp(16px, 3.4vw, 19px);
      color: var(--text-soft);
      min-height: 1.5em;
    }
    .cv-build-anchor strong {
      color: var(--text-main);
      font-weight: 800;
    }
    .cv-build-speaker {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: white;
      color: var(--text-main);
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(38,80,92,0.18);
      font-size: 22px;
      align-items: center; justify-content: center;
      transition: transform 0.15s ease;
    }
    .cv-build-speaker:active { transform: scale(0.92); }

    /* === Choosers (2 columns: vowels + letters) === */
    .cv-build-choosers {
      display: grid;
      grid-template-columns: 1fr 1.5fr;  /* vowels narrower than letters */
      gap: 14px;
    }
    @media (max-width: 480px) {
      .cv-build-choosers { grid-template-columns: 1fr; gap: 16px; }
    }
    .cv-build-col {
      background: rgba(255,255,255,0.75);
      border-radius: var(--radius-md);
      padding: 12px;
      box-shadow: 0 6px 14px rgba(38,80,92,0.12);
    }
    .cv-build-col__label {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-soft);
      text-align: center;
      margin-bottom: 8px;
    }
    .cv-build-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 6px;
    }
    .cv-build-grid--vowels {
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    }
    .cv-build-tile {
      aspect-ratio: 1 / 1;
      background: white;
      border: 2px solid rgba(38,80,92,0.18);
      border-radius: 12px;
      font-family: inherit;
      color: var(--text-main);
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(38,80,92,0.08);
    }
    .cv-build-tile--letter {
      font-size: clamp(20px, 4.6vw, 28px);
      font-weight: 800;
    }
    .cv-build-tile--vowel {
      aspect-ratio: auto;
      padding: 10px 6px;
      min-height: 84px;
    }
    .cv-build-tile__vowel-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      line-height: 1;
    }
    /* ✕ + ניקוד — ה-✕ הוא עוגן ניטרלי שמבליט את הניקוד (במקום ◌ החיוור) */
    .cv-build-tile__vowel-form {
      font-size: clamp(30px, 7vw, 42px);
      font-weight: 900;
      line-height: 1;
      color: var(--text-main);
      background: rgba(184, 242, 207, 0.45);
      border-radius: 10px;
      padding: 4px 8px 6px;
    }
    .cv-build-tile__vowel-sep {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-soft);
      margin: 0 1px;
    }
    .cv-build-tile__vowel-name {
      font-size: 11.5px;
      font-weight: 700;
      color: var(--text-soft);
      margin-top: 4px;
      text-align: center;
    }
    .cv-build-tile--vowel-merged .cv-build-tile__vowel-form {
      font-size: clamp(24px, 5.6vw, 34px);
      padding: 3px 6px 5px;
    }
    .cv-build-tile:hover { transform: translateY(-2px); }
    .cv-build-tile:active { transform: scale(0.94); }
    .cv-build-tile.selected {
      background: var(--mint);
      border-color: #6BCB9A;
      box-shadow: 0 0 0 3px rgba(184, 242, 207, 0.6), 0 4px 14px rgba(115, 217, 209, 0.4);
      transform: scale(1.05);
    }

    /* נוני בפינה */
    .noni-fixed {
      position: fixed;
      bottom: 14px;
      right: 14px;
      width: 80px;
      height: 80px;
      object-fit: contain;
      z-index: 5;
      filter: drop-shadow(0 6px 14px rgba(38, 80, 92, 0.18));
      animation: noni-float 4s ease-in-out infinite;
    }
    @keyframes noni-float {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-6px) rotate(3deg); }
    }
  </style>
</head>
<body>

  <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
       onerror="this.style.display='none'">

  <!-- SVG defs לדגים (reuse של אי 4 cv-tap) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="fishIcon" viewBox="0 0 100 70">
        <path d="M 88 35 L 100 14 L 100 56 Z" fill="currentColor" opacity="0.85"/>
        <ellipse cx="48" cy="35" rx="42" ry="25" fill="currentColor"/>
        <path d="M 36 12 Q 48 4, 60 14 L 56 22 Q 46 16, 38 20 Z" fill="currentColor" opacity="0.7"/>
        <path d="M 36 58 Q 48 66, 60 56 L 56 50 Q 46 54, 38 50 Z" fill="currentColor" opacity="0.7"/>
        <ellipse cx="44" cy="44" rx="22" ry="8" fill="#FFFFFF" opacity="0.55"/>
        <circle cx="20" cy="30" r="5" fill="#FFFFFF"/>
        <circle cx="20" cy="30" r="2.5" fill="#26505C"/>
        <path d="M 12 38 Q 18 42, 26 38" stroke="#26505C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </symbol>
    </defs>
  </svg>

  <header class="top-bar">
    <a href="stage-4-island.html" aria-label="חזרה לאי">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="counter">🛠 הַרְכִּיבוּ צֵרוּף</div>
    <div style="width:44px"></div>
  </header>

  <main>
    <div class="build-intro">
      <h1>הַרְכִּיבוּ אֶת הַצְּלִיל</h1>
      <p id="buildIntroSub">הַקְשִׁיבוּ לַצְּלִיל 🔊 — וְהַרְכִּיבוּ אוֹתוֹ מֵאוֹת וְנִקּוּד</p>
    </div>

    <div id="gameRoot"></div>
  </main>

  <!-- Completion overlay -->
  <div id="doneOverlay" style="display:none; position:fixed; inset:0; background: radial-gradient(circle at 50% 35%, rgba(184, 232, 224, 0.55), rgba(99, 216, 208, 0.75)); backdrop-filter: blur(2px); z-index: 100; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:24px; text-align:center;">
    <img src="assets/noni-kiss.png" alt="נוני שמח"
         style="width:140px;height:140px;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(38,80,92,0.25))"
         onerror="this.src='assets/noni-happy.png'">
    <h1 style="margin:0; font-size:clamp(28px,6vw,42px); font-weight:900; color:var(--text-main); background:rgba(255,255,255,0.85); padding:14px 22px; border-radius:var(--radius-lg); box-shadow:0 8px 24px rgba(38,80,92,0.18);">בָּנִיתֶם 5 צֵרוּפִים! 🎵</h1>
    <p style="margin:0; font-size:clamp(15px,3.4vw,18px); color:var(--text-main); background:rgba(255,255,255,0.85); padding:12px 18px; border-radius:var(--radius-lg); max-width:480px;">הַדָּגִים שָׁרִים אֶת הַצְּלִילִים שֶׁבָּנִיתֶם.</p>
    <a href="stage-4-island.html" style="height:64px; padding:0 48px; background:var(--water-secondary); color:white; border-radius:var(--radius-pill); font-family:inherit; font-size:clamp(20px,4.5vw,24px); font-weight:800; box-shadow:0 12px 28px rgba(115,217,209,0.5); display:inline-flex; align-items:center; justify-content:center; text-decoration:none;">חזרה לאי</a>
  </div>

  <img class="noni-fixed" id="noniImg" src="assets/noni-idle.png" alt="נוני">

  <!-- Scripts -->
  <script src="js/shared/audio.js" onerror="window._audioMissing=true"></script>
  <script src="js/shared/noni.js" onerror="window._noniMissing=true"></script>
  <script src="js/shared/vowel-adapter.js"></script>
  <script src="js/shared/epa.js" onerror="window._epaMissing=true"></script>
  <script src="js/shared/event-logger.js" onerror="window._evlogMissing=true"></script>
  <script src="js/shared/bkt.js" onerror="window._bktMissing=true"></script>
  <script src="js/templates/mechanic-cv-build.js"></script>

  <script>
    (function () {
      'use strict';

      // Unlock audio on first user gesture (iOS)
      document.addEventListener('click', function unlock() {
        if (window.AvneiAudio && typeof window.AvneiAudio.unlock === 'function') {
          try { window.AvneiAudio.unlock(); } catch (e) {}
        }
        document.removeEventListener('click', unlock);
      }, { once: true });

      // --- מיקוד-תנועה: ?vowel=<id> (שבועות-תנועה בתוכנית השנתית · 4.7.2026) ---
      // כשהפרמטר קיים ותקין (id מ-vowel-adapter): 4/5 סבבים על התנועה הממוקדת,
      // באותיות בעלות צליל ייחודי (בלי תאומות ת/ט · ק/כ · א/ע — כמו PILOT_TARGETS),
      // + סבב-ניגוד אחד מתנועה שכבר נלמדה לפי רצף מטח. בלי פרמטר — ההתנהגות
      // הקיימת ללא שינוי. קבלת phoneme_group (קמץ+פתח=/a/) וה-logging נשארים
      // במנוע כמו שהם.
      // מימוש: עטיפת getTopWeakCVs בדף הזה בלבד — mechanic-cv-build בונה ממנה
      // את רשימת ה-targets כשהיא מחזירה מספיק פריטים (בלי לגעת בקובץ המנוע).
      // ⚠️ שווא: אודיו cv-*-shva ידוע כבעייתי (מבטא "te" — ראה feedback 3.7.2026);
      //    מצב ?vowel=shva עובד טכנית אך דורש הפקת אודיו מחדש לפני שימוש בכיתה.
      var VA = window.AvneiVowelAdapter;
      var focusId = new URLSearchParams(location.search).get('vowel');
      var focusVowel = (focusId && VA && typeof VA.getVowelById === 'function') ? VA.getVowelById(focusId) : null;
      if (focusVowel) {
        // סדר ההוראה (ב-canonical של אריחי המנוע): /a/ → שווא → /i/ → /o/ → /e/ → /u/
        var TEACH_SEQ = ['patach', 'shva', 'hiriq', 'holam', 'tzere', 'kubutz'];
        var CANON = { kamatz: 'patach', segol: 'tzere', shuruk: 'kubutz' };
        var canonFocus = CANON[focusId] || focusId;
        // לקבוצת /u/ (קובוץ/שורוק) קיימים קובצי אודיו cv-* רק לאותיות ב/ל/מ
        var FOCUS_LETTERS = (VA.getPhonemeGroup(focusId) === 'u') ? ['ב', 'ל', 'מ'] : ['מ', 'ב', 'ל', 'ש', 'ר'];
        var learnedPool = TEACH_SEQ.slice(0, Math.max(0, TEACH_SEQ.indexOf(canonFocus)));
        var pick = function (arr) { return arr[Math.floor(Math.random() * arr.length)]; };
        var lettersShuffled = FOCUS_LETTERS.slice().sort(function () { return Math.random() - 0.5; });
        var focusTargets = [];
        for (var i = 0; i < 5; i++) {
          focusTargets.push({ letter: lettersShuffled[i % lettersShuffled.length], vowelId: focusId });
        }
        // סבב-ניגוד אחד (לא הראשון) מתנועה שכבר נלמדה — אם קיימת כזו
        if (learnedPool.length > 0) {
          focusTargets[3] = { letter: pick(lettersShuffled), vowelId: pick(learnedPool) };
        }
        VA.getTopWeakCVs = function (sid, n) {
          var count = (typeof n === 'number' && n > 0) ? n : focusTargets.length;
          var out = [];
          for (var j = 0; j < count; j++) out.push(focusTargets[j % focusTargets.length]);
          return out;
        };
        // כותרת-משנה ממוקדת (מנוקד — מסך ילד.ה)
        var VOWEL_NAME_NIQUD = {
          kamatz: 'קָמָץ', patach: 'פַּתָּח', shva: 'שְׁוָא', hiriq: 'חִירִיק', holam: 'חוֹלָם',
          tzere: 'צֵירֵי', segol: 'סֶגּוֹל', kubutz: 'קֻבּוּץ', shuruk: 'שׁוּרוּק',
        };
        var introSub = document.getElementById('buildIntroSub');
        if (introSub && VOWEL_NAME_NIQUD[focusId]) {
          introSub.innerHTML = 'הַיּוֹם מִתְאַמְּנִים עַל <b>' + VOWEL_NAME_NIQUD[focusId] + '</b> — הַקְשִׁיבוּ 🔊 וְהַרְכִּיבוּ';
        }
      }

      // Mount the mechanic — task mode עם 5 trials
      window.AvneiMechanics['cv-build'].mount(document.getElementById('gameRoot'), {
        numTrials: 5,
        onUnitWon: function () {
          if (window.AvneiNoni) try { window.AvneiNoni.setState('cheer'); } catch (e) {}
          setTimeout(function () {
            if (window.AvneiNoni) try { window.AvneiNoni.setState('idle'); } catch (e) {}
          }, 700);
        },
        onComplete: function () {
          if (window.AvneiNoni) try { window.AvneiNoni.setState('cheer'); } catch (e) {}
          const overlay = document.getElementById('doneOverlay');
          overlay.style.display = 'flex';
        },
      });
    })();
  </script>
</body>
</html>
