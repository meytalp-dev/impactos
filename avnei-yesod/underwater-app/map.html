<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>המפה · עומק הים המואר</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    body { background: #B9F0E8; overflow: hidden; }

    /* ===== Stage container — שומר על יחס 16:9 של המפה ===== */
    .map-stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #B9F0E8 0%, #7FD8D2 100%);
    }

    .map-frame {
      position: relative;
      width: 100%;
      height: 100%;
      aspect-ratio: 16 / 9;
      max-width: 100vw;
      max-height: 100vh;
      max-height: 100dvh;
      overflow: hidden;
    }

    .map-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      animation: bg-in 900ms ease-out forwards;
    }

    @keyframes bg-in {
      from { opacity: 0; transform: scale(1.03); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ===== Top bar — מעל המפה ===== */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: var(--space-m);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      pointer-events: none;
    }

    .top-bar > * { pointer-events: auto; }

    .icon-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 6px 16px rgba(38, 80, 92, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      font-size: 24px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 180ms ease;
    }
    .icon-btn:active { transform: scale(0.92); }

    /* ===== Map nodes (3 השלבים) ===== */

    .map-node {
      position: absolute;
      transform: translate(50%, -50%);  /* center on the % point — RTL friendly */
      z-index: 5;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      pointer-events: auto;
    }

    .map-node .node-dot {
      width: clamp(52px, 9vw, 72px);
      height: clamp(52px, 9vw, 72px);
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%,
        rgba(255, 255, 255, 1) 0%,
        var(--warm-white) 30%,
        var(--water-secondary) 90%);
      border: 4px solid rgba(255, 255, 255, 0.95);
      box-shadow:
        0 8px 22px rgba(38, 80, 92, 0.25),
        inset 0 0 18px rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(22px, 4.5vw, 30px);
      font-weight: 900;
      color: var(--text-main);
      position: relative;
    }

    /* פעימה רכה רק על השלב הפעיל */
    .map-node.active .node-dot {
      animation: node-pulse 2.4s ease-in-out infinite;
      background: radial-gradient(circle at 32% 28%,
        #FFFFFF 0%,
        #FFE7A8 30%,
        var(--coral) 95%);
    }

    @keyframes node-pulse {
      0%, 100% {
        box-shadow:
          0 8px 22px rgba(38, 80, 92, 0.25),
          inset 0 0 18px rgba(255, 255, 255, 0.5),
          0 0 0 0 rgba(255, 231, 168, 0.6);
        transform: scale(1);
      }
      50% {
        box-shadow:
          0 8px 22px rgba(38, 80, 92, 0.25),
          inset 0 0 18px rgba(255, 255, 255, 0.5),
          0 0 0 18px rgba(255, 231, 168, 0);
        transform: scale(1.05);
      }
    }

    /* שלב נעול */
    .map-node.locked .node-dot {
      background: radial-gradient(circle at 32% 28%,
        rgba(255, 255, 255, 0.9) 0%,
        rgba(218, 214, 201, 0.85) 100%);
      color: var(--text-soft);
      filter: saturate(0.6);
    }
    .map-node.locked { cursor: not-allowed; }
    .map-node.locked .node-label { opacity: 0.55; }

    .node-label {
      display: block;
      margin-top: 10px;
      text-align: center;
      background: rgba(255, 255, 255, 0.92);
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font-size: clamp(13px, 2.6vw, 16px);
      font-weight: 700;
      color: var(--text-main);
      box-shadow: 0 4px 12px rgba(38, 80, 92, 0.15);
      white-space: nowrap;
      transform: translateX(50%);
    }

    /* מזכרת על המפה (טבעת הד אם שלב 1 הושלם) */
    .souvenir-on-map {
      position: absolute;
      width: 30px;
      height: 30px;
      transform: translate(50%, -50%);
      z-index: 4;
      animation: souvenir-float 3.5s ease-in-out infinite;
      filter: drop-shadow(var(--glow-pedagogic));
    }

    @keyframes souvenir-float {
      0%, 100% { transform: translate(50%, -50%); }
      50%      { transform: translate(50%, calc(-50% - 8px)); }
    }

    /* ===== Noni overlay על המפה ===== */
    .map-noni {
      position: absolute;
      width: clamp(80px, 14vw, 130px);
      transform: translate(50%, -50%);
      z-index: 6;
      pointer-events: none;
      filter: drop-shadow(0 12px 22px rgba(38, 80, 92, 0.25));
      animation: noni-breathe 4.5s ease-in-out infinite;
    }

    @keyframes noni-breathe {
      0%, 100% { transform: translate(50%, -50%) scale(1); }
      50%      { transform: translate(50%, calc(-50% - 4px)) scale(1.03); }
    }

    /* ===== Title plate ===== */
    .map-title {
      position: absolute;
      top: var(--space-m);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 10px 22px;
      border-radius: var(--radius-pill);
      font-size: clamp(18px, 3.5vw, 22px);
      font-weight: 900;
      color: var(--text-main);
      box-shadow: 0 6px 16px rgba(38, 80, 92, 0.12);
      z-index: 8;
    }

    /* כניסה רכה לכל הצמתים */
    .map-node, .map-noni, .souvenir-on-map {
      opacity: 0;
      animation: fade-in 700ms ease-out forwards;
    }
    .map-node:nth-of-type(1) { animation-delay: 600ms; }
    .map-node:nth-of-type(2) { animation-delay: 750ms; }
    .map-node:nth-of-type(3) { animation-delay: 900ms; }
    .map-noni { animation-delay: 1050ms; }
    .souvenir-on-map { animation-delay: 1200ms; }

    @keyframes fade-in {
      to { opacity: 1; }
    }

    /* החזרה לאנימציית פעימה אחרי הכניסה (override) */
    .map-node.active .node-dot { animation: node-pulse 2.4s ease-in-out 1.5s infinite; }

    @media (prefers-reduced-motion: reduce) {
      .map-bg, .map-node, .map-noni, .souvenir-on-map {
        animation: none !important;
        opacity: 1 !important;
      }
      .map-node.active .node-dot { animation: none !important; }
    }
  </style>
</head>
<body>

  <main class="map-stage">
    <div class="map-frame">

      <img class="map-bg" src="assets/scene-map-bg.png" alt="" aria-hidden="true">

      <h1 class="map-title">המפה של נוני</h1>

      <!-- Top bar -->
      <header class="top-bar">
        <a href="index.html" class="icon-btn" aria-label="חזרה">
          <!-- חץ ימינה (RTL = חזרה) -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <div class="pearl-counter" aria-label="פנינים">
          <span class="pearl" aria-hidden="true"></span>
          <span class="count">0</span>
        </div>
      </header>

      <!-- ===== 3 הצמתים — ממוקמים ב-% על תמונת המפה ===== -->

      <!-- שלב 1 — פעיל (השונית הימנית הבהירה) -->
      <a href="stage-1.html" class="map-node active" style="right: 19%; top: 58%;">
        <div class="node-dot">1</div>
        <span class="node-label">מפרץ הבועות המזמרות</span>
      </a>

      <!-- שלב 2 — נעול (השונית האמצעית) -->
      <a class="map-node locked" style="right: 50%; top: 52%;" aria-disabled="true">
        <div class="node-dot">2</div>
        <span class="node-label">שונית גלי הצליל</span>
      </a>

      <!-- שלב 3 — נעול (השונית השמאלית בערפל) -->
      <a class="map-node locked" style="right: 82%; top: 46%;" aria-disabled="true">
        <div class="node-dot">3</div>
        <span class="node-label">אלמוגי האותיות</span>
      </a>

      <!-- ===== נוני עומד ליד שלב 1 ===== -->
      <img class="map-noni" src="assets/noni-hero-transparent.png" alt="נוני"
           style="right: 13%; top: 72%;">

      <!-- ===== מזכרת השליטה (טבעת הד) — תופיע רק אם שלב 1 הושלם ===== -->
      <div class="souvenir-on-map" id="echoRing" style="right: 19%; top: 75%; display: none;">
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="14" fill="none" stroke="#FFE7A8" stroke-width="3" opacity="0.95"/>
          <circle cx="20" cy="20" r="9" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.85"/>
          <circle cx="20" cy="20" r="4" fill="#FFE7A8" opacity="0.9"/>
        </svg>
      </div>

    </div>
  </main>

  <script src="js/state.js"></script>
  <script>
    // הצגת מזכרת השליטה אם שלב 1 הושלם
    if (typeof isStageCompleted === 'function' && isStageCompleted(1)) {
      const ring = document.getElementById('echoRing');
      if (ring) ring.style.display = 'block';
    }
  </script>

</body>
</html>
