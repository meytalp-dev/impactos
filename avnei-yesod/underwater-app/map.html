<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>המפה · עומק הים המואר</title>

  <!-- ═══ Entry flow (עודכן A0.1 — 26.5.2026) ═══
       סדר הכניסה: student-picker → map.
       - אם אין current-student מוגדר → מפנה לבחירת תלמידה.
         (חוץ מ-?skip-picker=1 או ?guest=1 לדמו/פיילוט).
       - הילדה הולכת ישר למשחק. BKT אוסף נתונים מהמשחקונים עצמם.
       - onboarding.html ("המסע הראשון בים") הוצא מהזרימה אחרי החלטת A0.1:
         הגישה ההיברידית מבוססת על נתוני BKT מ-10+ אירועי משחק אמיתי, לא priors רכים.
         אפשר עדיין להגיע אליו ישירות מ-URL לבחירה ידנית. -->
  <script>
    (function () {
      const params = new URLSearchParams(location.search);

      // אפשרות דמו: ?guest=1 → מתעדף 'local' ומדלג על picker
      if (params.get('guest') === '1') {
        localStorage.setItem('avnei-yesod-current-student', 'local');
      }
      // אפשרות פיילוט: ?skip-picker=1 → מאפשר להישאר ללא בחירה
      if (params.get('skip-picker') === '1') {
        sessionStorage.setItem('avnei-yesod-skip-picker', '1');
      }

      // דורש בחירת תלמידה
      const hasStudent = !!localStorage.getItem('avnei-yesod-current-student');
      const skipPicker = sessionStorage.getItem('avnei-yesod-skip-picker') === '1';
      if (!hasStudent && !skipPicker) {
        location.replace('student-picker.html?return=map.html');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    body {
      background: linear-gradient(180deg, #B9F0E8 0%, #7FD8D2 100%);
      overflow: hidden;
    }

    /* ===== Stage container — הקנבס של כל המסך ===== */
    .map-stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== Frame — חתיכת המפה במחיצת 16:9 ===== */
    /* הנוסחה: הריבוע הגדול ביותר ביחס 16:9 שנכנס במסך */
    .map-frame {
      position: relative;
      width: min(100vw, calc(100dvh * 16 / 9));
      aspect-ratio: 16 / 9;
      max-height: 100dvh;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(38, 80, 92, 0.15);
    }

    .map-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      opacity: 0;
      animation: bg-in 900ms ease-out forwards;
    }

    @keyframes bg-in {
      from { opacity: 0; transform: scale(1.03); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ===== Top bar — קבוע על המסך (לא בתוך הפריים) ===== */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: var(--space-m);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }

    .icon-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 6px 16px rgba(38, 80, 92, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      text-decoration: none;
      transition: transform 180ms ease;
    }
    .icon-btn:active { transform: scale(0.92); }

    /* ===== Map title plate (בתוך הפריים) ===== */
    .map-title {
      position: absolute;
      top: clamp(8px, 2vh, 18px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 8px 22px;
      border-radius: var(--radius-pill);
      font-size: clamp(16px, 2.8vw, 22px);
      font-weight: 900;
      color: var(--text-main);
      box-shadow: 0 6px 16px rgba(38, 80, 92, 0.15);
      z-index: 8;
      white-space: nowrap;
    }

    /* ===== Map nodes ===== */

    .map-node {
      position: absolute;
      z-index: 5;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      pointer-events: auto;
      /* nudge: align center to (right%, top%) point */
      transform: translate(50%, -50%);
    }

    .map-node .node-dot {
      width: clamp(44px, 6vw, 70px);
      height: clamp(44px, 6vw, 70px);
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%,
        #FFFFFF 0%,
        var(--warm-white) 30%,
        var(--water-secondary) 95%);
      border: 4px solid rgba(255, 255, 255, 0.96);
      box-shadow:
        0 8px 22px rgba(38, 80, 92, 0.3),
        inset 0 0 18px rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 900;
      color: var(--text-main);
    }

    @keyframes node-pulse {
      0%, 100% {
        box-shadow:
          0 8px 22px rgba(38, 80, 92, 0.3),
          inset 0 0 18px rgba(255, 255, 255, 0.45),
          0 0 0 0 rgba(255, 231, 168, 0.6);
        transform: scale(1);
      }
      50% {
        box-shadow:
          0 8px 22px rgba(38, 80, 92, 0.3),
          inset 0 0 18px rgba(255, 255, 255, 0.45),
          0 0 0 18px rgba(255, 231, 168, 0);
        transform: scale(1.05);
      }
    }

    /* ===== מצבי מפה לפי narrative-spec §3 — "אופק קרוב" ===== */
    /* completed | current | next-near | next-distant | horizon */

    /* completed — אי שכבר התבהר. מואר בעדינות, אפשר לחזור אליו */
    .map-node.map-state-completed .node-dot {
      background: radial-gradient(circle at 32% 28%,
        #FFFFFF 0%,
        #DCF6EC 30%,
        var(--water-secondary, #73D9D1) 95%);
      border-color: rgba(255, 255, 255, 0.95);
      color: var(--text-main, #1a3a3a);
      animation: node-completed-glow 5s ease-in-out infinite;
    }
    @keyframes node-completed-glow {
      0%, 100% {
        box-shadow:
          0 8px 22px rgba(38, 80, 92, 0.25),
          inset 0 0 18px rgba(255, 255, 255, 0.5);
      }
      50% {
        box-shadow:
          0 8px 22px rgba(38, 80, 92, 0.25),
          inset 0 0 18px rgba(255, 255, 255, 0.5),
          0 0 0 10px rgba(184, 242, 208, 0.2);
      }
    }

    /* current — האי הנוכחי. פעימה חמה כמו ה-active המקורי */
    .map-node.map-state-current .node-dot {
      background: radial-gradient(circle at 32% 28%,
        #FFFFFF 0%,
        #FFE7A8 30%,
        var(--coral, #FFA98D) 95%);
      color: #fff;
      animation: node-pulse 2.4s ease-in-out infinite;
    }

    /* next-near — נראה באובך רך. צללית קרובה, פרטים מטושטשים.
       רך, לא חסום ולא עצוב. אסור: גוונים אפורים, cursor not-allowed, סטורציה נמוכה */
    .map-node.map-state-next-near {
      opacity: 0.62;
      filter: blur(0.6px);
      cursor: default;
      pointer-events: none;
    }
    .map-node.map-state-next-near .node-dot {
      background: radial-gradient(circle at 32% 28%,
        rgba(255, 255, 255, 0.94) 0%,
        rgba(200, 240, 232, 0.85) 35%,
        rgba(155, 220, 210, 0.7) 95%);
      border-color: rgba(255, 255, 255, 0.8);
      color: rgba(60, 90, 95, 0.55);
      box-shadow: 0 6px 18px rgba(38, 80, 92, 0.15);
    }
    .map-node.map-state-next-near .node-label {
      background: rgba(255, 255, 255, 0.55);
      color: rgba(70, 90, 100, 0.65);
      font-weight: 500;
      box-shadow: 0 3px 8px rgba(38, 80, 92, 0.08);
    }

    /* next-distant — אור רחוק, צללית מטושטשת, ללא תווית */
    .map-node.map-state-next-distant {
      opacity: 0.32;
      filter: blur(1.6px);
      cursor: default;
      pointer-events: none;
    }
    .map-node.map-state-next-distant .node-dot {
      background: radial-gradient(circle at 32% 28%,
        rgba(255, 255, 255, 0.85) 0%,
        rgba(190, 225, 220, 0.7) 100%);
      border-color: rgba(255, 255, 255, 0.6);
      color: transparent;
    }
    .map-node.map-state-next-distant .node-label {
      display: none;
    }

    /* horizon — לא מציגים כלל. ערפל ים בלבד */
    .map-node.map-state-horizon {
      display: none;
    }

    /* Vertical Slice override — מאפשר קליק לאיים בפיתוח גם אם הם next-near.
       יוסר כשייבנו 22 איים מלאים. */
    .map-node[data-vs-open="true"] {
      pointer-events: auto !important;
      cursor: pointer !important;
    }

    .node-label {
      display: block;
      margin-top: 8px;
      text-align: center;
      background: rgba(255, 255, 255, 0.92);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      font-size: clamp(11px, 1.7vw, 15px);
      font-weight: 700;
      color: var(--text-main);
      box-shadow: 0 4px 12px rgba(38, 80, 92, 0.15);
      white-space: nowrap;
      /* center under the dot */
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 100%;
    }

    /* ===== מזכרת השליטה ===== */
    .souvenir-on-map {
      position: absolute;
      width: clamp(22px, 3vw, 32px);
      height: clamp(22px, 3vw, 32px);
      transform: translate(50%, -50%);
      z-index: 4;
      filter: drop-shadow(var(--glow-pedagogic));
    }
    .souvenir-on-map svg { width: 100%; height: 100%; }

    /* ===== Noni overlay ===== */
    .map-noni {
      position: absolute;
      width: clamp(70px, 11vw, 130px);
      z-index: 6;
      pointer-events: none;
      filter: drop-shadow(0 12px 22px rgba(38, 80, 92, 0.28));
      /* כניסה + נשימה בו זמנית */
      transform: translate(50%, -50%);
      opacity: 0;
      animation:
        noni-fade-in 800ms ease-out 1050ms forwards,
        noni-breathe 4.5s ease-in-out 1850ms infinite;
    }

    @keyframes noni-fade-in {
      from { opacity: 0; transform: translate(50%, calc(-50% + 8px)) scale(0.96); }
      to   { opacity: 1; transform: translate(50%, -50%) scale(1); }
    }

    @keyframes noni-breathe {
      0%, 100% { transform: translate(50%, -50%) scale(1); }
      50%      { transform: translate(50%, calc(-50% - 5px)) scale(1.03); }
    }

    /* כניסה רכה לצמתים */
    .map-node, .souvenir-on-map {
      opacity: 0;
      animation: node-fade-in 700ms ease-out forwards;
    }
    .map-node:nth-of-type(1) { animation-delay: 600ms; }
    .map-node:nth-of-type(2) { animation-delay: 750ms; }
    .map-node:nth-of-type(3) { animation-delay: 900ms; }
    .souvenir-on-map { animation-delay: 1200ms; }

    @keyframes node-fade-in {
      from { opacity: 0; transform: translate(50%, calc(-50% + 8px)); }
      to   { opacity: 1; transform: translate(50%, -50%); }
    }

    /* פעימה חוזרת על האי הנוכחי אחרי הכניסה (delay אחרי fade-in) */
    .map-node.map-state-current .node-dot { animation: node-pulse 2.4s ease-in-out 1.5s infinite; }

    /* ===== Hint לסיבוב מובייל ===== */
    .rotate-hint {
      position: fixed;
      bottom: var(--space-m);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
      box-shadow: 0 6px 16px rgba(38, 80, 92, 0.12);
      z-index: 60;
      display: none;
    }
    /* הצגה רק במסך צר וגבוה במיוחד (מובייל portrait) */
    @media (max-aspect-ratio: 3/4) {
      .rotate-hint { display: flex; align-items: center; gap: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .map-bg, .map-node, .map-noni, .souvenir-on-map {
        animation: none !important;
        opacity: 1 !important;
        transform: translate(50%, -50%) !important;
      }
      .map-node.map-state-current .node-dot { animation: none !important; }
      .map-node.map-state-completed .node-dot { animation: none !important; }
      .map-node.map-state-next-near, .map-node.map-state-next-distant {
        filter: none !important; opacity: 0.7 !important;
      }
    }
  </style>
</head>
<body>

  <main class="map-stage">
    <div class="map-frame">

      <img class="map-bg" src="assets/scene-map-bg.png" alt="" aria-hidden="true">

      <h1 class="map-title">המפה של נוני</h1>

      <!-- 3 הצמתים ממוקמים ב-% על תמונת המפה (יחס 16:9 קבוע)
           מצב הצומת מוחל דינמית ב-JS לפי getMapState() מ-state.js.
           data-vs-open: vertical-slice override שמאפשר קליק גם ב-next-near. -->

      <!-- אי 1 — מפרץ הבועות המזמרות (השונית הימנית) -->
      <a href="stage-1-island.html" class="map-node" data-island-id="1" data-vs-open="1" style="right: 19%; top: 60%;">
        <div class="node-dot">1</div>
        <span class="node-label">מפרץ הבועות המזמרות</span>
      </a>

      <!-- אי 2 — שונית גלי הצליל (השונית האמצעית) — מסך אינדקס עם 3 משחקונים
           (twin-seaweeds + fish-schools + whispers · 27.5.2026 · F.22) -->
      <a href="stage-2-island.html" class="map-node" data-island-id="2" data-vs-open="true" style="right: 50%; top: 53%;">
        <div class="node-dot">2</div>
        <span class="node-label">שונית גלי הצליל</span>
      </a>

      <!-- אי 3 — אלמוגי האותיות (השונית השמאלית) — מסך פתיחה עם 5 משחקונים
           (החלטה 23.5.2026: מסך אינדקס יחיד במקום נקודות ספציפיות לכל משחקון).
           הסדר הפדגוגי בתוך אי 3: מ → ב → ר → ק → ת -->
      <a href="stage-3-island.html" class="map-node" data-island-id="3" data-vs-open="true" style="right: 82%; top: 46%;">
        <div class="node-dot">3</div>
        <span class="node-label">אלמוגי האותיות</span>
      </a>

      <!-- אי 4 — אות-ניקוד-צליל / השונית השקטה (סוכן fix · 30.5.2026 · pilot).
           welcome buffer קצר → cv-tap session (5 סבבים · 4 mechanics · fish narrative).
           ממוקם בין אי 3 לאי 14 — שיקוף ההתקדמות פדגוגית של הילדה. -->
      <a href="stage-4-island.html" class="map-node" data-island-id="4" data-vs-open="true" style="right: 62%; top: 35%;">
        <div class="node-dot">4</div>
        <span class="node-label">השונית השקטה</span>
      </a>

      <!-- אי 14 — הבנת הנשמע (סוכן 31 · 29.5.2026 · pilot).
           data-vs-open: נגיש מהמפה ל-pilot גם לפני שכל האיים שלפניו הושלמו. -->
      <a href="stage-14-island.html" class="map-node" data-island-id="14" data-vs-open="true" style="right: 35%; top: 25%;">
        <div class="node-dot">14</div>
        <span class="node-label">הבנת הנשמע</span>
      </a>

      <!-- נוני עומד מתחת לשלב 1 — מחוץ למסלול התוויות -->
      <img class="map-noni" src="assets/noni-hero-transparent.png" alt="נוני"
           style="right: 8%; top: 90%;">

      <!-- מזכרת השליטה (תוצג רק אם שלב 1 הושלם) -->
      <div class="souvenir-on-map" id="echoRing" style="right: 19%; top: 75%; display: none;">
        <svg viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="14" fill="none" stroke="#FFE7A8" stroke-width="3"/>
          <circle cx="20" cy="20" r="9" fill="none" stroke="#FFFFFF" stroke-width="2"/>
          <circle cx="20" cy="20" r="4" fill="#FFE7A8"/>
        </svg>
      </div>

    </div>
  </main>

  <!-- Top bar קבוע למסך (לא לפריים) -->
  <header class="top-bar">
    <a href="index.html" class="icon-btn" aria-label="חזרה">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="pearl-counter" aria-label="פנינים">
      <span class="pearl" aria-hidden="true"></span>
      <span class="count">0</span>
    </div>
  </header>

  <div class="rotate-hint" aria-hidden="true">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M12 4l3 3M12 4l-3 3M12 4v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(90 12 12)"/>
    </svg>
    <span>סובב/י את המכשיר לרוחב לחוויה טובה יותר</span>
  </div>

  <script src="js/state.js"></script>
  <script>
    // === narrative-spec §3 — "אופק קרוב" ===
    // החלת מצב המפה הויזואלי לכל אי לפי getMapState() מ-state.js
    (function applyMapStates() {
      if (typeof getMapState !== 'function') return;
      document.querySelectorAll('.map-node[data-island-id]').forEach(node => {
        const id = parseInt(node.dataset.islandId, 10);
        const mapState = getMapState(id);
        node.classList.add(`map-state-${mapState}`);
        // איים שלא הושלמו ואינם נוכחיים — לא ניתן ללחוץ
        // (אלא אם vertical-slice override פעיל — data-vs-open)
        if (mapState !== 'current' && mapState !== 'completed' && !node.dataset.vsOpen) {
          node.removeAttribute('href');
          node.setAttribute('aria-disabled', 'true');
        }
      });
    })();

    // מזכרות שליטה — תצוגה מותנית בהשלמות
    if (typeof isStageCompleted === 'function' && isStageCompleted(1)) {
      const ring = document.getElementById('echoRing');
      if (ring) ring.style.display = 'block';
    }
  </script>

</body>
</html>
