<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>הבועה שמתפצלת נכון · אי 1 · עומק הים המואר</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/stage-1.css">
  <link rel="stylesheet" href="css/bubble-rise.css">
  <link rel="stylesheet" href="css/splitting-bubble.css">
</head>
<body>

  <main class="stage-1-scene">
    <img class="bay-bg" src="assets/island-01/bay-bg.png" alt="" aria-hidden="true">

    <!-- בועות רקע -->
    <div class="ambient-bubble" style="left: 12%; width: 28px; height: 28px; animation-duration: 14s; --drift: 20px;"></div>
    <div class="ambient-bubble" style="left: 78%; width: 22px; height: 22px; animation-duration: 18s; animation-delay: 3s; --drift: -15px;"></div>
    <div class="ambient-bubble" style="left: 30%; width: 18px; height: 18px; animation-duration: 12s; animation-delay: 6s; --drift: 10px;"></div>
    <div class="ambient-bubble" style="left: 88%; width: 32px; height: 32px; animation-duration: 20s; animation-delay: 9s; --drift: -25px;"></div>

    <!-- The split stage -->
    <div class="split-stage">
      <div class="split-big-bubble" id="bigBubble" role="button" aria-label="הקש על הבועה לפי ההברות">
        <img class="split-word-img" id="wordImg" src="assets/island-01/parpar.png" alt="">
        <div class="crack-layer" id="crackLayer"></div>
      </div>
    </div>

    <!-- Container for syllable fragments after split -->
    <div class="choice-field" id="fragmentField" aria-hidden="true"></div>

    <!-- Tap hint (animated finger) -->
    <div class="tap-hint" id="tapHint">
      <svg viewBox="0 0 24 24" fill="#FFF7C8">
        <path d="M8 11V6a2 2 0 0 1 4 0v5h2.5a1.5 1.5 0 0 1 1.5 1.5V18a3 3 0 0 1-3 3h-4a3 3 0 0 1-3-3v-4l2-3z" stroke="rgba(38,80,92,0.6)" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- נוני -->
    <img class="noni-bay" id="noniImg" src="assets/noni-idle.png" alt="נוני">
  </main>

  <!-- Top bar -->
  <header class="stage-1-topbar">
    <a href="stage-1-island.html" class="icon-btn" aria-label="חזרה לתפריט האי">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <div class="word-pill" id="wordPill">
      <img class="pill-img" id="pillImg" src="assets/island-01/parpar.png" alt="">
      <span id="wordPillText">פַּרְפַּר</span>
    </div>

    <button class="replay-btn" id="replayBtn" aria-label="השמע שוב">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor"/>
        <path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
  </header>

  <!-- הוראה דיסקרטית -->
  <div class="rise-instruction" id="riseInstruction" style="display:none">
    <div class="rise-instruction__bubble">
      <button class="mini-speaker" id="instructionSpeaker" aria-label="השמע">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor"/>
        </svg>
      </button>
      <span id="instructionText">הקשיבו...</span>
    </div>
  </div>

  <!-- tap-to-start -->
  <div class="tap-to-start" id="tapToStart">
    <h2>הבועה שמתפצלת נכון</h2>
    <button class="intro-speaker" id="introSpeaker" aria-label="הקש לשמיעה">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M11 5L6 9H3v6h3l5 4V5z" fill="#FFFFFF"/>
        <path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <span>הקש/י לשמוע</span>
    </button>
    <p>בועה גדולה מחזיקה מילה שלמה.</p>
    <p><strong>תקישו על הבועה לפי ההברות — ונראה איך היא מתפצלת!</strong></p>
    <button class="start-btn" id="startBtn">בוא/י נתחיל!</button>
  </div>

  <!-- completion -->
  <div class="completion" id="completion">
    <h2>פיצלנו את המילה!</h2>
    <p id="completionMsg">כל הברה בבועה שלה. נוני שמח.</p>
    <div>
      <button class="btn-primary" id="nextWordBtn">מילה נוספת</button>
      <a href="stage-1-island.html" class="btn-primary btn-secondary">חזרה לאי</a>
    </div>
  </div>

  <div class="feedback-toast" id="feedbackToast"></div>
  <div class="celebrate-particles" id="celebrateParticles" aria-hidden="true"></div>

  <audio id="audioPlayer" preload="auto"></audio>

  <script>
  // ============================================================
  // SplittingBubble — controller
  // הילדה מקישה על הבועה הגדולה כמספר ההברות במילה.
  // כל הקשה משמיעה הברה + יוצרת סדק זוהר. אחרי המספר הנכון,
  // הבועה מתפצלת לבועות קטנות.
  // ============================================================

  const AUDIO_BASE = 'assets/audio/island-01';
  const audio = document.getElementById('audioPlayer');

  let WORDS = [];
  let currentWordIndex = 0;
  let currentWord = null;
  let tapCount = 0;
  let started = false;
  let acceptingTaps = false;
  let resetTimer = null;
  let hintTimer = null;

  // ----- Audio helpers -----
  function playAudio(filename, onEnd) {
    audio.src = `${AUDIO_BASE}/${filename}.mp3`;
    audio.onended = onEnd || null;
    audio.play().catch(err => {
      console.warn('audio play blocked:', err);
      if (onEnd) setTimeout(onEnd, 800);
    });
  }

  function playSequence(filenames, onAllDone, gapMs = 350) {
    if (!filenames.length) { onAllDone && onAllDone(); return; }
    const [first, ...rest] = filenames;
    playAudio(first, () => {
      if (rest.length === 0) { onAllDone && onAllDone(); return; }
      setTimeout(() => playSequence(rest, onAllDone, gapMs), gapMs);
    });
  }

  async function loadWords() {
    try {
      const res = await fetch('data/island-01-words.json');
      const data = await res.json();
      WORDS = data.words;
    } catch (err) {
      console.error('failed to load words:', err);
    }
  }

  // ----- Listening pulse: bubble pulses on each syllable while playing the split version -----
  function playWordWithBubblePulse(onDone) {
    const big = document.getElementById('bigBubble');
    const syllableKeys = currentWord.syllable_audios.map(p => p.split('/').pop().replace('.mp3', ''));

    // Sequential play with bubble pulse on each syllable
    function playStep(i) {
      if (i >= syllableKeys.length) {
        // After all syllables: short pause then whole word
        setTimeout(() => {
          playAudio(`word-${currentWord.id}`, onDone);
        }, 500);
        return;
      }
      big.classList.remove('listening');
      void big.offsetWidth; // reflow to restart animation
      big.classList.add('listening');
      playAudio(syllableKeys[i], () => {
        setTimeout(() => playStep(i + 1), 350);
      });
    }
    playStep(0);
  }

  // ----- Crack line: visual on each tap -----
  function drawCrack(index, totalNeeded) {
    const layer = document.getElementById('crackLayer');
    const line = document.createElement('div');
    line.className = 'crack-line show';
    // Distribute angles evenly
    const angle = (index * (180 / totalNeeded)) - 90 + Math.random() * 16 - 8;
    line.style.setProperty('--angle', `${angle}deg`);
    layer.appendChild(line);
  }

  function clearCracks() {
    document.getElementById('crackLayer').innerHTML = '';
  }

  // ----- Tap handling -----
  function handleBubbleTap() {
    if (!acceptingTaps) return;
    clearTimeout(resetTimer);
    clearTimeout(hintTimer);
    hideTapHint();

    const big = document.getElementById('bigBubble');
    big.classList.remove('tapped');
    void big.offsetWidth;
    big.classList.add('tapped');

    // Play the syllable corresponding to this tap
    const sylIndex = tapCount;
    if (sylIndex < currentWord.syllable_count) {
      const audioKey = currentWord.syllable_audios[sylIndex].split('/').pop().replace('.mp3', '');
      drawCrack(sylIndex, currentWord.syllable_count);
      tapCount++;
      playAudio(audioKey, () => {
        if (tapCount === currentWord.syllable_count) {
          // perfect — split now
          setTimeout(splitBubble, 280);
        } else {
          // arm a "no more taps in 3s" timer — if she stops short, give a hint
          resetTimer = setTimeout(stalledFeedback, 3500);
        }
      });
    } else {
      // tapped MORE than needed → wobble + reset
      big.classList.add('wobble');
      setTimeout(() => big.classList.remove('wobble'), 600);
      setTimeout(resetAndReplay, 800);
    }
  }

  function stalledFeedback() {
    // child tapped fewer than syllable_count and stopped
    const big = document.getElementById('bigBubble');
    big.classList.add('wobble');
    setTimeout(() => big.classList.remove('wobble'), 600);
    playAudio('support-mistake-2', () => {
      // replay the word with bubble pulse, then re-arm
      setTimeout(resetAndReplay, 400);
    });
  }

  function resetAndReplay() {
    acceptingTaps = false;
    tapCount = 0;
    clearCracks();
    playWordWithBubblePulse(() => {
      showInstruction('הַקִּישׁוּ עַל הַבּוּעָה לְפִי הַהֲבָרוֹת');
      acceptingTaps = true;
      showTapHint();
    });
  }

  // ----- Split the bubble into syllable fragments -----
  function splitBubble() {
    acceptingTaps = false;
    const big = document.getElementById('bigBubble');
    const fragField = document.getElementById('fragmentField');
    fragField.innerHTML = '';
    fragField.setAttribute('aria-hidden', 'false');

    // Big bubble bursts
    big.classList.add('splitting');

    // Create fragment bubbles arranged in a row, each with syllable
    const positions = pickFragmentPositions(currentWord.syllable_count);
    const speakerSvg = `<svg class="speaker-icon" viewBox="0 0 24 24"><path d="M11 5L6 9H3v6h3l5 4V5z"/></svg>`;

    currentWord.syllables.forEach((syl, i) => {
      const frag = document.createElement('div');
      frag.className = 'syl-fragment appear';
      frag.style.left = positions[i].left;
      frag.style.top = positions[i].top;
      frag.style.setProperty('--fx', '0px');
      frag.style.setProperty('--fy', '0px');
      frag.style.animationDelay = `${i * 0.15}s`;
      frag.innerHTML = speakerSvg;
      fragField.appendChild(frag);
    });

    // After fragments appear: play each syllable in sequence with glow
    setTimeout(() => {
      const fragments = Array.from(fragField.querySelectorAll('.syl-fragment'));
      function playFragSequence(i) {
        if (i >= fragments.length) {
          // After all fragments played: full word + celebration
          setTimeout(() => {
            playAudio(`word-${currentWord.id}`, () => {
              celebrate();
            });
          }, 400);
          return;
        }
        const f = fragments[i];
        f.classList.add('glow');
        const audioKey = currentWord.syllable_audios[i].split('/').pop().replace('.mp3', '');
        playAudio(audioKey, () => {
          f.classList.remove('glow');
          setTimeout(() => playFragSequence(i + 1), 300);
        });
      }
      playFragSequence(0);
    }, currentWord.syllable_count * 200 + 700);
  }

  function pickFragmentPositions(n) {
    // Arrange n fragments in a horizontal row across center
    const POSITIONS_BY_N = {
      2: [
        { left: '35%', top: '46%' },
        { left: '65%', top: '46%' },
      ],
      3: [
        { left: '22%', top: '46%' },
        { left: '50%', top: '46%' },
        { left: '78%', top: '46%' },
      ],
    };
    return POSITIONS_BY_N[n] || POSITIONS_BY_N[2];
  }

  function celebrate() {
    const noni = document.getElementById('noniImg');
    noni.src = 'assets/noni-happy.png';
    noni.classList.add('celebrating');
    burstParticles();
    setTimeout(showCompletion, 1100);
  }

  function burstParticles() {
    const container = document.getElementById('celebrateParticles');
    container.innerHTML = '';
    const colors = ['#FFF7C8', '#FFA98D', '#B981FF', '#A8E8FF', '#73D9D1'];
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (i / 28) * Math.PI * 2;
      const dist = 200 + Math.random() * 120;
      p.style.left = `${50 + (Math.random() - 0.5) * 10}%`;
      p.style.top = `${50 + (Math.random() - 0.5) * 10}%`;
      p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      p.style.setProperty('--dy', `${Math.sin(angle) * dist - 80}px`);
      p.style.background = colors[i % colors.length];
      p.style.boxShadow = `0 0 12px ${colors[i % colors.length]}`;
      p.style.animationDelay = `${(i % 6) * 0.06}s`;
      container.appendChild(p);
    }
    setTimeout(() => { container.innerHTML = ''; }, 3000);
  }

  function showCompletion() {
    document.getElementById('completion').classList.add('visible');
  }

  function showInstruction(text) {
    document.getElementById('riseInstruction').style.display = 'flex';
    document.getElementById('instructionText').textContent = text;
  }

  function showTapHint() {
    const hint = document.getElementById('tapHint');
    const big = document.getElementById('bigBubble').getBoundingClientRect();
    hint.style.left = `${big.left + big.width * 0.6}px`;
    hint.style.top = `${big.top + big.height * 0.45}px`;
    hint.style.opacity = '0.85';
  }

  function hideTapHint() {
    document.getElementById('tapHint').style.opacity = '0';
  }

  // ----- Word switching -----
  function loadWord(idx) {
    currentWordIndex = (idx + WORDS.length) % WORDS.length;
    currentWord = WORDS[currentWordIndex];
    tapCount = 0;
    acceptingTaps = false;
    clearCracks();

    document.getElementById('wordImg').src = currentWord.image;
    document.getElementById('pillImg').src = currentWord.image;
    document.getElementById('wordPillText').textContent = currentWord.display;

    const fragField = document.getElementById('fragmentField');
    fragField.innerHTML = '';
    fragField.setAttribute('aria-hidden', 'true');

    const big = document.getElementById('bigBubble');
    big.classList.remove('splitting', 'wobble', 'tapped');

    const noni = document.getElementById('noniImg');
    noni.src = 'assets/noni-idle.png';
    noni.classList.remove('celebrating');

    document.getElementById('completion').classList.remove('visible');

    showInstruction('הַקְשִׁיבוּ לַמִּלָּה...');

    setTimeout(() => {
      playWordWithBubblePulse(() => {
        showInstruction('הַקִּישׁוּ עַל הַבּוּעָה לְפִי הַהֲבָרוֹת');
        acceptingTaps = true;
        showTapHint();
        // long-idle: if no tap within 10s, replay
        hintTimer = setTimeout(() => {
          if (tapCount === 0 && acceptingTaps) {
            resetAndReplay();
          }
        }, 10000);
      });
    }, 500);
  }

  function nextWord() {
    loadWord(currentWordIndex + 1);
  }

  // ----- Start -----
  function start() {
    if (started) return;
    started = true;
    document.getElementById('tapToStart').classList.add('hidden');
    loadWord(Math.floor(Math.random() * WORDS.length));
  }

  // ----- Wiring -----
  document.getElementById('bigBubble').addEventListener('click', handleBubbleTap);
  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('introSpeaker').addEventListener('click', (e) => {
    e.stopPropagation();
    playAudio('ui-bubble-story');
  });
  document.getElementById('replayBtn').addEventListener('click', () => {
    if (!currentWord) return;
    resetAndReplay();
  });
  document.getElementById('instructionSpeaker').addEventListener('click', () => {
    if (!currentWord) return;
    playAudio(`word-${currentWord.id}`);
  });
  document.getElementById('nextWordBtn').addEventListener('click', nextWord);

  (async function init() {
    await loadWords();
    audio.src = `${AUDIO_BASE}/ui-bubble-story.mp3`;
  })();
  </script>
</body>
</html>
