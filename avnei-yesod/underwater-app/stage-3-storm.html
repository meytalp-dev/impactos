  <main class="stage-scene">
    <div class="scene-frame lit-0" id="sceneFrame">
      <!-- שכבת בסיס: הים הזוהר (לא משתנה — נחשף בהדרגה כשה-dark דועך) -->
      <img class="scene-bg storm-scene storm-scene-bright"
           src="assets/island-03/storm-game/scene-storm-bright.png" alt="" aria-hidden="true"
           onerror="this.style.display='none'">
      <!-- שכבה עליונה: הים הסוער — opacity יורד עם כל אלמוג -->

           src="assets/island-03/storm-game/scene-storm-dark.png" alt="" aria-hidden="true"
           onerror="this.style.display='none'">

      <!-- שכבות סערה: ערפל חושך עדין + הבזקים רכים -->

      <div class="storm-flash" aria-hidden="true"></div>

      <!-- Quest header — באנר + שורת 5 אלמוגי-ת׳ -->
      <section class="quest-header">
        <div class="storm-banner" id="stormBanner">
          <span class="storm-banner-dot"></span>
          <span id="stormBannerText">גן האלמוגים חשוך</span>
        </div>
        <div class="corals-row" id="coralsRow">
          <!-- כל slot: SVG אחד (אותה צורת ת׳), הצבע משתנה דרך --coral-fill לפי dark/lit
               אם מאוחר יותר מורידים PNG אמיתי — מחליפים את ה-svg ב-img. -->
          <div class="coral-slot" data-i="0">
            <svg class="coral-svg coral-dark" viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
            <svg class="coral-svg coral-lit"  viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
          </div>
          <div class="coral-slot" data-i="1">
            <svg class="coral-svg coral-dark" viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
            <svg class="coral-svg coral-lit"  viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
          </div>
          <div class="coral-slot" data-i="2">
            <svg class="coral-svg coral-dark" viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
            <svg class="coral-svg coral-lit"  viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
          </div>
          <div class="coral-slot" data-i="3">
            <svg class="coral-svg coral-dark" viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
            <svg class="coral-svg coral-lit"  viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
          </div>
          <div class="coral-slot" data-i="4">
            <svg class="coral-svg coral-dark" viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
            <svg class="coral-svg coral-lit"  viewBox="0 0 60 80"><use href="#tavCoral"/></svg>
          </div>

      <!-- אזור פעילות — כל סיבוב mount-activity אחר -->

  <!-- SVG defs — אלמוג בצורת ת׳ בגרדיאנטים: dark (כבוי) ו-lit (תכלת ים זוהר) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- כבוי: אפור-תכלת דהוי -->
      <linearGradient id="coralGradDark" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="#6E8590"/>
        <stop offset="60%"  stop-color="#556B76"/>
        <stop offset="100%" stop-color="#3D525C"/>
      </linearGradient>
      <!-- זוהר: תכלת ים זוהר (#A8E8FF → #73D9D1 → #4FB8C9) -->
      <linearGradient id="coralGradLit" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="#E8F8FF"/>
        <stop offset="35%"  stop-color="#A8E8FF"/>
        <stop offset="75%"  stop-color="#73D9D1"/>
        <stop offset="100%" stop-color="#4FB8C9"/>
      </linearGradient>
      <radialGradient id="coralCoreLit" cx="50%" cy="35%" r="55%">
        <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#A8E8FF" stop-opacity="0"/>
      </radialGradient>

      <!-- אלמוג ת׳ בצורת האות ת — קו אופקי עליון, רגל ימנית עם "ברך" -->
      <symbol id="tavCoral" viewBox="0 0 60 80">
        <!-- בסיס סלע -->
        <ellipse cx="30" cy="74" rx="22" ry="5" fill="rgba(38,80,92,0.35)" class="coral-base-shadow"/>
        <!-- גזע קטן בבסיס -->
        <path d="M24 70 Q26 62 28 58 L32 58 Q34 62 36 70 Z"
              fill="var(--coral-fill)" stroke="#FFFFFF" stroke-width="1.2"/>
        <!-- צורת ת׳ דפוסית:
             * קו אופקי בראש (12..52 ב-y=16)
             * רגל ימנית — עם ברך מאוחורה למטה
             * רגל שמאלית קצרה בצורה של חצי-עיגול -->
        <!-- קו אופקי עליון -->
        <path d="M10 12 L52 12 Q56 12 56 18 L56 22 Q56 26 52 26 L10 26 Q6 26 6 22 L6 18 Q6 12 10 12 Z"
              fill="var(--coral-fill)" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- רגל ימנית (אנכי + ברך מאוחורה) -->
        <path d="M40 26 L48 26 L48 52 Q48 58 42 58 L36 58 Q31 58 31 53 L31 50 Q31 46 35 46 L40 46 Z"
              fill="var(--coral-fill)" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- רגל שמאלית קצרה -->
        <path d="M14 26 L22 26 L22 50 Q22 58 16 58 L12 58 Q8 58 8 52 L8 48 Q8 44 12 44 L14 44 Z"
              fill="var(--coral-fill)" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- ניצוץ פנימי (רק במצב lit) -->
        <circle cx="30" cy="18" r="4" fill="var(--coral-spark, transparent)"/>
        <circle cx="45" cy="38" r="2.5" fill="var(--coral-spark2, transparent)"/>
      </symbol>
    </defs>
  </svg>

  <!-- Shared modules — load order matters -->

  <!-- ====== OVERRIDE: noni facial expressions via src swap (מ-shell-quest) ====== -->
  <script>
  (function noniExpressions() {
    // EXPR.idle משתנה דינמית לפי כמה אלמוגים מודלקים
    // (window.STORM_setIdleByLit() מהקונטרולר). ברירת מחדל: עצוב.
    const EXPR = {
      idle:    'assets/island-03/storm-game/noni-sad-storm.png',
      help:    'assets/noni-thinking.png',
      hint:    'assets/noni-surprised.png',
      cheer:   'assets/noni-happy.png',
      dance:   'assets/noni-kiss.png',
    };
    Object.values(EXPR).forEach(src => { const i = new Image(); i.src = src; });

    // נחשף לקונטרולר כדי לעדכן את הבעת ה-idle לפי התקדמות
    window.STORM_setIdleByLit = function(litCount) {
      if (litCount >= 4)      EXPR.idle = 'assets/noni-happy.png';
      else if (litCount >= 2) EXPR.idle = 'assets/noni-thinking.png';
      else                    EXPR.idle = 'assets/island-03/storm-game/noni-sad-storm.png';
    };

    if (!window.AvneiNoni) return;
    const origSetState = AvneiNoni.setState;
    AvneiNoni.setState = function(state) {
      origSetState.call(this, state);
      const img = document.getElementById('noniImg');
      if (!img) return;
      const src = EXPR[state] || EXPR.idle;
      if (img.src.indexOf(src.split('/').pop()) === -1) {
        img.src = src;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const img = document.getElementById('noniImg');
      if (img) img.src = EXPR.idle;
    });
  })();
  </script>

  <!-- ====== OVERRIDE: hide feedback bubble (כמו ב-shell-quest) ====== -->
  <script>
  (function overrideFeedbackBubble() {
    if (!window.AvneiFeedback) return;
    AvneiFeedback.show = function(text) {
      const fb = document.getElementById('feedbackBubble');
      if (fb) fb.style.display = 'none';
    };
    AvneiFeedback.hide = function() {
      const fb = document.getElementById('feedbackBubble');
      if (fb) fb.style.display = 'none';
    };
  })();
  </script>

  <script src="js/shared/scaffolding.js"></script>
  <script src="js/shared/event-logger.js"></script>
  <script src="js/shared/shell.js"></script>
  <script src="js/shared/instruction.js"></script>
  <script src="js/activities/sound-match.js"></script>
  <script src="js/activities/letter-shape.js"></script>
  <script src="js/activities/find-letter.js"></script>

  <script>
  // ============================================================
  // storm-quest controller — הסערה והאור (5 חידות מ׳ → 5 אלמוגים מאירים)
  // מבנה מקביל ל-shell-quest. שינוי עיקרי: ההישג הסיפורי הוא הארת הים.
  // ============================================================

  const ISLAND_ID = 3;
  const LETTER = 'ת';
  const TOTAL_CORALS = 5;

  // עבור ת׳ יש כרגע רק sound-match items (10 פריטים — מספיק ל-5 סיבובים).
  // letter-shape ו-find-letter קיימים רק ל-מ׳. כשיוסיפו data — אפשר לחזור ל-mix.
  const STAGES = [
    { activity: 'soundMatch',  variant: null },
    { activity: 'soundMatch',  variant: null },
    { activity: 'soundMatch',  variant: null },
    { activity: 'soundMatch',  variant: null },
    { activity: 'soundMatch',  variant: null },
  ];

  // הודעות באנר לפי כמה אלמוגים הודלקו (תחושת התקדמות סיפורית)
  const BANNER_MESSAGES = [
    'גן האלמוגים חשוך',
    'אור ראשון!',
    'הים מתחיל להאיר',
    'עוד קצת חושך — ואור!',
    'כמעט כל הים זוהר',
    'הים זוהר שוב!',
  ];

  const state = {
    soundMatchItems: [],
    letterShapeAItems: [],
    letterShapeBItems: [],
    findLetterItems: [],
    soundMatchPool: [],
    coralsLit: 0,
    stageIdx: 0,
  };

  const elFrame   = document.getElementById('sceneFrame');
  const elRoot    = document.getElementById('gameRoot');
  const elBanner  = document.getElementById('stormBannerText');
  const elNoni    = document.getElementById('noniImg');

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function updateCoralCounter() {
    const el = document.getElementById('coralCountDisplay');
    if (el) el.textContent = state.coralsLit + '/5 אלמוגים';
  }

  function updateBanner(litCount) {
    if (elBanner) elBanner.textContent = BANNER_MESSAGES[litCount] || BANNER_MESSAGES[0];
  }

  function updatePearlDisplay() {
    if (typeof getPearls === 'function') {
      document.getElementById('pearlCount').textContent = getPearls();
    }
  }

  // ============================================================
  // טעינת כל ה-data
  // ============================================================
  async function loadAllData() {
    const [items03, letterShape, findLetter] = await Promise.all([
      fetch('data/island-03-items.json').then(r => r.json()),
      fetch('data/island-03-letter-shape.json').then(r => r.json()).catch(() => ({ items: [] })),
      fetch('data/island-03-find-letter.json').then(r => r.json()).catch(() => ({ items: [] })),
    ]);

    state.soundMatchItems = (items03.items || []).filter(it =>
      it.letter_in_focus === LETTER
    );
    state.letterShapeAItems = (letterShape.items || []).filter(it =>
      it.letter === LETTER && it.variant === 'A'
    );
    state.letterShapeBItems = (letterShape.items || []).filter(it =>
      it.letter === LETTER && it.variant === 'B'
    );
    state.findLetterItems = (findLetter.items || []).filter(it =>
      it.target_letter === LETTER
    );

    state.soundMatchPool = shuffle(state.soundMatchItems);
  }

  function getStageItems(stage) {
    if (stage.activity === 'soundMatch') {
      const next = state.soundMatchPool.shift();
      return next ? [next] : [];
    }
    if (stage.activity === 'letterShape' && stage.variant === 'A') {
      return state.letterShapeAItems.length > 0
        ? [state.letterShapeAItems[0]]
        : [];
    }
    if (stage.activity === 'letterShape' && stage.variant === 'B') {
      return state.letterShapeBItems.length > 0
        ? [state.letterShapeBItems[0]]
        : [];
    }
    if (stage.activity === 'findLetter') {
      return state.findLetterItems.length > 0
        ? [state.findLetterItems[Math.floor(Math.random() * state.findLetterItems.length)]]
        : [];
    }
    return [];
  }

  function runStage(stage) {
    return new Promise((resolve) => {
      let activity;
      if (stage.activity === 'soundMatch')  activity = window.AvneiSoundMatch;
      if (stage.activity === 'letterShape') activity = window.AvneiLetterShape;
      if (stage.activity === 'findLetter')  activity = window.AvneiFindLetter;

      if (!activity) {
        console.warn('Missing activity:', stage.activity);
        return resolve({ skipped: true });
      }

      const items = getStageItems(stage);
      if (items.length === 0) {
        console.warn('No items for', stage.activity, stage.variant, '— fallback to sound-match');
        if (state.soundMatchPool.length > 0) {
          const fb = state.soundMatchPool.shift();
          window.AvneiSoundMatch.mount(elRoot, {
            letter: LETTER,
            supportLevel: 1,
            items: [fb],
            onItemComplete: () => {},
            onActivityComplete: (summary) => {
              window.AvneiSoundMatch.unmount();
              resolve(summary);
            },
          });
          return;
        }
        return resolve({ skipped: true });
      }

      activity.mount(elRoot, {
        letter: LETTER,
        supportLevel: 1,
        variant: stage.variant,
        items,
        onItemComplete: () => {},
        onActivityComplete: (summary) => {
          activity.unmount();
          resolve(summary);
        },
      });
    });
  }

  // ============================================================
  // האירוע המרכזי: אלמוג נדלק → הים נפתח לאור
  // ============================================================
  function lightCoral(idx) {
    const slot = document.querySelector(`.coral-slot[data-i="${idx}"]`);
    if (!slot) return;

    // הילה גדולה רגעית — "פיצוץ אור"
    spawnLightBurst(slot);

    slot.classList.add('just-lit');
    setTimeout(() => slot.classList.add('lit'), 200);
    setTimeout(() => slot.classList.remove('just-lit'), 800);

    // עדכון רמת ההארה של ה-scene
    elFrame.classList.remove('lit-0','lit-1','lit-2','lit-3','lit-4','lit-5');
    elFrame.classList.add('lit-' + (idx + 1));
  }

  function spawnLightBurst(anchorEl) {
    const rect = anchorEl.getBoundingClientRect();
    const burst = document.createElement('div');
    burst.className = 'light-burst';
    burst.style.left = (rect.left + rect.width / 2) + 'px';
    burst.style.top  = (rect.top  + rect.height / 2) + 'px';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 2000);
  }

  function cheerNoni() {
    if (window.AvneiNoni) AvneiNoni.setState('cheer');
    // עדכון מצב ה-idle לפי התקדמות, לפני שחוזרים אליו
    if (window.STORM_setIdleByLit) window.STORM_setIdleByLit(state.coralsLit);
    setTimeout(() => {
      if (window.AvneiNoni) AvneiNoni.setState('idle');
    }, 1500);
  }

  // ============================================================
  // חגיגת סוף — נוני רוקד, קונפטי, נשיקות (זהה ל-shell-quest)
  // ============================================================
  function startFinale() {
    elNoni.classList.add('dancing');
    elNoni.src = 'assets/noni-kiss.png';

    spawnConfetti(80);
    spawnKisses(8);

    // ת׳ — finale-storm-tav-cleared, נופל אחורה ל-finale-storm-cleared (גנרי) ואז ל-finale-found-treasure
    try {
      AvneiAudio.playSequence(['great', 'finale-storm-tav-cleared'], 800);
    } catch (e) {
      AvneiAudio.playSequence(['great', 'finale-found-treasure'], 800);
    }

    setTimeout(showCompletion, 1800);
  }

  function spawnConfetti(count) {
    const container = document.getElementById('confettiLayer') || (() => {
      const c = document.createElement('div');
      c.id = 'confettiLayer';
      c.className = 'confetti-layer';
      document.body.appendChild(c);
      return c;
    })();
    const colors = ['#FFE7A8', '#FFA98D', '#B8F2CF', '#A8E8FF', '#D9D2FF', '#FFD3D8'];
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('span');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = (Math.random() * 0.8) + 's';
      piece.style.animationDuration = (2.4 + Math.random() * 2.2) + 's';
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (10 + Math.random() * 14) + 'px';
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 5000);
    }
  }

  function spawnKisses(count) {
    const container = document.getElementById('kissesLayer') || (() => {
      const c = document.createElement('div');
      c.id = 'kissesLayer';
      c.className = 'kisses-layer';
      document.body.appendChild(c);
      return c;
    })();
    for (let i = 0; i < count; i++) {
      const k = document.createElement('span');
      k.className = 'kiss-heart';
      k.style.left = (8 + Math.random() * 18) + 'vw';
      k.style.bottom = (4 + Math.random() * 6) + 'vh';
      k.style.animationDelay = (Math.random() * 1.2) + 's';
      k.innerHTML = `
        <svg viewBox="0 0 32 32">
          <path d="M16 28 C 6 20, 2 14, 6 9 C 10 4, 14 8, 16 12 C 18 8, 22 4, 26 9 C 30 14, 26 20, 16 28 Z"
                fill="#FF6B9D" stroke="#FFFFFF" stroke-width="1.5"/>
        </svg>
      `;
      container.appendChild(k);
      setTimeout(() => k.remove(), 5000);
    }
  }

  function showCompletion() {
    if (typeof completeStage === 'function') completeStage(ISLAND_ID);
    if (typeof addSouvenir === 'function') addSouvenir('אלמוג אור');
    document.getElementById('completion').classList.add('show');
    spawnConfetti(40);
  }

  // ============================================================
  // הרצה ראשית — 5 שלבים ברצף, כל הצלחה מאירה אלמוג
  // ============================================================
  async function runQuest() {
    AvneiNoni.ready();
    updatePearlDisplay();
    updateCoralCounter();
    updateBanner(0);

    for (let i = 0; i < TOTAL_CORALS; i++) {
      state.stageIdx = i;
      const stage = STAGES[i];
      const result = await runStage(stage);

      if (result && result.skipped) {
        continue;
      }

      // האלמוג ה-i נדלק
      lightCoral(state.coralsLit);
      state.coralsLit++;
      updateCoralCounter();
      updateBanner(state.coralsLit);
      updatePearlDisplay();
      cheerNoni();

      // המתנה ארוכה כדי שאודיו ההצלחה יסיים לפני ה-prompt הבא (לקח מ-shell-quest)
      if (state.coralsLit < TOTAL_CORALS) {
        await new Promise(r => setTimeout(r, 2400));
      }
    }

    if (state.coralsLit >= TOTAL_CORALS) {
      setTimeout(startFinale, 1000);
    } else {
      console.warn('Not enough stages completed:', state.coralsLit);
      showCompletion();
    }
  }

  // ============================================================
  // Intro speaker — מקריא את הסיפור
  // ============================================================
  document.getElementById('introSpeaker').addEventListener('click', () => {
    AvneiAudio.unlock();
    const btn = document.getElementById('introSpeaker');
    btn.classList.add('playing');
    // נסיון לנגן את ההקלטות הייעודיות לסערה. אם לא קיימות עדיין —
    // ה-onerror של ה-Audio יתקדם הלאה בלי לחסום.
    AvneiAudio.playSequence(['intro-storm-tav-quest', 'intro-storm-tav-mission'], 600);
    setTimeout(() => btn.classList.remove('playing'), 12000);
  });

  // ============================================================
  // Bootstrap
  // ============================================================
  document.getElementById('startBtn').addEventListener('click', async () => {
    AvneiAudio.unlock();
    document.getElementById('tapToStart').classList.add('hidden');

    try {
      await loadAllData();
    } catch (e) {
      console.error('Failed to load data:', e);
      return;
    }

    runQuest();
  });

  // Dev shortcut: ?reset=1
  const params = new URLSearchParams(window.location.search);
  if (params.get('reset') === '1') {
    localStorage.removeItem('underwater-app:v1');
    console.log('localStorage reset.');
  }
  </script>

</body>
</html>
