<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>אי 21 · בונים משפטים · לגונת הבקבוקים</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css?v=2026-07-07">

  <!-- ============================================================================
       stage-21-dictation.html — אי 21 · משחקון "בּוֹנֵי הַמִּשְׁפָּטִים" (דיקטה-בבנייה)
       H21 · 7.7.2026 · לוח בניית האיים
       שומעים משפט (2–4 מילים, isl21-sent-*.mp3) בלי לראותו → בונים מאריחי-מילים
       מנוקדים לפי הסדר (mechanic-sentence-build). דרגות: 2 מילים → 3 → 4 (2 השלמות
       נקיות ברצף = עולים דרגה). primary_island_id=21, strand_id=4.
       dual-mode: localStorage בלבד; guest=1/presentation=1.
       ============================================================================ -->
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100dvh;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      color: var(--text-main); direction: rtl; overflow-x: hidden;
    }
    .scene-bg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center bottom;
      z-index: 0; pointer-events: none;
    }
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 12px 18px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }
    .top-bar a.back {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.85); color: var(--text-main);
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 20px; font-weight: 900;
      box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    .top-bar .title { font-size: clamp(15px, 3.4vw, 19px); font-weight: 800; }
    .top-bar .counter {
      height: 40px; padding: 0 14px; border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.85); display: inline-flex; align-items: center;
      font-size: 14px; font-weight: 700; box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    main {
      position: relative; z-index: 2;
      max-width: 760px; margin: 0 auto;
      padding: 14px 18px 40px;
    }
    .levelchip {
      display: flex; justify-content: center; margin: 2px auto 10px;
    }
    .levelchip span {
      background: rgba(255,255,255,0.82); border-radius: var(--radius-pill);
      padding: 5px 16px; font-size: 13px; font-weight: 800; color: var(--text-soft);
      box-shadow: 0 2px 10px rgba(38,80,92,0.12);
    }
    .pearls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 4px auto 12px; }
    .pearl {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.7);
      box-shadow: inset 0 -2px 4px rgba(38,80,92,0.12); transition: all 0.35s ease;
    }
    .pearl.filled {
      background: radial-gradient(circle at 35% 30%, #FFF 0%, #CFEFF6 45%, #8FD6E6 100%);
      border-color: #FFF; box-shadow: 0 0 10px rgba(143,214,230,0.8);
    }
    .pearl.just-added { transform: scale(1.6); box-shadow: 0 0 16px 4px rgba(255,231,168,0.9); }

    .noni-row {
      display: flex; align-items: flex-end; gap: 10px;
      max-width: 620px; margin: 0 auto 12px; min-height: 64px;
    }
    .noni-row img { width: clamp(64px, 13vw, 96px); flex: 0 0 auto; filter: drop-shadow(0 6px 10px rgba(38,80,92,0.25)); }
    .bubble {
      position: relative; flex: 1;
      background: rgba(255,255,255,0.92); border-radius: var(--radius-lg);
      padding: 12px 16px; font-size: clamp(16px, 3.6vw, 20px); font-weight: 700;
      line-height: 1.5; box-shadow: 0 4px 16px rgba(38,80,92,0.14);
      display: flex; align-items: center; gap: 10px;
    }
    .bubble::before {
      content: ''; position: absolute; inset-inline-start: -8px; bottom: 16px;
      border: 9px solid transparent; border-inline-end-color: rgba(255,255,255,0.92);
    }
    .noni-row[hidden] { display: none; }

    #mountRoot { position: relative; min-height: 44vh; }

    /* ===== sentence-build mechanic ===== */
    .mechanic-sentence-build { text-align: center; }
    .sb-prompt { display: flex; justify-content: center; margin: 6px 0 16px; }
    .sb-hear {
      display: inline-flex; align-items: center; gap: 10px;
      min-height: 56px; padding: 0 26px;
      border-radius: var(--radius-pill);
      background: var(--water-secondary); color: #fff;
      font-family: inherit; font-size: clamp(17px, 3.8vw, 21px); font-weight: 800;
      box-shadow: 0 8px 20px rgba(115,217,209,0.5); border: none; cursor: pointer;
    }
    .sb-hear:active { transform: scale(0.97); }
    .sb-hear-ico { font-size: 24px; }

    .sb-build {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px;
      min-height: 84px; padding: 14px 18px; margin: 0 auto 22px; max-width: 620px;
      background: rgba(255,255,255,0.85);
      border-radius: var(--radius-md);
      border: 2px dashed rgba(38,80,92,0.25);
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .sb-build.complete {
      background: var(--mint); border-color: #6BCB9A; border-style: solid;
      transform: scale(1.04);
    }
    .sb-slot {
      font-size: clamp(22px, 5.4vw, 34px); font-weight: 900; color: #bcd0d8;
      min-width: 1.4em; min-height: 1.2em; padding: 2px 8px;
      border-bottom: 3px solid rgba(38,80,92,0.18);
      transition: color 0.2s ease;
    }
    .sb-slot.filled { color: var(--text-main); border-bottom-color: transparent; animation: sbPop 0.4s ease-out; }

    .sb-field {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 12px; max-width: 640px; margin: 0 auto;
    }
    .sb-tile {
      min-height: 56px; padding: 10px 22px;
      display: inline-flex; align-items: center; justify-content: center;
      background: #fff; border: 2px solid rgba(38,80,92,0.18);
      border-radius: var(--radius-md); box-shadow: 0 4px 14px rgba(38,80,92,0.15);
      font-family: inherit; font-size: clamp(22px, 5.2vw, 32px); font-weight: 900;
      color: var(--text-main); cursor: pointer;
      transition: transform 0.15s ease, opacity 0.3s ease, box-shadow 0.2s ease;
      -webkit-user-select: none; user-select: none; touch-action: manipulation;
    }
    .sb-tile:hover { transform: scale(1.04); }
    .sb-tile:active { transform: scale(0.95); }
    .sb-tile.placed { opacity: 0.32; cursor: default; box-shadow: none; }
    .sb-tile.listening { box-shadow: 0 0 0 4px rgba(115,217,209,0.55); }
    .sb-tile.sb-sway { animation: sbSway 0.6s ease; }
    .sb-tile.sb-sway-order { animation: sbSway 0.6s ease; border-color: #FFCF5A; }
    .sb-tile.hint-glow { animation: sbHint 1s ease-in-out infinite; border-color: #FFCF5A; }
    @keyframes sbPop { 0%{transform:scale(1);} 45%{transform:scale(1.18);} 100%{transform:scale(1);} }
    @keyframes sbSway {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-7px) rotate(-3deg); }
      60% { transform: translateX(7px) rotate(3deg); }
    }
    @keyframes sbHint {
      0%,100% { box-shadow: 0 4px 14px rgba(38,80,92,0.15); }
      50% { box-shadow: 0 0 20px 5px rgba(255,207,90,0.9); }
    }

    .start-veil {
      position: fixed; inset: 0; z-index: 20;
      background: rgba(38,80,92,0.35);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .start-veil[hidden] { display: none; }
    .start-card {
      background: #fff; border-radius: var(--radius-lg); max-width: 430px; width: 100%;
      padding: 26px 24px; text-align: center; box-shadow: 0 18px 50px rgba(38,80,92,0.3);
    }
    .start-card img { width: 116px; }
    .start-card h1 { font-size: clamp(20px, 5vw, 26px); font-weight: 900; margin: 8px 0 6px; }
    .start-card p { font-size: 15px; color: var(--text-soft); margin: 0 0 18px; line-height: 1.6; }
    .start-card button {
      min-height: 60px; width: 100%; border: none; border-radius: var(--radius-pill);
      background: var(--water-secondary); color: #fff; cursor: pointer;
      font-family: inherit; font-size: 22px; font-weight: 900;
      box-shadow: 0 8px 22px rgba(115,217,209,0.55);
    }
    .start-card button:active { transform: scale(0.97); }

    .finish { text-align: center; padding: 30px 10px; }
    .finish img { width: 140px; animation: finishBob 1.6s ease-in-out infinite; }
    @keyframes finishBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    .finish h2 { font-size: clamp(24px, 6vw, 32px); font-weight: 900; margin: 10px 0 4px; }
    .finish p { font-size: 16px; color: var(--text-soft); margin: 0 0 20px; }
    .finish .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .finish button, .finish a {
      min-height: 56px; padding: 0 26px; border: none; border-radius: var(--radius-pill);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 18px; font-weight: 800; cursor: pointer; text-decoration: none;
    }
    .finish .again { background: var(--water-secondary); color: #fff; box-shadow: 0 8px 22px rgba(115,217,209,0.55); }
    .finish .home { background: rgba(255,255,255,0.9); color: var(--text-main); box-shadow: 0 4px 14px rgba(38,80,92,0.15); }

    @media (max-width: 560px) {
      .noni-row { min-height: 56px; }
      .noni-row img { width: 58px; }
    }
  </style>
</head>
<body>
  <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
       onerror="this.style.display='none'">

  <div class="top-bar">
    <a class="back" href="stage-21-island.html" id="backBtn" aria-label="חזרה">→</a>
    <span class="title">בּוֹנֵי הַמִּשְׁפָּטִים · אִי 21</span>
    <span class="counter" id="counter">—</span>
  </div>

  <main>
    <div class="levelchip"><span id="levelChip">מִשְׁפָּט שֶׁל 2 מִלִּים</span></div>
    <div class="pearls" id="pearls" aria-hidden="true"></div>
    <div class="noni-row" id="noniRow" hidden>
      <img id="noniImg" src="assets/noni-idle.png" alt="נוני" onerror="this.style.display='none'">
      <div class="bubble"><span id="promptText" lang="he"></span></div>
    </div>
    <div id="mountRoot"></div>
  </main>

  <div class="start-veil" id="startVeil" hidden>
    <div class="start-card">
      <img src="assets/noni-thinking.png" alt="נוני" onerror="this.src='assets/noni-idle.png'">
      <h1>בּוֹנֵי הַמִּשְׁפָּטִים</h1>
      <p>נוֹנִי תַּשְׁמִיעַ לָכֶם מִשְׁפָּט — אַתֶּם לֹא רוֹאִים אוֹתוֹ.<br>
         הַקְשִׁיבוּ, וְסַדְּרוּ אֶת הַמִּלִּים בַּסֵּדֶר הַנָּכוֹן — מִיָּמִין לִשְׂמֹאל!</p>
      <button id="startBtn">מַתְחִילִים!</button>
    </div>
  </div>

  <!-- shared engine -->
  <script src="js/state.js?v=2026-07-07"></script>
  <script src="js/shared/audio.js?v=2026-07-07"></script>
  <script src="js/shared/epa.js?v=2026-07-07"></script>
  <script src="js/shared/bkt.js?v=2026-07-07"></script>
  <script src="js/shared/event-logger.js?v=2026-07-07"></script>
  <script src="js/shared/island21-sentences.js?v=2026-07-07"></script>
  <script src="js/templates/mechanic-sentence-build.js?v=2026-07-07"></script>

  <script>
    (function () {
      'use strict';
      var HUB = 'stage-21-island.html';
      var SB = window.AvneiIsland21Sentences;

      // סבב-הפעלה: 6 משפטים. מתחילים ב-2 מילים; 2 השלמות נקיות (בלי טעות) ברצף
      // באותה דרגה → עולים דרגה (3, ואז 4). דרגה בלי משפטים חדשים → נשארים בה.
      var TOTAL_ROUNDS = 6;
      var LEVEL_LABEL = { 2: 'מִשְׁפָּט שֶׁל 2 מִלִּים', 3: 'מִשְׁפָּט שֶׁל 3 מִלִּים', 4: 'מִשְׁפָּט שֶׁל 4 מִלִּים' };

      var NONI_PNG = {
        idle: 'assets/noni-idle.png', happy: 'assets/noni-happy.png',
        thinking: 'assets/noni-thinking.png', surprised: 'assets/noni-surprised.png',
      };
      function setNoniImg(state) {
        var img = document.getElementById('noniImg');
        if (img && NONI_PNG[state]) img.src = NONI_PNG[state];
      }

      var level = 2;
      var cleanStreak = 0;      // השלמות נקיות ברצף בדרגה הנוכחית
      var round = 0;            // כמה משפטים הושלמו
      var usedIds = {};         // כדי לא לחזור על אותו משפט
      var current = null;
      var mountRoot = document.getElementById('mountRoot');

      document.getElementById('backBtn').addEventListener('click', function (e) {
        e.preventDefault();
        if (history.length > 1) history.back(); else location.href = HUB;
      });

      function renderPearls() {
        var el = document.getElementById('pearls');
        el.innerHTML = '';
        for (var i = 0; i < TOTAL_ROUNDS; i++) {
          var p = document.createElement('span');
          p.className = 'pearl' + (i < round ? ' filled' : '');
          el.appendChild(p);
        }
      }

      function setPrompt(txt) { document.getElementById('promptText').textContent = txt; }

      // בוחר משפט מהדרגה הנוכחית שלא שוחק; אם אין — יורד לדרגה שיש בה משפט חדש.
      function pickSentence() {
        var order = [level, level - 1, level + 1, 2, 3, 4];
        for (var k = 0; k < order.length; k++) {
          var lv = order[k];
          if (lv < 2 || lv > 4) continue;
          var pool = SB.byLevel(lv).filter(function (s) { return !usedIds[s.id]; });
          if (pool.length) {
            level = lv;
            return pool[Math.floor(Math.random() * pool.length)];
          }
        }
        // כל המשפטים שוחקו — מאפסים שכפולים ומאפשרים חזרה.
        usedIds = {};
        var any = SB.byLevel(level);
        return any[Math.floor(Math.random() * any.length)];
      }

      function showFinish() {
        document.getElementById('noniRow').hidden = true;
        document.getElementById('counter').textContent = TOTAL_ROUNDS + ' / ' + TOTAL_ROUNDS;
        mountRoot.innerHTML =
          '<div class="finish">' +
          '<img src="assets/noni-happy.png" alt="נוני שמחה" onerror="this.style.display=\'none\'">' +
          '<h2>מְעֻלֶּה!</h2>' +
          '<p>הֶחֱזַרְתֶּם אֶת כֹּל הַמִּשְׁפָּטִים לַבַּקְבּוּקִים — אַתֶּם בּוֹנֵי מִשְׁפָּטִים!</p>' +
          '<div class="btns">' +
          '<button class="again" id="againBtn">עוֹד פַּעַם</button>' +
          '<a class="home" href="' + HUB + '">חֲזָרָה לָאִי</a>' +
          '</div></div>';
        document.getElementById('againBtn').addEventListener('click', function () { location.reload(); });
        try { window.AvneiAudio.play('completion-isl21'); } catch (e) {}
      }

      function mountNext() {
        if (current && current.unmount) { try { current.unmount(); } catch (e) {} }
        current = null;
        renderPearls();
        if (round >= TOTAL_ROUNDS) { showFinish(); return; }

        var s = pickSentence();
        usedIds[s.id] = true;
        document.getElementById('counter').textContent = (round + 1) + ' / ' + TOTAL_ROUNDS;
        document.getElementById('levelChip').textContent = LEVEL_LABEL[level] || '';
        document.getElementById('noniRow').hidden = false;
        setNoniImg('idle');
        setPrompt('הַקְשִׁיבוּ — וְסַדְּרוּ אֶת הַמִּלִּים לְפִי הַסֵּדֶר.');

        current = window.AvneiMechanics['sentence-build'].mount(mountRoot, {
          sentence: s,
          islandId: 21,
          questId: 'isl21-sentence-' + s.id + '-round-' + (round + 1),
          onNoni: setNoniImg,
          onComplete: function (info) {
            round++;
            // ניהול דרגה: השלמה נקייה → מקדמים streak; טעות → מאפסים.
            if (info && info.clean) {
              cleanStreak++;
              if (cleanStreak >= 2 && level < 4) { level++; cleanStreak = 0; }
            } else {
              cleanStreak = 0;
            }
            renderPearls();
            var pearls = document.querySelectorAll('.pearl');
            var p = pearls[round - 1];
            if (p) { p.classList.add('just-added'); setTimeout(function () { p.classList.remove('just-added'); }, 600); }
            setTimeout(mountNext, 400);
          },
        });
      }

      // auto-unlock audio (iOS) on first tap
      document.addEventListener('click', function unlock() {
        if (window.AvneiAudio && window.AvneiAudio.unlock) { try { window.AvneiAudio.unlock(); } catch (e) {} }
        document.removeEventListener('click', unlock);
      }, { once: true });

      if (!window.AvneiMechanics || !window.AvneiMechanics['sentence-build'] || !SB) {
        mountRoot.innerHTML = '<div style="text-align:center;padding:40px;font-weight:700;">מַשֶּׁהוּ הִשְׁתַּבֵּשׁ בַּטְּעִינָה. נַסּוּ שׁוּב.</div>';
        return;
      }

      document.getElementById('startVeil').hidden = false;
      document.getElementById('startBtn').addEventListener('click', function () {
        if (window.AvneiAudio && window.AvneiAudio.unlock) { try { window.AvneiAudio.unlock(); } catch (e) {} }
        document.getElementById('startVeil').hidden = true;
        round = 0; level = 2; cleanStreak = 0; usedIds = {};
        // הוראת-המשימה של נוני פעם אחת, ואז הסבב הראשון (המשפט יושמע ב-mount).
        try {
          var a = new Audio('assets/audio/mission-isl21.mp3');
          var started = false;
          function go() { if (!started) { started = true; mountNext(); } }
          a.addEventListener('ended', go);
          a.addEventListener('error', go);
          a.play().catch(go);
          setTimeout(go, 9000);
        } catch (e) { mountNext(); }
      });
    })();
  </script>
</body>
</html>
