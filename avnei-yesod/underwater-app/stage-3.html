<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>אלמוגי האותיות · עומק הים המואר</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/stage-3.css">
</head>
<body>

  <main class="stage-scene">
    <div class="scene-frame">
      <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
           onerror="this.style.display='none'">

      <!-- מיכל גמיש שבו activities מציירות את התוכן שלהן -->
      <div class="game-area" id="gameRoot"></div>

      <!-- burst layer לבועות זהב -->
      <div class="burst" id="burst"></div>
    </div>
  </main>

  <!-- נוני קבוע בפינה -->
  <img class="noni-fixed" id="noniImg" src="assets/noni-hero-transparent.png" alt="נוני">

  <!-- בועת פידבק קבועה מעל נוני -->
  <div class="feedback-bubble" id="feedbackBubble"></div>

  <!-- מסך פתיחה — משחרר את ה-TTS -->
  <div class="tap-to-start" id="tapToStart">
    <h2>אלמוגי האותיות</h2>
    <p style="font-size: clamp(18px, 4vw, 22px); color: var(--text-soft); max-width: 24ch; margin: 0;">
      נוני יראה לך אותיות, ואת.ה תמצאו ביחד את הצורה, הצליל והאות במילה
    </p>
    <button class="start-btn" id="startBtn">בוא/י נתחיל</button>
  </div>

  <!-- Top bar -->
  <header class="top-bar">
    <a href="map.html" class="icon-btn" aria-label="חזרה למפה">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="progress-pill">
      <span class="pp-letter" id="progressLetter">ת</span>
      <span id="progressCount">1/5</span>
    </div>
    <div class="pearl-counter" aria-label="פנינים">
      <span class="pearl" aria-hidden="true"></span>
      <span class="count">0</span>
    </div>
  </header>

  <!-- Completion overlay -->
  <div class="completion" id="completion">
    <h2 class="completion-title">גן האותיות התמלא אור!</h2>
    <svg class="completion-souvenir" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="coral-grad" cx="40%" cy="40%" r="70%">
          <stop offset="0%" stop-color="#FFE7A8"/>
          <stop offset="60%" stop-color="#FFA98D"/>
          <stop offset="100%" stop-color="#E27F66"/>
        </radialGradient>
      </defs>
      <path d="M50 12 C 70 28, 80 50, 78 78 C 78 84, 72 86, 68 80 C 64 60, 56 50, 50 50 C 44 50, 36 60, 32 80 C 28 86, 22 84, 22 78 C 20 50, 30 28, 50 12 Z"
            fill="url(#coral-grad)" stroke="#FFF" stroke-width="2"/>
      <circle cx="50" cy="42" r="6" fill="#FFE7A8" opacity="0.9"/>
      <circle cx="50" cy="42" r="3" fill="#FFFFFF"/>
    </svg>
    <p class="completion-msg" id="completionMsg">אלמוג אות זוהר הצטרף לבית של נוני.</p>
    <a href="map.html" class="btn-primary">חזרה למפה</a>
  </div>

  <!-- ============================================================ -->
  <!-- JS modules — סדר טעינה קריטי                                  -->
  <!-- ============================================================ -->
  <script src="js/state.js"></script>
  <script src="js/shared/audio.js"></script>
  <script src="js/shared/noni.js"></script>
  <script src="js/shared/feedback.js"></script>
  <script src="js/shared/scaffolding.js"></script>
  <script src="js/shared/event-logger.js"></script>
  <script src="js/shared/shell.js"></script>
  <script src="js/shared/instruction.js"></script>
  <script src="js/activities/sound-match.js"></script>
  <script src="js/activities/letter-shape.js"></script>
  <script src="js/activities/find-letter.js"></script>
  <script src="js/stage-3-controller.js"></script>

  <script>
    // ============================================================
    // Bootstrap — מסך פתיחה משחרר אודיו ומפעיל את הקונטרולר
    // ============================================================

    document.getElementById('startBtn').addEventListener('click', async () => {
      AvneiAudio.unlock();
      document.getElementById('tapToStart').classList.add('hidden');
      await AvneiStage3.run();
    });
  </script>

</body>
</html>
