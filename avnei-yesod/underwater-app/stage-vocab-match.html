<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>אוֹצַר הַמִּלִּים שֶׁל נוּנִי · השונית של נוני</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css?v=2026-07-04">

  <!-- ============================================================================
       stage-vocab-match.html — משחקון אוצר-מילים על מאגר תמונות-האוצר (assets/vocab)
       4.7.2026 · מורכב על ליבת mechanic-mcq (config-driven, EPA פר-מסיח)

       שלושה מצבים (?mode=):
         word  — מילה מנוקדת (+אודיו כשקיים) → בחירת התמונה מתוך 3
         image — תמונה אחת → בחירת המילה המנוקדת מתוך 3
         sort  — מיון לשדות סמנטיים: פריט (תמונה+מילה) → 2 קבוצות
         (ברירת מחדל: mix — שלושתם ברצף)

       מסיחים = מאותו שדה סמנטי כשאפשר (קושי אמיתי), אחרת השלמה אקראית.
       המילים = תת-מאגר "אובייקט יחיד" של assets/vocab/_manifest.json; הניקוד
       והשיוך לשדות כאן (המניפסט נושא רק word/file). אודיו = word-*.mp3 קיימים.

       logging: characteristic_id אמיתי מהבנק פר מצב (EPA G4) + primary_island_id
       לפי strand — כמו stage-bank-play.html:
         word  → nov-w4-d1-c1 "מתאים.ה מילה כתובה לתמונה"        (phonology → אי 5)
         image → dec-w1-d4-c1 "בוחר.ת את המילה המתאימה לאיור"    (oral     → אי 14)
         sort  → feb-w4-d3-c2 "ממיין.ת כמה מילים לשתי קטגוריות"  (morph    → אי 9)
       ============================================================================ -->
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100dvh;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      color: var(--text-main); direction: rtl; overflow-x: hidden;
    }
    .scene-bg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center bottom;
      z-index: 0; pointer-events: none;
    }
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 12px 18px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }
    .top-bar a.back {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.85); color: var(--text-main);
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 20px; font-weight: 900;
      box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    .top-bar .title { font-size: clamp(15px, 3.4vw, 19px); font-weight: 800; }
    .top-bar .counter {
      height: 40px; padding: 0 14px; border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.85); display: inline-flex; align-items: center;
      font-size: 14px; font-weight: 700; box-shadow: 0 2px 10px rgba(38,80,92,0.15);
    }
    main {
      position: relative; z-index: 2;
      max-width: 760px; margin: 0 auto;
      padding: 14px 18px 30px;
    }
    /* פנינים — התקדמות */
    .pearls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 4px auto 12px; }
    .pearl {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.7);
      box-shadow: inset 0 -2px 4px rgba(38,80,92,0.12); transition: all 0.35s ease;
    }
    .pearl.filled {
      background: radial-gradient(circle at 35% 30%, #FFF 0%, #CFEFF6 45%, #8FD6E6 100%);
      border-color: #FFF; box-shadow: 0 0 10px rgba(143,214,230,0.8);
    }
    .pearl.just-added { transform: scale(1.6); box-shadow: 0 0 16px 4px rgba(255,231,168,0.9); }

    /* בועת נוני — ההוראה (מנוקדת, לשון רבים) */
    .noni-row {
      display: flex; align-items: flex-end; gap: 10px;
      max-width: 620px; margin: 0 auto 10px; min-height: 64px;
    }
    .noni-row img { width: clamp(64px, 13vw, 96px); flex: 0 0 auto; filter: drop-shadow(0 6px 10px rgba(38,80,92,0.25)); }
    .bubble {
      position: relative; flex: 1;
      background: rgba(255,255,255,0.92); border-radius: var(--radius-lg);
      padding: 12px 16px; font-size: clamp(16px, 3.6vw, 20px); font-weight: 700;
      line-height: 1.5; box-shadow: 0 4px 16px rgba(38,80,92,0.14);
      display: flex; align-items: center; gap: 10px;
    }
    .bubble::before {
      content: ''; position: absolute; inset-inline-start: -8px; bottom: 16px;
      border: 9px solid transparent; border-inline-end-color: rgba(255,255,255,0.92);
    }
    .bubble .say {
      flex: 0 0 auto; width: 48px; height: 48px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 22px;
      background: var(--water-secondary); color: #fff;
      box-shadow: 0 4px 12px rgba(115,217,209,0.55);
    }
    .bubble .say:active { transform: scale(0.94); }

    #mountRoot { position: relative; min-height: 46vh; }

    /* אופציות-תמונה — כרטיס לבן מרובע קריא יותר מהפוד העגול */
    .mechanic-mcq .mcq-option--image {
      aspect-ratio: 1; border-radius: 22px;
      background: rgba(255,255,255,0.94);
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow: 0 8px 22px rgba(38,80,92,0.18);
    }
    /* stem-תמונה קטן מברירת-המחדל (34vh) — שאריחי הקטגוריות במיון ייכנסו
       למסך טאבלט בלי גלילה */
    .mechanic-mcq .mcq-stem-img { max-height: 22vh; }
    .mechanic-mcq .mcq-stem-caption { font-size: clamp(20px, 4vw, 28px); }

    /* מסך פתיחה — שכבת 35% בלבד, נוני מציגה את המשימה */
    .start-veil {
      position: fixed; inset: 0; z-index: 20;
      background: rgba(38,80,92,0.35);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .start-veil[hidden] { display: none; }
    .noni-row[hidden] { display: none; }
    .start-card {
      background: #fff; border-radius: var(--radius-lg); max-width: 420px; width: 100%;
      padding: 26px 24px; text-align: center; box-shadow: 0 18px 50px rgba(38,80,92,0.3);
    }
    .start-card img { width: 110px; }
    .start-card h1 { font-size: clamp(20px, 5vw, 26px); font-weight: 900; margin: 8px 0 6px; }
    .start-card p { font-size: 16px; color: var(--text-soft); margin: 0 0 18px; line-height: 1.6; }
    .start-card button {
      min-height: 60px; width: 100%; border: none; border-radius: var(--radius-pill);
      background: var(--water-secondary); color: #fff; cursor: pointer;
      font-family: inherit; font-size: 22px; font-weight: 900;
      box-shadow: 0 8px 22px rgba(115,217,209,0.55);
    }
    .start-card button:active { transform: scale(0.97); }

    /* מסך סיום */
    .finish { text-align: center; padding: 30px 10px; }
    .finish img { width: 140px; animation: finishBob 1.6s ease-in-out infinite; }
    @keyframes finishBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    .finish h2 { font-size: clamp(24px, 6vw, 32px); font-weight: 900; margin: 10px 0 4px; }
    .finish p { font-size: 16px; color: var(--text-soft); margin: 0 0 20px; }
    .finish .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .finish button, .finish a {
      min-height: 56px; padding: 0 26px; border: none; border-radius: var(--radius-pill);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 18px; font-weight: 800; cursor: pointer;
      text-decoration: none;
    }
    .finish .again { background: var(--water-secondary); color: #fff; box-shadow: 0 8px 22px rgba(115,217,209,0.55); }
    .finish .home { background: rgba(255,255,255,0.9); color: var(--text-main); box-shadow: 0 4px 14px rgba(38,80,92,0.15); }

    @media (max-width: 560px) {
      .noni-row { min-height: 56px; }
      .noni-row img { width: 58px; }  /* פורטרט: מפנים מקום לנוני ליד הבועה */
    }
  </style>
</head>
<body>
  <img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
       onerror="this.style.display='none'">

  <div class="top-bar">
    <a class="back" href="#" id="backBtn" aria-label="חזרה">→</a>
    <span class="title" id="pageTitle">אוֹצַר הַמִּלִּים שֶׁל נוּנִי</span>
    <span class="counter" id="counter">—</span>
  </div>

  <main>
    <div class="pearls" id="pearls" aria-hidden="true"></div>
    <div class="noni-row" id="noniRow" hidden>
      <img id="noniImg" src="assets/noni-idle.png" alt="נוני" onerror="this.style.display='none'">
      <div class="bubble">
        <span id="promptText" lang="he"></span>
        <button class="say" id="sayBtn" aria-label="הַקְשִׁיבוּ שׁוּב" hidden>🔊</button>
      </div>
    </div>
    <div id="mountRoot"></div>
  </main>

  <div class="start-veil" id="startVeil" hidden>
    <div class="start-card">
      <img src="assets/noni-happy.png" alt="נוני" onerror="this.style.display='none'">
      <h1>אוֹצַר הַמִּלִּים שֶׁל נוּנִי</h1>
      <p>נוּנִי מָצְאָה תֵּבַת אוֹצָר, אֲבָל הַתְּמוּנוֹת וְהַמִּלִּים הִתְעַרְבְּבוּ!<br>עִזְרוּ לְנוּנִי לְסַדֵּר אֶת הָאוֹצָר.</p>
      <button id="startBtn">מַתְחִילִים!</button>
    </div>
  </div>

  <!-- shared engine -->
  <script src="js/state.js?v=2026-07-04"></script>
  <script src="js/shared/audio.js?v=2026-07-04"></script>
  <script src="js/shared/noni.js?v=2026-07-04"></script>
  <script src="js/shared/vowel-adapter.js?v=2026-07-04"></script>
  <script src="js/shared/epa.js?v=2026-07-04"></script>
  <script src="js/shared/bkt.js?v=2026-07-04"></script>
  <script src="js/shared/event-logger.js?v=2026-07-04"></script>
  <script src="js/templates/mechanic-mcq.js?v=2026-07-04"></script>

  <script>
  (function () {
    'use strict';

    var params = new URLSearchParams(location.search);
    var MODE = params.get('mode') || 'mix';   // word | image | sort | mix

    // ------------------------------------------------------------------
    // המאגר — תת-הקבוצה "אובייקט יחיד" של assets/vocab (המניפסט המלא כולל
    // גם תמונות-משפט שאינן מתאימות למשחקון מילה-בודדת). ניקוד = הצורות
    // המאומתות מ-questions-grade1.json; audio = word-*.mp3 קיימים (null=אין
    // הקלטה — המילה מוצגת כתובה, בלי אודיו; לא ממציאים TTS בדפדפן).
    // ------------------------------------------------------------------
    var VOCAB = [
      { word: 'נְמָלָה', file: 'nmlh.png',  audio: 'word-nemala',                field: 'animals' },
      { word: 'דֹּב',    file: 'db.png',    audio: null,                         field: 'animals' },
      { word: 'נָחָשׁ',  file: 'nchsh.png', audio: 'word-nun-het-shin-nachash',  field: 'animals' },
      { word: 'כַּדּוּר', file: 'kdvr.png',  audio: 'word-kadur',                 field: 'things'  },
      { word: 'מַטֶּה',  file: 'mth.png',   audio: 'word-mem-tet-hey-mateh',     field: 'things'  },
      { word: 'חַלָּה',  file: 'chlh.png',  audio: 'word-het-lamed-hey-chala',   field: 'things'  },
      { word: 'אִישׁ',   file: 'ysh.png',   audio: 'word-ish',                   field: 'people'  },
      { word: 'צַלָּם',  file: 'tslm.png',  audio: null,                         field: 'people'  },
      { word: 'פֶּרַח',  file: 'prch.png',  audio: null,                         field: 'nature'  },
      { word: 'עֵץ',    file: 'ts.png',    audio: 'word-etz',                   field: 'nature'  },
      { word: 'מַיִם',   file: 'mym.png',   audio: 'word-mayim',                 field: 'nature'  },
      { word: 'אֵשׁ',    file: 'sh.png',    audio: 'word-alef-shin-esh',         field: 'nature'  },
    ];
    var IMG_BASE = 'assets/vocab/';

    var FIELD_LABEL = {
      animals: 'חַיּוֹת',
      things:  'דְּבָרִים',
      people:  'אֲנָשִׁים',
      nature:  'בַּטֶּבַע',
    };
    // זוגות-מיון עם ניגוד סמנטי נקי לגיל 6 (חיות/טבע לא מזווגים — דו-משמעי)
    var SORT_PAIRS = [
      ['animals', 'things'],
      ['animals', 'people'],
      ['nature',  'things'],
    ];

    // characteristic_id אמיתי מהבנק פר מצב (ראו כותרת הקובץ) + אי לפי strand
    var MODES = {
      word:  { cid: 'nov-w4-d1-c1', island: 5,
               interaction: 'word_to_image',
               prompt: 'קִרְאוּ אֶת הַמִּלָּה וְהַקִּישׁוּ עַל הַתְּמוּנָה הַמַּתְאִימָה.' },
      image: { cid: 'dec-w1-d4-c1', island: 14,
               interaction: 'image_to_word',
               prompt: 'הִסְתַּכְּלוּ בַּתְּמוּנָה וְהַקִּישׁוּ עַל הַמִּלָּה הַמַּתְאִימָה.' },
      sort:  { cid: 'feb-w4-d3-c2', island: 9,
               interaction: 'sort_to_category',
               prompt: 'לְאֵיזוֹ קְבוּצָה זֶה שַׁיָּךְ? הַקִּישׁוּ עַל הַקְּבוּצָה הַמַּתְאִימָה.' },
    };

    var THEMES = ['shells', 'fish', 'bubbles', 'treasure'];
    var EPA_MATCH = { what: 'Comprehension', where: 'isolation', task: 'find' };
    var EPA_SORT  = { what: 'Comprehension', where: 'isolation', task: 'recognition' };

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    // מסיחים: קודם מאותו שדה סמנטי (קושי אמיתי — אי אפשר לנחש לפי הקשר),
    // השלמה אקראית מהשאר אם אין מספיק.
    function pickDistractors(target, n) {
      var same = shuffle(VOCAB.filter(function (v) { return v !== target && v.field === target.field; }));
      var rest = shuffle(VOCAB.filter(function (v) { return v !== target && v.field !== target.field; }));
      return same.concat(rest).slice(0, n);
    }

    function imgOpt(item, isCorrect) {
      return {
        mode: 'image', image_src: IMG_BASE + item.file, image_alt: item.word,
        is_correct: isCorrect, epa: isCorrect ? null : EPA_MATCH,
      };
    }
    function wordOpt(item, isCorrect) {
      return {
        mode: 'text', label_he: item.word,
        is_correct: isCorrect, epa: isCorrect ? null : EPA_MATCH,
      };
    }

    // ------------------------------------------------------------------
    // בוני סבבים → config של mechanic-mcq
    // ------------------------------------------------------------------
    function baseCfg(modeKey, item) {
      var m = MODES[modeKey];
      return {
        interaction: m.interaction,
        questId: 'vocab-match-' + modeKey + '-' + item.file.replace(/\.png$/, ''),
        item_id: 'vocab-match-' + modeKey + '-' + item.file.replace(/\.png$/, ''),
        characteristic_id: m.cid,
        primary_island_id: m.island,
        promptLine: m.prompt,
        stemAudio: item.audio || null,   // לחיווט כפתור 🔊 בבועת נוני
      };
    }

    // מצב 1: מילה מנוקדת (+אודיו פעם אחת ב-mount כשקיים) → 3 תמונות
    function wordRound(item) {
      var cfg = baseCfg('word', item);
      cfg.stem = { mode: 'text', text_he: item.word };
      if (item.audio) cfg.stem.audio_key = item.audio;
      cfg.options = [imgOpt(item, true)].concat(
        pickDistractors(item, 2).map(function (d) { return imgOpt(d, false); }));
      return cfg;
    }

    // מצב 2: תמונה אחת → 3 מילים מנוקדות (חובה לקרוא — המסיחים מאותו שדה)
    function imageRound(item) {
      var cfg = baseCfg('image', item);
      cfg.stem = { mode: 'image', image_src: IMG_BASE + item.file, image_alt: item.word };
      cfg.options = [wordOpt(item, true)].concat(
        pickDistractors(item, 2).map(function (d) { return wordOpt(d, false); }));
      return cfg;
    }

    // מצב 3: מיון לקטגוריות — פריט (תמונה + המילה ככיתוב + אודיו כשקיים),
    // נגיעה על אחת משתי הקבוצות = שיוך. סבב-mcq של 2 אופציות פר פריט.
    function sortRounds(pair) {
      var a = pair[0], b = pair[1];
      var items = shuffle(VOCAB.filter(function (v) { return v.field === a; })).slice(0, 3)
        .concat(shuffle(VOCAB.filter(function (v) { return v.field === b; })).slice(0, 3));
      return shuffle(items).map(function (item) {
        var cfg = baseCfg('sort', item);
        cfg.stem = { mode: 'image', image_src: IMG_BASE + item.file, image_alt: item.word, text_he: item.word };
        if (item.audio) cfg.stem.audio_key = item.audio;
        cfg.options = [a, b].map(function (f) {
          return {
            mode: 'text', label_he: FIELD_LABEL[f],
            is_correct: f === item.field,
            epa: f === item.field ? null : EPA_SORT,
          };
        });
        return cfg;
      });
    }

    function buildQueue() {
      var q = [];
      var pool = shuffle(VOCAB);
      if (MODE === 'word') {
        pool.slice(0, 6).forEach(function (v) { q.push(wordRound(v)); });
      } else if (MODE === 'image') {
        pool.slice(0, 6).forEach(function (v) { q.push(imageRound(v)); });
      } else if (MODE === 'sort') {
        shuffle(SORT_PAIRS).slice(0, 2).forEach(function (p) { q = q.concat(sortRounds(p)); });
      } else { // mix — שלושת המצבים ברצף: 3 מילה→תמונה, 3 תמונה→מילה, זוג-מיון אחד
        pool.slice(0, 3).forEach(function (v) { q.push(wordRound(v)); });
        pool.slice(3, 6).forEach(function (v) { q.push(imageRound(v)); });
        q = q.concat(sortRounds(shuffle(SORT_PAIRS)[0]));
      }
      q.forEach(function (cfg, i) { cfg.theme = THEMES[i % THEMES.length]; });
      return q;
    }

    // ------------------------------------------------------------------
    // רצף המשחק — זהה לדפוס stage-bank-play (פנינים, בועת נוני, סיום)
    // ------------------------------------------------------------------
    var $ = function (id) { return document.getElementById(id); };
    var root = $('mountRoot');
    var current = null;
    var queue = [];
    var idx = 0;

    $('backBtn').addEventListener('click', function (e) {
      e.preventDefault();
      if (history.length > 1) history.back(); else location.href = 'student-picker.html';
    });

    function renderPearls() {
      var el = $('pearls');
      el.innerHTML = '';
      queue.forEach(function (_, i) {
        var p = document.createElement('span');
        p.className = 'pearl' + (i < idx ? ' filled' : '');
        el.appendChild(p);
      });
    }

    function showFinish() {
      $('noniRow').hidden = true;
      $('counter').textContent = queue.length + ' / ' + queue.length;
      root.innerHTML =
        '<div class="finish">' +
        '<img src="assets/noni-happy.png" alt="נוני שמחה" onerror="this.style.display=\'none\'">' +
        '<h2>כָּל הַכָּבוֹד!</h2>' +
        '<p>סִדַּרְתֶּם אֶת כָּל הָאוֹצָר שֶׁל נוּנִי!</p>' +
        '<div class="btns">' +
        '<button class="again" id="againBtn">עוֹד פַּעַם</button>' +
        '<a class="home" href="student-picker.html">לַמָּסָךְ הָרָאשִׁי</a>' +
        '</div></div>';
      $('againBtn').addEventListener('click', function () { location.reload(); });
      try { window.AvneiAudio.play('all-done'); } catch (e) {}
    }

    function mountNext() {
      if (current && current.unmount) { try { current.unmount(); } catch (e) {} }
      current = null;
      renderPearls();
      if (idx >= queue.length) { showFinish(); return; }

      var cfg = queue[idx];
      $('counter').textContent = (idx + 1) + ' / ' + queue.length;
      $('noniRow').hidden = false;
      $('promptText').textContent = cfg.promptLine;

      // כפתור 🔊 בבועת נוני — משמיע שוב את מילת-הסבב (רק כשיש הקלטה).
      // ההשמעה הראשונה = פעם אחת ב-mount (auto-play של mechanic-mcq), לא חוזרת.
      var say = $('sayBtn');
      say.hidden = !cfg.stemAudio;
      say.onclick = cfg.stemAudio ? function () { try { window.AvneiAudio.play(cfg.stemAudio); } catch (e) {} } : null;

      cfg.onComplete = function () {
        idx++;
        renderPearls();
        var pearls = document.querySelectorAll('.pearl');
        var p = pearls[idx - 1];
        if (p) { p.classList.add('just-added'); setTimeout(function () { p.classList.remove('just-added'); }, 600); }
        setTimeout(mountNext, 250);
      };

      current = window.AvneiMechanics['mcq'].mount(root, cfg);
    }

    function boot() {
      queue = buildQueue();
      // חימום cache — טוענים את תמונות התור ברקע פעם אחת (בלי הבזק-ריק בין סבבים)
      queue.forEach(function (cfg) {
        [cfg.stem].concat(cfg.options || []).forEach(function (o) {
          if (o && o.image_src) { (new Image()).src = o.image_src; }
        });
      });
      renderPearls();
      $('startVeil').hidden = false;
      $('startBtn').addEventListener('click', function () {
        try { if (window.AvneiAudio.unlock) window.AvneiAudio.unlock(); } catch (e) {}
        $('startVeil').hidden = true;
        idx = 0;
        mountNext();
      });
    }

    boot();
  })();
  </script>
</body>
</html>
