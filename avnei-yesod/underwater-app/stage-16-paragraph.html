<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#A8E8FF">
  <title>אי 16 · לשרשר פסקה</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css?v=2026-07-07">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Heebo', sans-serif;
      color: var(--text-main, #26505C);
      line-height: 1.5;
      min-height: 100vh;
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      -webkit-font-smoothing: antialiased;
    }
    .scene-bg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center bottom;
      z-index: 0; pointer-events: none;
    }

    .page-wrap {
      position: relative; z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 92px 16px 170px;
    }

    /* Top bar */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
    }
    .icon-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.92); border: 1.5px solid rgba(255,255,255,0.95);
      box-shadow: 0 6px 16px rgba(38,80,92,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-main, #26505C); text-decoration: none;
    }
    .icon-btn:active { transform: scale(0.92); }
    .title-pill {
      background: rgba(255,255,255,0.92);
      padding: 8px 22px; border-radius: 999px;
      font-weight: 900; font-size: 18px; color: var(--deep, #1E3D47);
      box-shadow: 0 6px 16px rgba(38,80,92,0.15);
    }

    /* Start veil */
    .start-veil {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.92);
      border-radius: var(--radius-lg, 28px);
      padding: 30px 24px;
      box-shadow: 0 20px 50px rgba(38,80,92,0.18);
      text-align: center;
      animation: fade-up 600ms ease-out;
    }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .start-veil h1 { font-size: 26px; font-weight: 900; color: var(--deep, #1E3D47); margin-bottom: 8px; }
    .start-veil p { color: var(--text-soft, #4D6F78); font-size: 17px; margin-bottom: 22px; }
    .start-btn {
      min-height: var(--touch-min, 56px);
      background: var(--sea-green, #8ED9B8);
      color: var(--deep, #1E3D47); border: none; padding: 14px 40px; border-radius: 999px;
      font-family: inherit; font-weight: 800; font-size: 18px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(38,80,92,0.18);
    }
    .start-btn:active { transform: scale(0.96); }

    /* Mechanic */
    .mechanic-paragraph-build { animation: fade-up 600ms ease-out; display: flex; flex-direction: column; gap: 16px; }
    .mpb-progress {
      align-self: center;
      font-weight: 800; font-size: 16px;
      color: var(--deep, #1E3D47);
      background: rgba(255,255,255,0.88);
      padding: 6px 18px; border-radius: 999px;
      box-shadow: 0 4px 12px rgba(38,80,92,0.1);
      direction: ltr;  /* "1 / 2" — מונה סבב, לא להיפוך ב-RTL */
    }
    .mpb-order-card {
      background: rgba(255,255,255,0.94);
      border-radius: var(--radius-md, 24px);
      padding: 22px;
      box-shadow: 0 16px 40px rgba(38,80,92,0.14);
    }
    .mpb-instruction {
      font-size: clamp(18px, 3.5vw, 22px); font-weight: 800; color: var(--deep, #1E3D47);
      direction: rtl; text-align: right; margin-bottom: 16px;
    }
    .mpb-section-title { color: var(--text-soft, #4D6F78); font-weight: 700; font-size: 16px; margin-bottom: 10px; }
    .mpb-section-title + .mpb-section-title { margin-top: 18px; }

    .mpb-answer-slots {
      list-style: none; padding: 0; margin: 0 0 18px;
      display: grid; gap: 8px;
      counter-reset: slot;
    }
    .mpb-slot {
      counter-increment: slot;
      background: var(--warm-white, #FFF9F4);
      border: 2px dashed var(--stone, #DAD6C9);
      border-radius: var(--radius-sm, 16px);
      padding: 14px 18px 14px 56px;
      font-weight: 600; font-size: clamp(17px, 3.6vw, 20px);
      direction: rtl; text-align: right;
      position: relative; min-height: 56px;
      color: var(--text-soft, #4D6F78);
      transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
    }
    .mpb-slot::before {
      content: counter(slot);
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--sea-green, #8ED9B8); color: var(--deep, #1E3D47);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 15px;
    }
    .mpb-slot--empty { color: var(--stone, #DAD6C9); }
    .mpb-slot--filled {
      background: #F2FBF6; border-color: var(--sea-green, #8ED9B8); border-style: solid;
      color: var(--deep, #1E3D47);
    }
    .mpb-slot--correct {
      background: #E9FBF2; border-color: var(--success, #7CE7B4); border-style: solid;
      color: var(--deep, #1E3D47);
      box-shadow: var(--glow-success, 0 0 20px #7CE7B4);
    }
    .mpb-slot--wrong {
      background: #FFF1EB; border-color: var(--coral, #FFA98D); border-style: solid;
      color: var(--deep, #1E3D47);
    }

    .mpb-choices { display: grid; gap: 10px; }
    .mpb-choice {
      min-height: var(--touch-min, 56px);
      background: var(--warm-white, #FFF9F4);
      border: 2.5px solid var(--stone, #DAD6C9);
      border-radius: var(--radius-sm, 16px);
      padding: 16px 18px;
      font-family: inherit; font-weight: 700; font-size: clamp(17px, 3.6vw, 20px);
      color: var(--deep, #1E3D47);
      direction: rtl; text-align: right;
      cursor: pointer; transition: transform 150ms ease, border-color 180ms ease, background 180ms ease;
    }
    .mpb-choice:hover:not(:disabled) {
      border-color: var(--sea-green, #8ED9B8);
      background: #F2FBF6;
      transform: translateY(-1px);
    }
    .mpb-choice--used { opacity: 0.35; cursor: default; }

    .mpb-feedback { min-height: 22px; text-align: right; font-weight: 800; margin-top: 14px; direction: rtl; }
    .mpb-feedback--ok   { color: #2E7A66; }
    .mpb-feedback--miss { color: #B5611F; }

    .mpb-actions {
      display: flex; gap: 12px; justify-content: space-between;
      margin-top: 18px; flex-wrap: wrap;
    }
    .mpb-btn {
      min-height: var(--touch-min, 56px);
      background: var(--sea-green, #8ED9B8);
      color: var(--deep, #1E3D47); border: none; padding: 12px 30px; border-radius: 999px;
      font-family: inherit; font-weight: 800; font-size: 16px;
      cursor: pointer; box-shadow: 0 6px 14px rgba(38,80,92,0.18);
    }
    .mpb-btn:disabled { opacity: 0.45; cursor: default; box-shadow: none; }
    .mpb-btn--ghost {
      background: transparent; color: var(--deep, #1E3D47);
      border: 2px solid var(--sea-green, #8ED9B8); box-shadow: none;
    }
    .mpb-error {
      background: var(--hint, #FFE7A8); border: 1px dashed var(--peach, #FFC8AE); border-radius: 12px;
      padding: 16px; color: var(--deep, #1E3D47); text-align: center; font-weight: 600;
    }

    /* Summary */
    .summary-card {
      background: rgba(255,255,255,0.94);
      border-radius: var(--radius-lg, 28px);
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(38,80,92,0.14);
      animation: fade-up 600ms ease-out;
    }
    .summary-title { font-size: 24px; font-weight: 900; color: var(--deep, #1E3D47); margin-bottom: 8px; }
    .summary-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
    .summary-btn {
      min-height: var(--touch-min, 56px);
      background: var(--sea-green, #8ED9B8);
      color: var(--deep, #1E3D47); border: none; padding: 14px 26px; border-radius: 999px;
      font-family: inherit; font-weight: 800; font-size: 16px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(38,80,92,0.18); text-decoration: none;
      display: inline-flex; align-items: center;
    }
    .summary-btn--ghost {
      background: transparent; color: var(--deep, #1E3D47);
      border: 2px solid var(--sea-green, #8ED9B8); box-shadow: none;
    }

    /* נוני */
    .noni-fixed {
      position: fixed; bottom: 18px; right: 14px;
      width: clamp(84px, 18vw, 120px); height: auto;
      animation: float-bob 3s ease-in-out infinite;
      pointer-events: none; z-index: 10;
      filter: drop-shadow(0 8px 14px rgba(38,80,92,0.25));
    }
    @keyframes float-bob { 0%, 100% { transform: translateY(-8px); } 50% { transform: translateY(8px); } }
    .noni-bubble {
      position: fixed; bottom: 150px; right: 16px;
      background: #fff; border-radius: var(--radius-md, 24px);
      padding: 14px 20px; max-width: 270px;
      box-shadow: 0 6px 18px rgba(38,80,92,0.18);
      z-index: 10;
      font-weight: 700; font-size: 16px; color: var(--deep, #1E3D47);
      transition: opacity 300ms ease;
    }
    .noni-bubble.hidden { opacity: 0; pointer-events: none; }

    @media (prefers-reduced-motion: reduce) {
      .start-veil, .mechanic-paragraph-build, .summary-card { animation: none !important; }
      .noni-fixed { animation: none !important; }
    }
  </style>
</head>
<body>

<img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
     onerror="this.style.display='none'">

<header class="top-bar">
  <a href="stage-16-island.html" class="icon-btn" id="backBtn" aria-label="חזרה לאי 16">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <div class="title-pill">לְשַׁרְשֵׁר פִּסְקָה</div>
  <div style="width:52px;height:52px;" aria-hidden="true"></div>
</header>

<main class="page-wrap">

  <section id="startVeil" class="start-veil">
    <h1>מוּכָנִים לְשַׁרְשֵׁר?</h1>
    <p>קִרְאוּ אֶת הַמִּשְׁפָּטִים בְּעַצְמְכֶם, בְּשֶׁקֶט — וְסַדְּרוּ אוֹתָם לְפִי הַסֵּדֶר הַהֶגְיוֹנִי.</p>
    <button class="start-btn" id="startBtn" type="button">בּוֹאוּ נַתְחִיל</button>
  </section>

  <section id="gameRoot" style="display:none;"></section>

  <section id="summarySection" class="summary-card" style="display:none;">
    <h1 class="summary-title">כָּל הַכָּבוֹד!</h1>
    <p id="summaryMsg" style="color:var(--text-soft, #4D6F78);">שִׁרְשַׁרְתֶּם אֶת הַמִּשְׁפָּטִים לְפִסְקָה — לְבַד!</p>
    <div class="summary-actions">
      <button class="summary-btn" id="playAgainBtn" type="button">עוֹד פַּעַם</button>
      <a class="summary-btn summary-btn--ghost" href="stage-16-island.html">חֲזָרָה לָאִי</a>
    </div>
  </section>

</main>

<img class="noni-fixed" id="noniImg" src="assets/noni-idle.png" alt="נוני"
     onerror="this.style.display='none'">
<div class="noni-bubble hidden" id="noniBubble">אֵיזֶה מִשְׁפָּט בָּא קֹדֶם?</div>

<script src="js/state.js"></script>
<script src="js/shared/event-logger.js"></script>
<script src="js/shared/bkt.js"></script>
<script src="js/shared/audio.js"></script>
<script src="js/templates/mechanic-paragraph-build.js"></script>

<script>
  (function () {
    'use strict';
    var PRIMARY_ISLAND = 16;

    // ── תוכן ה-inline (אין קובץ JSON → אין תלות ב-build-embedded-data; עובד ב-file://) ──
    // 🔴 סטים built:true בלבד נכנסים למשחק. שלושת הסטים ב-PENDING (בעיה→פתרון ימי)
    //    ממתינים לאישור פדגוגי של מיטל (ASK) — לא מוצגים לילד עד אישור.
    //
    // BUILT — נגזרים מקטעים שכבר אושרו פדגוגית (passages-read.json · אושר מיטל 4.7):
    //   כל קטע פוצל ל-3 משפטים בעלי סדר הגיוני (התחלה→אמצע→סוף / תהליך).
    var ITEMS_BUILT = [
      {
        item_id: 'isl16-shuk', characteristic_id: 'isl16-para-shuk', title: 'יוֹם שׁוּק',
        // מקור: passages-read.json · isle14-read-shuk (סיפור, אושר 4.7) — הלכה→קנתה→חזרה.
        sentences: [
          'תָּמָר הָלְכָה לַשּׁוּק עִם סַל גָּדוֹל.',
          'הִיא קָנְתָה תַּפּוּחַ אָדֹם וְלֶחֶם חַם.',
          'בַּסּוֹף תָּמָר חָזְרָה הַבַּיְתָה שְׂמֵחָה.',
        ],
      },
      {
        item_id: 'isl16-bees', characteristic_id: 'isl16-para-bees', title: 'הַדְּבוֹרָה',
        // מקור: passages-read.json · isle14-read-bees (אושר 4.7) — תהליך: עפה→אוספת→עושה דבש.
        sentences: [
          'הַדְּבוֹרָה עָפָה מִפֶּרַח לְפֶרַח.',
          'הִיא אוֹסֶפֶת צוּף מָתוֹק מֵהַפְּרָחִים.',
          'הַדְּבוֹרָה עוֹשָׂה דְּבַשׁ מֵהַצּוּף.',
        ],
      },
    ];

    // PENDING (built:false · ASK מיטל) — בעיה→פתרון ימי, אוצר גן/א'. לא בשימוש עד אישור.
    // מושארים כאן כתיעוד בלבד (לא נטענים למשחק).
    var ITEMS_PENDING = [
      { item_id: 'isl16-shell', characteristic_id: 'isl16-para-shell', title: 'הַצֶּדֶף הַסָּגוּר', built: false,
        sentences: [
          'נוּנִי מָצְאָה צֶדֶף סָגוּר עַל הַחוֹל.',
          'הִיא בִּקְשָׁה מֵהַסַּרְטָן לַעֲזֹר לָהּ.',
          'בַּסּוֹף הַצֶּדֶף נִפְתַּח, וּבִפְנִים הָיְתָה פְּנִינָה.',
        ] },
      { item_id: 'isl16-lost-fish', characteristic_id: 'isl16-para-lost-fish', title: 'הַדָּג שֶׁאָבַד', built: false,
        sentences: [
          'דָּג קָטָן שָׂחָה רָחוֹק מֵאִמָּא שֶׁלּוֹ.',
          'פִּתְאוֹם הוּא לֹא רָאָה אֶת הַדֶּרֶךְ הַבַּיְתָה.',
          'נוּנִי לָקְחָה אוֹתוֹ, וְהֶחֱזִירָה אוֹתוֹ לְאִמָּא.',
        ] },
      { item_id: 'isl16-reef-clean', characteristic_id: 'isl16-para-reef-clean', title: 'הַשּׁוּנִית הַנְּקִיָּה', built: false,
        sentences: [
          'הַזֶּרֶם לִכְלֵךְ אֶת הַשּׁוּנִית הַיָּפָה.',
          'כֹּל הַדָּגִים בָּאוּ לַעֲזֹר לְנַקּוֹת אוֹתָהּ.',
          'עַכְשָׁו הַשּׁוּנִית נְקִיָּה וְנוֹצֶצֶת שׁוּב.',
        ] },
    ];
    void ITEMS_PENDING; // מתועד; ממתין לאישור מיטל.

    function shuffleItems(arr) {
      var out = arr.slice();
      for (var i = out.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = out[i]; out[i] = out[j]; out[j] = t;
      }
      return out;
    }

    var studentId = localStorage.getItem('avnei-yesod-current-student') || 'local';
    var startVeil = document.getElementById('startVeil');
    var root      = document.getElementById('gameRoot');
    var summary   = document.getElementById('summarySection');
    var msg       = document.getElementById('summaryMsg');
    var again     = document.getElementById('playAgainBtn');
    var startBtn  = document.getElementById('startBtn');
    var noniImg   = document.getElementById('noniImg');
    var noniBub   = document.getElementById('noniBubble');
    var noniTimer = null;

    document.getElementById('backBtn').addEventListener('click', function (e) {
      e.preventDefault();
      if (history.length > 1) history.back(); else location.href = 'stage-16-island.html';
    });

    function noniSay(text) { if (noniBub) { noniBub.textContent = text; noniBub.classList.remove('hidden'); } }
    function noniMood(src, ms) {
      if (!noniImg) return;
      noniImg.src = 'assets/noni-' + src + '.png';
      if (noniTimer) clearTimeout(noniTimer);
      if (ms) noniTimer = setTimeout(function () { noniImg.src = 'assets/noni-idle.png'; }, ms);
    }

    // ניגון קליפ-הנחיה חד-פעמי (guidance · checklist §5) עם callback בסיום.
    function playMissionThen(cb) {
      var done = false;
      function fin() { if (!done) { done = true; cb(); } }
      try {
        var a = new Audio('assets/audio/mission-isl16.mp3');
        a.addEventListener('ended', fin);
        a.addEventListener('error', fin);
        a.play().catch(fin);
        setTimeout(fin, 9000);
      } catch (e) { fin(); }
    }

    function startGame() {
      startVeil.style.display = 'none';
      summary.style.display = 'none';
      root.style.display = '';
      root.innerHTML = '';
      noniMood('idle');
      noniSay('אֵיזֶה מִשְׁפָּט בָּא קֹדֶם?');

      window.AvneiMechanicParagraphBuild.init({
        studentId: studentId,
        primary_island_id: PRIMARY_ISLAND,
        items: shuffleItems(ITEMS_BUILT),
        mountRoot: root,
        onProgress: function (p) {
          if (p.isCorrect) noniMood('happy', 1500);
          else noniMood('thinking', 1500);
        },
        onComplete: function (payload) {
          root.style.display = 'none';
          summary.style.display = '';
          var pct = payload.total > 0 ? Math.round((payload.correct / payload.total) * 100) : 0;
          if (pct >= 70) {
            noniMood('happy', 4000);
            msg.textContent = 'שִׁרְשַׁרְתֶּם אֶת הַמִּשְׁפָּטִים לְפִסְקָה — לְבַד!';
            noniSay('אֵיזֶה כֵּיף! בְּנִיתֶם פִּסְקָה שְׁלֵמָה!');
          } else {
            msg.textContent = 'כָּל הַכָּבוֹד עַל הַקְּרִיאָה! בּוֹאוּ נְשַׁרְשֵׁר שׁוּב בְּיַחַד.';
            noniSay('בּוֹאוּ נִקְרָא שׁוּב, לְאַט לְאַט.');
          }
        },
      });
      window.AvneiMechanicParagraphBuild.start();
    }

    startBtn.addEventListener('click', function () {
      try { if (window.AvneiAudio && window.AvneiAudio.unlock) window.AvneiAudio.unlock(); } catch (e) {}
      // הנחיית נוני פעם אחת, ואז הסבב הראשון (fallback ל-timeout אם אין קובץ).
      playMissionThen(startGame);
    });

    again.addEventListener('click', function () {
      noniMood('idle');
      startGame();
    });

    // deep-link: ?auto=1 מדלג על ה-veil (לשימוש התוכנית השנתית/בדיקות)
    if (new URLSearchParams(location.search).get('auto') === '1') {
      try { if (window.AvneiAudio && window.AvneiAudio.unlock) window.AvneiAudio.unlock(); } catch (e) {}
      startGame();
    }
  })();
</script>

</body>
</html>
