<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>אי 1 · מפרץ הבועות המזמרות</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    body {
      background: linear-gradient(180deg, #BFEFFF 0%, #8EDDD8 60%, #4FB8C9 100%);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ===== Top bar ===== */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: var(--space-m);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }

    .icon-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 6px 16px rgba(38, 80, 92, 0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-main);
      text-decoration: none;
    }
    .icon-btn:active { transform: scale(0.92); }

    /* ===== Header ===== */
    .island-header {
      padding: 80px 16px 24px;
      text-align: center;
      animation: fade-down 700ms ease-out;
    }
    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .island-title {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 900;
      color: var(--text-main);
      margin: 0 0 6px;
      text-shadow: 0 2px 8px rgba(255, 255, 255, 0.5);
    }
    .island-subtitle {
      font-size: clamp(15px, 3vw, 19px);
      color: var(--text-soft);
      margin: 0;
      max-width: 50ch;
      margin-inline: auto;
      line-height: 1.5;
    }

    /* ===== Quests grid ===== */
    .quests-container {
      max-width: 880px;
      margin: 0 auto;
      padding: 16px 16px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: clamp(14px, 3vw, 22px);
    }

    /* ===== Quest card ===== */
    .quest-card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 24px;
      background: linear-gradient(180deg,
                  rgba(255, 255, 255, 0.92) 0%,
                  rgba(232, 247, 255, 0.88) 100%);
      box-shadow:
        0 14px 28px rgba(38, 80, 92, 0.18),
        inset 0 2px 8px rgba(255, 255, 255, 0.95);
      padding: 16px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: transform 280ms cubic-bezier(.34,1.56,.64,1);
      cursor: pointer;
      opacity: 0;
      animation: card-rise 700ms cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .quest-card:nth-child(1) { animation-delay: 200ms; }
    .quest-card:nth-child(2) { animation-delay: 320ms; }
    .quest-card:nth-child(3) { animation-delay: 440ms; }
    .quest-card:nth-child(4) { animation-delay: 560ms; }
    .quest-card:nth-child(5) { animation-delay: 680ms; }

    @keyframes card-rise {
      from { opacity: 0; transform: translateY(20px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .quest-card:active { transform: scale(0.96); }

    .quest-number {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(38, 80, 92, 0.12);
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* ===== Bubble icon — the star of the card ===== */
    .quest-bubble {
      width: clamp(82px, 18vw, 110px);
      height: clamp(82px, 18vw, 110px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95), rgba(255,255,255,0.25) 55%, transparent 78%),
        radial-gradient(circle at 50% 50%, rgba(168, 232, 255, 0.55), rgba(115, 217, 209, 0.55));
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow:
        inset 0 0 28px rgba(255,255,255,0.55),
        0 10px 22px rgba(115, 217, 209, 0.45),
        0 0 24px rgba(255, 247, 200, 0.5);
      display: flex; align-items: center; justify-content: center;
      margin-top: 6px;
      position: relative;
      animation: bubble-bob 4s ease-in-out infinite;
    }
    .quest-bubble::after {
      content: "";
      position: absolute;
      inset: 14% 14% auto auto;
      width: 26%;
      height: 22%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
      filter: blur(2px);
    }
    @keyframes bubble-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    .quest-bubble svg {
      width: 50%;
      height: 50%;
      color: var(--text-main);
      opacity: 0.75;
    }

    .quest-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .quest-name {
      font-size: clamp(15px, 3vw, 18px);
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.25;
    }
    .quest-tagline {
      font-size: clamp(12px, 2.4vw, 14px);
      color: var(--text-soft);
      line-height: 1.3;
      min-height: 1.3em;
    }

    /* ===== State: current/available ===== */
    .quest-card.state-current {
      animation: card-rise 700ms cubic-bezier(.34,1.56,.64,1) forwards,
                 current-glow 2.6s ease-in-out infinite 1s;
    }
    @keyframes current-glow {
      0%, 100% {
        box-shadow:
          0 14px 28px rgba(38, 80, 92, 0.18),
          inset 0 2px 8px rgba(255, 255, 255, 0.95),
          0 0 0 0 rgba(255, 231, 168, 0.6);
      }
      50% {
        box-shadow:
          0 14px 28px rgba(38, 80, 92, 0.22),
          inset 0 2px 8px rgba(255, 255, 255, 0.95),
          0 0 0 14px rgba(255, 231, 168, 0);
      }
    }

    /* ===== State: coming-soon ===== */
    .quest-card.state-coming-soon {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
      background: linear-gradient(180deg,
                  rgba(255, 255, 255, 0.78) 0%,
                  rgba(220, 240, 240, 0.7) 100%);
    }
    .quest-card.state-coming-soon .quest-bubble {
      filter: saturate(0.5);
      animation: none;
    }
    .quest-card.state-coming-soon .quest-bubble svg {
      opacity: 0.35;
    }
    .quest-card.state-coming-soon .coming-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255, 255, 255, 0.85);
      padding: 3px 9px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-soft);
      box-shadow: 0 3px 8px rgba(38, 80, 92, 0.1);
    }
    .quest-card.state-coming-soon .quest-tagline {
      opacity: 0;
    }

    /* ===== Noni desktop overlay ===== */
    .island-noni {
      display: none;
    }
    @keyframes noni-float {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-8px) rotate(3deg); }
    }
    @media (min-width: 820px) {
      .island-noni {
        display: block;
        position: fixed;
        bottom: clamp(8px, 2vh, 20px);
        left: clamp(8px, 3vw, 20px);
        width: clamp(100px, 12vw, 140px);
        z-index: 8;
        pointer-events: none;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.22));
        animation: noni-float 4s ease-in-out infinite;
      }
    }

    /* ===== Ambient bubbles בקרקעית הדף ===== */
    .ambient-bubble {
      position: fixed;
      bottom: -40px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.85), rgba(255,255,255,0.15) 60%, transparent 75%);
      border: 1.5px solid rgba(255,255,255,0.45);
      pointer-events: none;
      animation: ambient-rise linear infinite;
      opacity: 0;
      z-index: 1;
    }
    @keyframes ambient-rise {
      0%   { transform: translateY(0); opacity: 0; }
      10%  { opacity: 0.55; }
      90%  { opacity: 0.55; }
      100% { transform: translateY(-105vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <header class="top-bar">
    <a href="map.html" class="icon-btn" aria-label="חזרה למפה">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </header>

  <div class="island-header">
    <h1 class="island-title">אי 1 · מפרץ הבועות המזמרות</h1>
    <p class="island-subtitle">ארבע הרפתקאות עם בועות שמזמרות הברות. תלחצו ותשמעו — וכל אחת תלמד דבר חדש.</p>
  </div>

  <main class="quests-container" id="questsContainer"></main>

  <!-- Ambient bubbles -->
  <div class="ambient-bubble" style="left: 8%; width: 30px; height: 30px; animation-duration: 16s;"></div>
  <div class="ambient-bubble" style="left: 70%; width: 22px; height: 22px; animation-duration: 20s; animation-delay: 4s;"></div>
  <div class="ambient-bubble" style="left: 38%; width: 18px; height: 18px; animation-duration: 14s; animation-delay: 7s;"></div>
  <div class="ambient-bubble" style="left: 88%; width: 26px; height: 26px; animation-duration: 18s; animation-delay: 10s;"></div>

  <img class="island-noni" src="assets/noni-hero-transparent.png" alt="נוני"
       onerror="this.src='assets/noni-idle.png'">

  <script>
  // ============================================================
  // stage-1-island.html — מסך פתיחה של אי 1
  // 4 משחקונים — אחד בנוי, שלושה בתכנון.
  // ============================================================

  const QUESTS = [
    {
      id: 'bubble-rise',
      name: 'הבועה שרוצה לעלות',
      tagline: 'רצף הברות — בועה עולה אנכית',
      href: 'stage-1-bubble-rise.html',
      icon: 'arrow-up',
      built: true,
    },
    {
      id: 'merge-bubble',
      name: 'אוספים את החלקים',
      tagline: 'גוררים הברות לבועה גדולה',
      href: 'stage-1-merge-bubble.html',
      icon: 'merge',
      built: true,
    },
    {
      id: 'count-bubbles',
      name: 'כמה חלקים?',
      tagline: 'ספירת הברות',
      href: 'stage-1-count-bubbles.html',
      icon: 'count',
      built: true,
    },
    {
      id: 'choir',
      name: 'המקהלה שמתעוררת',
      tagline: 'מיזוג שמיעתי — בועות שמתעוררות',
      href: 'stage-1-choir.html',
      icon: 'choir',
      built: true,
    },
    {
      id: 'rhyme-chain',
      name: 'שרשרת החרוזים',
      tagline: 'חריזה שמיעתית — מחזירים חרוזים לשרשרת',
      href: 'stage-rhyme.html',
      icon: 'rhyme',
      built: true,
    },
  ];

  const ICONS = {
    'arrow-up': '<svg viewBox="0 0 24 24" fill="none"><path d="M12 4l-6 6h4v10h4V10h4l-6-6z" fill="currentColor"/></svg>',
    'merge': '<svg viewBox="0 0 24 24" fill="none"><circle cx="6" cy="6" r="2.5" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="6" r="2.5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="17" r="4" stroke="currentColor" stroke-width="2"/><path d="M7.5 8L10 14M16.5 8L14 14" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/></svg>',
    'count': '<svg viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2.2" fill="currentColor"/><circle cx="12" cy="12" r="2.2" fill="currentColor"/><circle cx="18" cy="12" r="2.2" fill="currentColor"/></svg>',
    'choir': '<svg viewBox="0 0 24 24" fill="none"><circle cx="6" cy="14" r="2.5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="10" r="2.5" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="14" r="2.5" stroke="currentColor" stroke-width="2"/><path d="M5 18q1 1.5 7 1.5t7-1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
    'rhyme': '<svg viewBox="0 0 24 24" fill="none"><path d="M4 8q8 6 16 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="6" cy="9.2" r="2.2" fill="currentColor"/><circle cx="12" cy="11" r="2.2" fill="currentColor"/><circle cx="18" cy="9.2" r="2.2" fill="currentColor"/></svg>',
  };

  function getCardState(quest) {
    if (!quest.built) return 'coming-soon';
    return 'current';
  }

  function renderQuestCard(quest, idx) {
    const state = getCardState(quest);
    const stateClass = `state-${state}`;
    const isClickable = quest.built;

    const cardTag = isClickable ? 'a' : 'div';
    const hrefAttr = isClickable ? `href="${quest.href}"` : '';

    const badge = state === 'coming-soon'
      ? `<div class="coming-badge">בקרוב</div>`
      : '';

    return `
      <${cardTag} ${hrefAttr} class="quest-card ${stateClass}" data-quest-id="${quest.id}">
        <div class="quest-number">${idx + 1}</div>
        ${badge}
        <div class="quest-bubble">${ICONS[quest.icon] || ICONS['arrow-up']}</div>
        <div class="quest-info">
          <div class="quest-name">${quest.name}</div>
          <div class="quest-tagline">${quest.tagline}</div>
        </div>
      </${cardTag}>
    `;
  }

  function renderIsland() {
    const container = document.getElementById('questsContainer');
    container.innerHTML = QUESTS.map((q, i) => renderQuestCard(q, i)).join('');
  }

  renderIsland();
  </script>

</body>
</html>
