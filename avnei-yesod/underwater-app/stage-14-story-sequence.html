<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script src="js/shared/file-protocol-shim.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#A8E8FF">
  <title>אי 14 · סדר אירועים</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css?v=2026-07-06">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Heebo', sans-serif;
      color: var(--text-main, #26505C);
      line-height: 1.5;
      min-height: 100vh;
      background: linear-gradient(180deg, #BFF1FF 0%, #A8E8FF 40%, #73D9D1 100%);
      -webkit-font-smoothing: antialiased;
    }
    .scene-bg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center bottom;
      z-index: 0; pointer-events: none;
    }

    .page-wrap {
      position: relative; z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 92px 16px 170px;
    }

    /* Top bar */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
    }
    .icon-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.92); border: 1.5px solid rgba(255,255,255,0.95);
      box-shadow: 0 6px 16px rgba(38,80,92,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-main, #26505C); text-decoration: none;
    }
    .icon-btn:active { transform: scale(0.92); }
    .title-pill {
      background: rgba(255,255,255,0.92);
      padding: 8px 22px; border-radius: 999px;
      font-weight: 900; font-size: 18px; color: var(--deep, #1E3D47);
      box-shadow: 0 6px 16px rgba(38,80,92,0.15);
    }

    /* Intro card (level picker) */
    .intro-card {
      background: rgba(255,255,255,0.92);
      border-radius: var(--radius-lg, 28px);
      padding: 28px 24px;
      box-shadow: 0 20px 50px rgba(38,80,92,0.18);
      text-align: center;
      animation: fade-up 600ms ease-out;
    }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .intro-title { font-size: 26px; font-weight: 900; color: var(--deep, #1E3D47); margin-bottom: 8px; }
    .intro-sub { color: var(--text-soft, #4D6F78); font-size: 17px; margin-bottom: 22px; }
    .level-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
    .level-card {
      min-height: var(--touch-min, 56px);
      background: var(--warm-white, #FFF9F4);
      border: 2.5px solid var(--mint, #B8F2CF);
      border-radius: var(--radius-md, 24px);
      padding: 18px 14px;
      font-family: inherit; font-weight: 800; font-size: 17px;
      color: var(--deep, #1E3D47);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }
    .level-card:hover { transform: translateY(-2px); border-color: var(--sea-green, #8ED9B8); background: #F2FBF6; }
    .level-card .lc-num {
      font-size: 30px; font-weight: 900; display: block; margin: 0 auto 6px;
      width: 52px; height: 52px; line-height: 52px;
      background: var(--mint, #B8F2CF); border-radius: 50%;
    }
    .level-card .lc-desc { font-weight: 600; font-size: 14px; color: var(--text-soft, #4D6F78); }

    /* Mechanic */
    .mechanic-story-sequence { animation: fade-up 600ms ease-out; display: flex; flex-direction: column; gap: 16px; }
    .mss-progress {
      align-self: center;
      font-weight: 800; font-size: 16px;
      color: var(--deep, #1E3D47);
      background: rgba(255,255,255,0.88);
      padding: 6px 18px; border-radius: 999px;
      box-shadow: 0 4px 12px rgba(38,80,92,0.1);
    }
    .mss-passage-card, .mss-order-card {
      background: rgba(255,255,255,0.94);
      border-radius: var(--radius-md, 24px);
      padding: 22px;
      box-shadow: 0 16px 40px rgba(38,80,92,0.14);
    }
    .mss-instruction {
      font-size: clamp(18px, 3.5vw, 22px); font-weight: 800; color: var(--deep, #1E3D47);
      direction: rtl; text-align: right; margin-bottom: 12px;
    }
    .mss-audio-btn {
      display: inline-flex; align-items: center; gap: 10px;
      min-height: var(--touch-min, 56px);
      background: var(--water-depth, #63CFE5);
      color: var(--deep, #1E3D47); border: none; padding: 12px 24px; border-radius: 999px;
      font-family: inherit; font-weight: 800; font-size: 16px;
      cursor: pointer; box-shadow: 0 6px 14px rgba(38,80,92,0.18);
      transition: transform 150ms ease;
    }
    .mss-audio-btn:hover { transform: translateY(-1px); }
    .mss-section-title { color: var(--text-soft, #4D6F78); font-weight: 700; font-size: 16px; margin-bottom: 10px; }
    .mss-section-title + .mss-section-title { margin-top: 18px; }

    .mss-answer-slots {
      list-style: none; padding: 0; margin: 0;
      display: grid; gap: 8px;
      counter-reset: slot;
      margin-bottom: 18px;
    }
    .mss-slot {
      counter-increment: slot;
      background: var(--warm-white, #FFF9F4);
      border: 2px dashed var(--stone, #DAD6C9);
      border-radius: var(--radius-sm, 16px);
      padding: 14px 18px 14px 56px;
      font-weight: 600; font-size: 17px;
      direction: rtl; text-align: right;
      position: relative; min-height: 52px;
      color: var(--text-soft, #4D6F78);
      transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
    }
    .mss-slot::before {
      content: counter(slot);
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--sea-green, #8ED9B8); color: var(--deep, #1E3D47);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 15px;
    }
    .mss-slot--empty { color: var(--stone, #DAD6C9); }
    .mss-slot--filled {
      background: #F2FBF6; border-color: var(--sea-green, #8ED9B8); border-style: solid;
      color: var(--deep, #1E3D47);
    }
    .mss-slot--correct {
      background: #E9FBF2; border-color: var(--success, #7CE7B4); border-style: solid;
      color: var(--deep, #1E3D47);
      box-shadow: var(--glow-success, 0 0 20px #7CE7B4);
    }
    .mss-slot--wrong {
      background: #FFF1EB; border-color: var(--coral, #FFA98D); border-style: solid;
      color: var(--deep, #1E3D47);
    }

    .mss-choices { display: grid; gap: 10px; }
    .mss-choice {
      min-height: var(--touch-min, 56px);
      background: var(--warm-white, #FFF9F4);
      border: 2.5px solid var(--stone, #DAD6C9);
      border-radius: var(--radius-sm, 16px);
      padding: 14px 18px;
      font-family: inherit; font-weight: 700; font-size: 17px;
      color: var(--deep, #1E3D47);
      direction: rtl; text-align: right;
      cursor: pointer; transition: transform 150ms ease, border-color 180ms ease, background 180ms ease;
    }
    .mss-choice:hover:not(:disabled) {
      border-color: var(--sea-green, #8ED9B8);
      background: #F2FBF6;
      transform: translateY(-1px);
    }
    .mss-choice--used { opacity: 0.35; cursor: default; }

    .mss-feedback { min-height: 22px; text-align: right; font-weight: 800; margin-top: 14px; direction: rtl; }
    .mss-feedback--ok   { color: #2E7A66; }
    .mss-feedback--miss { color: #B5611F; }

    .mss-actions {
      display: flex; gap: 12px; justify-content: space-between;
      margin-top: 18px; flex-wrap: wrap;
    }
    .mss-btn {
      min-height: var(--touch-min, 56px);
      background: var(--sea-green, #8ED9B8);
      color: var(--deep, #1E3D47); border: none; padding: 12px 24px; border-radius: 999px;
      font-family: inherit; font-weight: 800; font-size: 16px;
      cursor: pointer; box-shadow: 0 6px 14px rgba(38,80,92,0.18);
    }
    .mss-btn:disabled { opacity: 0.45; cursor: default; box-shadow: none; }
    .mss-btn--ghost {
      background: transparent; color: var(--deep, #1E3D47);
      border: 2px solid var(--sea-green, #8ED9B8); box-shadow: none;
    }

    .mss-error {
      background: var(--hint, #FFE7A8); border: 1px dashed var(--peach, #FFC8AE); border-radius: 12px;
      padding: 16px; color: var(--deep, #1E3D47); text-align: center; font-weight: 600;
    }

    /* Summary */
    .summary-card {
      background: rgba(255,255,255,0.94);
      border-radius: var(--radius-lg, 28px);
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(38,80,92,0.14);
      animation: fade-up 600ms ease-out;
    }
    .summary-title { font-size: 24px; font-weight: 900; color: var(--deep, #1E3D47); margin-bottom: 8px; }
    .summary-score { font-size: 48px; font-weight: 900; color: var(--sea-green, #8ED9B8); margin: 12px 0; }
    .summary-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
    .summary-btn {
      min-height: var(--touch-min, 56px);
      background: var(--sea-green, #8ED9B8);
      color: var(--deep, #1E3D47); border: none; padding: 14px 26px; border-radius: 999px;
      font-family: inherit; font-weight: 800; font-size: 16px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(38,80,92,0.18); text-decoration: none;
      display: inline-flex; align-items: center;
    }
    .summary-btn--ghost {
      background: transparent; color: var(--deep, #1E3D47);
      border: 2px solid var(--sea-green, #8ED9B8); box-shadow: none;
    }

    /* נוני */
    .noni-fixed {
      position: fixed; bottom: 18px; right: 14px;
      width: clamp(84px, 18vw, 120px); height: auto;
      animation: float-bob 3s ease-in-out infinite;
      pointer-events: none; z-index: 10;
      filter: drop-shadow(0 8px 14px rgba(38,80,92,0.25));
    }
    @keyframes float-bob {
      0%, 100% { transform: translateY(-8px); }
      50%      { transform: translateY(8px); }
    }
    .noni-bubble {
      position: fixed; bottom: 150px; right: 16px;
      background: #fff; border-radius: var(--radius-md, 24px);
      padding: 14px 20px; max-width: 270px;
      box-shadow: 0 6px 18px rgba(38,80,92,0.18);
      z-index: 10;
      font-weight: 700; font-size: 16px; color: var(--deep, #1E3D47);
      transition: opacity 300ms ease;
    }
    .noni-bubble.hidden { opacity: 0; pointer-events: none; }

    @media (prefers-reduced-motion: reduce) {
      .intro-card, .mechanic-story-sequence, .summary-card { animation: none !important; }
      .noni-fixed { animation: none !important; }
    }
  </style>
</head>
<body>

<img class="scene-bg" src="assets/scene-stage-3-bg.png" alt="" aria-hidden="true"
     onerror="this.style.display='none'">

<header class="top-bar">
  <a href="stage-14-island.html" class="icon-btn" aria-label="חזרה לאי 14">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <div class="title-pill">סֵדֶר אֵירוּעִים</div>
  <div style="width:52px;height:52px;" aria-hidden="true"></div>
</header>

<main class="page-wrap">

  <section id="introSection" class="intro-card">
    <h1 class="intro-title">בַּחֲרוּ רָמָה</h1>
    <p class="intro-sub">סִפּוּר בֵּינוֹנִי אוֹ אָרֹךְ — סַדְּרוּ אֶת הָאֵירוּעִים בַּסֵּדֶר הַנָּכוֹן.</p>
    <div class="level-grid" role="group">
      <button class="level-card" data-level="2" type="button">
        <span class="lc-num">2</span>
        <span class="lc-desc">סִפּוּרִים בֵּינוֹנִיִּים</span>
      </button>
      <button class="level-card" data-level="3" type="button">
        <span class="lc-num">3</span>
        <span class="lc-desc">סִפּוּרִים אֲרֻכִּים</span>
      </button>
    </div>
  </section>

  <section id="gameRoot" style="display:none;"></section>

  <section id="summarySection" class="summary-card" style="display:none;">
    <h1 class="summary-title">סִיַּמְתֶּם!</h1>
    <div class="summary-score" id="summaryScore">— / —</div>
    <p id="summaryMsg" style="color:var(--text-soft, #4D6F78);"></p>
    <div class="summary-actions">
      <button class="summary-btn" id="playAgainBtn" type="button">סֵבֶב חָדָשׁ</button>
      <a class="summary-btn summary-btn--ghost" href="stage-14-island.html">חֲזָרָה לְאִי 14</a>
    </div>
  </section>

</main>

<img class="noni-fixed" id="noniImg" src="assets/noni-idle.png" alt="נוני">
<div class="noni-bubble" id="noniBubble">מָה קָרָה קֹדֶם וּמָה אַחַר כָּךְ?</div>

<script src="js/state.js"></script>
<script src="js/shared/bkt.js"></script>
<script src="js/shared/audio.js"></script>
<script src="js/shared/oral-skill-adapter.js"></script>
<script src="js/templates/mechanic-story-sequence.js"></script>

<script>
  (function () {
    const studentId = localStorage.getItem('avnei-yesod-current-student') || 'local';
    const intro   = document.getElementById('introSection');
    const root    = document.getElementById('gameRoot');
    const summary = document.getElementById('summarySection');
    const score   = document.getElementById('summaryScore');
    const msg     = document.getElementById('summaryMsg');
    const again   = document.getElementById('playAgainBtn');
    const noniImg = document.getElementById('noniImg');
    const noniBub = document.getElementById('noniBubble');

    let currentLevel = null;
    let noniTimer = null;

    function noniSay(text) {
      if (!noniBub) return;
      noniBub.textContent = text;
      noniBub.classList.remove('hidden');
    }
    function noniMood(src, ms) {
      if (!noniImg) return;
      noniImg.src = 'assets/noni-' + src + '.png';
      if (noniTimer) clearTimeout(noniTimer);
      if (ms) noniTimer = setTimeout(() => { noniImg.src = 'assets/noni-idle.png'; }, ms);
    }

    const params = new URLSearchParams(location.search);
    const presetLevel = parseInt(params.get('level'), 10);
    if ([2,3].includes(presetLevel)) startLevel(presetLevel);

    document.querySelectorAll('.level-card').forEach(btn => {
      btn.addEventListener('click', () => startLevel(parseInt(btn.dataset.level, 10)));
    });

    function startLevel(level) {
      currentLevel = level;
      intro.style.display = 'none';
      summary.style.display = 'none';
      root.style.display = '';
      root.innerHTML = '';
      noniMood('idle');
      noniSay('מָה קָרָה קֹדֶם וּמָה אַחַר כָּךְ?');

      window.AvneiMechanicStorySequence.init({
        studentId, level,
        batchSize: 4,
        mountRoot: root,
        onProgress: (p) => {
          if (p.isCorrect) noniMood('happy', 1400);
          else noniMood('thinking', 1400);
        },
        onComplete: (payload) => {
          root.style.display = 'none';
          summary.style.display = '';
          const pct = payload.total > 0 ? Math.round((payload.correct / payload.total) * 100) : 0;
          if (score) score.style.display = 'none'; // בלי ציון מספרי לילד (החלטת מיטל 7.7)
          if (pct >= 70) {
            noniMood('happy', 4000);
            msg.textContent = 'כָּל הַכָּבוֹד! סִדַּרְתֶּם אֶת הַסִּפּוּר!';
            noniSay('סִדַּרְתֶּם אֶת הַסִּפּוּר מַמָּשׁ יָפֶה!');
          } else {
            msg.textContent = 'כִּמְעַט! בּוֹאוּ נְסַדֵּר שׁוּב בְּיַחַד.';
            noniSay('בּוֹאוּ נַקְשִׁיב שׁוּב וּנְסַדֵּר בְּיַחַד.');
          }
        },
      });
      window.AvneiMechanicStorySequence.start();
    }

    again.addEventListener('click', () => {
      noniMood('idle');
      noniSay('מָה קָרָה קֹדֶם וּמָה אַחַר כָּךְ?');
      if (currentLevel) startLevel(currentLevel);
      else { summary.style.display = 'none'; intro.style.display = ''; }
    });
  })();
</script>

</body>
</html>
