<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סיכום אי 3 · אבני יסוד</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Playpen+Sans+Hebrew:wght@500;700;800&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="demo-style.css">
<style>
  .selector {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 14px 18px;
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
    box-shadow: var(--shadow-sm);
  }
  .selector-label {
    font-size: 12px; font-weight: 700;
    color: var(--ink-faded); letter-spacing: 0.05em;
  }
  .selector select {
    font-family: 'Heebo', sans-serif;
    font-size: 14px; font-weight: 600;
    color: var(--ink);
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
  }

  .summary-head {
    background: linear-gradient(135deg, var(--card) 0%, var(--violet-soft) 100%);
    border-radius: var(--radius-lg);
    padding: 26px 28px;
    border: 1px solid var(--lavender);
    box-shadow: var(--shadow);
    margin-bottom: 22px;
  }
  .summary-head-row {
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap; margin-bottom: 14px;
  }
  .summary-avatar {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playpen Sans Hebrew', sans-serif;
    font-size: 30px; font-weight: 800;
    box-shadow: 0 6px 18px rgba(79, 70, 229, 0.25);
  }
  .summary-name {
    font-family: 'Playpen Sans Hebrew', sans-serif;
    font-size: 28px; font-weight: 800; color: var(--ink);
  }
  .summary-profile {
    font-size: 14px; color: var(--ink-soft);
    margin-top: 4px;
  }
  .summary-meta {
    display: flex; gap: 18px; flex-wrap: wrap;
    font-size: 13px; color: var(--ink-soft);
    padding-top: 12px;
    border-top: 1px dashed var(--lavender);
  }
  .summary-meta strong { color: var(--ink); font-family: 'Inter', sans-serif; }

  .progress-rail {
    background: var(--bg-soft);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 22px;
    border: 1px solid var(--line);
  }
  .progress-rail-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
  }
  .progress-rail-label {
    font-size: 12px; font-weight: 800;
    color: var(--ink-faded); letter-spacing: 0.06em;
  }
  .progress-rail-bar {
    height: 12px; border-radius: 999px;
    background: #F1F5F9;
    overflow: hidden;
    display: flex;
  }
  .progress-rail-bar > span {
    height: 100%;
    transition: width 0.6s ease;
  }

  .interpret {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 22px 24px;
    margin-bottom: 22px;
    box-shadow: var(--shadow-sm);
  }
  .interpret-title {
    font-family: 'Playpen Sans Hebrew', sans-serif;
    font-size: 18px; font-weight: 800;
    color: var(--indigo-deep);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .interpret-body {
    font-size: 14.5px; color: var(--ink);
    line-height: 1.65;
  }
  .interpret-body strong { color: var(--indigo); }

  .next-island-banner {
    background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 18px;
    border-right: 4px solid var(--green);
  }
  .next-island-title {
    font-family: 'Playpen Sans Hebrew', sans-serif;
    font-weight: 800; font-size: 17px;
    color: #047857;
    margin-bottom: 4px;
  }
  .next-island-body {
    font-size: 14px; color: #065F46;
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="brand" href="index.html">
    <div class="brand-mark">א</div>
    <div>
      <div class="brand-name">אבני יסוד</div>
      <div class="brand-sub">סיכום אי 3 · 5 משחקונים</div>
    </div>
  </a>
  <div class="topbar-actions">
    <span class="demo-tag">דמו</span>
    <a class="nav-link" href="index.html">שער</a>
    <a class="nav-link" href="morning-board.html">בוקר טוב</a>
  </div>
</header>

<main class="wrap">

  <div class="selector">
    <span class="selector-label">סיכום עבור:</span>
    <select id="student-select" aria-label="תלמיד"></select>
    <span style="margin-right: auto; font-size: 12px; color: var(--ink-faded);">
      בדמו — אפשר לדפדף בין 8 הילדים
    </span>
  </div>

  <div id="content"></div>

  <div class="foot">
    דמו · רגע 02: סיכום אי 3 · מבוסס detectAndRecordFlags של event-logger
  </div>

</main>

<script>
const STATE_URL = 'state.json';
let STATE = null;
const LETTER_ORDER = ['ב', 'ק', 'מ', 'ת', 'ר'];

const FLAG_DESCRIPTIONS = {
  slow_response: { title: 'זמן תגובה איטי', cls: 'gold',
    note: tpl => 'איטיות עקבית במספר אותיות — קריאה לא אוטומטית עדיין.' },
  repeated_hint: { title: 'שימוש חוזר ברמז', cls: 'gold',
    note: tpl => 'נעזר.ה ברמזים מעל הממוצע — אינדיקציה לקושי.' },
  shape_vs_sound_gap: { title: 'פער צורה-צליל', cls: 'violet',
    note: tpl => 'יודע.ת את הצליל, מתקשה בצורה. דורש מעטפת זיכרון-מיון.' },
  find_letter_struggle: { title: 'קושי לאתר אות בתוך מילה', cls: 'violet',
    note: tpl => 'אות בודדת בסדר, בהקשר — קשה. צעד טבעי לקראת אי 5.' },
  level4_drops: { title: 'נפילה ברמת תמיכה 4', cls: 'orange',
    note: tpl => 'גם בתמיכה מוגברת לא הצליח.ה — דורש 1:1.' }
};

function init() {
  fetch(STATE_URL).then(r => r.json()).then(data => {
    STATE = data;
    populateSelector();
    handleUrlChange();
  });
}

function populateSelector() {
  const sel = document.getElementById('student-select');
  STATE.students.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name + ' — ' + s.completed_today.length + '/5 משחקונים';
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    const sid = sel.value;
    history.replaceState(null, '', '?student=' + sid);
    render(sid);
  });
}

function handleUrlChange() {
  const params = new URLSearchParams(window.location.search);
  const sid = params.get('student') || STATE.students[0].id;
  document.getElementById('student-select').value = sid;
  render(sid);
}

function statusClass(s) {
  return { 'mastered': 'mastered', 'near-mastery': 'near', 'in-progress': 'progress', 'needs-review': 'review', 'not-attempted': 'not' }[s] || 'not';
}
function statusLabel(s) {
  return { 'mastered': 'mastery', 'near-mastery': 'קרוב', 'in-progress': 'התקדמות', 'needs-review': 'חזרה', 'not-attempted': 'לא הספיק.ה' }[s] || s;
}

function aggregateFlags(student) {
  const counts = {};
  Object.entries(student.per_letter).forEach(([letter, data]) => {
    (data.flags || []).forEach(f => {
      if (!counts[f]) counts[f] = { count: 0, letters: [] };
      counts[f].count++;
      counts[f].letters.push(letter);
    });
  });
  return Object.entries(counts)
    .sort((a, b) => b[1].count - a[1].count)
    .slice(0, 3)
    .map(([flag, info]) => ({ flag, ...info }));
}

function buildInterpretation(student) {
  const mastered = Object.values(student.per_letter).filter(d => d.status === 'mastered').length;
  const review   = Object.values(student.per_letter).filter(d => d.status === 'needs-review').length;
  const notDone  = Object.values(student.per_letter).filter(d => d.status === 'not-attempted').length;

  if (mastered === 5) {
    return 'כל 5 האותיות במצב mastery — דיוק גבוה, שטף תחת הסף, ללא רמזים. <strong>' + student.name + ' מוכן.ה לעבור לאי 5 (מיזוג CV)</strong>. סשן יציבות נוסף קצר ייצור קונסולידציה ארוכת-טווח.';
  }
  if (mastered >= 3 && notDone === 0) {
    return 'התקדמות יציבה — <strong>' + mastered + ' אותיות עברו mastery</strong>, ' + (5 - mastered) + ' קרובות. סשן אחד-שניים נוספים על האותיות החלשות יסגרו את אי 3. במקביל אפשר לפתוח את אי 5.';
  }
  if (review >= 3) {
    return '<strong>' + review + ' אותיות במצב חזרה</strong> — אי 3 לא מתבסס כרגע. ' + (
      student.tomorrow_plan.teacher_alert
        ? 'יש סף שמצדיק ליווי 1:1 — לא להמשיך אדפטיבי לבד.'
        : 'המערכת מציעה לחזק את האותיות החלשות ברמת פיגום עולה, ולחזור גם לאי 2 (PA) כתשתית.'
    );
  }
  if (notDone >= 2) {
    return '<strong>' + notDone + ' משחקונים לא בוצעו</strong> היום. המערכת תקצה אותם ראשונים מחר, ברמת פיגום שמתאימה ל' + (student.tomorrow_plan.teacher_alert ? 'תמיכה מוגברת' : 'הרמה הממוצעת של ' + student.name) + '.';
  }
  return 'התקדמות באמצע — חלק במצב in-progress, חלק קרוב ל-mastery. עוד סשן יחזק את התמונה. אין דגלים חמורים.';
}

function render(sid) {
  const student = STATE.students.find(s => s.id === sid);
  const root = document.getElementById('content');

  const mastered = Object.values(student.per_letter).filter(d => d.status === 'mastered').length;
  const near = Object.values(student.per_letter).filter(d => d.status === 'near-mastery').length;
  const progress = Object.values(student.per_letter).filter(d => d.status === 'in-progress').length;
  const review = Object.values(student.per_letter).filter(d => d.status === 'needs-review').length;
  const notDone = Object.values(student.per_letter).filter(d => d.status === 'not-attempted').length;

  const topFlags = aggregateFlags(student);
  const plan = student.tomorrow_plan;

  root.innerHTML = `
    <div class="summary-head">
      <div class="summary-head-row">
        <div class="summary-avatar">${student.name.charAt(0)}</div>
        <div style="flex: 1;">
          <div class="summary-name">${student.name}</div>
          <div class="summary-profile">${student.profile_flag}</div>
        </div>
        <span class="chip ${plan.ready_for_island_5 ? 'green' : 'progress'}" style="font-size: 13px; padding: 7px 16px;">
          <span class="chip-dot"></span>
          ${plan.ready_for_island_5 ? 'מוכן.ה לאי 5' : 'נשאר.ת באי 3'}
        </span>
      </div>
      <div class="summary-meta">
        <span>זמן סשן: <strong class="num">${student.total_session_minutes}</strong> דקות</span>
        <span>משחקונים שהושלמו: <strong class="num">${student.completed_today.length}</strong>/5</span>
        <span>נוצר: <strong>${STATE.meta.generated_at.split('T')[0]}</strong></span>
      </div>
    </div>

    <div class="progress-rail">
      <div class="progress-rail-head">
        <span class="progress-rail-label">מצב אי 3 — 5 אותיות</span>
        <span style="font-size: 12.5px; color: var(--ink-soft);">
          ${mastered} mastery · ${near} קרוב · ${progress} התקדמות · ${review} חזרה · ${notDone} לא בוצע
        </span>
      </div>
      <div class="progress-rail-bar">
        ${mastered ? `<span style="width:${mastered*20}%; background: var(--st-mastered);"></span>` : ''}
        ${near     ? `<span style="width:${near*20}%; background: var(--st-near);"></span>` : ''}
        ${progress ? `<span style="width:${progress*20}%; background: var(--st-progress);"></span>` : ''}
        ${review   ? `<span style="width:${review*20}%; background: var(--st-review);"></span>` : ''}
        ${notDone  ? `<span style="width:${notDone*20}%; background: var(--st-not);"></span>` : ''}
      </div>
    </div>

    ${plan.teacher_alert ? `
      <div class="alert">
        <div class="alert-title">⚠ התראת מערכת — תמיכה מוגברת</div>
        <div class="alert-body">${plan.teacher_alert}</div>
      </div>
    ` : ''}

    ${plan.ready_for_island_5 ? `
      <div class="next-island-banner">
        <div class="next-island-title">המערכת ממליצה לפתוח את אי 5 (מיזוג CV)</div>
        <div class="next-island-body">לפי מפת ה-prerequisites של 22 האיים — אי 3 הוא תנאי לאי 5. ${student.name} עומד.ת בסף.</div>
      </div>
    ` : ''}

    <div class="interpret">
      <div class="interpret-title">מה זה אומר?</div>
      <div class="interpret-body">${buildInterpretation(student)}</div>
    </div>

    <div class="section">
      <h2 class="section-title">5 האותיות — מפה מהירה</h2>
      <div class="letter-grid">
        ${LETTER_ORDER.map(l => renderLetterCard(student, l)).join('')}
      </div>
    </div>

    <div class="section">
      <h2 class="section-title">3 הדגלים החזקים שזוהו</h2>
      ${topFlags.length === 0 ? `
        <div class="card" style="display: flex; align-items: center; gap: 10px;">
          <span class="chip green" style="padding: 6px 14px;"><span class="chip-dot"></span> אין דגלים</span>
          <span style="font-size: 13.5px; color: var(--ink-soft);">ההתקדמות נקייה — אין צורך בהתערבות נקודתית.</span>
        </div>
      ` : `
        <div class="flag-list">
          ${topFlags.map(f => {
            const desc = FLAG_DESCRIPTIONS[f.flag] || { title: f.flag, cls: 'violet', note: () => '' };
            return `
              <div class="flag ${desc.cls}">
                <div class="flag-title">${desc.title} <span style="font-weight: 600; opacity: 0.7; font-size: 12.5px;">(ב-${f.letters.join(', ')})</span></div>
                <div>${desc.note(f)}</div>
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>

    <div class="section">
      <h2 class="section-title">מה המערכת מציעה למחר</h2>
      ${renderPlanCard(student)}
    </div>

    <div class="actions-row" style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 22px;">
      <a class="btn btn-primary" href="morning-board.html">← הצג בדשבורד הבוקר</a>
      <a class="btn btn-soft" href="after-game.html?student=${sid}&letter=ב">חזרה למסך אחרי-משחקון</a>
    </div>
  `;
}

function renderLetterCard(student, letter) {
  const data = student.per_letter[letter];
  const game = STATE.meta.games_island3[letter];
  const cls = statusClass(data.status);

  if (data.status === 'not-attempted') {
    return `
      <a class="letter-card ${cls} clickable" href="after-game.html?student=${student.id}&letter=${encodeURIComponent(letter)}" style="text-decoration: none;">
        <div class="letter-glyph">${letter}</div>
        <div class="letter-game">${game.name}</div>
        <div style="font-size: 12.5px; color: var(--ink-faded); padding-top: 6px; border-top: 1px solid var(--line);">
          לא בוצע היום
        </div>
      </a>
    `;
  }

  return `
    <a class="letter-card ${cls} clickable" href="after-game.html?student=${student.id}&letter=${encodeURIComponent(letter)}" style="text-decoration: none; color: inherit;">
      <div class="letter-glyph">${letter}</div>
      <div class="letter-game">${game.name}</div>
      <div class="letter-metric"><span>p(BKT)</span><strong class="num">${data.p_bkt.toFixed(2)}</strong></div>
      <div class="letter-metric"><span>זמן חציון</span><strong class="num">${data.fluency_median_sec.toFixed(1)}שנ'</strong></div>
      <div class="letter-metric"><span>סטטוס</span>
        <span class="chip ${cls}" style="font-size: 11px; padding: 2px 8px;">${statusLabel(data.status)}</span>
      </div>
    </a>
  `;
}

function renderPlanCard(student) {
  const plan = student.tomorrow_plan;
  return `
    <div class="plan-card">
      <div class="plan-head">
        <div class="plan-title">תכנית למחר — ${student.name}</div>
        <span class="chip violet"><span class="chip-dot"></span> ${plan.total_minutes_estimated} דקות</span>
      </div>
      <div class="plan-items">
        <div class="plan-block">
          <div class="plan-block-label">תרגול ראשי</div>
          <div class="plan-block-value">
            אי ${plan.primary_island} · ${plan.primary_items} פריטים · רמה ${plan.primary_level}
          </div>
          <div style="font-size: 13px; color: var(--ink-soft); margin-top: 4px;">
            מיקוד: <strong style="color: var(--ink);">${plan.primary_focus}</strong>
          </div>
          ${plan.primary_envelope ? `<div style="font-size: 12px; color: var(--ink-faded); margin-top: 4px;">מעטפת: ${plan.primary_envelope}</div>` : ''}
        </div>
        ${plan.secondary_island ? `
          <div class="plan-block">
            <div class="plan-block-label">תרגול משני</div>
            <div class="plan-block-value">
              אי ${plan.secondary_island} · ${plan.secondary_items} פריטים · רמה ${plan.secondary_level}
            </div>
            <div style="font-size: 13px; color: var(--ink-soft); margin-top: 4px;">
              מיקוד: <strong style="color: var(--ink);">${plan.secondary_focus}</strong>
            </div>
          </div>
        ` : `
          <div class="plan-block" style="opacity: 0.7;">
            <div class="plan-block-label">תרגול משני</div>
            <div class="plan-block-value" style="font-weight: 400; color: var(--ink-soft);">
              לא נדרש — תרגול ראשי מקיף
            </div>
          </div>
        `}
      </div>
      <div class="plan-rationale">
        <strong>למה ההצעה הזאת:</strong> ${plan.rationale}
      </div>
      ${plan.booklet_suggestion ? `
        <div style="margin-top: 12px; font-size: 13.5px; color: var(--indigo-deep);">
          📖 <strong>חוברת אתגר:</strong> ${plan.booklet_suggestion}
        </div>
      ` : ''}
    </div>
  `;
}

init();
</script>

</body>
</html>
