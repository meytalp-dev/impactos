<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אי שמות עצם · אבני יסוד</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Playpen+Sans+Hebrew:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink-soft: #4a5070;
    --bg-top: #fef9ee;
    --bg-bottom: #fde7d4;
    --card: #ffffff;
    --accent: #6b5cff;
    --accent-soft: #ece8ff;
    --pink: #e84a8a;
    --pink-soft: #fde0eb;
    --green: #2e8b6e;
    --gold: #d4a341;
    --border: rgba(26,26,46,0.08);
    --shadow: 0 4px 24px rgba(26,26,46,0.06);
    --shadow-lg: 0 12px 40px rgba(26,26,46,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    color: var(--ink); line-height: 1.5; min-height: 100vh;
  }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar a { color: var(--ink-soft); text-decoration: none; font-size: 14px; font-weight: 600; }
  .topbar h1 { font-family: 'Playpen Sans Hebrew', sans-serif; font-size: 18px; font-weight: 800; }
  .topbar .spacer { width: 80px; }

  .wrap { max-width: 540px; margin: 0 auto; padding: 24px 20px 60px; }

  .island-hero {
    text-align: center; margin-bottom: 32px;
  }
  .island-hero h2 {
    font-family: 'Playpen Sans Hebrew', sans-serif;
    font-size: 32px; font-weight: 800; color: var(--ink); margin-bottom: 6px;
  }
  .island-hero p { color: var(--ink-soft); font-size: 16px; margin-bottom: 24px; }

  .companion-big {
    width: 180px; height: 196px;
    margin: 0 auto 16px;
    display: block;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .greeting {
    text-align: center; font-family: 'Playpen Sans Hebrew', sans-serif;
    font-size: 18px; color: var(--ink); padding: 14px 24px;
    background: var(--card); border-radius: 999px;
    display: inline-block; box-shadow: var(--shadow);
    margin: 0 auto 32px; position: relative;
  }
  .greeting::before {
    content: ""; position: absolute; top: -10px; right: 40px;
    width: 18px; height: 18px; background: var(--card); transform: rotate(45deg);
    box-shadow: -2px -2px 4px rgba(0,0,0,0.04);
  }
  .greeting-wrap { text-align: center; }

  .section-title {
    font-family: 'Playpen Sans Hebrew', sans-serif;
    font-size: 20px; font-weight: 800; color: var(--ink);
    margin-bottom: 16px; padding-right: 4px;
  }

  .envelopes { display: flex; flex-direction: column; gap: 14px; }

  .envelope {
    background: var(--card); border-radius: 22px; padding: 22px 20px;
    border: 2px solid var(--border); box-shadow: var(--shadow);
    text-decoration: none; color: inherit;
    display: flex; align-items: center; gap: 16px;
    transition: all 0.2s ease-out;
    -webkit-tap-highlight-color: transparent;
  }
  .envelope.active {
    border-color: var(--pink);
    background: linear-gradient(135deg, #fff 0%, #fff8fb 100%);
  }
  .envelope.active:hover, .envelope.active:focus-visible {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    outline: none;
  }
  .envelope.locked { opacity: 0.55; cursor: default; }
  .envelope.locked:hover { transform: none; }

  .env-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playpen Sans Hebrew', sans-serif; font-size: 22px; font-weight: 800;
    flex-shrink: 0;
  }
  .envelope.active .env-icon { background: var(--pink-soft); color: var(--pink); }
  .envelope.locked .env-icon { background: #f0eae0; color: #94886e; }

  .env-text { flex: 1; }
  .env-text h3 {
    font-family: 'Playpen Sans Hebrew', sans-serif;
    font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 2px;
  }
  .env-text p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.4; }

  .env-cta {
    background: var(--pink); color: #fff; font-weight: 800;
    padding: 8px 16px; border-radius: 999px; font-size: 14px;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(232,74,138,0.35);
  }
  .envelope.locked .env-cta {
    background: #c9bda5; color: #fff; box-shadow: none;
    font-weight: 600; font-size: 12px;
  }

  .footer-note {
    text-align: center; color: var(--ink-soft); font-size: 13px;
    margin-top: 32px;
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="map.html">← למפה</a>
  <h1 id="islandTitle">אי</h1>
  <span class="spacer"></span>
</div>

<div class="wrap">

  <div class="island-hero">
    <div class="companion-big" id="companionBig" aria-label="האבן שלי"></div>
    <div class="greeting-wrap">
      <div class="greeting" id="greeting">בואי נכיר את האי שלי!</div>
    </div>
    <h2 id="islandName">שמות עצם</h2>
    <p id="islandSub">דברים שאני רואה — אבא, בית, חתול, ים</p>
  </div>

  <h3 class="section-title">איך נתחיל?</h3>
  <div class="envelopes" id="envelopes"></div>

  <p class="footer-note">3 דרכים לתרגל את האי הזה. נתחיל מהראשונה.</p>

</div>

<script src="data/islands.js"></script>
<script src="data/companion.js"></script>
<script>
  // Parse query
  const params = new URLSearchParams(window.location.search);
  const catId = params.get('cat') || 'nouns';
  const island = window.AVNEI_ISLANDS.find(i => i.id === catId);

  if (!island) {
    document.querySelector('.wrap').innerHTML = '<p>אי לא נמצא. <a href="map.html">חזרה למפה</a></p>';
  } else {
    document.getElementById('islandTitle').textContent = 'אי ' + island.name;
    document.getElementById('islandName').textContent = island.name;
    document.getElementById('islandSub').textContent = island.short;

    // Mount big companion
    const big = Companion.mount(document.getElementById('companionBig'), { size: 180 });
    // Click stone = cheer
    big.el.addEventListener('click', () => Companion.setState(big.el, 'cheer'));

    // Envelope cards
    const envelopes = [
      {
        id: 'tap', short: 'מעטפה 1',
        name: 'להתאים מילים',
        desc: 'שומעים מילה — בוחרים את הכרטיס הנכון מתוך 4',
        href: 'envelope-tap.html?cat=' + catId,
        active: true
      },
      {
        id: 'drag', short: 'מעטפה 2',
        name: 'לבנות מילים',
        desc: 'גוררים אריחים כדי לבנות מילה שלמה',
        href: '#', active: false
      },
      {
        id: 'shared-reading', short: 'מעטפה 3',
        name: 'סיפור באי',
        desc: 'קוראים יחד סיפור קצר עם הקלטה',
        href: '#', active: false
      }
    ];

    const envList = document.getElementById('envelopes');
    envelopes.forEach((env, i) => {
      const card = document.createElement(env.active ? 'a' : 'div');
      card.className = 'envelope ' + (env.active ? 'active' : 'locked');
      if (env.active) card.href = env.href;
      card.innerHTML = `
        <div class="env-icon">${i+1}</div>
        <div class="env-text">
          <h3>${env.name}</h3>
          <p>${env.desc}</p>
        </div>
        <span class="env-cta">${env.active ? 'התחילי' : 'בקרוב'}</span>
      `;
      envList.appendChild(card);
    });

    // Switch greeting after 2.5s
    setTimeout(() => {
      document.getElementById('greeting').textContent = 'נתחיל?';
    }, 2500);
  }
</script>
</body>
</html>
