<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F7FBFA">
  <title>סטודיו תוכן · אבני יסוד</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/studio.css?v=1">
</head>
<body class="studio-body">

  <header class="studio-header" role="banner">
    <div class="studio-brand">
      <span class="studio-brand-mark" aria-hidden="true">🪸</span>
      <div class="studio-brand-text">
        <h1 class="studio-brand-title">סטודיו תוכן</h1>
        <p class="studio-brand-sub">בנייה והתאמה לכיתה שלך · אבני יסוד</p>
      </div>
    </div>

    <div class="studio-header-meta">
      <span class="studio-teacher-name" id="studioTeacherName">מורה</span>
      <button class="studio-link-btn" id="studioBackBtn" type="button">חזרה לדשבורד</button>
    </div>
  </header>

  <main class="studio-main" id="studioMain">
    <section class="studio-wizard" id="studioWizard" aria-label="בניית פריט חדש">
      <!-- wizard.js מטפל ברינדור -->
    </section>

    <aside class="studio-preview" id="studioPreview" aria-label="תצוגה מקדימה במצב תלמידה">
      <!-- preview.js מטפל ברינדור -->
    </aside>
  </main>

  <!-- Toast host -->
  <div class="studio-toast-host" id="studioToastHost" aria-live="polite" aria-atomic="true"></div>

  <!-- Modal host (errors, help, feedback, tour) -->
  <div class="studio-modal-host" id="studioModalHost" hidden></div>

  <!-- Floating feedback widget -->
  <button class="studio-feedback-fab" id="studioFeedbackFab" type="button" aria-label="ספרי לנו">
    <span aria-hidden="true">💬</span>
    <span>ספרי לנו</span>
  </button>

  <!-- Pipeline modules (Pipeline agent territory; defer = load in order) -->
  <script src="js/studio/metadata.js" defer></script>
  <script src="js/studio/auto-tagger.js" defer></script>
  <script src="js/studio/niqud-client.js" defer></script>
  <script src="js/studio/tts-batch.js" defer></script>
  <script src="js/studio/validator-pipeline.js" defer></script>
  <script src="js/studio/local-store.js" defer></script>
  <script src="js/studio/_pipeline-real.js" defer></script>
  <!-- UI layer (this agent) -->
  <script src="js/studio/_shared.js" defer></script>
  <script src="js/studio/validator-ui.js" defer></script>
  <script src="js/studio/wizard.js" defer></script>
  <script src="js/studio/preview.js" defer></script>
  <script src="js/studio/feedback.js" defer></script>
</body>
</html>
