<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<meta name="robots" content="noindex, nofollow">
<title>אימות קרנות פילנתרופיות · ישראל</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7f8;
    --panel: #ffffff;
    --ink: #102a33;
    --ink-2: #4b5d63;
    --line: #e3e8ea;
    --line-2: #d6dee1;
    --teal: #0f766e;
    --teal-soft: #ccfbf1;
    --green: #15803d;
    --green-soft: #dcfce7;
    --red: #b91c1c;
    --red-soft: #fee2e2;
    --amber: #b45309;
    --amber-soft: #fef3c7;
    --blue: #1d4ed8;
    --blue-soft: #dbeafe;
    --shadow: 0 1px 2px rgba(16,42,51,.04), 0 8px 24px rgba(16,42,51,.06);
    --touch: 56px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
  }
  body { padding-bottom: 96px; }

  /* ---- sticky header ---- */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.96);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 12px 14px 10px;
  }
  .header h1 {
    margin: 0 0 8px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 .total {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
  }
  .progress {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .stat {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px 8px;
    text-align: center;
  }
  .stat b {
    display: block;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat span {
    font-size: 11px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .stat.approved b { color: var(--green); }
  .stat.rejected b { color: var(--red); }
  .stat.review b { color: var(--amber); }
  .stat.left b { color: var(--ink); }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1 1 100%;
    min-width: 0;
  }
  .search-wrap input {
    width: 100%;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--line-2);
    background: #fff;
    font: inherit;
    font-size: 15px;
    padding: 0 40px 0 14px;
    color: var(--ink);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-wrap input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(15,118,110,.12);
  }
  .search-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-2);
    pointer-events: none;
  }
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 2px 0;
    margin: 0 -14px;
    padding-left: 14px; padding-right: 14px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    height: 36px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--line-2);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: background .15s, border-color .15s, color .15s;
  }
  .chip:active { transform: scale(0.97); }
  .chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }
  .chip .count {
    font-size: 12px;
    padding: 1px 6px;
    border-radius: 999px;
    background: rgba(0,0,0,.06);
    font-weight: 600;
  }
  .chip.active .count { background: rgba(255,255,255,.2); color: #fff; }

  /* ---- list ---- */
  .list {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 720px;
    margin: 0 auto;
  }
  .section-hdr {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-2);
    text-transform: none;
    letter-spacing: 0.01em;
    padding: 12px 4px 4px;
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--bg) 75%, transparent);
    z-index: 1;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    box-shadow: var(--shadow);
    transition: border-color .15s;
  }
  .card.s-approved { border-color: #86efac; background: linear-gradient(180deg, #f0fdf4, #fff); }
  .card.s-rejected { border-color: #fca5a5; background: linear-gradient(180deg, #fef2f2, #fff); }
  .card.s-review   { border-color: #fcd34d; background: linear-gradient(180deg, #fffbeb, #fff); }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .card-name {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    margin: 0;
    word-break: break-word;
  }
  .badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--bg);
    color: var(--ink-2);
    border: 1px solid var(--line);
    white-space: nowrap;
  }
  .badge.sheet-main { background: var(--teal-soft); color: #115e59; border-color: #99f6e4; }
  .badge.sheet-atlas { background: var(--blue-soft); color: #1e3a8a; border-color: #bfdbfe; }
  .badge.sheet-endowments { background: #fde68a; color: #78350f; border-color: #fbbf24; }
  .badge.status-approved { background: var(--green-soft); color: var(--green); border-color: #86efac; }
  .badge.status-rejected { background: var(--red-soft); color: var(--red); border-color: #fca5a5; }
  .badge.status-review   { background: var(--amber-soft); color: var(--amber); border-color: #fcd34d; }
  .badge.dup { background: #fce7f3; color: #9d174d; border-color: #fbcfe8; }
  .badge.kind-open_call        { background: #dcfce7; color: #15803d; border-color: #86efac; }
  .badge.kind-open_call_likely { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
  .badge.kind-direct           { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .badge.kind-special          { background: #ede9fe; color: #6d28d9; border-color: #ddd6fe; }
  .badge.kind-inactive         { background: #1e293b; color: #cbd5e1; border-color: #334155; }
  .badge.kind-unknown          { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }

  .desc {
    font-size: 14px;
    color: var(--ink-2);
    margin: 8px 0 12px;
    line-height: 1.55;
    word-break: break-word;
  }
  .desc.collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .expand-btn {
    background: transparent;
    border: none;
    color: var(--teal);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 0;
    cursor: pointer;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 0 0 12px;
  }
  .link {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 12px;
    border-radius: 10px;
    background: #f1f5f9;
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--line);
    white-space: nowrap;
  }
  .link:active { transform: scale(0.97); }
  .link.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
  .link.search { background: var(--blue-soft); color: var(--blue); border-color: #bfdbfe; }
  .link.callto { background: var(--green); color: #fff; border-color: var(--green); }
  .link svg { width: 14px; height: 14px; }

  .why {
    font-size: 13px;
    color: var(--ink-2);
    margin: 6px 0 10px;
    padding: 8px 10px;
    background: #f8fafc;
    border-right: 3px solid var(--teal);
    border-radius: 4px;
    line-height: 1.5;
    word-break: break-word;
  }
  .why.from-web { border-right-color: #8b5cf6; }

  .auto-note {
    margin: 6px 0 10px;
    padding: 8px 10px;
    background: #fff7ed;
    border-right: 3px solid #f97316;
    border-radius: 4px;
    font-size: 13px;
    color: #7c2d12;
    line-height: 1.5;
    word-break: break-word;
  }
  .auto-note .label {
    font-weight: 700;
    color: #9a3412;
    margin-left: 4px;
  }

  .banner {
    background: linear-gradient(135deg, #f0fdfa, #ecfeff);
    border: 1px solid #99f6e4;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .banner-title {
    font-size: 15px;
    font-weight: 700;
    color: #115e59;
  }
  .banner-body {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .banner-body b { color: var(--ink); }
  .banner-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .banner-actions button {
    height: 40px;
    padding: 0 14px;
    border-radius: 10px;
    border: 1px solid #14b8a6;
    background: #fff;
    color: #115e59;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .banner-actions button.primary { background: var(--teal); color: #fff; }
  .banner-actions button:active { transform: scale(0.97); }

  .details {
    border-top: 1px dashed var(--line);
    margin-top: 10px;
    padding-top: 10px;
  }
  .details-toggle {
    background: transparent;
    border: none;
    color: var(--ink-2);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 0;
    width: 100%;
    text-align: right;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .details-body {
    display: none;
    padding-top: 6px;
  }
  .details-body.open { display: block; }
  .detail-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 13px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .k { color: var(--ink-2); font-weight: 600; }
  .detail-row .v { color: var(--ink); word-break: break-word; }

  /* ---- actions ---- */
  .actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 12px;
  }
  .act {
    height: var(--touch);
    border-radius: 12px;
    border: 1px solid var(--line-2);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: transform .08s, background .15s, border-color .15s, color .15s;
  }
  .act:active { transform: scale(0.96); }
  .act.approve { color: var(--green); border-color: #86efac; }
  .act.reject  { color: var(--red);   border-color: #fca5a5; }
  .act.review  { color: var(--amber); border-color: #fcd34d; }

  .card.s-approved .act.approve { background: var(--green); color: #fff; border-color: var(--green); }
  .card.s-rejected .act.reject  { background: var(--red);   color: #fff; border-color: var(--red); }
  .card.s-review   .act.review  { background: var(--amber); color: #fff; border-color: var(--amber); }

  .note-wrap {
    margin-top: 8px;
  }
  .note-wrap textarea {
    width: 100%;
    min-height: 44px;
    border-radius: 10px;
    border: 1px solid var(--line-2);
    background: #fff;
    font: inherit;
    font-size: 13px;
    padding: 8px 12px;
    resize: vertical;
    outline: none;
    color: var(--ink);
  }
  .note-wrap textarea:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(15,118,110,.12);
  }

  /* ---- bottom bar ---- */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,.96);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    border-top: 1px solid var(--line);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    z-index: 60;
  }
  .bottom-bar button {
    flex: 1;
    height: 44px;
    min-width: 0;
    padding: 0 8px;
    border-radius: 12px;
    border: 1px solid var(--line-2);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #reset { flex: 0 0 44px; padding: 0; }
  .bottom-bar button.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
  .bottom-bar button:active { transform: scale(0.97); }

  .empty {
    text-align: center;
    color: var(--ink-2);
    padding: 60px 20px;
    font-size: 14px;
  }

  /* ---- undo toast ---- */
  .toast {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 8px);
    left: 50%;
    transform: translate(-50%, -120%);
    z-index: 100;
    background: var(--ink);
    color: #fff;
    border-radius: 999px;
    padding: 0 10px 0 18px;
    height: 44px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    transition: transform .22s cubic-bezier(.2,.7,.2,1);
    max-width: 92vw;
  }
  .toast.show { transform: translate(-50%, 0); }
  .toast .undo-btn {
    height: 32px;
    padding: 0 14px;
    border-radius: 999px;
    border: 0;
    background: rgba(255,255,255,.15);
    color: #fff;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .toast .undo-btn:active { background: rgba(255,255,255,.28); }

  /* tablet+ */
  @media (min-width: 720px) {
    .header h1 { font-size: 20px; }
    .progress { grid-template-columns: repeat(4, auto); justify-content: start; }
    .stat { padding: 8px 14px; }
    .stat b { font-size: 20px; }
    .actions { grid-template-columns: repeat(3, auto); justify-content: start; }
    .act { padding: 0 24px; min-width: 130px; }
    .detail-row { grid-template-columns: 140px 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>
    <span>אימות קרנות פילנתרופיות</span>
    <span class="total" id="total-tag">…</span>
  </h1>
  <div class="progress">
    <div class="stat left"><b id="stat-left">0</b><span>נשארו</span></div>
    <div class="stat approved"><b id="stat-approved">0</b><span>אומתו</span></div>
    <div class="stat review"><b id="stat-review">0</b><span>לבדוק</span></div>
    <div class="stat rejected"><b id="stat-rejected">0</b><span>נפסלו</span></div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <input id="search" type="search" placeholder="חיפוש לפי שם, תיאור, תחום…" autocomplete="off">
      <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
  </div>
  <div class="filters" id="filters">
    <button class="chip active" data-filter="todo">לא נבדק <span class="count" id="c-todo">0</span></button>
    <button class="chip" data-filter="all">הכל <span class="count" id="c-all">0</span></button>
    <button class="chip" data-filter="approved">✅ אומת <span class="count" id="c-approved">0</span></button>
    <button class="chip" data-filter="review">🔬 לבדוק <span class="count" id="c-review">0</span></button>
    <button class="chip" data-filter="rejected">❌ נפסל <span class="count" id="c-rejected">0</span></button>
  </div>
  <div class="filters" id="kind-filters" style="margin-top:6px">
    <button class="chip active" data-kind="all">כל הסוגים</button>
    <button class="chip" data-kind="open_call">🟢 קול קורא <span class="count" id="k-open_call">0</span></button>
    <button class="chip" data-kind="direct">🔴 פנייה ישירה <span class="count" id="k-direct">0</span></button>
    <button class="chip" data-kind="special">🟣 הקדש <span class="count" id="k-special">0</span></button>
    <button class="chip" data-kind="inactive">⚫ סגורה <span class="count" id="k-inactive">0</span></button>
    <button class="chip" data-kind="unknown">⚪ לא ברור <span class="count" id="k-unknown">0</span></button>
  </div>
</header>

<div class="list" style="padding-bottom:0">
  <div id="auto-banner" class="banner" style="display:none">
    <div class="banner-title">🤖 יש לי המלצות אוטומטיות</div>
    <div class="banner-body" id="auto-banner-body"></div>
    <div class="banner-actions">
      <button class="primary" id="auto-apply-all">החל הכל</button>
      <button id="auto-apply-rejects">החל רק דחיות אוטומטיות</button>
      <button id="auto-dismiss">לא, אעבור ידנית</button>
    </div>
  </div>
</div>
<main class="list" id="list"></main>

<div class="toast" id="toast" role="status" aria-live="polite">
  <span id="toast-text">אומת</span>
  <button class="undo-btn" id="toast-undo">ביטול</button>
</div>

<nav class="bottom-bar">
  <button id="import-json" title="ייבוא JSON של החלטות קודמות">📥 ייבוא</button>
  <button id="export-csv">📊 CSV</button>
  <button id="export-approved" class="primary">⭐ אומתו</button>
  <button id="export-claude" title="ייצוא JSON לקלוד קוד">🤖 לקלוד</button>
  <button id="reset" title="אפס">↺</button>
</nav>
<input type="file" id="import-file" accept=".json,.csv" style="display:none">

    "phone": "",

<script>
(function(){
  const RAW = JSON.parse(document.getElementById('data').textContent);
  const STORAGE_KEY = 'foundations-verification-v1';
  const state = loadState();
  let currentFilter = 'todo';
  let currentKind = 'all';
  let currentQuery = '';
  let renderTimeout = null;

  const KIND_LABEL = {
    open_call:        '🟢 קול קורא',
    open_call_likely: '🟡 כנראה קול קורא',
    direct:           '🔴 פנייה ישירה',
    special:          '🟣 הקדש',
    inactive:         '⚫ סגורה / לא רלוונטית',
    unknown:          '⚪ לא ברור'
  };

  // section ordering — preserve Excel order
  const SECTION_ORDER = [];
  RAW.forEach(r => {
    if (!SECTION_ORDER.includes(r._section)) SECTION_ORDER.push(r._section);
  });

  function loadState() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch { return {}; }
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function matchesQuery(item, q) {
    if (!q) return true;
    const hay = [item.name, item.description, item.purpose, item.area, item.focus, item.criteria, item.website, item.email, item._section]
      .filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  }

  function matchesFilter(item) {
    if (currentKind !== 'all' && item._kind !== currentKind) return false;
    const s = state[item._id]?.status;
    switch (currentFilter) {
      case 'all': return true;
      case 'todo': return !s;
      case 'approved': return s === 'approved';
      case 'rejected': return s === 'rejected';
      case 'review':   return s === 'review';
      default: return true;
    }
  }

  function updateCounts() {
    const counts = { all: RAW.length, todo: 0, approved: 0, rejected: 0, review: 0 };
    const kinds = { open_call: 0, open_call_likely: 0, direct: 0, special: 0, inactive: 0, unknown: 0 };
    RAW.forEach(r => {
      const s = state[r._id]?.status;
      if (!s) counts.todo++;
      else counts[s]++;
      if (kinds[r._kind] !== undefined) kinds[r._kind]++;
    });
    document.getElementById('c-all').textContent = counts.all;
    document.getElementById('c-todo').textContent = counts.todo;
    document.getElementById('c-approved').textContent = counts.approved;
    document.getElementById('c-rejected').textContent = counts.rejected;
    document.getElementById('c-review').textContent = counts.review;
    Object.entries(kinds).forEach(([k, v]) => {
      const el = document.getElementById('k-' + k);
      if (el) el.textContent = v;
    });

    document.getElementById('stat-left').textContent = counts.todo;
    document.getElementById('stat-approved').textContent = counts.approved;
    document.getElementById('stat-rejected').textContent = counts.rejected;
    document.getElementById('stat-review').textContent = counts.review;
    document.getElementById('total-tag').textContent = `${counts.all - counts.todo} / ${counts.all}`;
  }

  function googleSearchUrl(name) {
    return 'https://www.google.com/search?q=' + encodeURIComponent(name + ' קרן פילנתרופית');
  }

  function ensureUrl(u) {
    if (!u) return null;
    u = String(u).trim();
    if (!u) return null;
    if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
    return u;
  }

  function escape(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  const SHEET_LABEL = {
    main: 'קובץ ראשי',
    atlas: 'אטלס קרנות',
    endowments: 'הקדש ישראלי',
  };

  function detailRows(item) {
    // unified field list, only show present ones
    const fields = [
      ['phone', '☎️ טלפון'],
      ['email', '✉️ אימייל'],
      ['contact', '👤 איש קשר'],
      ['area', '🎯 תחום פעילות'],
      ['focus', '🎯 תחומי מיקוד'],
      ['target', '👥 קהל יעד'],
      ['criteria', '✅ תבחיני זכאות'],
      ['purpose', '🎯 מטרת ההקדש'],
      ['source', '📁 סוג / מקור'],
      ['status', '📋 סטטוס פנייה'],
      ['how_to_apply', '📨 דרך פנייה'],
      ['year', '📅 שנת הקמה'],
      ['founders', '👨‍💼 מייסדים'],
      ['financial', '💰 היקף כספי'],
      ['assets', '💰 יתרת נכסים'],
      ['categories', '🏷️ קטגוריות'],
      ['trustee', '⚖️ נאמן'],
      ['contact_info', '📞 פרטי קשר'],
      ['other_sources', '🔗 מקורות נוספים'],
      ['relevance', '🇮🇱 רלוונטיות'],
      ['donates_to_israel', '🇮🇱 תורמת לישראל'],
      ['research_status', '🔬 סטטוס מחקר'],
    ];
    let html = '';
    for (const [k, label] of fields) {
      const v = item[k];
      if (v && String(v).trim()) {
        html += `<div class="detail-row"><div class="k">${escape(label)}</div><div class="v">${escape(v)}</div></div>`;
      }
    }
    return html;
  }

  function cardHtml(item) {
    const st = state[item._id]?.status || '';
    const note = state[item._id]?.note || '';
    // Prefer the workflow-discovered website if original data was empty
    const url = ensureUrl(item.website || item._found_website || '');
    const applyUrl = item._active_call_url || item._found_apply_url || '';
    const email = item.email || item._found_email || '';
    const phone = item.phone || item._found_phone || '';
    const desc = item.description || item.purpose || '';
    const longDesc = desc.length > 180;
    const isDup = item._is_duplicate;

    return `
    <article class="card ${st ? 's-' + st : ''}" data-id="${item._id}">
      <div class="card-head">
        <h2 class="card-name">${escape(item.name)}</h2>
      </div>
      <div class="badges">
        ${item._kind ? `<span class="badge kind-${item._kind}" title="${escape(item._kind_reason || '')}">${escape(KIND_LABEL[item._kind] || item._kind)}</span>` : ''}
        <span class="badge sheet-${item._sheet}">${SHEET_LABEL[item._sheet] || item._sheet}</span>
        <span class="badge">${escape(item._section || '')}</span>
        ${item.relevance ? `<span class="badge">${escape(item.relevance)}</span>` : ''}
        ${isDup ? `<span class="badge dup">כפילות</span>` : ''}
        ${st === 'approved' ? `<span class="badge status-approved">✅ אומת</span>` : ''}
        ${st === 'rejected' ? `<span class="badge status-rejected">❌ נפסל</span>` : ''}
        ${st === 'review'   ? `<span class="badge status-review">🔬 לבדוק</span>` : ''}
      </div>
      ${item._kind_reason ? `<div class="why ${item._kind_source === 'web_research' ? 'from-web' : ''}">${escape(item._kind_reason)}</div>` : ''}
      ${item._auto_note && !st ? `<div class="auto-note"><span class="label">🤖 בדיקה אוטומטית:</span>${escape(item._auto_note)}${item._auto_status ? ` <b>· המלצה: ${item._auto_status === 'rejected' ? 'דחיה' : 'בדיקה ידנית'}</b>` : ''}</div>` : ''}
      ${desc ? `<p class="desc ${longDesc ? 'collapsed' : ''}">${escape(desc)}</p>${longDesc ? `<button class="expand-btn" data-action="expand">הצג עוד ▾</button>` : ''}` : ''}

      <div class="links">
        ${applyUrl ? `<a class="link callto" href="${escape(ensureUrl(applyUrl))}" target="_blank" rel="noopener noreferrer">🟢 דף הגשה</a>` : ''}
        ${url ? `<a class="link primary" href="${escape(url)}" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          פתח אתר${item._found_website && !item.website ? ' (נמצא ע״י קלוד)' : ''}
        </a>` : ''}
        ${item._evidence_url && item._evidence_url !== applyUrl && item._evidence_url !== item.website ? `<a class="link" href="${escape(ensureUrl(item._evidence_url))}" target="_blank" rel="noopener noreferrer">🔗 ראיה</a>` : ''}
        <a class="link search" href="${googleSearchUrl(item.name)}" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          חיפוש בגוגל
        </a>
        ${phone ? `<a class="link" href="tel:${escape(phone.replace(/\s/g,''))}">📞 ${escape(phone)}</a>` : ''}
        ${email ? `<a class="link" href="mailto:${escape(email)}">✉️ ${escape(email)}</a>` : ''}
      </div>

      <div class="details">
        <button class="details-toggle" data-action="toggle-details">
          <span>פרטים נוספים</span><span class="caret">▾</span>
        </button>
        <div class="details-body">${detailRows(item)}</div>
      </div>

      <div class="actions">
        <button class="act approve" data-action="approve">✅ אמת</button>
        <button class="act review"  data-action="review">🔬 לבדוק שוב</button>
        <button class="act reject"  data-action="reject">❌ פסול</button>
      </div>

      <div class="note-wrap">
        <textarea data-action="note" placeholder="הערה (אופציונלי)">${escape(note)}</textarea>
      </div>
    </article>`;
  }

  function render() {
    const list = document.getElementById('list');
    const q = currentQuery;
    // group by section
    const groups = new Map();
    for (const item of RAW) {
      if (!matchesQuery(item, q)) continue;
      if (!matchesFilter(item)) continue;
      if (!groups.has(item._section)) groups.set(item._section, []);
      groups.get(item._section).push(item);
    }

    let html = '';
    let visibleCount = 0;
    for (const sec of SECTION_ORDER) {
      const items = groups.get(sec);
      if (!items || !items.length) continue;
      html += `<div class="section-hdr">${escape(sec)} · ${items.length}</div>`;
      for (const item of items) {
        html += cardHtml(item);
        visibleCount++;
      }
    }
    if (!visibleCount) {
      html = `<div class="empty">אין תוצאות. נסי לסנן או לחפש משהו אחר.</div>`;
    }
    list.innerHTML = html;
    updateCounts();
  }

  // ---- Undo toast ----
  const toastEl = document.getElementById('toast');
  const toastText = document.getElementById('toast-text');
  const toastUndo = document.getElementById('toast-undo');
  let toastTimer = null;
  let undoSnapshot = null; // { id, prev: {status, note, ts} }

  const STATUS_LABEL = {
    approved: '✅ אומתה',
    rejected: '❌ נפסלה',
    review:   '🔬 סומנה לבדיקה'
  };

  function showToast(label) {
    toastText.textContent = label;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 4000);
  }
  function hideToast() {
    toastEl.classList.remove('show');
    undoSnapshot = null;
  }
  toastUndo.addEventListener('click', () => {
    if (!undoSnapshot) return hideToast();
    const { id, prev } = undoSnapshot;
    if (prev === null) delete state[id];
    else state[id] = { ...prev };
    saveState();
    undoSnapshot = null;
    hideToast();
    render();
  });

  function setStatus(id, status) {
    const prev = state[id] ? JSON.parse(JSON.stringify(state[id])) : null;
    if (!state[id]) state[id] = {};
    const wasStatus = state[id].status;
    const isToggleOff = wasStatus === status;
    if (isToggleOff) {
      delete state[id].status;
      if (!state[id].note) delete state[id];
    } else {
      state[id].status = status;
      state[id].ts = Date.now();
    }
    saveState();

    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (!card) { updateCounts(); return; }
    const item = RAW.find(r => r._id === id);

    // Set up undo for non-toggle-off actions
    if (!isToggleOff) {
      undoSnapshot = { id, prev };
      showToast(STATUS_LABEL[status] || 'נשמר');
    }

    // If card no longer matches the active filter — slide it out and remove
    if (!matchesFilter(item)) {
      card.style.transition = 'transform .25s ease, opacity .25s ease, margin .25s ease, max-height .3s ease, padding .25s ease';
      card.style.maxHeight = card.offsetHeight + 'px';
      requestAnimationFrame(() => {
        card.style.opacity = '0';
        card.style.transform = 'translateX(-12px)';
        card.style.maxHeight = '0';
        card.style.marginTop = '0';
        card.style.marginBottom = '0';
        card.style.paddingTop = '0';
        card.style.paddingBottom = '0';
        card.style.borderWidth = '0';
      });
      setTimeout(() => {
        const prevHdr = card.previousElementSibling;
        card.remove();
        if (prevHdr && prevHdr.classList.contains('section-hdr')) {
          const next = prevHdr.nextElementSibling;
          if (!next || next.classList.contains('section-hdr')) prevHdr.remove();
        }
        updateCounts();
        const list = document.getElementById('list');
        if (!list.querySelector('.card')) {
          list.innerHTML = `<div class="empty">🎉 סיימת את הסבב! החליפי סינון או חפשי משהו אחר.</div>`;
        }
      }, 280);
    } else {
      // Still matches filter (e.g. user is on "all") → in-place swap
      const tmp = document.createElement('div');
      tmp.innerHTML = cardHtml(item);
      card.replaceWith(tmp.firstElementChild);
      updateCounts();
    }
  }

  // Event delegation
  document.getElementById('list').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const card = btn.closest('.card');
    if (!card) return;
    const id = card.dataset.id;
    const a = btn.dataset.action;
    if (a === 'expand') {
      const p = card.querySelector('.desc');
      if (p) p.classList.remove('collapsed');
      btn.remove();
    } else if (a === 'toggle-details') {
      const body = card.querySelector('.details-body');
      const caret = btn.querySelector('.caret');
      body.classList.toggle('open');
      caret.textContent = body.classList.contains('open') ? '▴' : '▾';
    } else if (a === 'approve') setStatus(id, 'approved');
    else if (a === 'reject') setStatus(id, 'rejected');
    else if (a === 'review') setStatus(id, 'review');
  });

  document.getElementById('list').addEventListener('input', (e) => {
    const ta = e.target.closest('[data-action="note"]');
    if (!ta) return;
    const card = ta.closest('.card');
    if (!card) return;
    const id = card.dataset.id;
    if (!state[id]) state[id] = {};
    state[id].note = ta.value;
    state[id].ts = Date.now();
    saveState();
  });

  // Filters (status)
  document.getElementById('filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#filters .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  // Filters (kind)
  document.getElementById('kind-filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#kind-filters .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentKind = chip.dataset.kind;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    clearTimeout(renderTimeout);
    const q = e.target.value.trim().toLowerCase();
    renderTimeout = setTimeout(() => {
      currentQuery = q;
      render();
    }, 180);
  });

  // Export
  function csvEscape(v) {
    if (v == null) return '';
    const s = String(v).replace(/"/g, '""');
    return /[,\n"]/.test(s) ? `"${s}"` : s;
  }

  function exportCSV(filter) {
    const headers = [
      'סטטוס','הערה','סוג קרן','סיבת סיווג','גיליון','קטגוריה','שם','אתר','אימייל','טלפון','איש קשר',
      'תחום','תיאור','תבחינים','דרך פנייה','רלוונטיות','חותמת זמן'
    ];
    const lines = [headers.join(',')];
    for (const r of RAW) {
      const s = state[r._id]?.status || '';
      const note = state[r._id]?.note || '';
      const ts = state[r._id]?.ts ? new Date(state[r._id].ts).toISOString() : '';
      if (filter === 'approved' && s !== 'approved') continue;
      if (filter === 'verified' && !s) continue;
      const row = [
        s, note,
        KIND_LABEL[r._kind] || r._kind || '', r._kind_reason || '',
        SHEET_LABEL[r._sheet] || r._sheet, r._section || '',
        r.name || '', r.website || '', r.email || '', r.phone || '',
        r.contact || r.contact_info || '',
        r.area || r.focus || '',
        r.description || r.purpose || '',
        r.criteria || '', r.how_to_apply || '',
        r.relevance || r.donates_to_israel || '',
        ts
      ];
      lines.push(row.map(csvEscape).join(','));
    }
    const csv = '﻿' + lines.join('\n'); // BOM for Excel Hebrew
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `קרנות-${filter === 'approved' ? 'אומתו' : 'הכל'}-${today}.csv`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  }

  function exportClaude() {
    // Compact JSON for Claude Code — only items that have a status or note
    const decisions = [];
    for (const r of RAW) {
      const s = state[r._id];
      if (!s || (!s.status && !s.note)) continue;
      decisions.push({
        id: r._id,
        name: r.name,
        sheet: r._sheet,
        section: r._section,
        website: r.website || '',
        status: s.status || '',
        note: s.note || '',
        ts: s.ts ? new Date(s.ts).toISOString() : ''
      });
    }
    const counts = { approved: 0, rejected: 0, review: 0, total_decisions: decisions.length, total_items: RAW.length };
    decisions.forEach(d => { if (counts[d.status] !== undefined) counts[d.status]++; });
    const payload = {
      meta: {
        title: 'אימות קרנות פילנתרופיות',
        exported_at: new Date().toISOString(),
        source: 'foundations-verifier',
        counts
      },
      decisions
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `foundations-verification-${today}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  }

  // ---- Auto-suggestions banner ----
  function updateAutoBanner() {
    const banner = document.getElementById('auto-banner');
    if (sessionStorage.getItem('autoBannerDismissed') === '1') {
      banner.style.display = 'none';
      return;
    }
    let reviewCount = 0, rejectCount = 0;
    for (const r of RAW) {
      if (state[r._id]?.status) continue; // already decided
      if (r._auto_status === 'review') reviewCount++;
      else if (r._auto_status === 'rejected') rejectCount++;
    }
    if (reviewCount + rejectCount === 0) {
      banner.style.display = 'none';
      return;
    }
    document.getElementById('auto-banner-body').innerHTML =
      `סרקתי את הקרנות שעדיין לא בדקת. מצאתי <b>${rejectCount}</b> שאין להן דרך ליצור קשר בכלל (המלצה: דחיה), ו<b>${reviewCount}</b> עם בעיות נתונים שכדאי לבדוק (אתר לא נטען, איש קשר עם כתובת במקום שם, פורמט אימייל חשוד וכד׳). הפעולות הללו ניתנות לביטול אחד־אחד.`;
    banner.style.display = 'flex';
  }

  function applyAuto(statusesToApply) {
    let n = 0;
    for (const r of RAW) {
      if (state[r._id]?.status) continue;
      if (!statusesToApply.includes(r._auto_status)) continue;
      state[r._id] = state[r._id] || {};
      state[r._id].status = r._auto_status;
      state[r._id].note = r._auto_note || '';
      state[r._id].ts = Date.now();
      state[r._id].auto = true;
      n++;
    }
    saveState();
    document.getElementById('auto-banner').style.display = 'none';
    sessionStorage.setItem('autoBannerDismissed', '1');
    render();
    return n;
  }

  document.getElementById('auto-apply-all').addEventListener('click', () => {
    const n = applyAuto(['review', 'rejected']);
    alert(`הוחלו ${n} המלצות. אפשר לראות בפילטרים "🔬 לבדוק" ו"❌ נפסל".`);
  });
  document.getElementById('auto-apply-rejects').addEventListener('click', () => {
    const n = applyAuto(['rejected']);
    alert(`הוחלו ${n} דחיות. אפשר לראות בפילטר "❌ נפסל".`);
  });
  document.getElementById('auto-dismiss').addEventListener('click', () => {
    document.getElementById('auto-banner').style.display = 'none';
    sessionStorage.setItem('autoBannerDismissed', '1');
  });

  // ---- Import ----
  document.getElementById('import-json').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    let imported = 0;
    try {
      if (file.name.endsWith('.csv')) {
        // CSV with columns: סטטוס, הערה, ..., שם, ...
        const lines = text.split(/\r?\n/);
        const headers = lines[0].replace(/^﻿/, '').split(',');
        const sIdx = headers.indexOf('סטטוס');
        const nIdx = headers.indexOf('הערה');
        const nameIdx = headers.indexOf('שם');
        const byName = {};
        for (const r of RAW) byName[r.name] = r._id;
        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;
          // simple CSV parse with quotes
          const cells = [];
          let cur = '', inQ = false;
          for (let j = 0; j < lines[i].length; j++) {
            const c = lines[i][j];
            if (c === '"' && lines[i][j+1] === '"') { cur += '"'; j++; }
            else if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { cells.push(cur); cur = ''; }
            else cur += c;
          }
          cells.push(cur);
          const s = cells[sIdx]?.trim();
          const note = cells[nIdx]?.trim();
          const name = cells[nameIdx]?.trim();
          if (!name || !s) continue;
          const id = byName[name];
          if (!id) continue;
          state[id] = { status: s, note, ts: Date.now() };
          imported++;
        }
      } else {
        // JSON — either the export-claude format {decisions: [...]} or a state map {id: {...}}
        const parsed = JSON.parse(text);
        if (parsed.decisions && Array.isArray(parsed.decisions)) {
          for (const d of parsed.decisions) {
            if (d.id) {
              state[d.id] = { status: d.status, note: d.note || '', ts: Date.now() };
              imported++;
            }
          }
        } else if (typeof parsed === 'object') {
          for (const [id, v] of Object.entries(parsed)) {
            if (v && (v.status || v.note)) {
              state[id] = { status: v.status, note: v.note || '', ts: Date.now() };
              imported++;
            }
          }
        }
      }
      saveState();
      render();
      updateAutoBanner();
      alert(`יובאו ${imported} החלטות.`);
    } catch (err) {
      alert('שגיאה בייבוא: ' + err.message);
    }
    e.target.value = '';
  });

  document.getElementById('export-csv').addEventListener('click', () => exportCSV('all'));
  document.getElementById('export-approved').addEventListener('click', () => exportCSV('approved'));
  document.getElementById('export-claude').addEventListener('click', exportClaude);
  document.getElementById('reset').addEventListener('click', () => {
    if (confirm('לאפס את כל האימותים וההערות? אי אפשר לבטל.')) {
      Object.keys(state).forEach(k => delete state[k]);
      saveState();
      render();
    }
  });

  render();
  updateAutoBanner();
})();
</script>
</body>
</html>
