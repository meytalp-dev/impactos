<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<meta name="robots" content="noindex, nofollow">
<title>אימות מענים · רצף</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7f8;
    --panel: #ffffff;
    --ink: #102a33;
    --ink-2: #4b5d63;
    --line: #e3e8ea;
    --line-2: #d6dee1;
    --teal: #0f766e;
    --teal-soft: #ccfbf1;
    --green: #15803d;
    --green-soft: #dcfce7;
    --red: #b91c1c;
    --red-soft: #fee2e2;
    --amber: #b45309;
    --amber-soft: #fef3c7;
    --blue: #1d4ed8;
    --blue-soft: #dbeafe;
    --violet: #6d28d9;
    --violet-soft: #ede9fe;
    --shadow: 0 1px 2px rgba(16,42,51,.04), 0 8px 24px rgba(16,42,51,.06);
    --touch: 56px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
  }
  body { padding-bottom: 96px; }

  /* ---- sticky header ---- */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.96);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 12px 14px 10px;
  }
  .header h1 {
    margin: 0 0 8px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 .total {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
  }
  .progress {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .stat {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px 8px;
    text-align: center;
  }
  .stat b {
    display: block;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat span {
    font-size: 11px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .stat.relevant b { color: var(--green); }
  .stat.no b { color: var(--red); }
  .stat.maybe b { color: var(--amber); }
  .stat.left b { color: var(--ink); }
  .stat.verified b { color: var(--teal); }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1 1 100%;
    min-width: 0;
  }
  .search-wrap input {
    width: 100%;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--line-2);
    background: #fff;
    font: inherit;
    font-size: 15px;
    padding: 0 40px 0 14px;
    color: var(--ink);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-wrap input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(15,118,110,.12);
  }
  .search-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-2);
    pointer-events: none;
  }
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 2px 0;
    margin: 0 -14px;
    padding-left: 14px; padding-right: 14px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    height: 36px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--line-2);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: background .15s, border-color .15s, color .15s;
  }
  .chip:active { transform: scale(0.97); }
  .chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }
  .chip .count {
    font-size: 12px;
    padding: 1px 6px;
    border-radius: 999px;
    background: rgba(0,0,0,.06);
    font-weight: 600;
  }
  .chip.active .count { background: rgba(255,255,255,.2); color: #fff; }

  /* ---- list ---- */
  .list {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 720px;
    margin: 0 auto;
  }
  .section-hdr {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-2);
    text-transform: none;
    letter-spacing: 0.01em;
    padding: 12px 4px 4px;
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--bg) 75%, transparent);
    z-index: 1;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    box-shadow: var(--shadow);
    transition: border-color .15s;
  }
  .card.s-yes   { border-color: #86efac; background: linear-gradient(180deg, #f0fdf4, #fff); }
  .card.s-no    { border-color: #fca5a5; background: linear-gradient(180deg, #fef2f2, #fff); }
  .card.s-maybe { border-color: #fcd34d; background: linear-gradient(180deg, #fffbeb, #fff); }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .card-name {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    margin: 0;
    word-break: break-word;
  }
  .verified-flag {
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 700;
    color: var(--teal);
    background: var(--teal-soft);
    border: 1px solid #99f6e4;
    border-radius: 999px;
    padding: 3px 9px;
    white-space: nowrap;
    display: none;
  }
  .card.is-verified .verified-flag { display: inline-block; }
  .badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--bg);
    color: var(--ink-2);
    border: 1px solid var(--line);
    white-space: nowrap;
  }
  .badge.cat { background: var(--teal-soft); color: #115e59; border-color: #99f6e4; }
  .badge.age { background: var(--blue-soft); color: #1e3a8a; border-color: #bfdbfe; }
  .badge.region { background: #fde68a; color: #78350f; border-color: #fbbf24; }
  .badge.status-yes   { background: var(--green-soft); color: var(--green); border-color: #86efac; }
  .badge.status-no    { background: var(--red-soft); color: var(--red); border-color: #fca5a5; }
  .badge.status-maybe { background: var(--amber-soft); color: var(--amber); border-color: #fcd34d; }
  .badge.rec-positive { background: #dcfce7; color: #15803d; border-color: #86efac; }
  .badge.rec-neutral  { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
  .badge.rec-pending  { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
  .badge.rec-mixed    { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
  .badge.rec-negative { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .badge.conf { background: #fff; color: var(--ink-2); border-color: var(--line-2); }
  .badge.site-live     { background: #dcfce7; color: #15803d; border-color: #86efac; }
  .badge.site-redirect { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; }
  .badge.site-blocked  { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
  .badge.site-dead     { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .badge.phone-bad     { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .badge.no-contact    { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
  .badge.dup           { background: #fce7f3; color: #9d174d; border-color: #fbcfe8; }

  .auto-note {
    margin: 6px 0 10px;
    padding: 8px 10px;
    background: #fff7ed;
    border-right: 3px solid #f97316;
    border-radius: 4px;
    font-size: 13px;
    color: #7c2d12;
    line-height: 1.5;
    word-break: break-word;
  }
  .auto-note .label { font-weight: 700; color: #9a3412; margin-left: 4px; }

  .banner {
    background: linear-gradient(135deg, #f0fdfa, #ecfeff);
    border: 1px solid #99f6e4;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .banner-title { font-size: 15px; font-weight: 700; color: #115e59; }
  .banner-body { font-size: 13px; color: var(--ink-2); line-height: 1.55; }
  .banner-body b { color: var(--ink); }
  .banner-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .banner-actions button {
    height: 40px; padding: 0 14px; border-radius: 10px;
    border: 1px solid #14b8a6; background: #fff; color: #115e59;
    font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .banner-actions button.primary { background: var(--teal); color: #fff; }
  .banner-actions button:active { transform: scale(0.97); }

  /* editable detail fields */
  .detail-row.edit { grid-template-columns: 110px 1fr; align-items: start; }
  .detail-edit {
    width: 100%;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    background: #fff;
    font: inherit;
    font-size: 13px;
    padding: 7px 10px;
    color: var(--ink);
    outline: none;
    resize: vertical;
  }
  .detail-edit:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(15,118,110,.12); }
  textarea.detail-edit { min-height: 40px; line-height: 1.5; }
  .edited-tag {
    font-size: 10px; font-weight: 700; color: var(--teal);
    background: var(--teal-soft); border-radius: 999px; padding: 1px 6px; margin-right: 4px;
  }

  .desc {
    font-size: 14px;
    color: var(--ink-2);
    margin: 8px 0 12px;
    line-height: 1.55;
    word-break: break-word;
  }
  .desc.collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .expand-btn {
    background: transparent;
    border: none;
    color: var(--teal);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 0;
    cursor: pointer;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 0 0 12px;
  }
  .link {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 12px;
    border-radius: 10px;
    background: #f1f5f9;
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--line);
    white-space: nowrap;
  }
  .link:active { transform: scale(0.97); }
  .link.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
  .link.search { background: var(--blue-soft); color: var(--blue); border-color: #bfdbfe; }
  .link.callto { background: var(--green); color: #fff; border-color: var(--green); }
  .link svg { width: 14px; height: 14px; }

  .quote {
    font-size: 13px;
    color: var(--ink-2);
    margin: 6px 0 10px;
    padding: 8px 10px;
    background: #f8fafc;
    border-right: 3px solid var(--teal);
    border-radius: 4px;
    line-height: 1.5;
    word-break: break-word;
  }

  .details {
    border-top: 1px dashed var(--line);
    margin-top: 10px;
    padding-top: 10px;
  }
  .details-toggle {
    background: transparent;
    border: none;
    color: var(--ink-2);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 0;
    width: 100%;
    text-align: right;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .details-body {
    display: none;
    padding-top: 6px;
  }
  .details-body.open { display: block; }
  .detail-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 13px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .k { color: var(--ink-2); font-weight: 600; }
  .detail-row .v { color: var(--ink); word-break: break-word; }

  /* ---- verify toggle ---- */
  .verify-row {
    margin-top: 12px;
  }
  .verify-toggle {
    width: 100%;
    height: 44px;
    border-radius: 12px;
    border: 1px dashed var(--line-2);
    background: #fff;
    color: var(--ink-2);
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform .08s, background .15s, border-color .15s, color .15s;
  }
  .verify-toggle:active { transform: scale(0.98); }
  .card.is-verified .verify-toggle {
    background: var(--teal); color: #fff; border-style: solid; border-color: var(--teal);
  }

  /* ---- actions ---- */
  .actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 10px;
  }
  .act {
    height: var(--touch);
    border-radius: 12px;
    border: 1px solid var(--line-2);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: transform .08s, background .15s, border-color .15s, color .15s;
  }
  .act:active { transform: scale(0.96); }
  .act.yes   { color: var(--green); border-color: #86efac; }
  .act.no    { color: var(--red);   border-color: #fca5a5; }
  .act.maybe { color: var(--amber); border-color: #fcd34d; }

  .card.s-yes   .act.yes   { background: var(--green); color: #fff; border-color: var(--green); }
  .card.s-no    .act.no    { background: var(--red);   color: #fff; border-color: var(--red); }
  .card.s-maybe .act.maybe { background: var(--amber); color: #fff; border-color: var(--amber); }

  .note-wrap {
    margin-top: 8px;
  }
  .note-wrap textarea {
    width: 100%;
    min-height: 44px;
    border-radius: 10px;
    border: 1px solid var(--line-2);
    background: #fff;
    font: inherit;
    font-size: 13px;
    padding: 8px 12px;
    resize: vertical;
    outline: none;
    color: var(--ink);
  }
  .note-wrap textarea:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(15,118,110,.12);
  }

  /* ---- bottom bar ---- */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,.96);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    border-top: 1px solid var(--line);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    z-index: 60;
  }
  .bottom-bar button {
    flex: 1;
    height: 44px;
    min-width: 0;
    padding: 0 8px;
    border-radius: 12px;
    border: 1px solid var(--line-2);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #reset { flex: 0 0 44px; padding: 0; }
  .bottom-bar button.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
  .bottom-bar button:active { transform: scale(0.97); }

  .empty {
    text-align: center;
    color: var(--ink-2);
    padding: 60px 20px;
    font-size: 14px;
  }

  /* ---- undo toast ---- */
  .toast {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 8px);
    left: 50%;
    transform: translate(-50%, -120%);
    z-index: 100;
    background: var(--ink);
    color: #fff;
    border-radius: 999px;
    padding: 0 10px 0 18px;
    height: 44px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    transition: transform .22s cubic-bezier(.2,.7,.2,1);
    max-width: 92vw;
  }
  .toast.show { transform: translate(-50%, 0); }
  .toast .undo-btn {
    height: 32px;
    padding: 0 14px;
    border-radius: 999px;
    border: 0;
    background: rgba(255,255,255,.15);
    color: #fff;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .toast .undo-btn:active { background: rgba(255,255,255,.28); }

  /* tablet+ */
  @media (min-width: 720px) {
    .header h1 { font-size: 20px; }
    .progress { grid-template-columns: repeat(5, auto); justify-content: start; }
    .stat { padding: 8px 14px; }
    .stat b { font-size: 20px; }
    .actions { grid-template-columns: repeat(3, auto); justify-content: start; }
    .act { padding: 0 24px; min-width: 130px; }
    .detail-row { grid-template-columns: 140px 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>
    <span>אימות מענים · רצף</span>
    <span class="total" id="total-tag">…</span>
  </h1>
  <div class="progress">
    <div class="stat left"><b id="stat-left">0</b><span>לא נבדק</span></div>
    <div class="stat relevant"><b id="stat-relevant">0</b><span>רלוונטי</span></div>
    <div class="stat maybe"><b id="stat-maybe">0</b><span>לבדוק</span></div>
    <div class="stat no"><b id="stat-no">0</b><span>לא רלוונטי</span></div>
    <div class="stat verified"><b id="stat-verified">0</b><span>אומתו</span></div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <input id="search" type="search" placeholder="חיפוש לפי שם, התמחות, אזור, גיל…" autocomplete="off">
      <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
  </div>
  <div class="filters" id="filters">
    <button class="chip active" data-filter="todo">לא נבדק <span class="count" id="c-todo">0</span></button>
    <button class="chip" data-filter="all">הכל <span class="count" id="c-all">0</span></button>
    <button class="chip" data-filter="yes">✅ רלוונטי <span class="count" id="c-yes">0</span></button>
    <button class="chip" data-filter="maybe">🔬 לבדוק <span class="count" id="c-maybe">0</span></button>
    <button class="chip" data-filter="no">❌ לא רלוונטי <span class="count" id="c-no">0</span></button>
    <button class="chip" data-filter="verified">🔎 אומת <span class="count" id="c-verified">0</span></button>
    <button class="chip" data-filter="issues">⚠️ בעיות נתונים <span class="count" id="c-issues">0</span></button>
  </div>
  <div class="filters" id="cat-filters" style="margin-top:6px">
    <button class="chip active" data-cat="all">כל הקטגוריות</button>
    <button class="chip" data-cat="אבחון והערכה">אבחון והערכה <span class="count">135</span></button>
    <button class="chip" data-cat="ארגונים ועמותות">ארגונים ועמותות <span class="count">84</span></button>
    <button class="chip" data-cat="זכויות ורווחה">זכויות ורווחה <span class="count">84</span></button>

<script>
(function(){
  const RAW = JSON.parse(document.getElementById('data').textContent);
  const STORAGE_KEY = 'retzef-services-verification-v1';
  const state = loadState();
  let currentFilter = 'todo';
  let currentCat = 'all';
  let currentRec = 'all';
  let currentQuery = '';
  let renderTimeout = null;

  const REC_LABEL = {
    positive: '🟢 חיובי',
    neutral:  '⚪ ניטרלי',
    pending:  '⏳ ממתין',
    mixed:    '🟡 מעורב',
    negative: '🔴 שלילי'
  };
  const CONF_LABEL = { high: 'ביטחון גבוה', medium: 'ביטחון בינוני', low: 'ביטחון נמוך' };
  const SITE_BADGE = {
    live:     '🌐 אתר חי',
    redirect: '🔁 אתר (הופנה)',
    blocked:  '🔒 אתר חוסם בוטים',
    dead:     '⚠️ אתר לא נטען'
  };

  // section ordering — preserve sheet order
  const SECTION_ORDER = [];
  RAW.forEach(r => {
    if (!SECTION_ORDER.includes(r._section)) SECTION_ORDER.push(r._section);
  });

  function loadState() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch { return {}; }
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function matchesQuery(item, q) {
    if (!q) return true;
    const hay = [item.name, item.specialty, item.subcat, item.ages, item.region, item.quote, item.notes, item._section]
      .filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  }

  function matchesFilter(item) {
    if (currentCat !== 'all' && item._section !== currentCat) return false;
    if (currentRec !== 'all' && item._rec !== currentRec) return false;
    const st = state[item._id] || {};
    switch (currentFilter) {
      case 'all': return true;
      case 'todo': return !st.relevance;
      case 'yes': return st.relevance === 'yes';
      case 'no': return st.relevance === 'no';
      case 'maybe': return st.relevance === 'maybe';
      case 'verified': return !!st.verified;
      case 'issues': return hasIssue(item);
      default: return true;
    }
  }

  function hasIssue(item) {
    return item._site_status === 'dead' || item._phone_status === 'invalid'
        || item._phone_status === 'partial' || item._no_contact || !!item._duplicate;
  }

  function updateCounts() {
    const counts = { all: RAW.length, todo: 0, yes: 0, no: 0, maybe: 0, verified: 0, issues: 0 };
    const recs = { positive: 0, neutral: 0, pending: 0, mixed: 0, negative: 0 };
    const cats = {};
    RAW.forEach(r => {
      const st = state[r._id] || {};
      if (!st.relevance) counts.todo++;
      else counts[st.relevance]++;
      if (st.verified) counts.verified++;
      if (hasIssue(r)) counts.issues++;
      if (recs[r._rec] !== undefined) recs[r._rec]++;
      cats[r._section] = (cats[r._section] || 0) + 1;
    });
    document.getElementById('c-all').textContent = counts.all;
    document.getElementById('c-todo').textContent = counts.todo;
    document.getElementById('c-yes').textContent = counts.yes;
    document.getElementById('c-no').textContent = counts.no;
    document.getElementById('c-maybe').textContent = counts.maybe;
    document.getElementById('c-verified').textContent = counts.verified;
    document.getElementById('c-issues').textContent = counts.issues;
    Object.entries(recs).forEach(([k, v]) => {
      const el = document.getElementById('r-' + k);
      if (el) el.textContent = v;
    });
    document.querySelectorAll('#cat-filters .chip[data-cat]').forEach(chip => {
      const c = chip.dataset.cat;
      if (c === 'all') return;
      const el = chip.querySelector('.count');
      if (el) el.textContent = cats[c] || 0;
    });

    document.getElementById('stat-left').textContent = counts.todo;
    document.getElementById('stat-relevant').textContent = counts.yes;
    document.getElementById('stat-maybe').textContent = counts.maybe;
    document.getElementById('stat-no').textContent = counts.no;
    document.getElementById('stat-verified').textContent = counts.verified;
    document.getElementById('total-tag').textContent = `${counts.all - counts.todo} / ${counts.all}`;
  }

  function googleSearchUrl(name) {
    return 'https://www.google.com/search?q=' + encodeURIComponent(name + ' אוטיזם');
  }

  function ensureUrl(u) {
    if (!u) return null;
    u = String(u).trim();
    if (!u) return null;
    if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
    return u;
  }

  function escape(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // effective value: edited value overrides original
  function eff(item, key) {
    const e = state[item._id]?.edits;
    if (e && e[key] != null && String(e[key]).trim() !== '') return e[key];
    return item[key];
  }

  // editable fields (text inputs / textareas) + read-only rows
  const EDIT_FIELDS = [
    ['website', '🌐 אתר', 'input'],
    ['phone', '📞 טלפון', 'input'],
    ['subcat', '🏷️ תת-קטגוריה', 'input'],
    ['ages', '👥 גילאים', 'input'],
    ['region', '📍 אזור', 'input'],
    ['specialty', '🎯 התמחות', 'input'],
    ['quote', '💬 הקשר / ציטוט', 'textarea'],
    ['notes', '📝 הערות', 'textarea'],
  ];

  function detailRows(item) {
    let html = '';
    for (const [k, label, type] of EDIT_FIELDS) {
      const v = eff(item, k) || '';
      const edited = state[item._id]?.edits && state[item._id].edits[k] != null && String(state[item._id].edits[k]).trim() !== '';
      const editTag = edited ? ' <span class="edited-tag">נערך</span>' : '';
      const field = type === 'textarea'
        ? `<textarea class="detail-edit" data-field="${k}" rows="2" placeholder="—">${escape(v)}</textarea>`
        : `<input class="detail-edit" data-field="${k}" type="text" value="${escape(v)}" placeholder="—">`;
      html += `<div class="detail-row edit"><div class="k">${escape(label)}${editTag}</div><div class="v">${field}</div></div>`;
    }
    // read-only context rows
    const ro = [
      ['mentions', '🔁 תדירות אזכור', item.mentions],
      ['rec', '👍 המלצת מקור', REC_LABEL[item._rec] || item.rec_raw],
      ['conf', '📊 רמת ביטחון', CONF_LABEL[item.conf] || item.conf],
    ];
    for (const [k, label, v] of ro) {
      if (v && String(v).trim()) {
        html += `<div class="detail-row"><div class="k">${escape(label)}</div><div class="v">${escape(v)}</div></div>`;
      }
    }
    return html;
  }

  function cardHtml(item) {
    const st = state[item._id] || {};
    const rel = st.relevance || '';
    const verified = !!st.verified;
    const note = st.note || '';
    const url = ensureUrl(eff(item, 'website') || '');
    const phone = eff(item, 'phone') || '';
    const desc = eff(item, 'specialty') || eff(item, 'subcat') || '';
    const quote = eff(item, 'quote') || '';
    const longDesc = quote.length > 180;

    return `
    <article class="card ${rel ? 's-' + rel : ''} ${verified ? 'is-verified' : ''}" data-id="${item._id}">
      <div class="card-head">
        <h2 class="card-name">${escape(item.name)}</h2>
        <span class="verified-flag">🔎 אומת</span>
      </div>
      <div class="badges">
        <span class="badge cat">${escape(item._section || '')}</span>
        ${eff(item, 'subcat') ? `<span class="badge">${escape(eff(item, 'subcat'))}</span>` : ''}
        ${eff(item, 'ages') ? `<span class="badge age">${escape(eff(item, 'ages'))}</span>` : ''}
        ${eff(item, 'region') ? `<span class="badge region">${escape(eff(item, 'region'))}</span>` : ''}
        ${item._rec ? `<span class="badge rec-${item._rec}">${escape(REC_LABEL[item._rec] || item._rec)}</span>` : ''}
        ${item.conf ? `<span class="badge conf">${escape(CONF_LABEL[item.conf] || item.conf)}</span>` : ''}
        ${SITE_BADGE[item._site_status] ? `<span class="badge site-${item._site_status}">${SITE_BADGE[item._site_status]}</span>` : ''}
        ${item._phone_status === 'invalid' ? `<span class="badge phone-bad">📞 טלפון לא תקין</span>` : ''}
        ${item._phone_status === 'partial' ? `<span class="badge phone-bad">📞 טלפון חלקי</span>` : ''}
        ${item._no_contact ? `<span class="badge no-contact">🚫 אין פרטי קשר</span>` : ''}
        ${item._duplicate ? `<span class="badge dup">👯 כפילות (${escape(item._duplicate.join('/'))})</span>` : ''}
        ${rel === 'yes'   ? `<span class="badge status-yes">✅ רלוונטי</span>` : ''}
        ${rel === 'no'    ? `<span class="badge status-no">❌ לא רלוונטי</span>` : ''}
        ${rel === 'maybe' ? `<span class="badge status-maybe">🔬 לבדוק</span>` : ''}
      </div>
      ${item._auto_note && !rel ? `<div class="auto-note"><span class="label">🤖 בדיקה אוטומטית:</span>${escape(item._auto_note)}</div>` : ''}
      ${desc ? `<p class="desc">${escape(desc)}</p>` : ''}
      ${quote ? `<div class="quote ${longDesc ? 'collapsed' : ''}">${escape(quote)}</div>${longDesc ? `<button class="expand-btn" data-action="expand">הצג עוד ▾</button>` : ''}` : ''}

      <div class="links">
        ${url ? `<a class="link primary" href="${escape(url)}" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          פתח אתר
        </a>` : ''}
        <a class="link search" href="${googleSearchUrl(item.name)}" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          חיפוש בגוגל
        </a>
        ${phone ? `<a class="link callto" href="tel:${escape(String(phone).replace(/[^\d+]/g,''))}">📞 ${escape(phone)}</a>` : ''}
      </div>

      <div class="details">
        <button class="details-toggle" data-action="toggle-details">
          <span>פרטים נוספים</span><span class="caret">▾</span>
        </button>
        <div class="details-body">${detailRows(item)}</div>
      </div>

      <div class="verify-row">
        <button class="verify-toggle" data-action="verify">${verified ? '🔎 אומת — הפרטים נכונים' : '🔎 סמני שאימתת את הפרטים'}</button>
      </div>

      <div class="actions">
        <button class="act yes"   data-action="yes">✅ רלוונטי</button>
        <button class="act maybe" data-action="maybe">🔬 לבדוק</button>
        <button class="act no"    data-action="no">❌ לא</button>
      </div>

      <div class="note-wrap">
        <textarea data-action="note" placeholder="הערה (אופציונלי)">${escape(note)}</textarea>
      </div>
    </article>`;
  }

  function render() {
    const list = document.getElementById('list');
    const q = currentQuery;
    const groups = new Map();
    for (const item of RAW) {
      if (!matchesQuery(item, q)) continue;
      if (!matchesFilter(item)) continue;
      if (!groups.has(item._section)) groups.set(item._section, []);
      groups.get(item._section).push(item);
    }

    let html = '';
    let visibleCount = 0;
    for (const sec of SECTION_ORDER) {
      const items = groups.get(sec);
      if (!items || !items.length) continue;
      html += `<div class="section-hdr">${escape(sec)} · ${items.length}</div>`;
      for (const item of items) {
        html += cardHtml(item);
        visibleCount++;
      }
    }
    if (!visibleCount) {
      html = `<div class="empty">אין תוצאות. נסי לסנן או לחפש משהו אחר.</div>`;
    }
    list.innerHTML = html;
    updateCounts();
  }

  // ---- Undo toast ----
  const toastEl = document.getElementById('toast');
  const toastText = document.getElementById('toast-text');
  const toastUndo = document.getElementById('toast-undo');
  let toastTimer = null;
  let undoSnapshot = null;

  const STATUS_LABEL = {
    yes:   '✅ סומן רלוונטי',
    no:    '❌ סומן לא רלוונטי',
    maybe: '🔬 סומן לבדיקה',
    verified_on:  '🔎 אומת',
    verified_off: 'בוטל אימות'
  };

  function showToast(label) {
    toastText.textContent = label;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 4000);
  }
  function hideToast() {
    toastEl.classList.remove('show');
    undoSnapshot = null;
  }
  toastUndo.addEventListener('click', () => {
    if (!undoSnapshot) return hideToast();
    const { id, prev } = undoSnapshot;
    if (prev === null) delete state[id];
    else state[id] = { ...prev };
    saveState();
    undoSnapshot = null;
    hideToast();
    render();
  });

  function cleanState(id) {
    const s = state[id];
    const hasEdits = s && s.edits && Object.keys(s.edits).length > 0;
    if (s && !s.relevance && !s.verified && !s.note && !hasEdits) delete state[id];
  }

  function setRelevance(id, rel) {
    const prev = state[id] ? JSON.parse(JSON.stringify(state[id])) : null;
    if (!state[id]) state[id] = {};
    const isToggleOff = state[id].relevance === rel;
    if (isToggleOff) delete state[id].relevance;
    else { state[id].relevance = rel; state[id].ts = Date.now(); }
    cleanState(id);
    saveState();
    if (!isToggleOff) { undoSnapshot = { id, prev }; showToast(STATUS_LABEL[rel] || 'נשמר'); }
    reflectCard(id);
  }

  function toggleVerified(id) {
    const prev = state[id] ? JSON.parse(JSON.stringify(state[id])) : null;
    if (!state[id]) state[id] = {};
    const now = !state[id].verified;
    state[id].verified = now;
    state[id].ts = Date.now();
    if (!now) delete state[id].verified;
    cleanState(id);
    saveState();
    undoSnapshot = { id, prev };
    showToast(now ? STATUS_LABEL.verified_on : STATUS_LABEL.verified_off);
    reflectCard(id);
  }

  function reflectCard(id) {
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (!card) { updateCounts(); return; }
    const item = RAW.find(r => r._id === id);
    if (!matchesFilter(item)) {
      card.style.transition = 'transform .25s ease, opacity .25s ease, margin .25s ease, max-height .3s ease, padding .25s ease';
      card.style.maxHeight = card.offsetHeight + 'px';
      requestAnimationFrame(() => {
        card.style.opacity = '0';
        card.style.transform = 'translateX(-12px)';
        card.style.maxHeight = '0';
        card.style.marginTop = '0';
        card.style.marginBottom = '0';
        card.style.paddingTop = '0';
        card.style.paddingBottom = '0';
        card.style.borderWidth = '0';
      });
      setTimeout(() => {
        const prevHdr = card.previousElementSibling;
        card.remove();
        if (prevHdr && prevHdr.classList.contains('section-hdr')) {
          const next = prevHdr.nextElementSibling;
          if (!next || next.classList.contains('section-hdr')) prevHdr.remove();
        }
        updateCounts();
        const list = document.getElementById('list');
        if (!list.querySelector('.card')) {
          list.innerHTML = `<div class="empty">🎉 סיימת את הסבב! החליפי סינון או חפשי משהו אחר.</div>`;
        }
      }, 280);
    } else {
      const tmp = document.createElement('div');
      tmp.innerHTML = cardHtml(item);
      card.replaceWith(tmp.firstElementChild);
      updateCounts();
    }
  }

  // Event delegation
  document.getElementById('list').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const card = btn.closest('.card');
    if (!card) return;
    const id = card.dataset.id;
    const a = btn.dataset.action;
    if (a === 'expand') {
      const p = card.querySelector('.quote');
      if (p) p.classList.remove('collapsed');
      btn.remove();
    } else if (a === 'toggle-details') {
      const body = card.querySelector('.details-body');
      const caret = btn.querySelector('.caret');
      body.classList.toggle('open');
      caret.textContent = body.classList.contains('open') ? '▴' : '▾';
    } else if (a === 'yes') setRelevance(id, 'yes');
    else if (a === 'no') setRelevance(id, 'no');
    else if (a === 'maybe') setRelevance(id, 'maybe');
    else if (a === 'verify') toggleVerified(id);
  });

  document.getElementById('list').addEventListener('input', (e) => {
    const ta = e.target.closest('[data-action="note"]');
    if (ta) {
      const card = ta.closest('.card');
      if (!card) return;
      const id = card.dataset.id;
      if (!state[id]) state[id] = {};
      state[id].note = ta.value;
      state[id].ts = Date.now();
      if (!ta.value) cleanState(id);
      saveState();
      return;
    }
    // inline edits of detail fields
    const ed = e.target.closest('.detail-edit[data-field]');
    if (ed) {
      const card = ed.closest('.card');
      if (!card) return;
      const id = card.dataset.id;
      const field = ed.dataset.field;
      const item = RAW.find(r => r._id === id);
      if (!state[id]) state[id] = {};
      if (!state[id].edits) state[id].edits = {};
      const val = ed.value;
      // store only when it differs from the original; clear when reset to original/empty
      if (val !== '' && val !== (item[field] || '')) state[id].edits[field] = val;
      else delete state[id].edits[field];
      if (Object.keys(state[id].edits).length === 0) delete state[id].edits;
      state[id].ts = Date.now();
      cleanState(id);
      saveState();
    }
  });

  // Filters (status)
  document.getElementById('filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#filters .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  // Filters (category)
  document.getElementById('cat-filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#cat-filters .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentCat = chip.dataset.cat;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  // Filters (recommendation)
  document.getElementById('rec-filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#rec-filters .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentRec = chip.dataset.rec;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    clearTimeout(renderTimeout);
    const q = e.target.value.trim().toLowerCase();
    renderTimeout = setTimeout(() => {
      currentQuery = q;
      render();
    }, 180);
  });

  // Export
  function csvEscape(v) {
    if (v == null) return '';
    const s = String(v).replace(/"/g, '""');
    return /[,\n"]/.test(s) ? `"${s}"` : s;
  }

  function exportCSV(filter) {
    const headers = [
      'רלוונטיות','אומת','הערה','קטגוריה','תת-קטגוריה','שם','גילאים','אזור','טלפון','אתר',
      'התמחות','המלצה','ביטחון','הקשר/ציטוט','הערות-מקור','בדיקת-אתר','בדיקת-טלפון','כפילות','נערך-ידנית','חותמת זמן'
    ];
    const REL_HE = { yes: 'רלוונטי', maybe: 'לבדוק', no: 'לא רלוונטי' };
    const SITE_HE = { live: 'אתר חי', redirect: 'הופנה', blocked: 'חוסם בוטים', dead: 'לא נטען', none: '' };
    const PHONE_HE = { ok: 'תקין', invalid: 'לא תקין', partial: 'חלקי', none: '' };
    const lines = [headers.join(',')];
    for (const r of RAW) {
      const st = state[r._id] || {};
      const rel = st.relevance || '';
      if (filter === 'relevant' && rel !== 'yes') continue;
      if (filter === 'decided' && !rel && !st.verified) continue;
      const E = (k) => { const e = st.edits; return (e && e[k] != null && String(e[k]).trim() !== '') ? e[k] : (r[k] || ''); };
      const ts = st.ts ? new Date(st.ts).toISOString() : '';
      const editedFields = st.edits ? Object.keys(st.edits).join(' ') : '';
      const row = [
        REL_HE[rel] || '', st.verified ? 'כן' : '', st.note || '',
        r._section || '', E('subcat'), r.name || '',
        E('ages'), E('region'), E('phone'), E('website'),
        E('specialty'), REC_LABEL[r._rec] || r.rec_raw || '', r.conf || '',
        E('quote'), E('notes'),
        SITE_HE[r._site_status] || '', PHONE_HE[r._phone_status] || '',
        r._duplicate ? r._duplicate.join('/') : '', editedFields, ts
      ];
      lines.push(row.map(csvEscape).join(','));
    }
    const csv = '﻿' + lines.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `מענים-רצף-${filter === 'relevant' ? 'רלוונטיים' : 'הכל'}-${today}.csv`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  }

  function exportClaude() {
    const decisions = [];
    for (const r of RAW) {
      const st = state[r._id];
      const hasEdits = st && st.edits && Object.keys(st.edits).length > 0;
      if (!st || (!st.relevance && !st.verified && !st.note && !hasEdits)) continue;
      decisions.push({
        id: r._id,
        name: r.name,
        category: r._section,
        website: r.website || '',
        relevance: st.relevance || '',
        verified: !!st.verified,
        note: st.note || '',
        edits: hasEdits ? st.edits : undefined,
        ts: st.ts ? new Date(st.ts).toISOString() : ''
      });
    }
    const counts = { yes: 0, no: 0, maybe: 0, verified: 0, total_decisions: decisions.length, total_items: RAW.length };
    decisions.forEach(d => { if (counts[d.relevance] !== undefined) counts[d.relevance]++; if (d.verified) counts.verified++; });
    const payload = {
      meta: {
        title: 'אימות מענים · רצף',
        exported_at: new Date().toISOString(),
        source: 'retzef-services-verifier',
        counts
      },
      decisions
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `retzef-services-verification-${today}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  }

  // ---- Import ----
  document.getElementById('import-json').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    let imported = 0;
    const REL_FROM_HE = { 'רלוונטי': 'yes', 'לבדוק': 'maybe', 'לא רלוונטי': 'no' };
    try {
      if (file.name.endsWith('.csv')) {
        const lines = text.split(/\r?\n/);
        const headers = lines[0].replace(/^﻿/, '').split(',');
        const relIdx = headers.indexOf('רלוונטיות');
        const verIdx = headers.indexOf('אומת');
        const nIdx = headers.indexOf('הערה');
        const nameIdx = headers.indexOf('שם');
        const byName = {};
        for (const r of RAW) byName[r.name] = r._id;
        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;
          const cells = [];
          let cur = '', inQ = false;
          for (let j = 0; j < lines[i].length; j++) {
            const c = lines[i][j];
            if (c === '"' && lines[i][j+1] === '"') { cur += '"'; j++; }
            else if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { cells.push(cur); cur = ''; }
            else cur += c;
          }
          cells.push(cur);
          const name = cells[nameIdx]?.trim();
          if (!name) continue;
          const id = byName[name];
          if (!id) continue;
          const rel = REL_FROM_HE[(cells[relIdx]||'').trim()] || '';
          const ver = (cells[verIdx]||'').trim() === 'כן';
          const note = cells[nIdx]?.trim() || '';
          if (!rel && !ver && !note) continue;
          state[id] = { relevance: rel, verified: ver, note, ts: Date.now() };
          imported++;
        }
      } else {
        const parsed = JSON.parse(text);
        const arr = parsed.decisions && Array.isArray(parsed.decisions) ? parsed.decisions : null;
        if (arr) {
          for (const d of arr) {
            if (d.id) {
              state[d.id] = { relevance: d.relevance || '', verified: !!d.verified, note: d.note || '', ts: Date.now() };
              if (d.edits && Object.keys(d.edits).length) state[d.id].edits = d.edits;
              imported++;
            }
          }
        } else if (typeof parsed === 'object') {
          for (const [id, v] of Object.entries(parsed)) {
            if (v && (v.relevance || v.verified || v.note || v.edits)) {
              state[id] = { relevance: v.relevance || '', verified: !!v.verified, note: v.note || '', ts: Date.now() };
              if (v.edits && Object.keys(v.edits).length) state[id].edits = v.edits;
              imported++;
            }
          }
        }
      }
      saveState();
      render();
      updateAutoBanner();
      alert(`יובאו ${imported} החלטות.`);
    } catch (err) {
      alert('שגיאה בייבוא: ' + err.message);
    }
    e.target.value = '';
  });

  // ---- Auto-suggestions banner ----
  function updateAutoBanner() {
    const banner = document.getElementById('auto-banner');
    if (sessionStorage.getItem('retzefAutoBannerDismissed') === '1') { banner.style.display = 'none'; return; }
    let dead = 0, badPhone = 0, noContact = 0, dup = 0, flagged = 0;
    for (const r of RAW) {
      if (state[r._id]?.relevance) continue; // already decided
      if (r._site_status === 'dead') dead++;
      if (r._phone_status === 'invalid' || r._phone_status === 'partial') badPhone++;
      if (r._no_contact) noContact++;
      if (r._duplicate) dup++;
      if (r._auto_status === 'review') flagged++;
    }
    if (flagged + noContact + dup === 0) { banner.style.display = 'none'; return; }
    document.getElementById('auto-banner-body').innerHTML =
      `סרקתי את כל ${RAW.length} המענים. מצאתי <b>${dead}</b> עם אתר שלא נטען, <b>${badPhone}</b> עם טלפון בפורמט לא תקין, ` +
      `<b>${noContact}</b> בלי שום פרטי קשר (אתר/טלפון), ו-<b>${dup}</b> עם חשד לכפילות. ` +
      `אפשר לסמן את אלה שיש להן בעיה אמיתית (אתר שבור / טלפון לא תקין) כ"לבדוק" בלחיצה אחת — וכל אחת ניתנת לביטול. ` +
      `אפשר גם לסנן בכל רגע עם הצ'יפ "⚠️ בעיות נתונים".`;
    banner.style.display = 'flex';
  }

  document.getElementById('auto-apply-all').addEventListener('click', () => {
    let n = 0;
    for (const r of RAW) {
      if (state[r._id]?.relevance) continue;
      if (r._auto_status !== 'review') continue;
      state[r._id] = state[r._id] || {};
      state[r._id].relevance = 'maybe';
      state[r._id].note = (state[r._id].note ? state[r._id].note + ' · ' : '') + (r._auto_note || 'בעיית נתונים');
      state[r._id].ts = Date.now();
      state[r._id].auto = true;
      n++;
    }
    saveState();
    document.getElementById('auto-banner').style.display = 'none';
    sessionStorage.setItem('retzefAutoBannerDismissed', '1');
    render();
    alert(`${n} מענים סומנו כ"לבדוק". אפשר לראות אותם בצ'יפ "🔬 לבדוק".`);
  });
  document.getElementById('auto-dismiss').addEventListener('click', () => {
    document.getElementById('auto-banner').style.display = 'none';
    sessionStorage.setItem('retzefAutoBannerDismissed', '1');
  });

  document.getElementById('export-csv').addEventListener('click', () => exportCSV('all'));
  document.getElementById('export-relevant').addEventListener('click', () => exportCSV('relevant'));
  document.getElementById('export-claude').addEventListener('click', exportClaude);
  document.getElementById('reset').addEventListener('click', () => {
    if (confirm('לאפס את כל הסימונים וההערות? אי אפשר לבטל.')) {
      Object.keys(state).forEach(k => delete state[k]);
      saveState();
      render();
    }
  });

  render();
  updateAutoBanner();
})();
</script>
</body>
</html>
