<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ידע פדגוגי — אבני יסוד · ImpactOS Learning Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fafaff;
    --surface:#ffffff;
    --surface-2:#f4f3ff;
    --ink:#1a1a2e;
    --ink-muted:#5b5b7a;
    --lavender:#a78bfa;
    --lavender-soft:#ddd6fe;
    --lavender-deep:#7c3aed;
    --mint:#86efac;
    --mint-soft:#d1fae5;
    --rose:#fda4af;
    --rose-soft:#fecdd3;
    --amber:#fcd34d;
    --amber-soft:#fef3c7;
    --sky:#7dd3fc;
    --sky-soft:#e0f2fe;
    --border:#e8e6f5;
    --shadow-sm: 0 2px 8px rgba(124, 58, 237, 0.06);
    --shadow-md: 0 8px 24px rgba(124, 58, 237, 0.10);
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Heebo','Assistant',system-ui,sans-serif;
    background:
      radial-gradient(circle at 10% 0%, #f3eaff 0%, transparent 40%),
      radial-gradient(circle at 90% 100%, #e0f2fe 0%, transparent 40%),
      var(--bg);
    color:var(--ink);
    line-height:1.55;
    min-height:100vh;
  }

  /* ===== Header ===== */
  .topbar{
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:18px 32px;
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    gap:24px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .brand-mark{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg, var(--lavender) 0%, var(--lavender-deep) 100%);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:900;font-size:20px;
    box-shadow:var(--shadow-sm);
  }
  .brand-text{display:flex;flex-direction:column}
  .brand-title{font-weight:900;font-size:18px;color:var(--ink);letter-spacing:-0.3px}
  .brand-sub{font-size:12px;color:var(--ink-muted);font-weight:500}
  .topbar-meta{display:flex;align-items:center;gap:18px;font-size:13px;color:var(--ink-muted)}
  .topbar-meta a{color:var(--lavender-deep);text-decoration:none;font-weight:600}
  .topbar-meta a:hover{text-decoration:underline}

  /* ===== Hero ===== */
  .hero{
    max-width:1280px;margin:0 auto;padding:48px 32px 24px;
  }
  .hero-eyebrow{
    display:inline-block;
    padding:6px 14px;
    background:var(--lavender-soft);
    color:var(--lavender-deep);
    border-radius:999px;
    font-size:13px;font-weight:700;
    margin-bottom:18px;
  }
  .hero h1{
    font-size:clamp(28px,4vw,44px);
    font-weight:900;
    letter-spacing:-0.8px;
    margin:0 0 14px;
    line-height:1.15;
    background:linear-gradient(120deg,var(--ink) 0%, var(--lavender-deep) 60%, var(--ink) 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .hero p{
    font-size:17px;color:var(--ink-muted);
    max-width:780px;margin:0;
  }

  /* ===== Stats strip ===== */
  .stats{
    max-width:1280px;margin:32px auto 0;
    padding:0 32px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
  }
  .stat-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px 22px;
    box-shadow:var(--shadow-sm);
    position:relative;overflow:hidden;
  }
  .stat-card::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg, transparent 0%, var(--surface-2) 100%);
    opacity:0.5;z-index:0;
  }
  .stat-card > *{position:relative;z-index:1}
  .stat-num{font-size:32px;font-weight:900;color:var(--ink);letter-spacing:-1px;line-height:1}
  .stat-label{font-size:13px;color:var(--ink-muted);font-weight:600;margin-top:8px}
  .stat-card.v-lav{border-top:3px solid var(--lavender)}
  .stat-card.v-mint{border-top:3px solid var(--mint)}
  .stat-card.v-rose{border-top:3px solid var(--rose)}
  .stat-card.v-amber{border-top:3px solid var(--amber)}
  .stat-card.v-sky{border-top:3px solid var(--sky)}

  /* ===== Sources section ===== */
  .container{max-width:1280px;margin:0 auto;padding:48px 32px}
  .section-title{
    font-size:24px;font-weight:900;letter-spacing:-0.4px;
    margin:0 0 6px;color:var(--ink);
  }
  .section-sub{font-size:15px;color:var(--ink-muted);margin:0 0 24px}

  /* ===== Source cards grid ===== */
  .sources-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:18px;
    margin-bottom:36px;
  }
  .source-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px;
    box-shadow:var(--shadow-sm);
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    position:relative;
    cursor:pointer;
  }
  .source-card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-md);
    border-color:var(--lavender-soft);
  }
  .source-card.is-active{
    border:2px solid var(--lavender-deep);
    box-shadow:0 10px 28px rgba(124,58,237,0.18);
  }
  .source-card.is-placeholder{
    background:transparent;
    border:2px dashed var(--border);
    color:var(--ink-muted);
    box-shadow:none;
  }
  .source-card.is-placeholder:hover{transform:none;box-shadow:none;border-color:var(--lavender-soft)}
  .source-tag{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    font-size:11px;font-weight:700;
    margin-bottom:12px;
    text-transform:uppercase;letter-spacing:0.5px;
  }
  .tag-grade1{background:var(--mint-soft);color:#065f46}
  .tag-grade2{background:var(--sky-soft);color:#075985}
  .tag-pending{background:#f1f1f7;color:#7a7a9a}
  .source-card h3{
    font-size:18px;font-weight:800;
    margin:0 0 8px;color:var(--ink);
    letter-spacing:-0.2px;
  }
  .source-card p{font-size:14px;color:var(--ink-muted);margin:0 0 14px;line-height:1.5}
  .source-meta{
    display:flex;gap:16px;font-size:12px;color:var(--ink-muted);
    padding-top:14px;border-top:1px solid var(--border);
  }
  .source-meta b{color:var(--ink);font-weight:700;display:block}

  /* ===== Active source viewer ===== */
  .viewer{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    box-shadow:var(--shadow-md);
    overflow:hidden;
    margin-bottom:48px;
  }
  .viewer-head{
    padding:28px 32px;
    background:linear-gradient(135deg, var(--lavender-soft) 0%, #fff 100%);
    border-bottom:1px solid var(--border);
  }
  .viewer-head h2{margin:0 0 6px;font-size:22px;font-weight:900;letter-spacing:-0.4px}
  .viewer-head .src-meta{font-size:13px;color:var(--ink-muted)}
  .viewer-head .src-meta a{color:var(--lavender-deep);font-weight:600}

  .viewer-body{padding:24px 32px}

  /* ===== Filters ===== */
  .filters{
    display:flex;flex-wrap:wrap;gap:8px;
    margin-bottom:20px;
    padding-bottom:18px;border-bottom:1px solid var(--border);
  }
  .filter-btn{
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--ink);
    padding:7px 14px;
    border-radius:999px;
    font-size:13px;font-weight:600;
    cursor:pointer;
    font-family:inherit;
    transition:all 0.15s ease;
  }
  .filter-btn:hover{background:#fff;border-color:var(--lavender)}
  .filter-btn.is-on{
    background:var(--lavender-deep);
    color:#fff;
    border-color:var(--lavender-deep);
  }
  .filter-count{
    opacity:0.7;font-size:11px;margin-inline-start:4px;
  }
  .search-wrap{margin-inline-start:auto;display:flex;align-items:center;gap:8px}
  .search-wrap input{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:999px;
    padding:8px 14px;
    font-family:inherit;font-size:13px;
    width:200px;
    color:var(--ink);
  }
  .search-wrap input:focus{outline:none;border-color:var(--lavender);background:#fff}

  /* ===== Worksheets table ===== */
  .ws-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:10px;
  }
  .ws-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 16px;
    display:flex;align-items:center;gap:12px;
    transition:all 0.15s ease;
    text-decoration:none;color:inherit;
  }
  .ws-card:hover{
    border-color:var(--lavender);
    box-shadow:var(--shadow-sm);
    transform:translateY(-1px);
  }
  .ws-num{
    flex-shrink:0;
    width:36px;height:36px;
    background:var(--surface-2);
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;color:var(--lavender-deep);
  }
  .ws-body{flex:1;min-width:0}
  .ws-title{
    font-weight:600;font-size:14px;color:var(--ink);
    margin:0 0 3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .ws-meta{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--ink-muted)}
  .cat-dot{display:inline-block;width:7px;height:7px;border-radius:50%}
  .cat-reading_writing{background:var(--lavender)}
  .cat-phonological_awareness{background:var(--sky)}
  .cat-reading_comprehension{background:var(--rose)}
  .cat-vocabulary{background:var(--amber)}
  .cat-language_structure{background:var(--mint)}

  /* ===== Legend ===== */
  .legend{
    display:flex;flex-wrap:wrap;gap:14px;
    background:var(--surface-2);
    border-radius:14px;
    padding:14px 18px;
    margin-bottom:18px;
    font-size:12px;
  }
  .legend-item{display:flex;align-items:center;gap:7px;color:var(--ink-muted);font-weight:600}

  /* ===== Empty state ===== */
  .empty-state{
    text-align:center;padding:48px 24px;color:var(--ink-muted);
  }
  .empty-state strong{color:var(--ink);display:block;margin-bottom:6px}

  /* ===== Roadmap section ===== */
  .roadmap{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    padding:32px;
    margin-top:32px;
    box-shadow:var(--shadow-sm);
  }
  .roadmap h2{margin:0 0 20px;font-size:22px;font-weight:900;letter-spacing:-0.4px}
  .stage-list{display:grid;gap:14px}
  .stage{
    display:flex;gap:18px;
    padding:18px 20px;
    background:var(--surface-2);
    border-radius:14px;
    border-inline-start:4px solid var(--lavender);
  }
  .stage-num{
    flex-shrink:0;
    width:42px;height:42px;
    background:var(--lavender-deep);color:#fff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:16px;
  }
  .stage h4{margin:0 0 5px;font-size:16px;font-weight:800}
  .stage p{margin:0;font-size:14px;color:var(--ink-muted);line-height:1.55}
  .stage-tag{
    display:inline-block;padding:2px 8px;border-radius:6px;
    background:#fff;border:1px solid var(--border);
    font-size:11px;font-weight:700;color:var(--ink-muted);
    margin-inline-start:8px;
  }

  /* ===== Footer ===== */
  .foot{
    text-align:center;padding:36px 24px;
    color:var(--ink-muted);font-size:13px;
    border-top:1px solid var(--border);
    background:var(--surface);
    margin-top:48px;
  }
  .foot a{color:var(--lavender-deep);text-decoration:none;font-weight:600}

  @media (max-width:768px){
    .topbar{padding:14px 18px}
    .hero{padding:32px 18px 16px}
    .container{padding:32px 18px}
    .stats{padding:0 18px}
    .viewer-head{padding:20px}
    .viewer-body{padding:18px}
    .search-wrap input{width:140px}
    .search-wrap{margin-inline-start:0;width:100%}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">י</div>
    <div class="brand-text">
      <div class="brand-title">ידע פדגוגי — אבני יסוד</div>
      <div class="brand-sub">ImpactOS · Learning Engine · מאגר מקורות לפיתוח פאקים דיפרנציאליים</div>
    </div>
  </div>
  <div class="topbar-meta">
    <span>עודכן: 20.5.2026</span>
    <a href="../literacy-grade1-2-yearly.html">חזרה לתוכנית השנתית</a>
  </div>
</header>

<style>
  /* ===== Framework viewer (תוכנית-מסגרת, להבדיל מדפי עבודה) ===== */
  .framework-section{margin-bottom:32px}
  .framework-section h3{
    font-size:18px;font-weight:900;letter-spacing:-0.3px;
    margin:0 0 4px;color:var(--lavender-deep);
    display:flex;align-items:center;gap:10px;
  }
  .framework-section h3 .pill{
    background:var(--lavender-soft);color:var(--lavender-deep);
    font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;
    letter-spacing:0.3px;
  }
  .framework-section .sec-intro{
    font-size:13px;color:var(--ink-muted);margin:0 0 14px;
  }
  .concept-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;
  }
  .concept-card{
    background:var(--surface-2);border:1px solid var(--border);
    border-radius:14px;padding:16px 18px;
    transition:all 0.15s ease;
  }
  .concept-card:hover{border-color:var(--lavender);background:#fff}
  .concept-card .num{
    display:inline-block;width:26px;height:26px;
    background:var(--lavender-deep);color:#fff;
    border-radius:50%;text-align:center;line-height:26px;
    font-weight:900;font-size:12px;margin-bottom:8px;
  }
  .concept-card h4{
    margin:0 0 6px;font-size:15px;font-weight:800;color:var(--ink);
  }
  .concept-card .age{
    display:inline-block;font-size:11px;font-weight:700;
    background:var(--mint-soft);color:#065f46;
    padding:2px 8px;border-radius:6px;margin-bottom:8px;
  }
  .concept-card p{margin:0;font-size:13px;color:var(--ink-muted);line-height:1.5}
  .concept-card ul{margin:6px 0 0;padding-inline-start:18px;font-size:13px;color:var(--ink-muted)}
  .concept-card .engine-note{
    margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);
    font-size:12px;color:var(--lavender-deep);font-weight:600;
  }

  .difficulty-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
  .difficulty-table th{
    background:var(--lavender-soft);color:var(--lavender-deep);
    padding:10px 14px;text-align:right;font-weight:800;font-size:12px;
  }
  .difficulty-table td{padding:10px 14px;border-top:1px solid var(--border);color:var(--ink-muted)}
  .difficulty-table td:first-child{font-weight:700;color:var(--ink)}

  .rti-pyramid{
    display:flex;flex-direction:column;align-items:center;gap:6px;margin:14px 0;
  }
  .rti-tier{
    border-radius:14px;padding:14px 22px;color:#fff;font-weight:700;
    display:flex;align-items:center;justify-content:space-between;gap:18px;
    box-shadow:var(--shadow-sm);
  }
  .rti-tier.t1{background:linear-gradient(135deg,#86efac,#10b981);width:100%}
  .rti-tier.t2{background:linear-gradient(135deg,#fcd34d,#f59e0b);width:75%}
  .rti-tier.t3{background:linear-gradient(135deg,#fda4af,#ef4444);width:45%}
  .rti-tier .pct{font-size:18px;font-weight:900}
  .rti-tier .name{font-size:14px}

  .compat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:10px}
  @media(max-width:720px){.compat-grid{grid-template-columns:1fr}}
  .compat-col{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px}
  .compat-col h4{margin:0 0 10px;font-size:14px;font-weight:800}
  .compat-col.ok h4{color:#10b981}
  .compat-col.gap h4{color:#f59e0b}
  .compat-col ul{margin:0;padding-inline-start:18px;font-size:13px;color:var(--ink-muted);line-height:1.7}
  .compat-col li{margin-bottom:4px}

  .researcher-list{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;
    font-size:13px;
  }
  .researcher-item{
    background:#fff;border:1px solid var(--border);border-radius:10px;
    padding:10px 14px;color:var(--ink-muted);
  }
  .researcher-item b{color:var(--ink);font-weight:700;display:block;font-size:13px}

  /* ===== Lessons-books viewer (קסם וחברים — חוברות+שיעורים) ===== */
  .book-block{
    background:#fff;border:1px solid var(--border);border-radius:18px;
    padding:22px 26px;margin-bottom:18px;
    border-inline-start:6px solid var(--lavender);
    box-shadow:var(--shadow-sm);
  }
  .book-block.book-1{border-inline-start-color:#6366F1}
  .book-block.book-2{border-inline-start-color:#EC4899}
  .book-block.book-3{border-inline-start-color:#14B8A6}
  .book-block.book-4{border-inline-start-color:#F59E0B}
  .book-block.book-5{border-inline-start-color:#8B5CF6}
  .book-head{display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap}
  .book-pill{
    width:46px;height:46px;border-radius:13px;color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:22px;flex-shrink:0;
  }
  .book-block.book-1 .book-pill{background:#6366F1}
  .book-block.book-2 .book-pill{background:#EC4899}
  .book-block.book-3 .book-pill{background:#14B8A6}
  .book-block.book-4 .book-pill{background:#F59E0B}
  .book-block.book-5 .book-pill{background:#8B5CF6}
  .book-head h4{margin:0;font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-0.2px}
  .book-head .book-meta{font-size:12px;color:var(--ink-muted);font-weight:600}
  .book-rationale{font-size:13px;color:var(--ink-muted);margin:8px 0 14px;line-height:1.55}

  .lesson-pills{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;
    margin-top:10px;
  }
  .lesson-pill{
    background:var(--surface-2);border:1px solid var(--border);
    border-radius:12px;padding:12px;text-align:center;
    transition:all 0.15s ease;
  }
  .lesson-pill:hover{background:#fff;border-color:var(--lavender);transform:translateY(-1px)}
  .lesson-pill .l-num{font-size:11px;color:var(--ink-muted);font-weight:600;margin-bottom:4px}
  .lesson-pill .l-letters{font-size:24px;font-weight:900;color:var(--ink);letter-spacing:1px;line-height:1.1;margin:4px 0}
  .lesson-pill .l-cumul{font-size:11px;color:var(--lavender-deep);font-weight:700;margin-top:4px}
  .lesson-pill .l-note{font-size:10.5px;color:var(--ink-muted);margin-top:4px;line-height:1.4}

  .sub-unit-row{
    background:var(--surface-2);border-radius:12px;padding:14px 16px;
    margin-top:10px;border:1px solid var(--border);
  }
  .sub-unit-top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .sub-unit-top .name{font-weight:800;font-size:15px;color:var(--ink)}
  .sub-unit-top .range{font-size:12px;background:#fff;padding:2px 8px;border-radius:6px;color:var(--ink-muted);font-weight:700;border:1px solid var(--border)}
  .sub-unit-top .phoneme{font-family:'Inter',monospace;font-size:13px;color:var(--lavender-deep);font-weight:700;background:var(--lavender-soft);padding:2px 10px;border-radius:6px}
  .sub-unit-top .niqqud{font-size:18px;color:var(--ink);font-weight:700}
  .sub-unit-why{font-size:12.5px;color:var(--ink-muted);line-height:1.55}

const SOURCES = {

  'pedagogy-verification-2026-05-21':   {file:'sources/pedagogy-verification-2026-05-21.json',   type:'framework'}
};
const CAT_LABELS = {
  reading_writing: 'קריאה וכתיבה',
  phonological_awareness: 'מודעות פונולוגית',
  reading_comprehension: 'הבנת הנקרא',
  vocabulary: 'אוצר מילים',
  language_structure: 'מבנה הלשון'
};

let DATA = null;
let DATA_TYPE = null;
let activeSource = 'moe-curriculum-tashpav-2026';
let activeCat = 'all';
let searchQ = '';

async function loadSource(id){
  const cfg = SOURCES[id];
  if(!cfg) return;
  activeSource = id;
  DATA_TYPE = cfg.type;
  try{
    const r = await fetch(cfg.file);
    if(!r.ok) throw new Error('failed to load JSON');
    DATA = await r.json();
    render();
  } catch(e){
    document.querySelector('.viewer-body').innerHTML =
      '<div class="empty-state">' +
      '<strong>שגיאה בטעינה</strong>לא הצלחנו לטעון את הקובץ ' + cfg.file + '<br>' +
      '<small style="opacity:0.6">' + e.message + '</small></div>';
  }
}

function render(){
  if(!DATA) return;
  document.querySelectorAll('.source-card').forEach(c => c.classList.remove('is-active'));
  const activeEl = document.querySelector('[data-source="' + activeSource + '"]');
  if(activeEl) activeEl.classList.add('is-active');

  if(DATA_TYPE === 'worksheets') renderWorksheets();
  else if(DATA_TYPE === 'framework') renderFramework();
  else if(DATA_TYPE === 'lessons_books') renderLessonsBooks();
  else if(DATA_TYPE === 'lomda_catalog') renderLomdaCatalog();
}

function renderWorksheets(){
  const ws = DATA.worksheets || [];
  const counts = {all: ws.length};
  Object.keys(CAT_LABELS).forEach(k => counts[k] = ws.filter(w => w.category === k).length);

  document.getElementById('stat-total').textContent = ws.length;
  document.getElementById('stat-rw').textContent = counts.reading_writing;
  document.getElementById('stat-rc').textContent = counts.reading_comprehension;
  document.getElementById('stat-pa').textContent = counts.phonological_awareness;

  Object.entries(counts).forEach(([k,v]) => {
    const el = document.getElementById('cnt-' + k);
    if(el) el.textContent = '(' + v + ')';
  });

  document.getElementById('viewer-head').innerHTML =
    '<h2>' + DATA.source.name + '</h2>' +
    '<div class="src-meta">' +
    DATA.source.publisher + ' · ' +
    'כיתה ' + DATA.source.grade + ' · ' +
    DATA.source.total_items + ' פריטים · ' +
    'נסרק: ' + DATA.source.fetched_at + ' · ' +
    '<a href="' + DATA.source.url + '" target="_blank" rel="noopener">דף המקור באינטרנט</a>' +
    '</div>';

  document.querySelector('.viewer-body').innerHTML = WORKSHEETS_BODY_HTML;
  document.getElementById('filters').addEventListener('click', filterClick);
  document.getElementById('search-input').addEventListener('input', searchInput);
  renderList();
}

function renderFramework(){
  const d = DATA;
  document.getElementById('stat-total').textContent = '—';

  document.getElementById('stat-rc').textContent = d.developmental_stages.stages.length;
  document.getElementById('stat-pa').textContent = d.phonological_awareness_difficulty_dimensions.dimensions.length;
  document.getElementById('stat-sources').textContent = '2';
  document.querySelector('.stat-card.v-lav .stat-label').textContent = 'מסמך-מסגרת';
  document.querySelector('.stat-card.v-sky .stat-label').textContent = 'רכיבי המודל';
  document.querySelector('.stat-card.v-rose .stat-label').textContent = 'שלבי רכישה';
  document.querySelector('.stat-card.v-amber .stat-label').textContent = 'גורמי קושי PA';

  document.getElementById('viewer-head').innerHTML =
    '<h2>' + d.source.name + '</h2>' +
    '<div class="src-meta">' +
    d.source.publisher + ' · ' +
    d.source.publication_year + ' · ' +
    'נסרק: ' + d.source.fetched_at + ' · ' +
    '<a href="' + d.source.url + '" target="_blank" rel="noopener">PDF מקורי</a> · ' +
    '<a href="' + d.source.portal_url + '" target="_blank" rel="noopener">פורטל פופ</a>' +

function sectionWrap(num, title, inner){

        '</div>' +
        '<div class="compat-col gap">' +

  }

  document.querySelector('.viewer-body').innerHTML = html;
}

function filterClick(e){
  const btn = e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('is-on'));
  btn.classList.add('is-on');
  activeCat = btn.dataset.cat;
  renderList();
}
function searchInput(e){ searchQ = e.target.value; renderList(); }

function renderList(){
  if(!DATA || DATA_TYPE !== 'worksheets') return;
  const ws = DATA.worksheets;
  const filtered = ws.filter(w => {
    if(activeCat !== 'all' && w.category !== activeCat) return false;
    if(searchQ){
      const hay = (w.title + ' ' + (w.letter || '') + ' ' + (w.vowel || '')).toLowerCase();
      if(!hay.includes(searchQ.toLowerCase())) return false;
    }
    return true;
  });

  const grid = document.getElementById('ws-grid');
  const empty = document.getElementById('empty-state');
  if(filtered.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(w => {
    const meta = [];
    if(w.letter) meta.push('אות ' + w.letter);
    if(w.vowel) meta.push(w.vowel);
    meta.push(CAT_LABELS[w.category] || w.category);
    return '<a href="' + w.pdf + '" target="_blank" rel="noopener" class="ws-card">' +
      '<div class="ws-num">' + w.id + '</div>' +
      '<div class="ws-body">' +
        '<div class="ws-title">' + w.title + '</div>' +
        '<div class="ws-meta">' +
          '<span class="cat-dot cat-' + w.category + '"></span>' +
          meta.join(' · ') +
        '</div>' +
      '</div>' +
    '</a>';
  }).join('');
}

document.getElementById('sources-grid').addEventListener('click', e => {
  const card = e.target.closest('.source-card[data-source]');
  if(!card) return;
  loadSource(card.dataset.source);
});

loadSource(activeSource);
