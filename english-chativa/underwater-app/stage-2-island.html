<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#A8E8FF">
  <title>אי 2 · שונית גלי הצליל</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    body {
      background: linear-gradient(180deg, #C5F0FF 0%, #A8E8FF 50%, #73D9D1 100%);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ===== Top bar ===== */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: var(--space-m);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }

    .icon-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 6px 16px rgba(38, 80, 92, 0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-main);
      text-decoration: none;
    }
    .icon-btn:active { transform: scale(0.92); }

    /* ===== Header ===== */
    .island-header {
      padding: 80px 16px 24px;
      text-align: center;
      animation: fade-down 700ms ease-out;
    }
    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .island-title {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 900;
      color: var(--text-main);
      margin: 0 0 6px;
      text-shadow: 0 2px 8px rgba(255, 255, 255, 0.5);
    }
    .island-subtitle {
      font-size: clamp(15px, 3vw, 19px);
      color: var(--text-soft);
      margin: 0;
      max-width: 50ch;
      margin-inline: auto;
      line-height: 1.5;
    }

    /* ===== Quests grid ===== */
    .quests-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 16px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: clamp(14px, 3vw, 22px);
    }

    /* ===== Quest card ===== */
    .quest-card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 24px;
      background: linear-gradient(180deg,
                  rgba(255, 255, 255, 0.92) 0%,
                  rgba(220, 246, 245, 0.88) 100%);
      box-shadow:
        0 14px 28px rgba(38, 80, 92, 0.18),
        inset 0 2px 8px rgba(255, 255, 255, 0.95);
      padding: 16px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: transform 280ms cubic-bezier(.34,1.56,.64,1),
                  box-shadow 280ms ease;
      cursor: pointer;
      opacity: 0;
      animation: card-rise 700ms cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .quest-card:nth-child(1) { animation-delay: 200ms; }
    .quest-card:nth-child(2) { animation-delay: 340ms; }
    .quest-card:nth-child(3) { animation-delay: 480ms; }

    @keyframes card-rise {
      from { opacity: 0; transform: translateY(20px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .quest-card:active { transform: scale(0.96); }

    /* Number badge — top-right corner */
    .quest-number {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(38, 80, 92, 0.12);
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* Icon circle — the visual identity of each quest */
    .quest-icon {
      width: clamp(78px, 17vw, 110px);
      height: clamp(78px, 17vw, 110px);
      border-radius: 50%;
      box-shadow:
        0 10px 22px rgba(38, 80, 92, 0.25),
        inset 0 2px 8px rgba(255, 255, 255, 0.7);
      display: flex; align-items: center; justify-content: center;
      margin-top: 6px;
      animation: icon-bob 4s ease-in-out infinite;
      overflow: hidden;
    }
    @keyframes icon-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    /* Per-quest icon backgrounds */
    .quest-icon[data-icon="seaweed"] {
      background: radial-gradient(circle at 32% 28%,
                  #FFFFFF 0%, #DCF6EC 30%, #73D9D1 95%);
    }
    .quest-icon[data-icon="fish"] {
      background: radial-gradient(circle at 32% 28%,
                  #FFFFFF 0%, #FFE7A8 30%, #FFA98D 95%);
    }
    .quest-icon[data-icon="shell"] {
      background: radial-gradient(circle at 32% 28%,
                  #FFFFFF 0%, #FFD3D8 30%, #FFA98D 95%);
    }

    .quest-icon-svg {
      width: 64%;
      height: 64%;
      filter: drop-shadow(0 2px 4px rgba(38, 80, 92, 0.25));
    }

    .quest-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .quest-name {
      font-size: clamp(15px, 3vw, 18px);
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.25;
    }
    .quest-tagline {
      font-size: clamp(12px, 2.4vw, 14px);
      color: var(--text-soft);
      line-height: 1.3;
      min-height: 2.6em;
    }

    /* ===== State: available (current) ===== */
    .quest-card.state-current {
      animation: card-rise 700ms cubic-bezier(.34,1.56,.64,1) forwards,
                 current-glow 2.6s ease-in-out infinite 1s;
    }
    @keyframes current-glow {
      0%, 100% {
        box-shadow:
          0 14px 28px rgba(38, 80, 92, 0.18),
          inset 0 2px 8px rgba(255, 255, 255, 0.95),
          0 0 0 0 rgba(255, 231, 168, 0.6);
      }
      50% {
        box-shadow:
          0 14px 28px rgba(38, 80, 92, 0.22),
          inset 0 2px 8px rgba(255, 255, 255, 0.95),
          0 0 0 14px rgba(255, 231, 168, 0);
      }
    }

    /* ===== State: completed ===== */
    .quest-card.state-completed {
      background: linear-gradient(180deg,
                  rgba(220, 246, 236, 0.95) 0%,
                  rgba(184, 242, 207, 0.88) 100%);
    }
    .quest-card.state-completed .completed-check {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--water-secondary, #73D9D1);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(115, 217, 209, 0.5);
    }
    .quest-card.state-completed .completed-check svg {
      width: 16px; height: 16px;
    }

    /* ===== State: locked ===== */
    .quest-card.state-locked {
      opacity: 0.62;
      filter: blur(0.4px);
      cursor: default;
      pointer-events: none;
    }
    .quest-card.state-locked .quest-icon {
      filter: grayscale(0.6) brightness(0.95);
      animation: none;
    }
    .quest-card.state-locked .lock-icon {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 8px rgba(38, 80, 92, 0.12);
    }
    .quest-card.state-locked .lock-icon svg {
      width: 14px; height: 14px;
      color: var(--text-soft);
    }

    /* ===== Progress bar at the bottom ===== */
    .progress-bar {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .progress-track {
      width: 100%;
      max-width: 320px;
      height: 8px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(38, 80, 92, 0.15);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #73D9D1, #FFA98D);
      border-radius: 999px;
      transition: width 800ms cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 0 12px rgba(115, 217, 209, 0.55);
    }
    .progress-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-soft);
    }

    /* ===== Noni overlay ===== */
    .island-noni { display: none; }
    @keyframes noni-float {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-8px) rotate(3deg); }
    }
    @media (min-width: 820px) {
      .island-noni {
        display: block;
        position: fixed;
        bottom: clamp(8px, 2vh, 20px);
        left: clamp(8px, 3vw, 20px);
        width: clamp(100px, 12vw, 140px);
        z-index: 8;
        pointer-events: none;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.22));
        animation: noni-float 4s ease-in-out infinite;
      }
    }
  </style>
</head>
<body>

  <!-- Shared SVG defs — reusable icons -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- Seaweed icon — fronds curling up -->
      <symbol id="iconSeaweed" viewBox="0 0 60 80">
        <g fill="#1E6B5E" stroke="#0F4A40" stroke-width="1">
          <path d="M 30 78 Q 22 62, 26 48 Q 30 32, 22 18 Q 28 28, 32 36 Q 36 24, 30 10 Q 38 24, 34 42 Q 38 56, 30 78 Z"/>
          <path d="M 30 78 Q 38 64, 36 52 Q 34 38, 42 24 Q 38 38, 40 50 Q 42 64, 30 78 Z" opacity="0.78"/>
          <path d="M 30 78 Q 24 68, 18 56 Q 14 42, 18 30 Q 18 42, 22 52 Q 24 66, 30 78 Z" opacity="0.7"/>
        </g>
      </symbol>

      <!-- Fish icon — happy swimming fish -->
      <symbol id="iconFish" viewBox="0 0 80 60">
        <g>
          <path d="M 70 30 L 80 12 L 80 48 Z" fill="#E27F66"/>
          <ellipse cx="36" cy="30" rx="34" ry="22" fill="#E27F66"/>
          <ellipse cx="32" cy="38" rx="18" ry="8" fill="#FFFFFF" opacity="0.5"/>
          <circle cx="14" cy="24" r="4" fill="#FFFFFF"/>
          <circle cx="14" cy="24" r="2" fill="#26505C"/>
          <path d="M 8 32 Q 14 36, 22 32" stroke="#26505C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        </g>
      </symbol>

      <!-- Shell icon — clam shell with ribs -->
      <symbol id="iconShell" viewBox="0 0 80 80">
        <g>
          <path d="M 40 72
                   C 12 72, 4 48, 10 30
                   C 18 12, 40 6, 62 12
                   C 76 22, 76 50, 66 62
                   C 58 70, 50 72, 40 72 Z"
                fill="#FFD3D8" stroke="#C26A52" stroke-width="2"/>
          <g stroke="#C26A52" stroke-width="1.4" fill="none" opacity="0.6" stroke-linecap="round">
            <path d="M 40 70 L 40 14"/>
            <path d="M 40 70 L 24 22"/>
            <path d="M 40 70 L 56 22"/>
            <path d="M 40 70 L 14 38"/>
            <path d="M 40 70 L 66 38"/>
          </g>
          <ellipse cx="40" cy="72" rx="8" ry="3" fill="#C26A52" opacity="0.7"/>
        </g>
      </symbol>
    </defs>
  </svg>

  <header class="top-bar">
    <a href="map.html" class="icon-btn" aria-label="חזרה למפה">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="pearl-counter" aria-label="פנינים">
      <span class="pearl" aria-hidden="true"></span>
      <span class="count" id="pearlCount">0</span>
    </div>
  </header>

  <div class="island-header">
    <h1 class="island-title">אי 2 · שונית גלי הצליל</h1>
    <p class="island-subtitle">שלוש הרפתקאות צליל. כל אחת לוחשת לכם משהו שונה.</p>
  </div>

  <main class="quests-container" id="questsContainer">
    <!-- 3 quest cards inserted by JS -->
  </main>

  <div class="progress-bar">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0/3 הרפתקאות</div>
  </div>

  <img class="island-noni" src="assets/noni-hero-transparent.png" alt="נוני"
       onerror="this.src='assets/noni-idle.png'">

  <script src="js/state.js"></script>
  <script>
  // ============================================================
  // stage-2-island.html — מסך פתיחה של אי 2 · שונית גלי הצליל
  //
  // סדר פדגוגי (קל → קשה):
  // 1. אצות התאומות — same/different פותח (אבחנה בינארית)
  // 2. להקות הדגיגים — sort-by-phoneme פותח (אבחנה רב-קטגורית)
  // 3. ים השמועות — memory-pair עיצור-סוגר (memory load + סוגר קשה מפותח)
  //
  // localStorage key: 'island2-quests:completed'
  // (תואם למה ש-twin-seaweeds, fish-schools, whispers כותבים אליו)
  // ============================================================

  const QUESTS = [
    {
      id: 'twin-seaweeds',
      iconType: 'seaweed',
      iconSymbol: '#iconSeaweed',
      name: 'אצות התאומות',
      tagline: 'זהה או שונה בצליל הפותח',
      href: 'stage-2-twin-seaweeds.html',
      built: true,
    },
    {
      id: 'fish-schools',
      iconType: 'fish',
      iconSymbol: '#iconFish',
      name: 'להקות הדגיגים',
      tagline: 'איזה דגיג שייך לאיזו להקה?',
      href: 'stage-2-fish-schools.html',
      built: true,
    },
    {
      id: 'whispers',
      iconType: 'shell',
      iconSymbol: '#iconShell',
      name: 'ים השמועות',
      tagline: 'זוגות מילים שמסתיימות באותו צליל',
      href: 'stage-2-whispers.html',
      built: true,
    },
  ];

  const QUESTS_STORAGE_KEY = 'island2-quests:completed';

  function getCompletedQuests() {
    try {
      return JSON.parse(localStorage.getItem(QUESTS_STORAGE_KEY) || '[]');
    } catch {
      return [];
    }
  }

  function isQuestCompleted(quest) {
    if (!quest.built) return false;
    return getCompletedQuests().includes(quest.id);
  }

  function getQuestState(quest, prevQuestCompleted) {
    if (!quest.built) return 'coming-soon';
    if (isQuestCompleted(quest)) return 'completed';
    if (prevQuestCompleted) return 'current';
    return 'locked';
  }

  function renderQuests() {
    const container = document.getElementById('questsContainer');
    container.innerHTML = '';

    let prevCompleted = true; // First quest is always available
    let completedCount = 0;

    QUESTS.forEach((quest, i) => {
      const state = getQuestState(quest, prevCompleted);
      if (state === 'completed') completedCount++;

      const isClickable = (state === 'current' || state === 'completed') && quest.href;
      const el = document.createElement(isClickable ? 'a' : 'div');
      el.className = `quest-card state-${state}`;
      if (isClickable) el.href = quest.href;
      el.setAttribute('aria-label', quest.name);

      let topLeftHtml = '';
      if (state === 'completed') {
        topLeftHtml = `
          <div class="completed-check" aria-label="הושלם">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M5 13l4 4 10-10" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>`;
      } else if (state === 'locked') {
        topLeftHtml = `
          <div class="lock-icon" aria-label="נעול">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="5" y="11" width="14" height="10" rx="2" fill="currentColor"/>
              <path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2.2" fill="none"/>
            </svg>
          </div>`;
      }

      el.innerHTML = `
        <div class="quest-number">${i + 1}</div>
        ${topLeftHtml}
        <div class="quest-icon" data-icon="${quest.iconType}" aria-hidden="true">
          <svg class="quest-icon-svg"><use href="${quest.iconSymbol}"/></svg>
        </div>
        <div class="quest-info">
          <div class="quest-name">${quest.name}</div>
          <div class="quest-tagline">${quest.tagline}</div>
        </div>
      `;

      container.appendChild(el);
      prevCompleted = (state === 'completed');
    });

    const pct = Math.round((completedCount / QUESTS.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent =
      completedCount + '/' + QUESTS.length + ' הרפתקאות';
  }

  function updatePearls() {
    if (typeof getPearls === 'function') {
      document.getElementById('pearlCount').textContent = getPearls();
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderQuests();
    updatePearls();
  });

  // Dev shortcut: ?reset=1 wipes island 2 progress
  const params = new URLSearchParams(window.location.search);
  if (params.get('reset') === '1') {
    localStorage.removeItem(QUESTS_STORAGE_KEY);
    console.log('Island 2 progress reset.');
  }
  </script>
</body>
</html>
