<!DOCTYPE html>
<html lang="he" dir="rtl" data-arabic-verified="false">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>מישמיש · مشمش — שוק</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700&family=Heebo:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
</head>
<body>
  <main class="app">
    <section class="scene" data-audio="idle">

      <!-- שורה עליונה -->
      <header class="topbar">
        <div id="progress" class="progress" aria-label="התקדמות"></div>
        <div id="place-chip" class="place-chip">
          <span class="he"></span><span class="ar">بالسوق</span>
        </div>
      </header>

      <!-- אזור מרכזי -->
      <div class="stage">
        <p id="instr" class="sr-only" aria-live="polite"></p>

        <img id="mishmish" class="mishmish" src="../assets/characters/mishmish/mishmish-idle.png" alt="מישמיש">

        <div class="bubble"><span id="bubble-he" class="he"></span></div>

        <button id="listen" class="listen" type="button">
          <img class="ico" src="../assets/icons/icon-audio.svg" alt="">
          <span>הַאֲזָנָה</span>
        </button>
        <span class="audio-error">האודיו לא נטען — לחצו שוב 🔊</span>

        <!-- אריחי-תשובה -->
        <div id="tiles" class="tiles" role="group" aria-label="בחרו תמונה"></div>

        <!-- שורת-פיגום (עמית). טקסט ערבי מגודר עד אימות בודק ילידי. -->
        <div id="scaffold" class="scaffold" hidden>
          <img class="peer" src="../assets/characters/peers/amir-hint.png" alt="">
          <span class="tag">עֶזְרָה · مساعدة</span>
          <span class="ar" lang="ar">اسمع شو بدّه، وبعدين اختار الصورة</span>
        </div>
      </div>

      <!-- שורת שפת-הישרדות (רוחבית, זמינה-תמיד). מוזרקת מ-data/scaffold.json
           דרך MishmishScaffold.render — מקור-אמת יחיד, לא מקודדת פה. -->
      <nav id="survival" class="survival" aria-label="עזרה"></nav>

    </section>
  </main>

  <!-- סדר-טעינה קבוע (וניל, file://-safe): data → data-loader → audio → bkt → measured → play -->
  <script src="js/data.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/bkt.js"></script>
  <script src="js/measured.js"></script>
  <script src="js/shared/scaffold.js"></script>
  <script src="js/play.js"></script>
  <script>
    MishmishScaffold.render('#survival');   /* מזריק את שורת ההישרדות לפני start() → #sv-* קיימים ל-play.js */
    window.MishmishPlay.start();
  </script>
</body>
</html>
