<!DOCTYPE html>
<html lang="he" dir="rtl" data-arabic-verified="false">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>מישמיש · مشمش — אוֹתוֹ אוֹ שׁוֹנֶה?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700&family=Heebo:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/tokens.css">
  <style>
    /* ── מכניקת "אוֹתוֹ אוֹ שׁוֹנֶה?" — הבחנת-צליל (פּ/בּ, גל 1–2 שמיעתי) ──
       CSS עצמאי; טוקנים מ-tokens.css. אין gradient ייחודי למשחקון —
       ההבחנה היא הנושא/התפאורה (רקע-PNG), לא צבע. */
    * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font-he); }
    body { background: #14202a; }

    .stage { position: fixed; inset: 0; overflow: hidden; }
    .scene-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    /* צעיף רך כדי שהמלל/האריחים יקראו מעל הרקע (לא gradient-משחקון, רק קריאוּת) */
    .veil { position: absolute; inset: 0; z-index: 1; background: rgba(20,32,42,.28); pointer-events: none; }

    /* שורה עליונה: התקדמות + שם-מקום */
    .topbar { position: absolute; top: 0; inset-inline: 0; z-index: 40; display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; gap: 10px; }
    .progress { display: flex; gap: 7px; background: rgba(255,250,241,.9); padding: 8px 13px; border-radius: var(--radius-pill); box-shadow: var(--shadow-soft); }
    .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(0,0,0,.14); transition: transform .3s var(--ease-soft), background .3s; }
    .dot.done { background: var(--color-apricot-500); }
    .dot.current { background: var(--color-sun-500); transform: scale(1.35); }
    .place-chip { background: rgba(38,55,70,.72); color: #fff; font-weight: 700; font-size: 14px; padding: 6px 14px; border-radius: var(--radius-pill); }
    .place-chip .ar { font-family: var(--font-ar); opacity: .7; margin-inline-start: 6px; }
    [data-arabic-verified="false"] .place-chip .ar { display: none; }

    /* בועת-ההוראה */
    .bubble-wrap { position: absolute; top: 62px; inset-inline: 0; z-index: 41; display: flex; justify-content: center; pointer-events: none; }
    .bubble { background: rgba(255,250,241,.96); color: var(--color-ink-900); font-weight: 900; font-size: clamp(22px,6vw,32px); padding: 9px 28px; border-radius: var(--radius-pill); box-shadow: var(--shadow-card); }

    /* שתי ההשמעות — כרטיסי-אוזן (1) ו-(2) */
    .sounds { position: absolute; top: 128px; inset-inline: 0; z-index: 30; display: flex; gap: clamp(14px,4vw,28px); justify-content: center; }
    .snd { display: flex; flex-direction: column; align-items: center; gap: 6px; width: clamp(96px,26vw,150px); min-height: 56px;
      background: rgba(255,255,255,.94); border: 3px solid var(--color-border-soft); border-radius: var(--radius-xl);
      padding: 14px 10px; box-shadow: var(--shadow-soft); color: var(--color-ink-700); cursor: pointer; transition: transform .18s var(--ease-soft); }
    .snd:active { transform: scale(.96); }
    .snd .num { font-weight: 900; font-size: clamp(20px,5vw,26px); color: var(--color-ink-500); }
    .snd .ear { width: clamp(38px,9vw,52px); height: clamp(38px,9vw,52px); }
    .snd[data-audio="playing"] { border-color: var(--color-sky-500); animation: sndPulse 1s ease infinite; }
    @keyframes sndPulse { 50% { box-shadow: 0 0 0 8px rgba(79,157,200,.22), var(--shadow-soft); } }
    .snd.done { border-color: var(--color-mint-500); }

    /* אריחי-השיפוט: "אוֹתוֹ" / "שׁוֹנֶה" — גדולים (≥56px), נעולים עד סוף ההשמעה */
    .tiles { position: absolute; inset-inline: 0; bottom: 120px; z-index: 31; display: flex; gap: clamp(14px,4vw,26px); justify-content: center; padding: 0 14px; }
    .tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      width: clamp(130px,40vw,210px); min-height: clamp(120px,30vw,168px);
      background: rgba(255,250,241,.97); border: 4px solid var(--color-border-soft); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card); font-family: var(--font-he); font-weight: 900; font-size: clamp(26px,7vw,40px);
      color: var(--color-ink-900); cursor: pointer; transition: transform .16s var(--ease-soft), box-shadow .2s, opacity .2s; }
    .tile .glyph { font-size: clamp(40px,11vw,64px); line-height: 1; }
    .tile:active { transform: scale(.96); }
    .tile[aria-disabled="true"] { opacity: .5; cursor: default; pointer-events: none; }
    /* נבחר-נכון = הבלטת-זהות (משמש/זהב), לא ירוק */
    .tile.chosen { border-color: var(--color-sun-500); box-shadow: 0 0 0 5px rgba(243,202,103,.5), var(--shadow-card); animation: pop .5s var(--ease-soft); }
    @keyframes pop { 0%{transform:scale(1);} 45%{transform:scale(1.09);} 100%{transform:scale(1);} }
    /* הצבעה חזותית (רמז / חיווי-טעות) — מסגרת-רמז ניטרלית, בלי אדום */
    .tile.point { border-color: var(--color-state-hint, #b0cf80); animation: pointPulse 1.1s ease-in-out infinite; }
    @keyframes pointPulse { 0%,100%{box-shadow:0 0 0 3px rgba(176,207,128,.5),var(--shadow-card);} 50%{box-shadow:0 0 0 7px rgba(176,207,128,.9),var(--shadow-card);} }

    /* מישמיש (דמות חיה) */
    .mishmish { position: absolute; bottom: 6px; inset-inline-start: 6px; width: clamp(92px,23vw,140px); z-index: 28; filter: drop-shadow(0 6px 12px rgba(0,0,0,.5)); transition: transform .25s; }
    .mishmish.celebrate { animation: cheer .7s ease; }
    @keyframes cheer { 30%{transform:translateY(-14px) rotate(-4deg) scale(1.06);} 60%{transform:translateY(0) rotate(3deg);} }

    /* פיגום-עמית (אמיר) — טקסט ערבי מגודר עד אימות בודק ילידי */
    .scaffold { position: absolute; bottom: 12px; inset-inline-end: 12px; z-index: 30; display: none; align-items: center; gap: 8px; background: rgba(255,250,241,.94); padding: 8px 14px 8px 8px; border-radius: var(--radius-pill); box-shadow: var(--shadow-soft); max-width: 64vw; }
    .scaffold.show { display: flex; }
    .scaffold img { width: 46px; height: 46px; }
    .scaffold .he { font-weight: 700; font-size: 14px; color: var(--color-ink-700); }
    .scaffold .ar { font-family: var(--font-ar); font-size: 14px; color: var(--color-ink-500); }
    [data-arabic-verified="false"] .scaffold .ar { display: none; }

    /* שורת שפת-הישרדות (מוזרקת מ-scaffold.json דרך MishmishScaffold) */
    .survival { position: absolute; bottom: 0; inset-inline: 0; z-index: 32; display: flex; gap: 8px; justify-content: center; padding: 8px; }
    .survival .sv-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,250,241,.85); color: var(--color-ink-700); font-family: var(--font-he); font-weight: 700; font-size: 14px; border: none; padding: 9px 15px; border-radius: var(--radius-pill); box-shadow: var(--shadow-soft); min-height: 44px; }
    .survival .sv-btn:active { transform: scale(.95); }
    .survival .sv-ico { font-size: 18px; }

    /* overlays: פתיחה + סיום */
    .overlay { position: absolute; inset: 0; z-index: 60; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 18px; padding: 28px; background: radial-gradient(circle at 50% 35%, rgba(30,46,60,.9), rgba(9,16,22,.96)); }
    .overlay.hidden { display: none; }
    .overlay img.hero { width: clamp(120px,30vw,180px); filter: drop-shadow(0 10px 18px rgba(0,0,0,.5)); }
    .overlay h2 { font-size: clamp(26px,7vw,40px); color: var(--color-ink-900); background: rgba(255,250,241,.95); padding: 10px 24px; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
    .overlay p { font-size: clamp(17px,4.4vw,22px); color: var(--color-ink-900); line-height: 1.5; max-width: 460px; background: rgba(255,250,241,.9); padding: 12px 20px; border-radius: var(--radius-md); }
    .btn-big { font-family: var(--font-he); font-size: 22px; font-weight: 800; color: #fff; background: var(--color-apricot-500); border: none; padding: 15px 42px; border-radius: var(--radius-pill); box-shadow: var(--shadow-button); }
    .btn-big:active { transform: scale(.96); }
    .btn-ghost { font-family: var(--font-he); font-size: 16px; font-weight: 700; color: var(--color-ink-900); background: rgba(255,255,255,.85); border: none; padding: 11px 26px; border-radius: var(--radius-pill); text-decoration: none; }
    .peek { position: fixed; inset-block-end: 8px; inset-inline-start: 8px; max-width: 340px; max-height: 46vh; overflow: auto; background: var(--color-cream-50); border: 1px solid var(--color-border-soft); border-radius: 12px; padding: 10px; font-size: 12px; z-index: 90; direction: ltr; text-align: left; white-space: pre-wrap; }
    @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:.01ms!important; animation-iteration-count:1!important; } }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <img class="scene-bg" src="../assets/backgrounds/bg-shared-market.png" alt="" aria-hidden="true" onerror="this.style.display='none'">
    <div class="veil" aria-hidden="true"></div>

    <header class="topbar">
      <div id="progress" class="progress" aria-label="הַתְקַדְּמוּת"></div>
      <div class="place-chip"><span id="place-he" class="he"></span><span class="ar" lang="ar">بالسوق</span></div>
    </header>

    <div class="bubble-wrap"><span id="bubble" class="bubble">אוֹתוֹ אוֹ שׁוֹנֶה?</span></div>

    <!-- שתי ההשמעות (שמיעתי-קודם). נגיעה = האזנה חוזרת (לא נמדדת). -->
    <div class="sounds" aria-label="שְׁתֵּי הַשְׁמָעוֹת">
      <button id="snd-1" class="snd" type="button" data-audio="idle">
        <span class="num">1</span>
        <svg class="ear" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor"/><path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button id="snd-2" class="snd" type="button" data-audio="idle">
        <span class="num">2</span>
        <svg class="ear" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor"/><path d="M15.5 8.5a4 4 0 0 1 0 7M18 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- אריחי-השיפוט (נעולים עד סוף ההשמעה) -->
    <div class="tiles" id="tiles">
      <button id="tile-same" class="tile" type="button" aria-disabled="true" aria-label="אוֹתוֹ">
        <span class="glyph" aria-hidden="true">🟰</span>
        <span>אוֹתוֹ</span>
      </button>
      <button id="tile-different" class="tile" type="button" aria-disabled="true" aria-label="שׁוֹנֶה">
        <span class="glyph" aria-hidden="true">⚡</span>
        <span>שׁוֹנֶה</span>
      </button>
    </div>

    <img class="mishmish" id="mishmish" src="../assets/characters/mishmish/mishmish-idle.png" alt="מישמיש">

    <div class="scaffold" id="scaffold">
      <img id="amir-img" src="../assets/characters/peers/amir-hint.png" alt="">
      <span id="amir-text" class="he"></span>
      <span class="ar" lang="ar" data-arabic-verified="false"></span>
    </div>

    <!-- שורת שפת-הישרדות מוזרקת מ-data/scaffold.json דרך MishmishScaffold.bind -->
    <nav id="survival" class="survival" aria-label="עזרה"></nav>

    <!-- overlay פתיחה -->
    <div class="overlay" id="introOverlay">
      <img class="hero" src="../assets/characters/mishmish/mishmish-idle.png" alt="מישמיש">
      <h2>אוֹתוֹ אוֹ שׁוֹנֶה? 👂</h2>
      <p>מִישְׁמִישׁ יַשְׁמִיעַ שְׁתֵּי מִלִּים.<br>הַקְשִׁיבוּ טוֹב — הַאִם הֵן <b>אוֹתוֹ</b> דָּבָר אוֹ <b>שׁוֹנוֹת</b>?</p>
      <button class="btn-big" id="startBtn">בּוֹאוּ נַתְחִיל</button>
    </div>

    <!-- overlay סיום -->
    <div class="overlay hidden" id="doneOverlay">
      <img class="hero" src="../assets/characters/mishmish/mishmish-celebrate.png" alt="מישמיש">
      <h2>אָזְנַיִם חַדּוֹת! 🎉</h2>
      <p>הִקְשַׁבְתֶּם טוֹב וְהִבְחַנְתֶּם בֵּין הַצְּלִילִים!</p>
      <button class="btn-big" id="againBtn">עוֹד פַּעַם</button>
      <a class="btn-ghost" href="index.html">לַשּׁוּק ←</a>
    </div>
  </main>

  <!-- אותה תשתית: data → data-loader → audio → bkt → scaffold → מכניקה -->
  <script src="js/data.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/bkt.js"></script>
  <script src="js/shared/scaffold.js"></script>
  <script src="js/shared/epa.js"></script>
  <script src="js/shared/flow.js"></script>
  <script src="js/templates/mechanic-same-different.js"></script>
  <script>
    window.MishmishSameDiff.start();
  </script>
</body>
</html>
