<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פולס · דשבורד מחנכת · כיתה א׳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Rubik:wght@400;500;600;700;800&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pulse-core.css">
<script src="../demo/demo-icons.js" defer></script>
<style>
/* ═══════ הרחבות מסך — על בסיס pulse-core.css בלבד ═══════ */
:root {
  /* צבעי ממד רוויים — קנוני, תואם תצוגת מנהלת/מורה */
  --dim-adjust:  #F2B844;
  --dim-friend:  #E08FAF;
  --dim-emotion: #8B6BC0;
  --dim-joy:     #5BC0A8;
  /* גוני "עומק" לטקסט פר ממד */
  --dim-adjust-deep:  #97781F;
  --dim-friend-deep:  #B05A77;
  --dim-emotion-deep: #6E61B5;
  --dim-joy-deep:     #2E8F86;
}

html { direction: rtl; }
body { font-family: "Rubik","Assistant","Heebo",Arial,sans-serif; }

/* ═══════ TOP BAR ═══════ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  /* fallback מלא לדפדפנים בלי backdrop-filter */
  background: #F7FBFA;
  border-bottom: 1px solid rgba(82,189,181,.14);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
@supports ((backdrop-filter: blur(14px)) or (-webkit-backdrop-filter: blur(14px))) {
  .topbar {
    background: rgba(247,251,250,.78);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
  }
}
.brand { display: flex; align-items: center; gap: 10px; }
/* ═══════ אחידות עם מסכי-המורה ═══════ */
/* אותו שורש-גופן (17px) ואותו רקע-גרדיאנט תכלת-מנטה כמו demo.css. */
html { font-size: 17px; }
body {
  /* צפיפות זהה למסכי-המורה: טקסט-גוף ~14px + line-height 1.5 (לא 17px/1.6).
     הכותרות מעוגנות ל-rem (שורש 17px) אז נשארות גדולות — יחס גוף/כותרת כמו במורה. */
  font-size: 14px; line-height: 1.5; min-height: 100dvh;
  /* מסכי-המורה (underwater-app) עושים override ל-demo.css: רקע לבן חלק, Rubik, letter-spacing. */
  background: #FFFFFF;
  letter-spacing: -.01em;
}
/* כותרות בגודל+משקל של demo.css (.sec-title 21px/800 · .hero h1 25px/800) */
.hero h1 { font-size: 25px; font-weight: 800; }
.section-title { font-size: 21px; font-weight: 800; }
.stat-num { font-weight: 800; }
.topbar .crumbs { font-size: 15px; font-weight: 600; color: var(--muted); }
.topbar .crumbs b { color: var(--ink); font-weight: 800; }
.topbar .date { font-size: 14px; font-weight: 600; color: var(--muted);
  background: #F4F7F7; padding: 7px 16px; border-radius: 999px; }
/* מסך-מוצר, לא הדגמה: מסתירים תוויות "דמו" (הזרעת-דוגמה עדיין דרך ?seed=1) */
.demo-badge, .demo-banner { display: none !important; }

/* ═══════ APP SHELL + RAIL (זהה לתפריט-הצד של מסכי-המורה) ═══════ */
.app { position: relative; z-index: 2; display: flex; min-height: 100dvh; }
.rail {
  flex: 0 0 222px; position: sticky; top: 0; align-self: flex-start; height: 100dvh;
  display: flex; flex-direction: column; gap: 4px; padding: 20px 14px 16px;
  /* זהה ל-teacher-home: רקע כמעט-לבן אטום, בלי blur, גבול דק. */
  background: #FBFDFD; border-left: 1px solid #EEF2F2;
}
.rail .logo {
  display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none;
  padding: 6px 0 16px; margin-bottom: 8px; border-bottom: 1px solid rgba(52,96,103,.12);
}
.rail .logo .gm { width: 42px; height: 42px; border-radius: 12px; display: grid; place-items: center;
  background: var(--surface); box-shadow: var(--shadow-card); }
.rail .logo .gm svg { width: 22px; height: 22px; }
.rail .logo b { font-size: 15px; font-weight: 900; color: var(--aqua-deep); text-align: center; line-height: 1.15; }
.rail .item {
  display: flex; align-items: center; gap: 13px; width: 100%; padding: 12px 14px; border: none; cursor: pointer;
  background: transparent; border-radius: 14px; font-family: inherit; font-weight: 600; font-size: 15px;
  color: var(--muted); text-align: right; text-decoration: none; transition: background .15s, color .15s; position: relative;
}
.rail .item .ic { width: 26px; height: 24px; flex: 0 0 auto; display: grid; place-items: center; color: var(--muted); transition: color .15s; }
.rail .item .ic svg { width: 23px; height: 23px; display: block; }
.rail .item:hover { background: var(--surface); color: var(--ink); }
.rail .item:hover .ic { color: var(--ink); }
.rail .item.active { background: var(--surface); color: var(--ink); font-weight: 800; box-shadow: var(--shadow-card); }
.rail .item.active .ic { color: var(--aqua-deep); }
.rail .item.active::before { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 5px; height: 26px; border-radius: 6px; background: var(--aqua-deep); }
.rail .me { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 12px 10px 4px; border-top: 1px solid rgba(52,96,103,.12); }
.rail .me .av { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; flex: 0 0 auto;
  color: #fff; background: linear-gradient(135deg, var(--aqua-deep), #7C6BD0); font-size: 15px; box-shadow: var(--shadow-card); }
.rail .me small { font-size: 13px; color: var(--ink); font-weight: 700; line-height: 1.15; }
.rail .me small span { display: block; font-size: 11px; color: var(--muted); font-weight: 600; }
.main { flex: 1; min-width: 0; }
/* טאבים של תצוגות-הפולס (לשעבר תפריט-הצד) — כעת אופקיים בראש התוכן */
.view-tabs { display: flex; gap: 6px; flex-wrap: wrap; max-width: 1120px; margin: 0 auto; padding: 16px clamp(16px,3vw,20px) 0; }
.view-tab { background: transparent; border: none; font-family: inherit; font-size: .92rem; font-weight: 600;
  color: var(--muted); padding: 9px 16px; border-radius: 12px; cursor: pointer; transition: background .15s, color .15s; }
.view-tab:hover { background: var(--surface); color: var(--ink); }
.view-tab.active { background: var(--surface); color: var(--aqua-deep); box-shadow: var(--shadow-card); }
@media (max-width: 900px) {
  .app { display: block; }
  .rail { flex-direction: row; height: auto; width: auto; position: sticky; top: 0; z-index: 45; overflow-x: auto;
    gap: 6px; padding: 10px 14px; border-left: none; border-bottom: 1px solid rgba(82,189,181,.18); }
  .rail .logo, .rail .me { display: none; }
  .rail .item { width: auto; white-space: nowrap; padding: 8px 12px; }
  .rail .item.active::before { display: none; }
}
@media print { .rail, .view-tabs, .demo-banner { display: none !important; } #container .view { display: block !important; } }
.brand-mark {
  width: 34px; height: 34px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--aqua), var(--aqua-deep));
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.05rem;
}
.brand-title { font-weight: 700; font-size: 1rem; color: var(--ink); }
.brand-sub { font-size: .72rem; color: var(--muted); margin-top: -2px; }
.topbar-meta {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  font-size: .85rem; color: var(--muted);
}
.class-select {
  padding: 8px 16px;
  border: 1.5px solid var(--surface-soft);
  border-radius: 12px;
  background: var(--surface);
  font-family: inherit;
  font-size: .88rem;
  color: var(--ink);
  cursor: pointer;
  box-shadow: var(--shadow-card);
}

/* ═══════ LAYOUT — תפריט צד + תוכן ═══════ */
.layout {
  display: flex;
  align-items: flex-start;
  max-width: 1320px;
  margin: 0 auto;
}
.side-nav {
  position: sticky;
  top: 84px;
  flex: none;
  width: 190px;
  padding: 28px 20px 0 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.side-link {
  text-align: right;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: .92rem;
  font-weight: 600;
  color: var(--muted);
  padding: 11px 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: background .15s ease, color .15s ease;
}
.side-link:hover { background: var(--surface); color: var(--ink); }
.side-link.active { background: var(--surface); color: var(--aqua-deep); box-shadow: var(--shadow-card); }
.view > .section:first-child { margin-top: 0; }
/* הדפסה — כל התצוגות, בלי תפריט הצד */
@media print {
  .side-nav { display: none !important; }
  #container .view { display: block !important; }
}
@media (max-width: 900px) {
  .layout { display: block; }
  .side-nav {
    position: sticky;
    top: 0;
    z-index: 45;
    width: auto;
    flex-direction: row;
    overflow-x: auto;
    padding: 10px 16px;
    gap: 8px;
    background: var(--bg);
  }
  .side-link { white-space: nowrap; background: var(--surface); box-shadow: var(--shadow-card); padding: 8px 14px; }
}

/* ═══════ CONTAINER ═══════ */
.container {
  max-width: 1120px;
  margin: 0 auto;
  padding: 28px 20px 80px;
  flex: 1;
  min-width: 0;
}

/* ═══════ HERO — כרטיס לבן עם שמש, מטא־שורה, ושני כפתורים רכים ═══════ */
.hero {
  margin-bottom: 18px;
  position: relative;
  background: var(--surface);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  padding: 26px 30px;
}
.hero-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; flex-wrap: wrap; margin-bottom: 4px;
}
.hero-id { display: flex; align-items: center; gap: 14px; }
.hero-sun {
  flex: none;
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--sand);
  color: #B98A2E;
  display: flex; align-items: center; justify-content: center;
}
.hero h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
.hero-date { font-size: .82rem; color: var(--muted); margin-top: 3px; }
.hero-side { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
.hero-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.btn-hero {
  min-height: 44px;
  padding: 8px 18px;
  font-size: .86rem;
  background: var(--surface-soft);
  color: var(--ink);
  text-decoration: none;
}
.btn-hero:hover { background: var(--mint); filter: none; }
.hero-line {
  font-size: 1rem;
  line-height: 1.8;
  color: var(--ink);
  margin: 14px 0 0;
  max-width: 60ch;
}
.hero-line strong { font-weight: 700; }
.hero-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
@media (max-width: 640px) {
  .hero-side { align-items: flex-start; }
  .hero-actions { justify-content: flex-start; }
}

/* ═══════ "הדיווח שלי" — כרטיס בולט לטופס הדירוג הדו-שבועי של המורה ═══════ */
.teacher-report {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border-right: 5px solid var(--aqua-deep);
  padding: 16px 22px;
  margin-bottom: 18px;
  text-decoration: none;
  color: var(--ink);
  transition: transform .15s ease, box-shadow .15s ease;
}
.teacher-report:hover { transform: translateY(-2px); box-shadow: var(--shadow-soft); }
.teacher-report-icon {
  flex: none;
  width: 44px; height: 44px;
  border-radius: 13px;
  background: var(--lavender);
  color: #6E61B5;
  display: flex; align-items: center; justify-content: center;
}
.teacher-report-text { flex: 1; min-width: 220px; }
.teacher-report-title { display: block; font-weight: 700; font-size: 1rem; }
.teacher-report-sub { display: block; font-size: .85rem; color: var(--muted); margin-top: 2px; line-height: 1.6; }
.teacher-report-arrow { flex: none; font-weight: 700; color: var(--aqua-deep); }

/* ═══════ שורת 4 סטטיסטיקות — כרטיסים לבנים קומפקטיים עם צ'יפ אייקון פסטלי ═══════ */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 30px;
}
.stats-3 { grid-template-columns: repeat(3, 1fr); }
.stat {
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  box-shadow: var(--shadow-card);
}
.stat-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.stat-num { font-weight: 700; font-size: 1.45rem; line-height: 1.2; color: var(--ink); }
.stat-icon {
  flex: none;
  width: 34px; height: 34px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
}
.si-peach    { background: var(--peach);    color: #A35B43; }
.si-sky      { background: var(--sky);      color: #3D7C99; }
.si-sand     { background: var(--sand);     color: #A07B33; }
.si-mint     { background: var(--mint);     color: #3E8A63; }
.si-lavender { background: var(--lavender); color: #6E61B5; }
.stat-label { font-size: .88rem; color: var(--muted); margin-top: 6px; }
@media (max-width: 640px) { .stats, .stats-3 { grid-template-columns: repeat(2, 1fr); } }

/* ═══════ כותרות מקטע — עם צ'יפ אייקון קטן ═══════ */
.section { margin-top: 34px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
.section-icon {
  flex: none;
  width: 30px; height: 30px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.section-title { font-size: 1.08rem; font-weight: 700; color: var(--ink); margin: 0 0 2px; }
.section-head .section-title { margin: 0; }
.section-micro { color: var(--muted); font-size: .86rem; margin: 0 0 14px; }

/* ═══════ "מה כדאי לשים לב אליו היום" — שני כרטיסים רכים זה לצד זה ═══════ */
.actions-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
.action-card {
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
}
.action-card.tint-mint { background: var(--mint); }
.action-card.tint-sky  { background: var(--sky);  }
.action-card-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap; margin-bottom: 8px;
}
.action-who { font-weight: 700; font-size: 1.02rem; }
.action-dim { font-size: .88rem; font-weight: 600; }
.action-why { color: var(--ink); font-size: .92rem; margin: 0 0 6px; line-height: 1.7; }
.action-what {
  background: rgba(255,255,255,.65);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  font-size: .9rem;
  line-height: 1.7;
  margin: 8px 0 14px;
}
.action-what strong { font-weight: 600; }
.btn-done {
  min-height: 44px;
  padding: 8px 20px;
  font-size: .9rem;
  align-self: flex-start;
  margin-top: auto;
  background: var(--surface);
  color: var(--ink);
}
.btn-done:hover { filter: brightness(.98); }
.btn-done.done {
  background: rgba(255,255,255,.85);
  color: var(--ink);
}
.actions-empty {
  background: var(--mint);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  font-size: .95rem;
  line-height: 1.7;
}

/* ═══════ אקלים כיתה — 4 פסי ממד ═══════ */
.dim-list {
  background: var(--surface);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}
.dim-row {
  display: grid;
  grid-template-columns: 120px 1fr 48px 90px;
  align-items: center;
  gap: 12px;
  padding: 17px 24px;
  border-bottom: 1px solid var(--surface-soft);
}
.dim-row:last-child { border-bottom: none; }
.dim-name { font-weight: 600; font-size: .94rem; display: flex; align-items: center; gap: 8px; }
.dim-dot { flex: none; width: 10px; height: 10px; border-radius: 50%; }
.dim-bar {
  height: 8px;
  border-radius: 999px;
  position: relative;
  /* overflow גלוי — מעוין "מבט המורה" בולט מעל הפס */
}
.dim-bar-fill {
  position: absolute; top: 0; right: 0;
  height: 100%;
  border-radius: 999px;
  transition: width .8s ease-out;
}
.dim-score { font-weight: 700; font-size: 1.05rem; text-align: center; }
.dim-trend { font-size: .8rem; font-weight: 600; text-align: center; white-space: nowrap; }
.trend-up   { color: var(--ok); }
.trend-down { color: #C2705C; }
.trend-flat { color: var(--muted); }

/* ═══════ "מבט המורה" — מעוין כהה על פס הממד + הערת מקרא ═══════ */
.dim-teacher-marker {
  position: absolute;
  top: 50%;
  width: 10px; height: 10px;
  transform: translateY(-50%) rotate(45deg);
  background: var(--ink);
  border: 2px solid #fff;
  border-radius: 2px;
  box-shadow: 0 1px 4px rgba(36,50,56,.35);
}
.teacher-lens-note {
  margin: 12px 2px 0;
  font-size: .84rem;
  color: var(--muted);
  line-height: 1.7;
}
.teacher-lens-note strong { color: var(--ink); }
.lens-marker {
  display: inline-block;
  width: 9px; height: 9px;
  transform: rotate(45deg);
  background: var(--ink);
  border: 2px solid #fff;
  border-radius: 2px;
  box-shadow: 0 1px 3px rgba(36,50,56,.3);
  margin-left: 4px;
  vertical-align: middle;
}
.kh-flag { box-shadow: inset 0 0 0 2px var(--aqua-deep); font-weight: 700; }
.kh-gap-chip { font-size: .66rem; padding: 1px 8px; margin-right: 4px; }

.trend-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 20px 24px 34px;
  box-shadow: var(--shadow-card);
  margin-top: 14px;
}
.trend-title { font-size: .9rem; color: var(--muted); font-weight: 500; margin-bottom: 14px; }
.trend-chart { display: flex; align-items: flex-end; gap: 12px; height: 70px; }
.trend-bar {
  flex: 1; min-width: 30px;
  background: linear-gradient(180deg, var(--aqua), var(--aqua-deep));
  border-radius: 6px 6px 0 0;
  position: relative;
  opacity: .55;
  transition: opacity .2s;
}
.trend-bar:last-child { opacity: 1; }
.trend-bar::after {
  content: attr(data-week);
  position: absolute; bottom: -24px; left: 0; right: 0;
  text-align: center;
  font-size: .7rem;
  color: var(--muted);
}

/* ═══════ איתות מתמשך ═══════ */
.alert {
  background: var(--sand);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin-top: 16px;
  font-size: .93rem;
  line-height: 1.7;
}

/* ═══════ קבוצות ממד — כרטיסי ילדים ═══════ */
.dim-group {
  border-radius: var(--radius-lg);
  padding: 18px 22px;
  margin-bottom: 14px;
}
.dim-group-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.dim-group-name { font-weight: 700; font-size: 1rem; }
.dim-group-desc { font-size: .88rem; color: var(--muted); }
.dim-group-empty { font-size: .88rem; color: var(--muted); margin-top: 8px; }
.kid-cards { display: grid; gap: 10px; margin-top: 12px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.kid-card {
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  box-shadow: var(--shadow-card);
}
.kid-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.kid-name { font-weight: 600; font-size: .95rem; }
.kid-note { font-size: .88rem; color: var(--muted); margin: 6px 0 0; line-height: 1.6; }

/* ═══════ מגירת התערבויות + מפה מלאה ═══════ */
details.drawer {
  background: var(--surface);

// ═══════ SAFETY: escape לכל טקסט דינמי לפני innerHTML (הכנה ל-backend עתידי) ═══════
function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ═══════ TOAST — משוב מיקרו לפעולות בלי יעד ניווט ═══════
let _toastTimer = null;
function showToast(msg) {
  let el = document.getElementById('pulse-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'pulse-toast';
    el.className = 'toast';
    el.setAttribute('role', 'status');
    el.setAttribute('aria-live', 'polite');
    document.body.appendChild(el);
  }
  el.textContent = msg;
  // reflow כדי שהאנימציה תרוץ שוב גם בלחיצה רצופה
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

const MISSING_LATEST = new Set(['a1-06', 'a2-05', 'a3-04', 'a4-08']);

// Hash דטרמיניסטי — אותם seeds תמיד = אותו pattern (לדמו יציב בין refreshes)
function pseudoRand(seed) {
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) {
    h = Math.imul(h ^ seed.charCodeAt(i), 16777619);
  }
  return ((h >>> 0) % 10000) / 10000;
}

function seedData() {
  const seeds = [];
  const now = Date.now();
  for (let week = 1; week <= 4; week++) {
    const weekTs = new Date(now - (4 - week) * 14 * 24 * 3600 * 1000);
    KIDS.forEach(kid => {
      if (week === 4 && MISSING_LATEST.has(kid.id)) return;

      const responses = DIMENSIONS.map(d => {
        // Drift: מקום משתפר לאט (התאקלמות) · לגלות יורד לאט (אופייני אחרי תחילת שנה)
        const drift = d.id === 'adjust' ? (week - 1) * 0.03
                    : d.id === 'joy'    ? -(week - 1) * 0.04
                    : 0;
        const p = Math.max(0.05, Math.min(0.95, kid.base[d.id] + drift));
        const r = pseudoRand(kid.id + ':' + d.id + ':' + week);
        let score;
        if (r < p) score = 3;
        else if (r < p + (1 - p) * 0.6) score = 2;
        else score = 1;
        return { dim: d.id, score, ts: weekTs.toISOString() };
      });

      seeds.push({
        school: 'בית ספר אימפקט',
        class: kid.class,
        sid: kid.id,
        sidName: kid.name,
        biweek: week,
        sessionId: 's-' + weekTs.getTime() + '-' + kid.id,
        submittedAt: weekTs.toISOString(),
        responses
      });
    });
  }
  localStorage.setItem('pulse-demo-responses', JSON.stringify(seeds));

  // "מבט המורה" — דירוג טופס אחד לכל כיתה (סולם 1–4), נגזר מאותם baseP,
  // + אי-הסכמה מכוונת בילד.ה אחד.ת פר כיתה בממד "חברים" — להדגמת "שווה מבט"
  // (הילד.ה מסמן.ת "כן", המורה רואה אחרת — האיתות המעניין באמת).
  const DISAGREE = { "א'1": 'רועי שמש', "א'2": 'עינב סלע', "א'3": 'לי עוז', "א'4": 'עומר נחום' };
  const obs = Object.keys(CLASS_META).map(classId => {
    const perStudent = {};
    KIDS.filter(k => k.class === classId).forEach(kid => {
      const dims = {};
      DIMENSIONS.forEach(d => {
        const r = pseudoRand('t:' + kid.id + ':' + d.id);
        let v = 1 + kid.base[d.id] * 3 + (r - 0.5) * 0.8;
        if (DISAGREE[classId] === kid.name && d.id === 'friend') v = 1.5;
        dims[d.id] = Math.max(1, Math.min(4, Math.round(v * 2) / 2));
      });
      perStudent[kid.name] = dims;
    });
    const dimAverages = {};
    DIMENSIONS.forEach(d => {
      const vals = Object.values(perStudent).map(x => x[d.id]);
      dimAverages[d.id] = vals.reduce((a, b) => a + b, 0) / vals.length;
    });
    return { class: classId, submittedAt: new Date(now).toISOString(), scale: '1-4', perStudent, dimAverages };
  });
  localStorage.setItem(TEACHER_OBS_KEY, JSON.stringify(obs));

  render();
}

// ═══════ סיכום קבוצתי בלי שמות — פר כיתה ═══════
function aggregateClass(classId) {
  const all = getSubmissions().filter(s => s.class === classId);
  if (!all.length) return null;

  const latestBiweek = Math.max(...all.map(s => +s.biweek));
  const latestSubs = all.filter(s => +s.biweek === latestBiweek);
  const prevSubs = all.filter(s => +s.biweek === latestBiweek - 1);

  const dimAverages = {};
  const dimLows = {}; // כמה ילדים סימנו "לא" בממד
  const questionStats = {}; // פילוח תשובות פר שאלה (כן/קצת/לא) — לפולס האחרון
  DIMENSIONS.forEach(d => {
    const scores = latestSubs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
    if (!scores.length) { dimAverages[d.id] = null; dimLows[d.id] = 0; questionStats[d.id] = null; return; }
    dimAverages[d.id] = scores.reduce((a,b) => a+b, 0) / scores.length;
    dimLows[d.id] = scores.filter(s => s === 1).length;
    questionStats[d.id] = {
      yes:  scores.filter(s => s === 3).length,
      some: scores.filter(s => s === 2).length,
      no:   scores.filter(s => s === 1).length,
      total: scores.length
    };
  });

  // מגמות מול הפולס הקודם
  const dimTrends = {};
  DIMENSIONS.forEach(d => {
    if (!prevSubs.length) { dimTrends[d.id] = 'flat'; return; }
    const prevScores = prevSubs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
    if (!prevScores.length) { dimTrends[d.id] = 'flat'; return; }
    const prevAvg = prevScores.reduce((a,b) => a+b, 0) / prevScores.length;
    const cur = dimAverages[d.id];
    if (cur - prevAvg > 0.15) dimTrends[d.id] = 'up';
    else if (prevAvg - cur > 0.15) dimTrends[d.id] = 'down';
    else dimTrends[d.id] = 'flat';
  });

  // מגמות לאורך זמן — 4 הפולסים האחרונים, פר ממד (לא רק "לגלות")
  const dimTrendSeries = {};
  DIMENSIONS.forEach(d => {
    const series = [];
    for (let w = Math.max(1, latestBiweek - 3); w <= latestBiweek; w++) {
      const subs = all.filter(s => +s.biweek === w);
      const scores = subs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
      series.push({
        week: w,
        avg: scores.length ? scores.reduce((a,b) => a+b, 0) / scores.length : 0
      });
    }
    dimTrendSeries[d.id] = series;
  });

  // איתות מתמשך: ממד נמוך 3 פולסים ברציפות → פנייה ליועצת
  let alertText = null;
  DIMENSIONS.forEach(d => {
    let lowCount = 0;
    for (let w = latestBiweek; w >= Math.max(1, latestBiweek - 2); w--) {
      const subs = all.filter(s => +s.biweek === w);
      const scores = subs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
      if (!scores.length) continue;
      const avg = scores.reduce((a,b) => a+b, 0) / scores.length;
      if (avg < 2.0) lowCount++;
    }
    if (lowCount >= 3) {
      alertText = `שלושה פולסים ברציפות עם <strong>"${d.name}"</strong> נמוך יותר מהרגיל — נראה שכדאי לשתף את היועצת ולחשוב יחד.`;
    }
  });

  return {
    classId,
    biweek: latestBiweek,
    responseCount: latestSubs.length,
    dimAverages,
    dimLows,
    dimTrends,
    dimTrendSeries,
    questionStats,
    alertText
  };
}

// ═══════ משפט סיכום רגוע ל-hero ═══════
function generateHero(data) {
  const lowestDim = Object.keys(data.dimAverages).reduce((a, b) =>
    data.dimAverages[a] < data.dimAverages[b] ? a : b
  );
  const lowDim = DIMENSIONS.find(d => d.id === lowestDim);
  const lowAvg = data.dimAverages[lowestDim];
  const lowCount = data.dimLows[lowestDim];

  let chipClass, chipText, line;

  if (lowAvg >= 2.5) {
    chipClass = 'chip-ok';
    chipText = 'שגרה טובה';
    line = `הכיתה במקום טוב: <strong>${data.responseCount}</strong> ילדים שיתפו בפולס האחרון, ואין ממד שמבקש תשומת לב מיוחדת.`;
  } else if (lowAvg >= 2.0) {
    chipClass = 'chip-notice';
    chipText = 'איתות עדין';
    line = `בסך הכול הכיתה בסדר. ב<strong>"${lowDim.name}"</strong> יש ירידה קלה — ${lowCount} ילדים סימנו "לא". כדאי לשים לב, בנחת.`;
  } else {
    chipClass = 'chip-attention';
    chipText = 'כדאי לשים לב היום';
    line = `<strong>"${lowDim.name}"</strong> נמוך מהרגיל — ${lowCount} מתוך ${data.responseCount} ילדים סימנו "לא". נראה שכדאי לבדוק, יש הצעות לפעולה רכה למטה.`;
  }

  return { chipClass, chipText, line, lowDim };
}

function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'בוקר טוב';
  if (h < 18) return 'צהריים טובים';
  return 'ערב טוב';
}

// ═══════ מפת תלמידים ═══════
let mapSortBy = 'concern';

function changeMapSort(value) {
  mapSortBy = value;
  render();
}

function getStudentMap(classId, biweek) {
  const all = getSubmissions().filter(s => s.class === classId);
  const latest = all.filter(s => +s.biweek === biweek);
  const prev = all.filter(s => +s.biweek === biweek - 1);
  const nameById = {};
  all.forEach(s => { if (s.sidName) nameById[s.sid] = s.sidName; });
  const allSids = [...new Set(all.map(s => s.sid))];

  return allSids.map(sid => {
    const sub = latest.find(s => s.sid === sid);
    const psub = prev.find(s => s.sid === sid);
    const dims = {};
    const prevDims = {};
    DIMENSIONS.forEach(d => {
      const r = sub?.responses.find(rr => rr.dim === d.id);
      dims[d.id] = r ? r.score : null;
      const pr = psub?.responses.find(rr => rr.dim === d.id);
      prevDims[d.id] = pr ? pr.score : null;
    });
    const lows = Object.values(dims).filter(s => s === 1).length;
    const mids = Object.values(dims).filter(s => s === 2).length;
    // ממדים שבהם נראה שיפור: "לא" בפולס הקודם → "קצת"/"כן" עכשיו
    const improved = DIMENSIONS.filter(d => prevDims[d.id] === 1 && dims[d.id] >= 2).map(d => d.id);
    let status;
    if (!sub) status = 'missing';
    else if (lows >= 2) status = 'attention';
    else if (lows >= 1 || mids >= 3) status = 'watch';
    else status = 'stable';
    return { sid, name: nameById[sid] || sid, dims, prevDims, improved, status, lows, mids };
  });
}

const STATUS_LABEL = {
  stable: 'יציב',
  watch: 'לבדיקה',
  attention: 'סימון לתשומת לב',
  missing: 'טרם ענה.תה'
};
const STATUS_CHIP = {
  stable: 'chip-ok',
  watch: 'chip-notice',
  attention: 'chip-attention',
  missing: 'chip-info'
};

function renderStudentMapRows(classId, biweek) {
  const rows = getStudentMap(classId, biweek);

  if (mapSortBy === 'name') {
    rows.sort((a, b) => a.name.localeCompare(b.name, 'he'));
  } else {
    const order = { attention: 0, watch: 1, stable: 2, missing: 3 };
    rows.sort((a, b) => (order[a.status] - order[b.status]) || (b.lows - a.lows));
  }

  return rows.map(r => {
    const cells = DIMENSIONS.map(d => {
      const s = r.dims[d.id];
      // טקסט + צבע יחד — לא צבע בלבד
      const pill = s === 3 ? '<span class="score-pill pill-yes">כן</span>'
                 : s === 2 ? '<span class="score-pill pill-some">קצת</span>'
                 : s === 1 ? '<span class="score-pill pill-no">לא</span>'
                 : '<span class="score-pill pill-none">—</span>';
      return `<td class="map-cell">${pill}</td>`;
    }).join('');
    return `
      <tr>
        <td class="map-name">${escapeHtml(r.name)}</td>
        ${cells}
        <td class="map-cell"><span class="chip ${STATUS_CHIP[r.status]}">${STATUS_LABEL[r.status]}</span></td>
      </tr>
    `;
  }).join('');
}

// ═══════ "מה כדאי לעשות היום?" — עד 3 כרטיסי פעולה ═══════
function buildTodayActions(classId, data) {
  const actions = [];

  // פעולה כיתתית — אם הממד הנמוך ביותר ירד מתחת לסף
  const lowestDim = Object.keys(data.dimAverages).reduce((a, b) =>
    data.dimAverages[a] < data.dimAverages[b] ? a : b
  );
  const lowDim = DIMENSIONS.find(d => d.id === lowestDim);
  if (data.dimAverages[lowestDim] < 2.35) {
    actions.push({
      key: `pulse-demo-action-done-${classId}-${data.biweek}-class`,
      dim: lowDim,
      who: 'כל הכיתה',
      why: `הממוצע הכיתתי ב"${lowDim.name}" נמוך מהרגיל — ${data.dimLows[lowestDim]} ילדים סימנו "לא".`,
      what: lowDim.classAction
    });
  }

  // עד 2-3 ילדים עם הכי הרבה איתותים
  const rows = getStudentMap(classId, data.biweek)
    .filter(r => r.status === 'attention')
    .sort((a, b) => b.lows - a.lows);

  for (const r of rows) {
    if (actions.length >= 3) break;
    const firstLow = DIMENSIONS.find(d => r.dims[d.id] === 1);
    if (!firstLow) continue;
    actions.push({
      key: `pulse-demo-action-done-${classId}-${data.biweek}-${r.sid}`,
      dim: firstLow,
      who: r.name,
      why: `סימן.ה "לא" ב"${firstLow.name}"${r.lows > 1 ? ' ועוד ממד אחד' : ''} בפולס האחרון. ${firstLow.childWhy}.`,
      what: firstLow.childAction
    });
  }

  return actions.slice(0, 3);
}

function renderActionsSection(classId, data) {
  const actions = buildTodayActions(classId, data);

  const head = `
    <div class="section-head">
      <span class="section-icon si-mint" aria-hidden="true">${ICONS.eye}</span>
      <h2 class="section-title">מה כדאי לשים לב אליו היום?</h2>
    </div>
  `;

  if (!actions.length) {
    return `
      <section class="section">
        ${head}
        <p class="section-micro">הצעות רכות, לא הוראות — את מכירה את הילדים הכי טוב.</p>
        <div class="actions-empty">אין הצעה מיוחדת היום — הכיתה נראית במקום טוב. אפשר פשוט להמשיך בשגרה הנעימה.</div>
      </section>
    `;
  }

  const cards = actions.map((a, i) => {
    const isDone = localStorage.getItem(a.key) === '1';
    const tint = i % 2 === 0 ? 'tint-mint' : 'tint-sky';
    return `
      <article class="action-card ${tint}">
        <div class="action-card-head">
          <span class="action-who">${escapeHtml(a.who)}</span>
          <span class="action-dim" style="color:${a.dim.deep}">${escapeHtml(a.dim.name)} · ${escapeHtml(a.dim.desc)}</span>
        </div>
        <p class="action-why">${escapeHtml(a.why)}</p>
        <div class="action-what"><strong>הצעה לפעולה רכה:</strong> ${escapeHtml(a.what)}</div>
        <button type="button" class="btn btn-done ${isDone ? 'done' : ''}" onclick="markActionDone('${a.key}')" aria-pressed="${isDone ? 'true' : 'false'}" title="${isDone ? 'לחיצה תבטל את הסימון' : 'סימון שעשיתי את הפעולה'}">
          ${isDone ? '✓ עשיתי · לביטול' : 'סמני: ✓ עשיתי'}
        </button>
      </article>
    `;
  }).join('');

  return `
    <section class="section">
      ${head}
      <p class="section-micro">עד שלוש הצעות קטנות, לפי הפולס האחרון. הצעות — לא הוראות.</p>
      <div class="actions-grid">${cards}</div>
    </section>
  `;
}

// ═══════ היסטוריית תשובות של ילד.ה — כל הפולסים ═══════
function getStudentHistory(classId, sid) {
  return getSubmissions()
    .filter(s => s.class === classId && s.sid === sid)
    .sort((a, b) => +a.biweek - +b.biweek)
    .map(s => ({
      week: +s.biweek,
      dims: Object.fromEntries(DIMENSIONS.map(d => {
        const r = s.responses.find(rr => rr.dim === d.id);
        return [d.id, r ? r.score : null];
      }))
    }));
}

// טבלת מיני בכרטיס ילד.ה: שורה פר ממד, עמודה פר פולס — רואים איפה ענה.תה פחות.
// אם יש דירוג מורה לילד.ה — עמודה נוספת "המורה", ודגש כשהמבטים שונים ("שווה מבט").
const T_LABEL = v => v < 2 ? 'לא ראיתי' : v < 3 ? 'לפעמים' : 'הרבה';
const T_CLASS = v => v < 2 ? 'kh-no' : v < 3 ? 'kh-some' : 'kh-yes';
function kidDisagrees(childScore, teacherVal) {
  // הילד.ה "כן" והמורה כמעט לא ראתה — או להפך
  return teacherVal != null && childScore != null &&
    ((childScore === 3 && teacherVal < 2.25) || (childScore === 1 && teacherVal >= 3.25));
}

function renderKidHistory(classId, sid, name) {
  const hist = getStudentHistory(classId, sid).slice(-4);
  if (hist.length < 2) return '';
  const tobs = getTeacherObs(classId);
  const tdims = tobs && tobs.perStudent ? tobs.perStudent[name] : null;
  const latest = hist[hist.length - 1].dims;

  const head = hist.map(h => `<span class="kh-head">פולס ${h.week}</span>`).join('')
    + (tdims ? '<span class="kh-head">המורה</span>' : '');

  const rows = DIMENSIONS.map(d => {
    const cells = hist.map(h => {
      const s = h.dims[d.id];
      const cls = s === 3 ? 'kh-yes' : s === 2 ? 'kh-some' : s === 1 ? 'kh-no' : 'kh-none';
      const txt = s === 3 ? 'כן' : s === 2 ? 'קצת' : s === 1 ? 'לא' : '—';
      return `<span class="kh-cell ${cls}" role="img" aria-label="${escapeHtml(d.name)} · פולס ${h.week}: ${txt}">${txt}</span>`;
    }).join('');
    let tCell = '';
    if (tdims) {
      const tv = tdims[d.id];
      if (tv == null) {
        tCell = '<span class="kh-cell kh-none">—</span>';
      } else {
        const flag = kidDisagrees(latest[d.id], tv);
        tCell = `<span class="kh-cell ${T_CLASS(tv)}${flag ? ' kh-flag' : ''}" role="img"
          aria-label="מבט המורה · ${escapeHtml(d.name)}: ${T_LABEL(tv)}${flag ? ' — שונה ממה שהילד.ה סימן.ה' : ''}">${T_LABEL(tv)}</span>`;
      }
    }
    return `<span class="kh-dim" style="color:${d.deep}">${escapeHtml(d.name)}</span>${cells}${tCell}`;
  }).join('');

  const anyFlag = tdims && DIMENSIONS.some(d => kidDisagrees(latest[d.id], tdims[d.id]));
  return `
    <div class="kid-history">
      <div class="kid-history-caption">
        מה ענה.תה בפולסים${tdims ? ' + מבט המורה' : ''}:
        ${anyFlag ? '<span class="chip chip-info kh-gap-chip">שווה מבט — המבטים שונים</span>' : ''}
      </div>
      <div class="kh-grid" style="grid-template-columns:52px repeat(${hist.length},1fr)${tdims ? ' 1.25fr' : ''}">
        <span></span>${head}
        ${rows}
      </div>
    </div>
  `;
}

// ═══════ "איך ענו על השאלות" — שאלות חזקות ושאלות לחיזוק ═══════
function renderQuestionStats(data) {
  const entries = DIMENSIONS
    .map(d => ({ d, s: data.questionStats[d.id] }))
    .filter(e => e.s && e.s.total > 0);
  if (!entries.length) return '';

  const avgOf = e => (3 * e.s.yes + 2 * e.s.some + 1 * e.s.no) / e.s.total;
  entries.sort((a, b) => avgOf(b) - avgOf(a));
  const strongest = entries[0];
  const weakest = entries[entries.length - 1];

  const rows = entries.map(e => {
    const { d, s } = e;
    const pct = n => Math.round((n / s.total) * 100);
    const badge =
      e === strongest && avgOf(e) >= 2.5 ? '<span class="chip chip-ok">שאלה חזקה — רוב הכיתה ענתה "כן"</span>'
      : e === weakest && avgOf(e) < 2.35 ? '<span class="chip chip-attention">שאלה לחיזוק — הרבה ענו נמוך</span>'
      : '';
    const seg = (cls, count, label) => count === 0 ? '' :
      `<div class="q-seg ${cls}" style="width:${pct(count)}%">${pct(count) >= 14 ? `${count} ${label}` : ''}</div>`;
    return `
      <div class="q-row">
        <div class="q-row-top">
          <span class="q-text">"${escapeHtml(d.questionText)}"${badge ? `<span class="q-badges">${badge}</span>` : ''}</span>
          <span class="q-dim-tag" style="color:${d.deep}">${escapeHtml(d.name)} · ${escapeHtml(d.desc)}</span>
        </div>
        <div class="q-bar" role="img" aria-label="${escapeHtml(d.questionText)} — כן: ${s.yes}, קצת: ${s.some}, לא: ${s.no}">
          ${seg('seg-yes', s.yes, 'כן')}
          ${seg('seg-some', s.some, 'קצת')}
          ${seg('seg-no', s.no, 'לא')}
        </div>
      </div>
    `;
  }).join('');

  return `
    <section class="section">
      <div class="section-head">
        <span class="section-icon si-sky" aria-hidden="true">${ICONS.bars}</span>
        <h2 class="section-title">איך ענו על השאלות · הפולס האחרון</h2>
      </div>
      <p class="section-micro">כל שאלה בפולס של נוני שייכת לתחום אחד. שאלה "לחיזוק" היא הזדמנות לעבודה כיתתית — לא ציון.</p>
      <div class="q-list">
        ${rows}
        <div class="q-legend">
          <span><span class="score-pill pill-yes">כן</span> ענו "כן, הרבה"</span>
          <span><span class="score-pill pill-some">קצת</span> ענו "קצת"</span>
          <span><span class="score-pill pill-no">לא</span> ענו "לא"</span>
        </div>
      </div>
    </section>
  `;
}

// ═══════ כרטיסי ילדים לפי ממד ═══════
function renderDimensionGroups(classId, biweek) {
  const rows = getStudentMap(classId, biweek);

  const groups = DIMENSIONS.map(d => {
    const lowKids = rows.filter(r => r.dims[d.id] === 1);
    const improvedKids = rows.filter(r => r.improved.includes(d.id));

    const kidCards = [
      ...lowKids.map(r => `
        <div class="kid-card">
          <div class="kid-card-top">
            <span class="kid-name">${escapeHtml(r.name)}</span>
            <span class="chip ${r.lows >= 2 ? 'chip-attention' : 'chip-notice'}">${r.lows >= 2 ? 'לבדיקה' : 'איתות עדין'}</span>
          </div>
          <p class="kid-note">סימן.ה "לא" ב"${escapeHtml(d.name)}" בפולס האחרון — כדאי לשים לב, בנחת.</p>
          ${renderKidHistory(classId, r.sid, r.name)}
        </div>
      `),
      ...improvedKids.map(r => `
        <div class="kid-card">
          <div class="kid-card-top">
            <span class="kid-name">${escapeHtml(r.name)}</span>
            <span class="chip chip-ok">שיפור נראה</span>
          </div>
          <p class="kid-note">עלה.תה מ"לא" בפולס הקודם — מגמה משמחת ב"${escapeHtml(d.name)}".</p>
          ${renderKidHistory(classId, r.sid, r.name)}
        </div>
      `)
    ].join('');

    return `
      <div class="dim-group ${d.dimClass}">
        <div class="dim-group-head">
          <span class="dim-group-name" style="color:${d.deep}">${escapeHtml(d.name)}</span>
          <span class="dim-group-desc">${escapeHtml(d.desc)}</span>
        </div>
        ${kidCards
          ? `<div class="kid-cards">${kidCards}</div>`
          : `<p class="dim-group-empty">אין איתותים בממד הזה בפולס האחרון — נראה טוב.</p>`}
      </div>
    `;
  }).join('');

  return `
    <section class="section">
      <div class="section-head">
        <span class="section-icon si-peach" aria-hidden="true">${ICONS.kids}</span>
        <h2 class="section-title">ילדים שכדאי לראות היום · לפי ממד</h2>
      </div>
      <p class="section-micro">איתותים, לא אבחנות. ילד.ה שלא מופיע.ה כאן — נראה במקום טוב כרגע.</p>
      ${groups}
    </section>
  `;
}

// ═══════ מבט שכבה (?role=principal בלבד — לא בדשבורד המחנכת) ═══════
function switchToClass(classId) {
  document.getElementById('class-select').value = classId;
  render();
}

function classStatus(lowAvg) {
  if (lowAvg >= 2.7) return { label: 'יציב',            chip: 'chip-ok' };
  if (lowAvg >= 2.3) return { label: 'כדאי לשים לב',   chip: 'chip-notice' };
  return                    { label: 'מומלץ מבט היום', chip: 'chip-attention' };
}

function renderLayerView(container) {
  const classes = Object.keys(CLASS_META).map(classId => ({
    id: classId,
    meta: CLASS_META[classId],
    total: KIDS.filter(k => k.class === classId).length,
    data: aggregateClass(classId)
  }));

  const allHaveData = classes.every(c => c.data);
  if (!allHaveData) {
    container.innerHTML = `
      <div class="empty">
        <h3>עדיין אין מספיק נתונים לשכבה</h3>
        <p>חלק מהכיתות לא ענו. אפשר ללחוץ "טען דוגמה" למטה כדי לראות את המבט המלא.</p>
      </div>
    `;
    return;
  }

  const totalKids = classes.reduce((s, c) => s + c.total, 0);
  const totalResponded = classes.reduce((s, c) => s + c.data.responseCount, 0);
  const allAvgs = classes.flatMap(c => Object.values(c.data.dimAverages));
  const gradeAvg = allAvgs.reduce((a, b) => a + b, 0) / allAvgs.length;

  const classCards = classes.map(c => {
    const d = c.data;
    const dimBars = DIMENSIONS.map(dim => {
      const avg = d.dimAverages[dim.id] || 0;
      const widthPct = (avg / 3) * 100;
      return `
        <div class="class-mini-row">
          <div class="class-mini-name" style="color:${dim.deep}">${escapeHtml(dim.name)}</div>
          <div class="class-mini-bar" style="background:color-mix(in srgb, ${dim.soft} 30%, white)"><div class="class-mini-bar-fill" style="background:${dim.deep}; width:${widthPct}%;"></div></div>
          <div class="class-mini-score" style="color:${dim.deep}">${toDisplay5(avg).toFixed(1)}</div>
        </div>
      `;
    }).join('');

    const lowestDim = Object.keys(d.dimAverages).reduce((a, b) => d.dimAverages[a] < d.dimAverages[b] ? a : b);
    const st = classStatus(d.dimAverages[lowestDim]);

    return `
      <button type="button" class="class-card" style="--class-color:${c.meta.color}" onclick="switchToClass(&quot;${c.id}&quot;)">
        <div class="class-card-head">
          <div>
            <div class="class-card-name">${escapeHtml(c.meta.name)}</div>
            <div class="class-card-teacher">מחנכת: ${escapeHtml(c.meta.teacher)}</div>
          </div>
          <span class="chip ${st.chip}">${st.label}</span>
        </div>
        <div class="class-card-mini-bars">${dimBars}</div>
        <div class="class-card-response">${d.responseCount} מתוך ${c.total} ענו · פולס ${d.biweek}</div>
        <span class="class-card-cta">פתיחת תצוגת כיתה ←</span>
      </button>
    `;
  }).join('');

  // ילדים עם סימון לתשומת לב — חוצי-שכבה (מבט רכזת/מנהלת בלבד)
  const attention = [];
  classes.forEach(c => {
    const studentMap = getStudentMap(c.id, c.data.biweek);
    studentMap.forEach(s => {
      if (s.status === 'attention') {
        attention.push({ ...s, className: c.meta.name });
      }
    });
  });
  attention.sort((a, b) => b.lows - a.lows);

  const attentionHTML = attention.length === 0 ? `
    <div class="layer-attention-empty">✓ אין ילדים עם "סימון לתשומת לב" בשכבה בפולס האחרון</div>
  ` : `
    <div class="layer-attention-list">
      ${attention.map(s => `
        <div class="layer-attention-row">
          <div>
            <span class="layer-attention-name">${escapeHtml(s.name)}</span>
            <span class="layer-attention-class">· ${escapeHtml(s.className)}</span>
          </div>
          <div class="layer-attention-signals">${s.lows} איתותים</div>
          <span class="chip chip-attention">סימון לתשומת לב</span>
        </div>
      `).join('')}
    </div>
  `;

  container.innerHTML = `
    <section class="hero">
      <div class="hero-top">
        <div class="hero-id">
          <div class="hero-sun">${ICONS.sun}</div>
          <div>
            <h1>${greeting()}, מבט על שכבה א׳</h1>
            <div class="hero-date">יוני 2026 · תצוגת רכזת שכבה</div>
          </div>
        </div>
        <span class="demo-badge">נתוני הדגמה בלבד · מיועד להצגת חוויית שימוש</span>
      </div>
      <p class="hero-line">סיכום קבוצתי בלי שמות פר כיתה, ורשימת ילדים שכדאי לראות — מתוך הפולס האחרון.</p>
    </section>

    <div class="stats stats-3">
      <div class="stat">
        <div class="stat-top">
          <div class="stat-num">${classes.length}</div>
          <span class="stat-icon si-lavender" aria-hidden="true">${ICONS.tools}</span>
        </div>
        <div class="stat-label">כיתות בשכבה</div>
      </div>
      <div class="stat">
        <div class="stat-top">
          <div class="stat-num">${totalResponded}/${totalKids}</div>
          <span class="stat-icon si-peach" aria-hidden="true">${ICONS.kids}</span>
        </div>
        <div class="stat-label">שיתפו בפולס האחרון</div>
      </div>
      <div class="stat">
        <div class="stat-top">
          <div class="stat-num">${toDisplay5(gradeAvg).toFixed(1)}</div>
          <span class="stat-icon si-sky" aria-hidden="true">${ICONS.heart}</span>
        </div>
        <div class="stat-label">תחושה כללית בשכבה (מתוך 5)</div>
      </div>
    </div>

    <section class="section">
      <h2 class="section-title">הכיתות בשכבה</h2>
      <p class="section-micro">לחיצה על כרטיס פותחת את תצוגת הכיתה.</p>
      <div class="layer-classes">${classCards}</div>
    </section>

    <section class="section">
      <h2 class="section-title">ילדים שכדאי לראות בשכבה · ${attention.length}</h2>
      <p class="section-micro">איתותים מהפולס — לא אבחנה. הצעד הבא: שיחה עם המחנכת, ואם נמשך — פנייה ליועצת.</p>
      ${attentionHTML}
    </section>

    ${renderFooter()}
  `;
}

// ═══════ NAV STRIP — קישור לכלי הפולס האחרים שהמחנכת צריכה ═══════

      <nav class="nav-strip" aria-label="כלי פולס נוספים">
        <a class="nav-card" href="pulse-questionnaire.html${q}">
          <span class="nav-card-ic student" aria-hidden="true">🐙</span>
          <span>
            <span class="nav-card-title">פולס תלמידים</span>

          </span>
          <span class="nav-card-arrow" aria-hidden="true">←</span>
        </a>
        <a class="nav-card" href="pulse-teacher-form-mockup.html${q}">
          <span class="nav-card-ic form" aria-hidden="true">📋</span>
          <span>
            <span class="nav-card-title">טופס דירוג</span>
            <span class="nav-card-sub">תצפית המחנכת — דירוג דו-שבועי</span>
          </span>
          <span class="nav-card-arrow" aria-hidden="true">←</span>
        </a>
        <a class="nav-card" href="pulse-parent-monthly.html${q}">
          <span class="nav-card-ic parent" aria-hidden="true">👨‍👩‍👧</span>
          <span>
            <span class="nav-card-title">פולס הורים</span>
            <span class="nav-card-sub">המבט החודשי של ההורים</span>
          </span>
          <span class="nav-card-arrow" aria-hidden="true">←</span>
        </a>
      </nav>
    </section>
  `;

function renderFooter() {
  return `
    <footer class="page-foot">
      פולס א׳-ב׳ · אימפקט.OS · יוני 2026 — כל השמות והנתונים בדויים.<br>
      הפיילוט הראשון: 4 כיתות בכיתה א׳, בכ־4 בתי ספר או מסגרות פיילוט, בכפוף לאישור סופי. תחילת פיילוט: 1.9.2026.<br>
      המערכת מציעה איתותים רכים בלבד — לא אבחנות, לא ציונים, ובלי בינה מלאכותית.
    </footer>
  `;
}

// ═══════ RENDER ═══════
function render() {
  const classId = document.getElementById('class-select').value;
  const container = document.getElementById('container');

  // פריטי-התצוגה ברייל רלוונטיים רק לתצוגת כיתה — במבט שכבה מסתירים
  document.querySelectorAll('.rail .view-tab').forEach(function (el) {
    el.style.display = classId === 'layer' ? 'none' : '';
  });

  if (classId === 'layer') {
    return renderLayerView(container);
  }

  const data = aggregateClass(classId);

  if (!data) {
    activeView = 'overview';
    container.innerHTML = `
      <div class="view" data-view="overview">
      <div class="empty">
        <h3>עדיין אין תשובות לכיתה ${escapeHtml(classId)}</h3>
        <p>הילדים עוד לא מילאו פולס. אפשר לשלוח להם את הקישור.</p>
        <a class="btn" href="pulse-questionnaire.html?class=${encodeURIComponent(classId)}&biweek=1" target="_blank" rel="noopener">פתיחת השאלון</a>
        <p style="margin-top:20px;font-size:0.85rem;">או — ללחוץ "טען דוגמה" למטה כדי לראות איך זה נראה עם נתונים.</p>
      </div>
      </div>
      <div class="view" data-view="tools">${renderNavStrip(classId)}</div>
      ${renderFooter()}
    `;
    applyView();
    return;
  }

  const hero = generateHero(data);
  const teacherName = CLASS_META[classId] ? CLASS_META[classId].teacher : '';

  // "מבט המורה" — אם טופס הדירוג נשלח, מסמנים מעוין כהה על כל פס
  const tobs = getTeacherObs(classId);
  const gapDims = tobs ? DIMENSIONS.filter(d => {
    const t = tobs.dimAverages[d.id], c = data.dimAverages[d.id];
    return t != null && c != null && Math.abs(toDisplay5(c) - teacherToDisplay5(t)) >= 1;
  }) : [];

  const dimBars = DIMENSIONS.map(d => {
    const avg = data.dimAverages[d.id] || 0;
    const widthPct = (avg / 3) * 100;
    const trend = data.dimTrends[d.id];
    const trendText = trend === 'up' ? '↑ עלייה' : trend === 'down' ? '↓ ירידה' : '→ יציב';
    const trendClass = trend === 'up' ? 'trend-up' : trend === 'down' ? 'trend-down' : 'trend-flat';
    const tAvg = tobs ? tobs.dimAverages[d.id] : null;
    const tMarker = tAvg == null ? '' : `
      <span class="dim-teacher-marker" style="right:calc(${(tAvg / 4) * 100}% - 5px)" role="img"
        aria-label="מבט המורה ב${escapeHtml(d.name)}: ${teacherToDisplay5(tAvg).toFixed(1)} מתוך 5"
        title="מבט המורה: ${teacherToDisplay5(tAvg).toFixed(1)} מתוך 5"></span>`;
    return `
      <div class="dim-row">
        <div class="dim-name" style="color:${d.deep}"><span class="dim-dot" style="background:${d.soft}" aria-hidden="true"></span>${escapeHtml(d.name)}</div>
        <div class="dim-bar" style="background:color-mix(in srgb, ${d.soft} 18%, white)">
          <div class="dim-bar-fill" style="background:${d.soft}; width:${widthPct}%;"></div>
          ${tMarker}
        </div>
        <div class="dim-score" style="color:${d.deep}">${toDisplay5(avg).toFixed(1)}</div>
        <div class="dim-trend ${trendClass}">${trendText}</div>
      </div>
    `;
  }).join('');

  const formLink = `pulse-teacher-form-mockup.html?class=${encodeURIComponent(classId)}`;
  const teacherNote = tobs ? `
    <p class="teacher-lens-note">
      <span class="lens-marker" aria-hidden="true"></span>
      המעוין הכהה על כל פס = <strong>מבט המורה</strong>, מטופס הדירוג האחרון ששלחת.
      ${gapDims.length
        ? `יש פער בולט בין מה שהילדים סימנו למה שראית ב: <strong>${gapDims.map(d => `"${escapeHtml(d.name)}"`).join(', ')}</strong> — שווה מבט.`
        : 'שני המבטים די קרובים — אין פער בולט.'}
    </p>` : `
    <p class="teacher-lens-note">
      עדיין אין כאן "מבט המורה" — אחרי שתמלאי את <a href="${formLink}">טופס הדירוג</a> ותלחצי "שליחה",
      הדירוג שלך יופיע על הפסים האלה לצד מה שהילדים סימנו.
    </p>`;

  // 4 גרפי מיני — מגמת כל תחום לאורך הפולסים האחרונים
  const trendMinis = DIMENSIONS.map(d => {
    const series = data.dimTrendSeries[d.id] || [];
    const last = series.length ? series[series.length - 1].avg : 0;
    const first = series.length ? series[0].avg : 0;
    const delta = last - first;
    const deltaText = series.length < 2 ? '' :
      delta > 0.15 ? '↑ עלייה מאז פולס ' + series[0].week :
      delta < -0.15 ? '↓ ירידה מאז פולס ' + series[0].week :
      '→ יציב לאורך הפולסים';
    const deltaClass = delta > 0.15 ? 'trend-up' : delta < -0.15 ? 'trend-down' : 'trend-flat';
    const bars = series.map(w => `
      <div class="trend-mini-bar" style="height:${w.avg ? (w.avg / 3) * 100 : 0}%; background:${d.soft};"
        data-week="פולס ${w.week}" role="img"
        aria-label="${escapeHtml(d.name)} · פולס ${w.week}: ${w.avg ? toDisplay5(w.avg).toFixed(1) : 'אין נתון'} מתוך 5"></div>
    `).join('');
    return `
      <div class="trend-mini">
        <div class="trend-mini-head">
          <span class="trend-mini-name" style="color:${d.deep}"><span class="dim-dot" style="background:${d.soft}" aria-hidden="true"></span>${escapeHtml(d.name)}</span>
          <span class="trend-mini-score" style="color:${d.deep}">${last ? toDisplay5(last).toFixed(1) : '—'}</span>
        </div>
        <div class="trend-mini-chart">${bars}</div>
        <div class="trend-mini-delta ${deltaClass}">${deltaText}</div>
      </div>
    `;
  }).join('');

  const overallAvg = Object.values(data.dimAverages).reduce((a,b) => a+b, 0) / 4;
  // איתותים פעילים — ילדים עם לפחות איתות אחד בפולס האחרון (אותה לוגיקה של המפה)
  const signalsCount = getStudentMap(classId, data.biweek)
    .filter(r => r.status === 'attention' || r.status === 'watch').length;

  container.innerHTML = `
    <div class="view" data-view="overview">
    <section class="hero">
      <div class="hero-top">
        <div class="hero-id">
          <div class="hero-sun">${ICONS.sun}</div>
          <div>
            <h1>${greeting()}${teacherName ? ', ' + escapeHtml(teacherName) : ''}</h1>
            <div class="hero-date">יוני 2026 · כיתה ${escapeHtml(classId)} · פולס ${data.biweek}</div>
          </div>
        </div>
        <div class="hero-side">
          <span class="demo-badge">נתוני הדגמה בלבד · מיועד להצגת חוויית שימוש</span>
          <div class="hero-actions">
            <button type="button" class="btn btn-hero" onclick="openSendModal('kids')">שליחת פולס לילדים</button>
            <button type="button" class="btn btn-hero" onclick="openSendModal('parents')">שליחת פולס להורים</button>
            <button type="button" class="btn btn-hero" onclick="openMapDrawer()">המפה המלאה</button>
          </div>
        </div>
      </div>
      <p class="hero-line">${hero.line}</p>
      <div class="hero-chips">
        <span class="chip ${hero.chipClass}">${hero.chipText}</span>
        <span class="chip chip-info">${data.responseCount} ילדים שיתפו</span>
      </div>
    </section>

    <!-- הדיווח של המורה — הפולס נשען על שני מקורות: הילדים + המבט שלך -->
    <a class="teacher-report" href="${formLink}">
      <span class="teacher-report-icon" aria-hidden="true">${ICONS.clipboard}</span>
      <span class="teacher-report-text">
        <span class="teacher-report-title">הדיווח שלי · 8 שאלות · 2 דקות</span>
        <span class="teacher-report-sub">הפולס לא נשען רק על מה שהילדים מסמנים — המבט שלך משלים את התמונה. אחרי השליחה הדירוג שלך מופיע כאן, על פסי האקלים.</span>
      </span>
      ${tobs
        ? '<span class="chip chip-ok">נשלח לפולס הנוכחי</span>'
        : '<span class="chip chip-notice">עדיין לא מולא לפולס הזה</span>'}
      <span class="teacher-report-arrow" aria-hidden="true">←</span>
    </a>

    <div class="stats">
      <div class="stat">
        <div class="stat-top">
          <div class="stat-num">${data.responseCount}</div>
          <span class="stat-icon si-peach" aria-hidden="true">${ICONS.kids}</span>
        </div>
        <div class="stat-label">ילדים שיתפו בפולס האחרון</div>
      </div>
      <div class="stat">
        <div class="stat-top">
          <div class="stat-num">${overallAvg ? toDisplay5(overallAvg).toFixed(1) : '—'}</div>
          <span class="stat-icon si-sky" aria-hidden="true">${ICONS.heart}</span>
        </div>
        <div class="stat-label">תחושה כללית (מתוך 5)</div>
      </div>
      <div class="stat">
        <div class="stat-top">
          <div class="stat-num">${signalsCount}</div>
          <span class="stat-icon si-sand" aria-hidden="true">${ICONS.bell}</span>
        </div>
        <div class="stat-label">איתותים פעילים — כדאי לשים לב</div>
      </div>
      <div class="stat">
        <div class="stat-top">
          <div class="stat-num">${data.biweek}</div>
          <span class="stat-icon si-mint" aria-hidden="true">${ICONS.check}</span>
        </div>
        <div class="stat-label">פולסים הושלמו השנה</div>
      </div>
    </div>

    ${renderActionsSection(classId, data)}

    <section class="section">
      <div class="section-head">
        <span class="section-icon si-lavender" aria-hidden="true">${ICONS.bars}</span>
        <h2 class="section-title">אקלים הכיתה · 4 ממדים</h2>
      </div>
      <p class="section-micro">סיכום קבוצתי בלי שמות — הפס הצבעוני = מה שהילדים סימנו, המעוין הכהה = מבט המורה.</p>
      <div class="dim-list">${dimBars}</div>
      ${teacherNote}

      ${data.alertText ? `<div class="alert">${data.alertText}</div>` : ''}
    </section>

    ${renderDimensionGroups(classId, data.biweek)}
    </div>

    <div class="view" data-view="trends">
      <section class="section" style="margin-top:0">
        <div class="section-head">
          <span class="section-icon si-mint" aria-hidden="true">${ICONS.bars}</span>
          <h2 class="section-title">מגמות לאורך הפולסים · לפי תחום</h2>
        </div>
        <p class="section-micro">עמודה לכל פולס, הכהה ביותר = הפולס האחרון.</p>
        <div class="trend-grid">${trendMinis}</div>
      </section>
    </div>

    <div class="view" data-view="questions">
      ${renderQuestionStats(data)}
    </div>

    <div class="view" data-view="tools">
    ${renderNavStrip(classId)}

    <section class="section">
      <div class="section-head">
        <span class="section-icon si-sand" aria-hidden="true">${ICONS.tools}</span>
        <h2 class="section-title">להעמיק במבט הזה</h2>
      </div>
      <p class="section-micro">למי שרוצה להעמיק — הכול נשאר רך וקטן.</p>

      ${renderInterventionDrawer(classId)}

      <details class="drawer" id="map-drawer">
        <summary>המפה המלאה של הכיתה · פולס ${data.biweek}</summary>
        <div class="drawer-body">
          <div class="map-header">
            <p class="drawer-sub" style="margin:0">מה כל ילד.ה סימן.ה בפולס האחרון · ${data.responseCount} שיתפו</p>
            <div>
              <label class="visually-hidden" for="map-sort">מיון המפה</label>
              <select class="map-sort" id="map-sort" onchange="changeMapSort(this.value)">
                <option value="concern" ${mapSortBy === 'concern' ? 'selected' : ''}>מיון: מי לתשומת לב קודם</option>
                <option value="name" ${mapSortBy === 'name' ? 'selected' : ''}>מיון: לפי שם</option>
              </select>
            </div>
          </div>
          <div class="map-legend">
            <span><span class="score-pill pill-yes">כן</span> כן, הרבה</span>
            <span><span class="score-pill pill-some">קצת</span> קצת</span>
            <span><span class="score-pill pill-no">לא</span> לא</span>
            <span><span class="score-pill pill-none">—</span> טרם ענה.תה</span>
          </div>
          <table class="map-table">
            <thead>
              <tr>
                <th scope="col">תלמיד.ה</th>
                ${DIMENSIONS.map(d => `<th scope="col" class="col-dim" style="color:${d.deep}">${escapeHtml(d.name)}</th>`).join('')}
                <th scope="col" class="col-dim">מצב</th>
              </tr>
            </thead>
            <tbody>${renderStudentMapRows(classId, data.biweek)}</tbody>
          </table>
          <div class="map-caveat">
            הפולס הוא <strong>איתות</strong>, לא אבחנה. ילד.ה עם "סימון לתשומת לב" שלושה פולסים ברצף —
            מוסיפים תצפית מורה ופונים ליועצת לפני כל החלטה.
          </div>
        </div>
      </details>
    </section>
    </div>

    ${renderFooter()}
  `;
  applyView();
}

// טוגל דו-כיווני + שמירה ב-localStorage + משוב toast
function markActionDone(key) {
  const isDone = localStorage.getItem(key) === '1';
  if (isDone) {
    localStorage.removeItem(key);
    showToast('סימון "עשיתי" בוטל — אפשר לחזור לזה מתי שנוח.');
  } else {
    localStorage.setItem(key, '1');
    showToast('יופי — סומן כ"עשיתי". נשמר בדפדפן.');
  }
  render();
}

// ═══════ שליחת פולס — מודל בחירת סוג הפולס (ילדים / הורים) ═══════
function buildSendOptions(target) {
  const enc = encodeURIComponent(document.getElementById('class-select').value);
  if (target === 'kids') {
    return [
      { id: 'full', color: 'var(--aqua-deep)', name: 'הפולס המלא · 4 בועות',
        desc: 'המסע הרגיל של נוני — מקום, חברים, רגש ולגלות. כשלוש דקות לילד.ה.',
        href: `pulse-questionnaire.html?class=${enc}` },
      ...DIMENSIONS.map(d => ({
        id: d.id, color: d.soft,
        name: `פולס ממוקד · ${d.name}`,
        desc: `שאלה אחת בלבד: "${d.questionText}" — כשרוצים לבדוק רק את התחום הזה.`,
        href: `pulse-questionnaire.html?class=${enc}&dims=${d.id}`
      }))
    ];
  }
  return [
    { id: 'monthly', color: 'var(--lavender)', name: 'פולס חודשי מלא · 5 שאלות',
      desc: 'סקרנות ועניין · רוגע אחרי תסכול · שמחה ללכת לבית הספר · תלונות חוזרות · ומשהו אחד שחשוב שתדעי.',
      href: `pulse-parent-monthly.html?class=${enc}` },
    { id: 'micro', color: 'var(--sky)', name: 'פולס מהיר · שאלה אחת',
      desc: '"באיזו מידה הילד.ה פורח.ת השבוע?" — סולם 0–10, פחות מדקה להורה.',
      href: `pulse-parent-monthly.html?class=${enc}&mode=micro` }
  ];
}

const SEND_COPY = {
  kids: {
    title: 'שליחת פולס לילדים',
    sub: 'בוחרים איזה פולס לשלוח — והוא נפתח אצל הילדים בטאבלט.',
    note: 'בדמו הקישור נפתח כאן בדפדפן. בפיילוט הפולס ייפתח לילדים בטאבלט הכיתתי.'
  },
  parents: {
    title: 'שליחת פולס להורים',
    sub: 'בוחרים איזה פולס לשלוח להורים החודש.',
    note: 'בפיילוט הקישור נשלח ידנית בקבוצת הוואטסאפ של הכיתה — "העתקת קישור" ואז הדבקה בקבוצה.'
  }
};

let sendOptions = [];
let sendSelectedId = null;
let sendLastFocus = null;

function renderSendOptions() {
  const wrap = document.getElementById('send-modal-options');
  wrap.innerHTML = sendOptions.map(o => `
    <button type="button" class="send-option ${o.id === sendSelectedId ? 'selected' : ''}" onclick="selectSendOption('${o.id}')" aria-pressed="${o.id === sendSelectedId ? 'true' : 'false'}">
      <span class="send-option-dot" style="background:${o.color}" aria-hidden="true"></span>
      <span>
        <span class="send-option-name">${escapeHtml(o.name)}</span>
        <span class="send-option-desc" style="display:block">${escapeHtml(o.desc)}</span>
      </span>
      <span class="send-option-check" aria-hidden="true">✓</span>
    </button>
  `).join('');
  const sel = sendOptions.find(o => o.id === sendSelectedId);
  document.getElementById('send-modal-open').href = sel ? sel.href : '#';
}

function selectSendOption(id) {
  sendSelectedId = id;
  renderSendOptions();
}

function openSendModal(target) {
  sendLastFocus = document.activeElement;
  sendOptions = buildSendOptions(target);
  sendSelectedId = sendOptions[0].id;
  const classId = document.getElementById('class-select').value;
  document.getElementById('send-modal-title').textContent = `${SEND_COPY[target].title} · כיתה ${classId}`;
  document.getElementById('send-modal-sub').textContent = SEND_COPY[target].sub;
  document.getElementById('send-modal-note').textContent = SEND_COPY[target].note;
  renderSendOptions();
  document.getElementById('send-modal').classList.add('open');
  document.querySelector('#send-modal .modal-close').focus();
}

function closeSendModal() {
  document.getElementById('send-modal').classList.remove('open');
  if (sendLastFocus) sendLastFocus.focus();
}

function copySendLink() {
  const sel = sendOptions.find(o => o.id === sendSelectedId);
  if (!sel) return;
  const url = new URL(sel.href, location.href).href;
  const fail = () => showToast('לא הצלחתי להעתיק — אפשר לפתוח את הפולס ולהעתיק את הכתובת מהדפדפן.');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(
      () => showToast('הקישור הועתק — אפשר להדביק בוואטסאפ של הכיתה.'),
      fail
    );
  } else {
    fail();
  }
}

document.getElementById('send-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSendModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('send-modal').classList.contains('open')) closeSendModal();
});

// ═══════ INIT ═══════
(function init() {
  const select = document.getElementById('class-select');
  if (ROLE !== 'principal') {
    // עיקרון סגור: דשבורד מחנכת בלי השוואה בין כיתות — מבט שכבה רק ב-?role=principal
    const layerOpt = select.querySelector('option[value="layer"]');
    if (layerOpt) layerOpt.remove();
    select.value = "א'1";
  } else {
    select.value = 'layer';
  }
  select.addEventListener('change', render);

  // תפריט הצד — מעבר בין תצוגות
  document.querySelectorAll('.view-tab').forEach(b =>
    b.addEventListener('click', () => setView(b.dataset.view)));

  // ═══════ Auto-load demo data ב-?seed=1 / ?demo=1 ═══════
  // נטען נתוני דמו אוטומטית רק אם הפרמטר קיים ועדיין אין תשובות שמורות —
  // כך שהפתיחה מהדמו מציגה דשבורד מלא, לא מסך "עדיין אין תשובות".
  // seedData() קורא ל-render() בעצמו (בדיוק כמו לחיצה על "טען דוגמה").
  const params = new URLSearchParams(location.search);
  const wantsSeed = params.get('seed') === '1' || params.get('demo') === '1';
  if (wantsSeed && getSubmissions().length === 0) {
    seedData();
  } else {
    render();
  }
})();
</script>
<script src="../demo/journey.js" defer></script>
