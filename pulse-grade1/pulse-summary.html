<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פולס · השונית של נוני · סִיּוּם</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   פולס א'-ב' · מסך סיכום לילד.ה — אחרי השאלון
   רגע נוני רך ותת-מימי: מדבקה אקראית + פרידה חמה.
   עקרונות סגורים: בלי ציונים, בלי תוצאות, בלי השוואות,
   בלי "כל הכבוד על התשובות" — המדבקה תמיד אקראית,
   בלי שום קשר לתשובות. ניקוד מלא בכל טקסט לילד.ה.
   Restyle לפי שפת ה-mockups (assets/design-refs):
   שמיים-מים פסטליים → חול חם, אלמוגים בפינות, כפתור ענבר.
   ═══════════════════════════════════════════════════════ */
:root {
  --dim-adjust: #F2B844;
  --dim-friend: #E08FAF;
  --dim-emotion: #8B6BC0;
  --dim-joy: #5BC0A8;
  --reef-water: #E7F5F6;
  --reef-mid: #DCEEEF;
  --reef-sand: #F6EAD0;
  --reef-sand-deep: #F2E0BE;
  --cream: rgba(255, 252, 243, 0.93);
  --amber-hi: #FFD173;
  --amber-lo: #F2A93B;
  --amber-ink: #5B3A12;
  --text: #2C2622;
  --text-light: #6E6258;
  --white: #FDFCFA;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; }
body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(180deg,
    var(--reef-water) 0%,
    var(--reef-mid) 38%,
    #EDEEDC 58%,
    var(--reef-sand) 78%,
    var(--reef-sand-deep) 100%);
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  overscroll-behavior: contain;
  overflow-x: hidden;
  overflow-y: auto; /* גלילה אנכית כ-fallback במסכים נמוכים */
}

.app {
  width: 100%;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
/* זוהר שמש רך מלמעלה — כמו ב-mockups */
.app::before {
  content: '';
  position: absolute; top: -90px; left: 50%;
  transform: translateX(-50%);
  width: 480px; height: 280px;
  background: radial-gradient(ellipse at center, rgba(255,247,213,.85), rgba(255,247,213,0) 68%);
  pointer-events: none;
  z-index: 0;
}

/* Reef bubbles bg */
.bg-bubbles { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bubble {
  position: absolute;
  background: rgba(255,255,255,.5);
  border: 1px solid rgba(255,255,255,.65);
  border-radius: 50%;
  animation: rise linear infinite;
}
@keyframes rise {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  10% { opacity: 0.65; }
  90% { opacity: 0.35; }
  100% { transform: translateY(-100px) scale(1); opacity: 0; }
}

/* ═══════ SEABED — אלמוגים, אצות וכוכב ים בפינות (דקורטיבי) ═══════ */
.seabed {
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 30vh; max-height: 280px; min-height: 150px;
  pointer-events: none; z-index: 0;
}
.seabed svg { width: 100%; height: 100%; display: block; }

/* ═══════ OUTRO ═══════ */
.outro {
  flex: 1; position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 28px 24px;
  animation: fadeIn .35s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.outro-nuni {
  width: 150px; height: 158px;
  object-fit: contain;
  filter: drop-shadow(0 12px 24px rgba(159,144,216,.4));
  animation: noni-float 4s ease-in-out infinite;
}
@keyframes noni-float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-10px) scale(1.02); }
}
.outro-title {
  font-size: 2rem; font-weight: 900;
  margin: 16px 0 8px;
  line-height: 1.3;
  text-shadow: 0 2px 0 rgba(255,255,255,.5);
}
.outro-sub {
  font-size: 1.08rem; font-weight: 600;
  color: var(--text-light);
  max-width: 320px;
  line-height: 1.7;
  margin-bottom: 20px;
}

/* ═══════ STICKER — תמיד אקראית, בלי קשר לתשובות ═══════ */
.sticker {
  width: 180px; height: 180px;
  background: var(--cream);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  margin: 10px 0 22px;
  box-shadow: 0 16px 40px rgba(92,70,30,.2);
  position: relative;
  animation: stickerPop .8s cubic-bezier(.34,1.56,.64,1);
}
@keyframes stickerPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); }
}
.sticker::before {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50%;
  background: conic-gradient(#FFE3A1, #F8CBD8, #DDD2F2, #BCE6DC, #FFE3A1);
  z-index: -1;
  animation: spin 12s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.sticker-emoji { font-size: 4.2rem; }
.sticker-label {
  font-weight: 800; font-size: 0.95rem;
  color: var(--text);
  margin-top: 4px;
}

/* ═══════ AUDIO BTN — פיל לבן שקט "שִׁמְעוּ שׁוּב" ═══════ */
.audio-btn {
  margin: 0 auto 18px;
  background: rgba(255,255,255,.95);
  border: 1.5px solid rgba(120,90,40,.08);
  border-radius: 999px;
  padding: 8px 20px;
  display: flex; align-items: center; gap: 8px;
  font-family: 'Heebo'; font-size: 0.9rem; font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(92,70,30,.08);
  transition: transform .15s;
}
.audio-btn:active { transform: scale(0.95); }
.audio-btn.playing .audio-icon { animation: pulse 0.6s ease-in-out infinite; }
@keyframes pulse { 50% { transform: scale(1.25); } }

/* ═══════ AMBER CTA — פיל ענבר חם, טקסט חום-כהה (mockups) ═══════ */
.btn-start {
  background: linear-gradient(180deg, var(--amber-hi), var(--amber-lo));
  color: var(--amber-ink);
  border: none; border-radius: 999px;
  padding: 16px 44px;
  font-family: 'Heebo'; font-weight: 800; font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 10px 24px rgba(242,169,59,.38), inset 0 1px 0 rgba(255,255,255,.55);
  transition: transform .15s;
}
.btn-start:active { transform: scale(0.96); }

:focus-visible {
  outline: 3px solid #52BDB5;
  outline-offset: 3px;
  border-radius: 999px;
}

/* ═══════ DEMO NOTE — פינה עליונה, עדין (כמו ב-mockups) ═══════ */
.demo-banner {
  position: fixed; top: 8px; left: 10px;
  background: rgba(255,255,255,.6);
  color: var(--text-light);
  font-size: 0.62rem; font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px; z-index: 100;
  font-family: 'Heebo', sans-serif;
  pointer-events: none;
}

@media (max-height: 640px) {
  .outro-nuni { width: 120px; height: 126px; }
  .sticker { width: 150px; height: 150px; }
  .sticker-emoji { font-size: 3.4rem; }
  .outro-title { font-size: 1.5rem; }
  .seabed { height: 22vh; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!--
  פרטיות: זהו דמו בלבד. תשובות נשמרות זמנית ב-localStorage ('pulse-demo-responses')
  ומנוקות אוטומטית אחרי 24 שעות. בפיילוט האמיתי נתוני ילדים חייבים להישלח
  ל-backend (Supabase) בלבד, ואסור שיישמרו לטווח ארוך על טאבלטים משותפים.

  עקרון סגור: המדבקה אקראית תמיד — אין כאן תוצאות, ציונים או משוב על ביצועים.
-->

<div class="app">

  <!-- Bubbles bg -->
  <div class="bg-bubbles" id="bubbles"></div>

  <!-- Seabed — קישוט תחתון: אצות, אלמוגים, כוכב ים (דקורטיבי בלבד) -->
  <div class="seabed" aria-hidden="true">
    <svg viewBox="0 0 480 200" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
      <!-- דיונות חול -->
      <path d="M0 150 Q120 132 240 146 Q360 160 480 142 L480 200 L0 200 Z" fill="#F0DCB4" opacity="0.85"/>
      <path d="M0 170 Q140 156 280 168 Q400 178 480 166 L480 200 L0 200 Z" fill="#EBD2A4" opacity="0.9"/>
      <!-- אצות — פינה שמאלית -->
      <path d="M38 172 Q28 130 40 96 Q46 82 42 70" stroke="#8FBF9F" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.75"/>
      <path d="M58 176 Q66 140 56 112 Q50 96 58 84" stroke="#A8CCA8" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M20 178 Q14 150 24 126" stroke="#9CC79F" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
      <!-- אלמוג ורוד — שמאל -->
      <path d="M92 178 V150 M92 162 Q80 158 78 144 M92 156 Q104 152 106 138" stroke="#F0AABE" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.8"/>
      <!-- אלמוגים — פינה ימנית -->
      <path d="M428 180 V146 M428 162 Q414 158 412 140 M428 156 Q442 150 444 132 M412 182 V164 Q402 162 400 150" stroke="#EFA68C" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.8"/>
      <ellipse cx="394" cy="180" rx="14" ry="9" fill="#E9B7CB" opacity="0.7"/>
      <ellipse cx="452" cy="184" rx="12" ry="8" fill="#F3C9A0" opacity="0.7"/>
      <!-- כוכב ים — ימין -->
      <path d="M356 170 L360.5 180 L371 181 L363 188 L365.5 198 L356 192.5 L346.5 198 L349 188 L341 181 L351.5 180 Z" fill="#F2A968" opacity="0.9"/>
      <!-- צדפים ואבנים קטנות -->
      <ellipse cx="160" cy="188" rx="10" ry="6" fill="#E3CBA0" opacity="0.8"/>
      <ellipse cx="252" cy="192" rx="8" ry="5" fill="#DEC498" opacity="0.7"/>
      <path d="M210 190 Q206 182 210 178 Q214 182 210 190 Z" fill="#F0BFCD" opacity="0.75"/>
    </svg>
  </div>

  <div class="outro">
    <img class="outro-nuni" src="assets/noni-happy.png" alt="נוני">
    <h1 class="outro-title">תּוֹדָה שֶׁעֲזַרְתֶּם לְנוּנִי 🐙</h1>
    <p class="outro-sub">קִבַּלְתֶּם מַדְבֵּקָה מֵהַשּׁוֹנִית!</p>

    <div class="sticker">
      <div class="sticker-emoji" id="sticker-emoji">⭐</div>
      <div class="sticker-label" id="sticker-label">כּוֹכַב הַשּׁוֹנִית</div>
    </div>

    <p class="outro-sub">נִתְרָאֶה בַּשּׁוֹנִית<br>בַּפַּעַם הַבָּאָה 🌊</p>

    <button class="audio-btn" id="outro-audio-btn" onclick="playOutroAudio()">
      <span class="audio-icon">🔊</span>
      <span>שִׁמְעוּ שׁוּב</span>
    </button>

    <button class="btn-start" id="btn-new-pulse">פּוֹלְס חָדָשׁ</button>
  </div>

  <!-- Demo note — פינה עליונה (mockups) -->
  <div class="demo-banner" title="DEMO v4 · audio=MP3 (Hila) · no-TTS">נְתוּנֵי הַדְגָּמָה בִּלְבַד</div>
</div>

<script>
// ═══════ URL params — נשמרים בחזרה לשאלון ═══════
const params = new URLSearchParams(window.location.search);
const classId = params.get('class') || 'א1';
const sid = params.get('sid') || '';
const biweek = params.get('biweek') || '1';

// ═══════ פרטיות (דמו בלבד) — ניקוי נתונים בני יותר מ-24 שעות ═══════
(function cleanupOldDemoData() {
  try {
    const KEY = 'pulse-demo-responses';
    const cutoff = Date.now() - 24 * 60 * 60 * 1000;
    const items = JSON.parse(localStorage.getItem(KEY) || '[]');
    const fresh = items.filter(s => {
      const t = Date.parse(s && s.submittedAt || '');
      return !isNaN(t) && t >= cutoff;
    });
    if (fresh.length !== items.length) {
      localStorage.setItem(KEY, JSON.stringify(fresh));
    }
  } catch (_) { /* localStorage חסום — אין מה לנקות */ }
})();

// ═══════ BUBBLES BG ═══════
(function createBubbles() {
  const container = document.getElementById('bubbles');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 4 + Math.random() * 18;
    b.style.width = b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + '%';
    b.style.animationDuration = (8 + Math.random() * 10) + 's';
    b.style.animationDelay = (-Math.random() * 15) + 's';
    container.appendChild(b);
  }
})();

// ═══════ STICKER — אקראית תמיד, בלי שום קשר לתשובות ═══════
const STICKERS = [
  { emoji: '⭐', label: 'כּוֹכַב הַשּׁוֹנִית' },
  { emoji: '🐚', label: 'צֶדֶף הַזָּהָב' },
  { emoji: '🪸', label: 'אַלְמוֹג מְיֻחָד' },
  { emoji: '🐢', label: 'הַצָּב הֶחָכָם' },
  { emoji: '🌊', label: 'גַּל הַחֲבֵרוּת' },
  { emoji: '🦀', label: 'הַסַּרְטָן הַשָּׂמֵחַ' },
  { emoji: '🐙', label: 'הַתַּמְנוּן הַזָּרִיז' }
];
const sticker = STICKERS[Math.floor(Math.random() * STICKERS.length)];
document.getElementById('sticker-emoji').textContent = sticker.emoji;
document.getElementById('sticker-label').textContent = sticker.label;

// ═══════ AUDIO — MP3 בלבד (הקלטה אנושית · הילה) ═══════
// עיקרון סגור: אין ולא יהיה TTS / Web Speech בשום מצב.
// אם ה-MP3 חסר/חסום (למשל autoplay בטעינת עמוד) — נכשלים בשקט:
// הטקסט המנוקד על המסך, וכפתור "שִׁמְעוּ שׁוּב" מנסה שוב את ה-MP3.
const audioElement = new Audio('assets/audio/outro.mp3');
audioElement.preload = 'auto';

function playOutroAudio() {
  const btn = document.getElementById('outro-audio-btn');
  try { audioElement.pause(); audioElement.currentTime = 0; } catch (_) {}
  btn.classList.add('playing');
  const stop = () => btn.classList.remove('playing');
  audioElement.onended = stop;
  audioElement.onerror = stop; // כישלון שקט — בלי fallback קולי
  const p = audioElement.play();
  if (p && typeof p.catch === 'function') p.catch(stop);
}

// ניסיון השמעה עדין בטעינה; אם הדפדפן חוסם autoplay — שקט.
setTimeout(playOutroAudio, 500);

// ═══════ פולס חדש — חזרה לשאלון עם אותם פרמטרים ═══════
document.getElementById('btn-new-pulse').addEventListener('click', () => {
  const qp = new URLSearchParams({ class: classId, biweek });
  if (sid) qp.set('sid', sid);
  window.location.href = 'pulse-questionnaire.html?' + qp.toString();
});
</script>

</body>
</html>
