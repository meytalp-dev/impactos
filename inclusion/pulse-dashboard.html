<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פולס · דשבורד מחנכת · כיתה א׳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --dim-adjust: #F2B844;
  --dim-friend: #E08FAF;
  --dim-emotion: #8B6BC0;
  --dim-joy: #5BC0A8;
  --primary: #2E7D8C; --primary-dark: #1E5A66;
  --tertiary: #8B3A4A;
  --leaf: #4A9B7F;
  --surface: #F5F0E8;
  --surface-card: #F7F5F2;
  --white: #FDFCFA;
  --text: #2C2622;
  --text-light: #6E6258;
  --border: #EDE6D8;
  --shadow-sm: 0 2px 8px rgba(44,38,34,.05);
  --shadow-md: 0 6px 20px rgba(44,38,34,.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--surface);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
h1, h2, h3, h4 { font-family: 'Rubik', sans-serif; }

/* ═══════ TOP BAR ═══════ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(245,240,232,.94);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(46,125,140,.08);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
}
.brand-num {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--dim-adjust), var(--dim-friend));
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-family: 'Rubik';
}
.brand-title {
  font-family: 'Rubik'; font-weight: 800; font-size: 1rem;
  color: var(--primary-dark);
}
.topbar-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 0.85rem; color: var(--text-light);
}
.class-select {
  padding: 6px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--white);
  font-family: 'Heebo';
  font-size: 0.85rem;
  color: var(--text);
  cursor: pointer;
}

/* ═══════ CONTAINER ═══════ */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ═══════ HERO CARD ═══════ */
.hero-card {
  background: var(--white);
  border-radius: 18px;
  padding: 22px 24px;
  box-shadow: var(--shadow-md);
  margin-bottom: 18px;
  border-right: 6px solid var(--hero-color, var(--dim-adjust));
  position: relative;
}
.hero-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.75rem; font-weight: 700;
  padding: 4px 12px; border-radius: 999px;
  background: rgba(0,0,0,.04);
  color: var(--text);
  margin-bottom: 10px;
}
.hero-status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--hero-color, var(--dim-adjust));
}
.hero-line {
  font-size: 1.08rem;
  line-height: 1.7;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 14px;
}
.hero-line strong { color: var(--text); font-weight: 800; }
.hero-action {
  background: var(--leaf);
  color: var(--white);
  border: none;
  padding: 10px 22px;
  border-radius: 10px;
  font-family: 'Heebo';
  font-weight: 700;
  font-size: 0.92rem;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: transform .15s, opacity .25s;
}
.hero-action:hover { transform: translateY(-1px); }
.hero-action.done {
  background: rgba(74,155,127,.18);
  color: var(--leaf);
}

/* ═══════ DIMENSIONS BARS ═══════ */
.section-title {
  font-size: 0.85rem; font-weight: 700;
  color: var(--text-light);
  margin: 22px 0 10px;
  letter-spacing: 0.04em;
  padding-right: 4px;
}

.dim-list {
  background: var(--white);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.dim-row {
  display: grid;
  grid-template-columns: 110px 1fr 60px 60px;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(0,0,0,.04);
}
.dim-row:last-child { border-bottom: none; }
.dim-name {
  font-weight: 700;
  font-size: 0.92rem;
  font-family: 'Heebo';
}
.dim-bar {
  height: 10px;
  background: rgba(0,0,0,.05);
  border-radius: 5px;
  position: relative;
  overflow: hidden;
}
.dim-bar-fill {
  position: absolute; top: 0; right: 0;
  height: 100%;
  border-radius: 5px;
  transition: width .8s ease-out;
}
.dim-score {
  font-family: 'Rubik';
  font-weight: 800;
  font-size: 1.1rem;
  text-align: center;
}
.dim-trend {
  text-align: center;
  font-size: 1rem;
  font-weight: 700;
}
.trend-up { color: var(--leaf); }
.trend-down { color: var(--tertiary); }
.trend-flat { color: var(--text-light); }

/* ═══════ MINI TREND ═══════ */
.trend-card {
  background: var(--white);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow-sm);
  margin-top: 16px;
}
.trend-title {
  font-size: 0.85rem;
  color: var(--text-light);
  font-weight: 600;
  margin-bottom: 12px;
}
.trend-chart {
  display: flex; align-items: flex-end; gap: 10px;
  height: 70px;
}
.trend-bar {
  flex: 1; min-width: 30px;
  background: linear-gradient(180deg, var(--dim-adjust), var(--dim-friend));
  border-radius: 6px 6px 0 0;
  position: relative;
  opacity: 0.65;
  transition: opacity .2s;
}
.trend-bar:last-child { opacity: 1; }
.trend-bar::after {
  content: attr(data-week);
  position: absolute; bottom: -22px; left: 0; right: 0;
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-light);
}

/* ═══════ ALERT ═══════ */
.alert {
  background: rgba(232,168,73,.12);
  border-right: 4px solid #C88A2E;
  padding: 14px 18px;
  border-radius: 12px;
  margin-top: 18px;
  font-size: 0.92rem;
  line-height: 1.6;
  color: var(--text);
}
.alert strong { color: #8E5A1E; }

/* ═══════ EMPTY STATE ═══════ */
.empty {
  background: var(--white);
  border-radius: 18px;
  padding: 40px 24px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.empty h3 {
  font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;
}
.empty p {
  color: var(--text-light); font-size: 0.95rem;
  margin-bottom: 20px;
}
.empty a {
  display: inline-block;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 10px 24px;
  border-radius: 999px;
  font-weight: 700;
  transition: transform .15s;
}
.empty a:hover { transform: translateY(-1px); }

/* ═══════ STATS BAR ═══════ */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.stat {
  background: var(--white);
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-family: 'Rubik';
  font-weight: 900;
  font-size: 1.5rem;
  color: var(--primary-dark);
  line-height: 1;
}
.stat-label {
  font-size: 0.72rem;
  color: var(--text-light);
  margin-top: 4px;
}

/* ═══════ DEMO BANNER ═══════ */
.demo-banner {
  position: fixed; bottom: 8px; right: 8px;
  background: rgba(0,0,0,.6);
  color: white;
  font-size: 0.7rem;
  padding: 5px 12px;
  border-radius: 6px;
  font-family: monospace;
  z-index: 100;
  display: flex; align-items: center; gap: 8px;
}
.demo-banner button {
  background: rgba(255,255,255,.2);
  border: none;
  color: white;
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: monospace;
}
.demo-banner button:hover { background: rgba(255,255,255,.3); }

@media (max-width: 520px) {
  .dim-row { grid-template-columns: 90px 1fr 50px; }
  .dim-trend { display: none; }
}
</style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="brand">
    <div class="brand-num">10</div>
    <div class="brand-title">פולס · דשבורד מחנכת</div>
  </div>
  <div class="topbar-meta">
    <select class="class-select" id="class-select">
      <option value="א1">כיתה א1</option>
      <option value="א2">כיתה א2</option>
    </select>
    <span id="biweek-label">פולס #4 · 28.5.26</span>
  </div>
</header>

<div class="container" id="container">
  <!-- Filled by JS -->
</div>

<!-- Demo banner -->
<div class="demo-banner">
  DEMO · localStorage
  <button onclick="seedData()">טען דוגמה</button>
  <button onclick="clearData()">נקה</button>
</div>

<script>
const DIMENSIONS = [
  { id: 'adjust', name: 'הִסְתַּגְּלוּת', color: '#F2B844' },
  { id: 'friend', name: 'חַ בְ ר וּ ת', color: '#E08FAF' },
  { id: 'emotion', name: 'שָׂפָה רִגְשִׁית', color: '#8B6BC0' },
  { id: 'joy', name: 'שִׂמְחָה לִלְמֹד', color: '#5BC0A8' }
];

// ═══════ DATA LAYER (localStorage for demo) ═══════
function getSubmissions() {
  return JSON.parse(localStorage.getItem('pulse-demo-responses') || '[]');
}

function clearData() {
  if (confirm('למחוק את כל הנתונים?')) {
    localStorage.removeItem('pulse-demo-responses');
    render();
  }
}

function seedData() {
  // Generate ~20 mock submissions for class א1
  const seeds = [];
  const now = Date.now();
  // Build trend: weeks 1-4 with mild variation
  for (let week = 1; week <= 4; week++) {
    const weekTs = new Date(now - (4 - week) * 14 * 24 * 3600 * 1000);
    for (let kid = 0; kid < 18; kid++) {
      const responses = DIMENSIONS.map(d => {
        // Simulate: adjust improving, friend stable, emotion middling, joy declining
        let basePct;
        if (d.id === 'adjust') basePct = 0.4 + week * 0.07;
        else if (d.id === 'friend') basePct = 0.65;
        else if (d.id === 'emotion') basePct = 0.55;
        else basePct = 0.75 - week * 0.08;
        const r = Math.random();
        let score;
        if (r < basePct) score = 3;
        else if (r < basePct + 0.25) score = 2;
        else score = 1;
        return { dim: d.id, score, ts: weekTs.toISOString() };
      });
      seeds.push({
        school: 'demo',
        class: 'א1',
        sid: 'kid-' + kid,
        biweek: week,
        sessionId: 's-' + weekTs.getTime() + '-' + kid,
        submittedAt: weekTs.toISOString(),
        responses
      });
    }
  }
  localStorage.setItem('pulse-demo-responses', JSON.stringify(seeds));
  render();
}

// ═══════ AGGREGATIONS ═══════
function aggregateClass(classId) {
  const all = getSubmissions().filter(s => s.class === classId);
  if (!all.length) return null;

  // Get latest biweek
  const latestBiweek = Math.max(...all.map(s => +s.biweek));
  const latestSubs = all.filter(s => +s.biweek === latestBiweek);
  const prevSubs = all.filter(s => +s.biweek === latestBiweek - 1);

  const dimAverages = {};
  const dimReds = {};
  DIMENSIONS.forEach(d => {
    const scores = latestSubs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
    if (!scores.length) { dimAverages[d.id] = null; dimReds[d.id] = 0; return; }
    dimAverages[d.id] = scores.reduce((a,b) => a+b, 0) / scores.length;
    dimReds[d.id] = scores.filter(s => s === 1).length;
  });

  // Compute trends
  const dimTrends = {};
  DIMENSIONS.forEach(d => {
    if (!prevSubs.length) { dimTrends[d.id] = 'flat'; return; }
    const prevScores = prevSubs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
    if (!prevScores.length) { dimTrends[d.id] = 'flat'; return; }
    const prevAvg = prevScores.reduce((a,b) => a+b, 0) / prevScores.length;
    const cur = dimAverages[d.id];
    if (cur - prevAvg > 0.15) dimTrends[d.id] = 'up';
    else if (prevAvg - cur > 0.15) dimTrends[d.id] = 'down';
    else dimTrends[d.id] = 'flat';
  });

  // Trend chart — last 4 biweeks for "joy" (or worst dim)
  const trendDimId = 'joy';
  const trendWeeks = [];
  for (let w = Math.max(1, latestBiweek - 3); w <= latestBiweek; w++) {
    const subs = all.filter(s => +s.biweek === w);
    const scores = subs.flatMap(s => s.responses.filter(r => r.dim === trendDimId).map(r => r.score));
    trendWeeks.push({
      week: w,
      avg: scores.length ? scores.reduce((a,b) => a+b, 0) / scores.length : 0
    });
  }

  // Pattern alert: any dim 3+ weeks in a row red?
  let alertText = null;
  DIMENSIONS.forEach(d => {
    let lowCount = 0;
    for (let w = latestBiweek; w >= Math.max(1, latestBiweek - 2); w--) {
      const subs = all.filter(s => +s.biweek === w);
      const scores = subs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
      if (!scores.length) continue;
      const avg = scores.reduce((a,b) => a+b, 0) / scores.length;
      if (avg < 2.0) lowCount++;
    }
    if (lowCount >= 3) {
      alertText = `פולס 3 ברציפות עם <strong>${d.name}</strong> נמוך — שווה לדבר עם היועצת`;
    }
  });

  return {
    classId,
    biweek: latestBiweek,
    responseCount: latestSubs.length,
    dimAverages,
    dimReds,
    dimTrends,
    trendWeeks,
    alertText
  };
}

// ═══════ HERO TEXT GENERATION ═══════
function generateHero(data) {
  const lowestDim = Object.keys(data.dimAverages).reduce((a, b) =>
    data.dimAverages[a] < data.dimAverages[b] ? a : b
  );
  const lowDim = DIMENSIONS.find(d => d.id === lowestDim);
  const lowAvg = data.dimAverages[lowestDim];
  const lowReds = data.dimReds[lowestDim];

  let status, statusColor, line, action;

  if (lowAvg >= 3.5) {
    status = 'יציב';
    statusColor = '#5BC0A8';
    line = `הכיתה במצב טוב השבוע — <strong>${data.responseCount}</strong> ילדים ענו, אין מימד שדורש התראה.`;
    action = 'המשיכי כרגיל';
  } else if (lowAvg >= 2.5) {
    status = 'דורש תשומת לב';
    statusColor = lowDim.color;
    line = `הכיתה כמעט בסדר. <strong>"${lowDim.name.trim()}"</strong> ירד — ${lowReds} ילדים דיווחו נמוך.`;
    action = `כדאי: פעילות מותאמת ל${lowDim.name.trim()}`;
  } else {
    status = 'התראה';
    statusColor = '#C04860';
    line = `<strong>"${lowDim.name.trim()}"</strong> במצב נמוך — ${lowReds} מתוך ${data.responseCount} ילדים בקושי. שווה להתערב היום.`;
    action = `כדאי: שיחה כיתתית + מעגל בוקר`;
  }

  return { status, statusColor, line, action };
}

// ═══════ RENDER ═══════
function render() {
  const classId = document.getElementById('class-select').value;
  const container = document.getElementById('container');
  const data = aggregateClass(classId);

  if (!data) {
    container.innerHTML = `
      <div class="empty">
        <h3>אין עוד תשובות לכיתה ${classId}</h3>
        <p>הילדים עוד לא מילאו פולס. שלחי להם את הקישור.</p>
        <a href="pulse-questionnaire.html?class=${classId}&biweek=1" target="_blank">פתחי את השאלון</a>
        <p style="margin-top:20px;font-size:0.85rem;">או — לחצי "טען דוגמה" למטה לראות איך זה נראה עם נתונים.</p>
      </div>
    `;
    return;
  }

  const hero = generateHero(data);
  const heroDoneKey = `pulse-demo-action-done-${classId}-${data.biweek}`;
  const isDone = localStorage.getItem(heroDoneKey) === '1';

  const dimBars = DIMENSIONS.map(d => {
    const avg = data.dimAverages[d.id] || 0;
    const widthPct = (avg / 3) * 100;
    const trend = data.dimTrends[d.id];
    const trendIcon = trend === 'up' ? '↑' : trend === 'down' ? '↓' : '→';
    const trendClass = trend === 'up' ? 'trend-up' : trend === 'down' ? 'trend-down' : 'trend-flat';
    return `
      <div class="dim-row">
        <div class="dim-name" style="color:${d.color}">${d.name}</div>
        <div class="dim-bar">
          <div class="dim-bar-fill" style="background:${d.color}; width:${widthPct}%;"></div>
        </div>
        <div class="dim-score" style="color:${d.color}">${avg.toFixed(1)}</div>
        <div class="dim-trend ${trendClass}">${trendIcon}</div>
      </div>
    `;
  }).join('');

  const trendBars = data.trendWeeks.map(w => {
    const h = w.avg ? (w.avg / 3) * 100 : 0;
    return `<div class="trend-bar" style="height:${h}%;" data-week="פולס ${w.week}"></div>`;
  }).join('');

  container.innerHTML = `
    <div class="stats">
      <div class="stat">
        <div class="stat-num" style="color:${DIMENSIONS[0].color}">${data.responseCount}</div>
        <div class="stat-label">ילדים ענו</div>
      </div>
      <div class="stat">
        <div class="stat-num" style="color:${DIMENSIONS[2].color}">${data.biweek}</div>
        <div class="stat-label">מספר פולס</div>
      </div>
      <div class="stat">
        <div class="stat-num" style="color:${DIMENSIONS[3].color}">${Object.values(data.dimAverages).reduce((a,b)=>a+b,0)/4 | 0 || '—'}.${(Math.round((Object.values(data.dimAverages).reduce((a,b)=>a+b,0)/4)*10)%10)}</div>
        <div class="stat-label">ממוצע כיתתי</div>
      </div>
    </div>

    <div class="hero-card" style="--hero-color:${hero.statusColor}">
      <div class="hero-status">
        <div class="hero-status-dot"></div>
        ${hero.status}
      </div>
      <div class="hero-line">${hero.line}</div>
      <button class="hero-action ${isDone ? 'done' : ''}" onclick="markActionDone('${heroDoneKey}')">
        ${isDone ? '✓ עשיתי' : '→ ' + hero.action}
      </button>
    </div>

    <div class="section-title">פירוט פר מימד</div>
    <div class="dim-list">${dimBars}</div>

    <div class="trend-card">
      <div class="trend-title">מגמת "שמחה ללמוד" — ${data.trendWeeks.length} פולסים אחרונים</div>
      <div class="trend-chart">${trendBars}</div>
    </div>

    ${data.alertText ? `<div class="alert">⚠️ ${data.alertText}</div>` : ''}
  `;
}

function markActionDone(key) {
  localStorage.setItem(key, '1');
  render();
}

document.getElementById('class-select').addEventListener('change', render);

// Initial render
render();
</script>

</body>
</html>
