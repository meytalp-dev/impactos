<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פולס · דשבורד מחנכת · כיתה א׳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --dim-adjust: #F2B844;
  --dim-friend: #E08FAF;
  --dim-emotion: #8B6BC0;
  --dim-joy: #5BC0A8;
  --primary: #2E7D8C; --primary-dark: #1E5A66;
  --tertiary: #8B3A4A;
  --leaf: #4A9B7F;
  --surface: #F5F0E8;
  --surface-card: #F7F5F2;
  --white: #FDFCFA;
  --text: #2C2622;
  --text-light: #6E6258;
  --border: #EDE6D8;
  --shadow-sm: 0 2px 8px rgba(44,38,34,.05);
  --shadow-md: 0 6px 20px rgba(44,38,34,.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--surface);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
h1, h2, h3, h4 { font-family: 'Rubik', sans-serif; }

/* ═══════ TOP BAR ═══════ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(245,240,232,.94);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(46,125,140,.08);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
}
.brand-num {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--dim-adjust), var(--dim-friend));
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-family: 'Rubik';
}
.brand-title {
  font-family: 'Rubik'; font-weight: 800; font-size: 1rem;
  color: var(--primary-dark);
}
.topbar-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 0.85rem; color: var(--text-light);
}
.class-select {
  padding: 6px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--white);
  font-family: 'Heebo';
  font-size: 0.85rem;
  color: var(--text);
  cursor: pointer;
}

/* ═══════ CONTAINER ═══════ */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ═══════ HERO CARD ═══════ */
.hero-card {
  background: var(--white);
  border-radius: 18px;
  padding: 22px 24px;
  box-shadow: var(--shadow-md);
  margin-bottom: 18px;
  border-right: 6px solid var(--hero-color, var(--dim-adjust));
  position: relative;
}
.hero-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.75rem; font-weight: 700;
  padding: 4px 12px; border-radius: 999px;
  background: rgba(0,0,0,.04);
  color: var(--text);
  margin-bottom: 10px;
}
.hero-status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--hero-color, var(--dim-adjust));
}
.hero-line {
  font-size: 1.08rem;
  line-height: 1.7;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 14px;
}
.hero-line strong { color: var(--text); font-weight: 800; }
.hero-action {
  background: var(--leaf);
  color: var(--white);
  border: none;
  padding: 10px 22px;
  border-radius: 10px;
  font-family: 'Heebo';
  font-weight: 700;
  font-size: 0.92rem;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: transform .15s, opacity .25s;
}
.hero-action:hover { transform: translateY(-1px); }
.hero-action.done {
  background: rgba(74,155,127,.18);
  color: var(--leaf);
}

/* ═══════ DIMENSIONS BARS ═══════ */
.section-title {
  font-size: 0.85rem; font-weight: 700;
  color: var(--text-light);
  margin: 22px 0 10px;
  letter-spacing: 0.04em;
  padding-right: 4px;
}

.dim-list {
  background: var(--white);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.dim-row {
  display: grid;
  grid-template-columns: 110px 1fr 60px 60px;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(0,0,0,.04);
}
.dim-row:last-child { border-bottom: none; }
.dim-name {
  font-weight: 700;
  font-size: 0.92rem;
  font-family: 'Heebo';
}
.dim-bar {
  height: 10px;
  background: rgba(0,0,0,.05);
  border-radius: 5px;
  position: relative;
  overflow: hidden;
}
.dim-bar-fill {
  position: absolute; top: 0; right: 0;
  height: 100%;
  border-radius: 5px;
  transition: width .8s ease-out;
}
.dim-score {
  font-family: 'Rubik';
  font-weight: 800;
  font-size: 1.1rem;
  text-align: center;
}
.dim-trend {
  text-align: center;
  font-size: 1rem;
  font-weight: 700;
}
.trend-up { color: var(--leaf); }
.trend-down { color: var(--tertiary); }
.trend-flat { color: var(--text-light); }

/* ═══════ MINI TREND ═══════ */
.trend-card {
  background: var(--white);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow-sm);
  margin-top: 16px;
}
.trend-title {
  font-size: 0.85rem;
  color: var(--text-light);
  font-weight: 600;
  margin-bottom: 12px;
}
.trend-chart {
  display: flex; align-items: flex-end; gap: 10px;
  height: 70px;
}
.trend-bar {
  flex: 1; min-width: 30px;
  background: linear-gradient(180deg, var(--dim-adjust), var(--dim-friend));
  border-radius: 6px 6px 0 0;
  position: relative;
  opacity: 0.65;
  transition: opacity .2s;
}
.trend-bar:last-child { opacity: 1; }
.trend-bar::after {
  content: attr(data-week);
  position: absolute; bottom: -22px; left: 0; right: 0;
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-light);
}

/* ═══════ ALERT ═══════ */
.alert {
  background: rgba(232,168,73,.12);
  border-right: 4px solid #C88A2E;
  padding: 14px 18px;
  border-radius: 12px;
  margin-top: 18px;
  font-size: 0.92rem;
  line-height: 1.6;
  color: var(--text);
}
.alert strong { color: #8E5A1E; }

/* ═══════ EMPTY STATE ═══════ */
.empty {
  background: var(--white);
  border-radius: 18px;
  padding: 40px 24px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.empty h3 {
  font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;
}
.empty p {
  color: var(--text-light); font-size: 0.95rem;
  margin-bottom: 20px;
}
.empty a {
  display: inline-block;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 10px 24px;
  border-radius: 999px;
  font-weight: 700;
  transition: transform .15s;
}
.empty a:hover { transform: translateY(-1px); }

/* ═══════ STATS BAR ═══════ */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.stat {
  background: var(--white);
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-family: 'Rubik';
  font-weight: 900;
  font-size: 1.5rem;
  color: var(--primary-dark);
  line-height: 1;
}
.stat-label {
  font-size: 0.72rem;
  color: var(--text-light);
  margin-top: 4px;
}

/* ═══════ LAYER VIEW (PRINCIPAL) ═══════ */
.layer-classes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 18px; }
.class-card { background: var(--white); border-radius: 16px; padding: 16px 18px; box-shadow: var(--shadow-sm); border-top: 4px solid var(--class-color, var(--primary)); cursor: pointer; transition: transform .15s, box-shadow .15s; }
.class-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.class-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px; }
.class-card-name { font-family: 'Rubik'; font-weight: 800; font-size: 1.1rem; }
.class-card-teacher { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }
.class-card-status { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
.class-card-mini-bars { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
.class-mini-row { display: grid; grid-template-columns: 50px 1fr 28px; gap: 8px; align-items: center; font-size: 0.78rem; }
.class-mini-name { font-weight: 700; }
.class-mini-bar { height: 7px; background: rgba(0,0,0,.05); border-radius: 4px; position: relative; overflow: hidden; }
.class-mini-bar-fill { position: absolute; top: 0; right: 0; height: 100%; border-radius: 4px; transition: width .6s ease-out; }
.class-mini-score { text-align: center; font-family: 'Rubik'; font-weight: 800; }
.class-card-response { font-size: 0.78rem; color: var(--text-light); margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,.04); }
.class-card-cta { display: block; text-align: center; padding: 8px; margin-top: 8px; background: rgba(46,125,140,.06); border-radius: 8px; font-size: 0.78rem; font-weight: 700; color: var(--primary-dark); }
@media (max-width: 720px) { .layer-classes { grid-template-columns: 1fr; } }

.layer-section-title { font-size: 0.85rem; font-weight: 700; color: var(--text-light); margin: 22px 0 10px; letter-spacing: 0.04em; padding-right: 4px; }
.layer-attention-list { display: flex; flex-direction: column; gap: 6px; }
.layer-attention-row { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; padding: 10px 14px; background: var(--white); border-radius: 10px; font-size: 0.88rem; border-right: 3px solid #C04860; box-shadow: var(--shadow-sm); }
.layer-attention-name { font-weight: 600; }
.layer-attention-class { color: var(--text-light); font-size: 0.78rem; margin-right: 6px; }
.layer-attention-reds { color: #8B3A4A; font-weight: 700; font-size: 0.82rem; }
.layer-attention-empty { padding: 16px; background: rgba(74,155,127,.08); border: 1px solid rgba(74,155,127,.18); border-radius: 12px; color: #2f7a66; font-size: 0.9rem; text-align: center; font-weight: 600; }

/* ═══════ STUDENT MAP ═══════ */
.map-card { background: var(--white); border-radius: 18px; padding: 22px 22px 18px; box-shadow: var(--shadow-sm); margin-top: 18px; }
.map-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 16px; flex-wrap: wrap; }
.map-header h3 { font-size: 1rem; font-weight: 800; margin-bottom: 2px; }
.map-sub { font-size: 0.78rem; color: var(--text-light); }
.map-sort { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--white); font-family: 'Heebo'; font-size: 0.82rem; cursor: pointer; color: var(--text); }
.map-legend { display: flex; gap: 18px; flex-wrap: wrap; font-size: 0.78rem; color: var(--text-light); padding: 10px 0 12px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.map-legend span { display: inline-flex; align-items: center; gap: 6px; }
.dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
.dot-green { background: #4A9B7F; }
.dot-yellow { background: #F2B844; }
.dot-red { background: #C04860; }
.dot-gray { background: rgba(0,0,0,.12); }
.map-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.map-table th { text-align: right; padding: 12px 8px 8px; font-size: 0.72rem; font-weight: 700; color: var(--text-light); letter-spacing: 0.02em; }
.map-table th.col-dim { text-align: center; }
.map-table td { padding: 11px 8px; font-size: 0.88rem; border-top: 1px solid rgba(0,0,0,.04); }
.map-table tbody tr:hover td { background: rgba(46,125,140,.03); }
.map-name { font-weight: 600; color: var(--text); }
.map-cell { text-align: center; }
.map-status { font-size: 0.74rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; display: inline-block; white-space: nowrap; }
.status-stable { background: rgba(74,155,127,.15); color: #2f7a66; }
.status-watch { background: rgba(242,184,68,.18); color: #8E5A1E; }
.status-attention { background: rgba(192,72,96,.15); color: #8B3A4A; }
.status-missing { background: rgba(0,0,0,.05); color: var(--text-light); }
.map-caveat { margin-top: 14px; padding: 10px 14px; background: rgba(46,125,140,.05); border-radius: 10px; font-size: 0.82rem; color: var(--text); line-height: 1.6; }
.map-caveat strong { color: var(--primary-dark); }
@media (max-width: 520px) {
  .map-table th, .map-table td { padding: 10px 4px; font-size: 0.78rem; }
  .map-table th.col-dim { font-size: 0.65rem; }
  .map-status { font-size: 0.68rem; padding: 2px 7px; }
}

/* ═══════ DEMO BANNER ═══════ */
.demo-banner {
  position: fixed; bottom: 8px; right: 8px;
  background: rgba(0,0,0,.6);
  color: white;
  font-size: 0.7rem;
  padding: 5px 12px;
  border-radius: 6px;
  font-family: monospace;
  z-index: 100;
  display: flex; align-items: center; gap: 8px;
}
.demo-banner button {
  background: rgba(255,255,255,.2);
  border: none;
  color: white;
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: monospace;
}
.demo-banner button:hover { background: rgba(255,255,255,.3); }

@media (max-width: 520px) {
  .dim-row { grid-template-columns: 90px 1fr 50px; }
  .dim-trend { display: none; }
}
</style>
</head>

const MISSING_LATEST = new Set(['a1-06', 'a1-15', 'a2-08', 'a3-04', 'a3-11']);

// Hash דטרמיניסטי — אותם seeds תמיד = אותו pattern (לדמו יציב בין refreshes)
function pseudoRand(seed) {
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) {
    h = Math.imul(h ^ seed.charCodeAt(i), 16777619);
  }
  return ((h >>> 0) % 10000) / 10000;
}

function seedData() {
  const seeds = [];
  const now = Date.now();
  for (let week = 1; week <= 4; week++) {
    const weekTs = new Date(now - (4 - week) * 14 * 24 * 3600 * 1000);
    KIDS.forEach(kid => {
      if (week === 4 && MISSING_LATEST.has(kid.id)) return;

      const responses = DIMENSIONS.map(d => {
        // Drift: מקום משתפר לאט (התאקלמות) · לגלות יורד לאט (אופייני אחרי תחילת שנה)
        const drift = d.id === 'adjust' ? (week - 1) * 0.03
                    : d.id === 'joy'    ? -(week - 1) * 0.04
                    : 0;
        const p = Math.max(0.05, Math.min(0.95, kid.base[d.id] + drift));
        const r = pseudoRand(kid.id + ':' + d.id + ':' + week);
        let score;
        if (r < p) score = 3;
        else if (r < p + (1 - p) * 0.6) score = 2;
        else score = 1;
        return { dim: d.id, score, ts: weekTs.toISOString() };
      });

      seeds.push({
        school: 'demo',
        class: kid.class,
        sid: kid.id,
        sidName: kid.name,
        biweek: week,
        sessionId: 's-' + weekTs.getTime() + '-' + kid.id,
        submittedAt: weekTs.toISOString(),
        responses
      });
    });
  }
  localStorage.setItem('pulse-demo-responses', JSON.stringify(seeds));
  render();
}

// ═══════ AGGREGATIONS ═══════
function aggregateClass(classId) {
  const all = getSubmissions().filter(s => s.class === classId);
  if (!all.length) return null;

  // Get latest biweek
  const latestBiweek = Math.max(...all.map(s => +s.biweek));
  const latestSubs = all.filter(s => +s.biweek === latestBiweek);
  const prevSubs = all.filter(s => +s.biweek === latestBiweek - 1);

  const dimAverages = {};
  const dimReds = {};
  DIMENSIONS.forEach(d => {
    const scores = latestSubs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
    if (!scores.length) { dimAverages[d.id] = null; dimReds[d.id] = 0; return; }
    dimAverages[d.id] = scores.reduce((a,b) => a+b, 0) / scores.length;
    dimReds[d.id] = scores.filter(s => s === 1).length;
  });

  // Compute trends
  const dimTrends = {};
  DIMENSIONS.forEach(d => {
    if (!prevSubs.length) { dimTrends[d.id] = 'flat'; return; }
    const prevScores = prevSubs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
    if (!prevScores.length) { dimTrends[d.id] = 'flat'; return; }
    const prevAvg = prevScores.reduce((a,b) => a+b, 0) / prevScores.length;
    const cur = dimAverages[d.id];
    if (cur - prevAvg > 0.15) dimTrends[d.id] = 'up';
    else if (prevAvg - cur > 0.15) dimTrends[d.id] = 'down';
    else dimTrends[d.id] = 'flat';
  });

  // Trend chart — last 4 biweeks for "joy" (or worst dim)
  const trendDimId = 'joy';
  const trendWeeks = [];
  for (let w = Math.max(1, latestBiweek - 3); w <= latestBiweek; w++) {
    const subs = all.filter(s => +s.biweek === w);
    const scores = subs.flatMap(s => s.responses.filter(r => r.dim === trendDimId).map(r => r.score));
    trendWeeks.push({
      week: w,
      avg: scores.length ? scores.reduce((a,b) => a+b, 0) / scores.length : 0
    });
  }

  // Pattern alert: any dim 3+ weeks in a row red?
  let alertText = null;
  DIMENSIONS.forEach(d => {
    let lowCount = 0;
    for (let w = latestBiweek; w >= Math.max(1, latestBiweek - 2); w--) {
      const subs = all.filter(s => +s.biweek === w);
      const scores = subs.flatMap(s => s.responses.filter(r => r.dim === d.id).map(r => r.score));
      if (!scores.length) continue;
      const avg = scores.reduce((a,b) => a+b, 0) / scores.length;
      if (avg < 2.0) lowCount++;
    }
    if (lowCount >= 3) {
      alertText = `פולס 3 ברציפות עם <strong>${d.name}</strong> נמוך — שווה לדבר עם היועצת`;
    }
  });

  return {
    classId,
    biweek: latestBiweek,
    responseCount: latestSubs.length,
    dimAverages,
    dimReds,
    dimTrends,
    trendWeeks,
    alertText
  };
}

// ═══════ HERO TEXT GENERATION ═══════
function generateHero(data) {
  const lowestDim = Object.keys(data.dimAverages).reduce((a, b) =>
    data.dimAverages[a] < data.dimAverages[b] ? a : b
  );
  const lowDim = DIMENSIONS.find(d => d.id === lowestDim);
  const lowAvg = data.dimAverages[lowestDim];
  const lowReds = data.dimReds[lowestDim];

  let status, statusColor, line, action;

  if (lowAvg >= 3.5) {
    status = 'יציב';
    statusColor = '#5BC0A8';
    line = `הכיתה במצב טוב השבוע — <strong>${data.responseCount}</strong> ילדים ענו, אין מימד שדורש התראה.`;
    action = 'המשיכי כרגיל';
  } else if (lowAvg >= 2.5) {
    status = 'דורש תשומת לב';
    statusColor = lowDim.color;
    line = `הכיתה כמעט בסדר. <strong>"${lowDim.name.trim()}"</strong> ירד — ${lowReds} ילדים דיווחו נמוך.`;
    action = `כדאי: פעילות מותאמת ל${lowDim.name.trim()}`;
  } else {
    status = 'התראה';
    statusColor = '#C04860';
    line = `<strong>"${lowDim.name.trim()}"</strong> במצב נמוך — ${lowReds} מתוך ${data.responseCount} ילדים בקושי. שווה להתערב היום.`;
    action = `כדאי: שיחה כיתתית + מעגל בוקר`;
  }

  return { status, statusColor, line, action };
}

// ═══════ STUDENT MAP ═══════
let mapSortBy = 'concern';

function changeMapSort(value) {
  mapSortBy = value;
  render();
}

function getStudentMap(classId, biweek) {
  const all = getSubmissions().filter(s => s.class === classId);
  const latest = all.filter(s => +s.biweek === biweek);
  const nameById = {};
  all.forEach(s => { if (s.sidName) nameById[s.sid] = s.sidName; });
  const allSids = [...new Set(all.map(s => s.sid))];

  return allSids.map(sid => {
    const sub = latest.find(s => s.sid === sid);
    const dims = {};
    DIMENSIONS.forEach(d => {
      const r = sub?.responses.find(rr => rr.dim === d.id);
      dims[d.id] = r ? r.score : null;
    });
    const reds = Object.values(dims).filter(s => s === 1).length;
    const yellows = Object.values(dims).filter(s => s === 2).length;
    let status;
    if (!sub) status = 'missing';
    else if (reds >= 2) status = 'attention';
    else if (reds >= 1 || yellows >= 3) status = 'watch';
    else status = 'stable';
    return { sid, name: nameById[sid] || sid, dims, status, reds, yellows };
  });
}

function renderStudentMapRows(classId, biweek) {
  const rows = getStudentMap(classId, biweek);

  if (mapSortBy === 'name') {
    rows.sort((a, b) => a.name.localeCompare(b.name, 'he'));
  } else {
    const order = { attention: 0, watch: 1, stable: 2, missing: 3 };
    rows.sort((a, b) => (order[a.status] - order[b.status]) || (b.reds - a.reds));
  }

  const STATUS_LABEL = {
    stable: 'יציב',
    watch: 'שווה לבדוק',
    attention: 'תשומת לב',
    missing: 'טרם ענה'
  };

  return rows.map(r => {
    const cells = DIMENSIONS.map(d => {
      const s = r.dims[d.id];
      const cls = s === 3 ? 'dot-green' : s === 2 ? 'dot-yellow' : s === 1 ? 'dot-red' : 'dot-gray';
      const title = s ? `${s}/3` : 'אין תשובה';
      return `<td class="map-cell"><span class="dot ${cls}" title="${title}"></span></td>`;
    }).join('');
    return `
      <tr>
        <td class="map-name">${r.name}</td>
        ${cells}
        <td class="map-cell"><span class="map-status status-${r.status}">${STATUS_LABEL[r.status]}</span></td>
      </tr>
    `;
  }).join('');
}

// ═══════ LAYER (PRINCIPAL) VIEW ═══════
function switchToClass(classId) {
  document.getElementById('class-select').value = classId;
  render();
}

function classStatus(lowAvg) {
  if (lowAvg >= 2.7) return { label: 'יציב',         bg: 'rgba(74,155,127,.15)',  color: '#2f7a66' };
  if (lowAvg >= 2.3) return { label: 'שווה לבדוק',   bg: 'rgba(242,184,68,.18)',  color: '#8E5A1E' };
  return                    { label: 'תשומת לב',     bg: 'rgba(192,72,96,.15)',   color: '#8B3A4A' };
}

function renderLayerView(container) {
  const classes = Object.keys(CLASS_META).map(classId => ({
    id: classId,
    meta: CLASS_META[classId],
    total: KIDS.filter(k => k.class === classId).length,
    data: aggregateClass(classId)
  }));

  const allHaveData = classes.every(c => c.data);
  if (!allHaveData) {
    container.innerHTML = `
      <div class="empty">
        <h3>עדיין אין מספיק נתונים לשכבה</h3>
        <p>חלק מהכיתות לא ענו. לחצי "טען דוגמה" לראות את המבט המלא.</p>
      </div>
    `;
    return;
  }

  const totalKids = classes.reduce((s, c) => s + c.total, 0);
  const totalResponded = classes.reduce((s, c) => s + c.data.responseCount, 0);
  const allAvgs = classes.flatMap(c => Object.values(c.data.dimAverages));
  const gradeAvg = allAvgs.reduce((a, b) => a + b, 0) / allAvgs.length;

  const classCards = classes.map(c => {
    const d = c.data;
    const dimBars = DIMENSIONS.map(dim => {
      const avg = d.dimAverages[dim.id] || 0;
      const widthPct = (avg / 3) * 100;
      return `
        <div class="class-mini-row">
          <div class="class-mini-name" style="color:${dim.color}">${dim.name}</div>
          <div class="class-mini-bar"><div class="class-mini-bar-fill" style="background:${dim.color}; width:${widthPct}%;"></div></div>
          <div class="class-mini-score" style="color:${dim.color}">${avg.toFixed(1)}</div>
        </div>
      `;
    }).join('');

    const lowestDim = Object.keys(d.dimAverages).reduce((a, b) => d.dimAverages[a] < d.dimAverages[b] ? a : b);
    const lowAvg = d.dimAverages[lowestDim];
    const st = classStatus(lowAvg);

    return `
      <div class="class-card" style="--class-color:${c.meta.color}" onclick="switchToClass('${c.id}')">
        <div class="class-card-head">
          <div>
            <div class="class-card-name">${c.meta.name}</div>
            <div class="class-card-teacher">מחנכת: ${c.meta.teacher}</div>
          </div>
          <div class="class-card-status" style="background:${st.bg}; color:${st.color};">${st.label}</div>
        </div>
        <div class="class-card-mini-bars">${dimBars}</div>
        <div class="class-card-response">${d.responseCount} מתוך ${c.total} ענו · פולס #${d.biweek}</div>
        <div class="class-card-cta">פתחי כיתה ←</div>
      </div>
    `;
  }).join('');

  // ילדים בתשומת לב חוצי-שכבה
  const attention = [];
  classes.forEach(c => {
    const studentMap = getStudentMap(c.id, c.data.biweek);
    studentMap.forEach(s => {
      if (s.status === 'attention') {
        attention.push({ ...s, className: c.meta.name });
      }
    });
  });
  attention.sort((a, b) => b.reds - a.reds);

  const attentionHTML = attention.length === 0 ? `
    <div class="layer-attention-empty">✓ אין תלמידים ב"תשומת לב" בשכבה השבוע</div>
  ` : `
    <div class="layer-attention-list">
      ${attention.map(s => `
        <div class="layer-attention-row">
          <div>
            <span class="layer-attention-name">${s.name}</span>
            <span class="layer-attention-class">· ${s.className}</span>
          </div>
          <div class="layer-attention-reds">${s.reds} אדומים</div>
          <span class="map-status status-attention">תשומת לב</span>
        </div>
      `).join('')}
    </div>
  `;

  container.innerHTML = `
    <div class="stats">
      <div class="stat">
        <div class="stat-num" style="color:${DIMENSIONS[0].color}">${classes.length}</div>
        <div class="stat-label">כיתות בשכבה</div>
      </div>
      <div class="stat">
        <div class="stat-num" style="color:${DIMENSIONS[1].color}">${totalResponded}/${totalKids}</div>
        <div class="stat-label">ענו השבוע</div>
      </div>
      <div class="stat">
        <div class="stat-num" style="color:${DIMENSIONS[3].color}">${gradeAvg.toFixed(1)}</div>
        <div class="stat-label">ממוצע שכבה</div>
      </div>

    <div class="layer-section-title">סטטוס כיתות · לחיצה על כרטיס פותחת תצוגת כיתה</div>
    <div class="layer-classes">${classCards}</div>

    <div class="layer-section-title">תלמידים בתשומת לב בשכבה · ${attention.length}</div>

    <div class="trend-card">
      <div class="trend-title">מגמת "שמחה ללמוד" — ${data.trendWeeks.length} פולסים אחרונים</div>
      <div class="trend-chart">${trendBars}</div>
    </div>

    ${data.alertText ? `<div class="alert">⚠️ ${data.alertText}</div>` : ''}

    <div class="map-card">
      <div class="map-header">
        <div>
          <h3>מיפוי תלמידים · פולס #${data.biweek}</h3>
          <div class="map-sub">מי שווה מבט השבוע · ${data.responseCount} ענו</div>
        </div>
        <select class="map-sort" onchange="changeMapSort(this.value)">
          <option value="concern" ${mapSortBy === 'concern' ? 'selected' : ''}>מיון: רמת דאגה</option>
          <option value="name" ${mapSortBy === 'name' ? 'selected' : ''}>מיון: שם</option>
        </select>
      </div>
      <div class="map-legend">
        <span><i class="dot dot-green"></i>כן, הרבה</span>
        <span><i class="dot dot-yellow"></i>קצת</span>
        <span><i class="dot dot-red"></i>לא</span>
        <span><i class="dot dot-gray"></i>טרם ענה</span>
      </div>
      <table class="map-table">
        <thead>
          <tr>
            <th>תלמיד.ה</th>
            ${DIMENSIONS.map(d => `<th class="col-dim" style="color:${d.color}">${d.name}</th>`).join('')}
            <th class="col-dim">סטטוס</th>
          </tr>
        </thead>
        <tbody>${renderStudentMapRows(classId, data.biweek)}</tbody>
      </table>
      <div class="map-caveat">
        💡 הפולס הוא <strong>איתות</strong>, לא אבחנה. תלמיד.ה ב"תשומת לב" 3 פולסים → להוסיף תצפית מורה + לדבר עם היועצת לפני כל החלטה.
      </div>
    </div>
  `;
}

function markActionDone(key) {
  localStorage.setItem(key, '1');
  render();
}

document.getElementById('class-select').addEventListener('change', render);

// Initial render
render();
</script>

</body>
</html>
