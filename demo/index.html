<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#EAF8FE">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>אבני יסוד · בית ספר אימפקט · כניסה למערכת</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo.css">
  <script src="demo-icons.js" defer></script>
  <style>
    .wrap{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:54px clamp(18px,4vw,48px) 70px;}
    .brand{display:flex;align-items:center;gap:14px;animation:fadeUp .8s cubic-bezier(.32,.72,0,1) both;}
    .brand .gm{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;flex:0 0 auto;
      background:#DDF3EC;}
    .brand .gm svg{width:30px;height:30px;}
    .brand .wm{text-align:right;}
    .brand .wm h1{font-size:clamp(28px,4vw,42px);font-weight:900;color:var(--deep);line-height:1.05;}
    .brand .wm span{display:block;font-size:14px;font-weight:600;color:var(--text-soft);margin-top:4px;}
    .head{text-align:center;margin:30px 0 30px;}
    .head h2{font-size:clamp(20px,2.6vw,26px);font-weight:800;color:var(--deep);}
    .head p{font-size:15.5px;color:var(--text-soft);margin-top:8px;}
    .grid{display:grid;gap:18px;grid-template-columns:repeat(4,1fr);width:100%;max-width:1060px;}
    .grid.spaces{grid-template-columns:repeat(3,1fr);max-width:840px;}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:540px){.grid,.grid.spaces{grid-template-columns:1fr;}}
    .gcard{cursor:pointer;text-align:right;font-family:inherit;display:flex;flex-direction:column;gap:12px;min-height:206px;
      transition:transform .5s cubic-bezier(.32,.72,0,1),box-shadow .5s cubic-bezier(.32,.72,0,1),border-color .3s;}
    .gcard:hover{border-color:#DCE4E5;}
    .gcard:hover{transform:translateY(-7px);box-shadow:var(--shadow-h);}
    .tile{width:56px;height:56px;border-radius:15px;display:grid;place-items:center;color:#fff;flex:0 0 auto;}
    .tile .tic svg{width:28px;height:28px;}
    .gcard .gic{width:56px;height:56px;border-radius:15px;display:grid;place-items:center;background:var(--w);color:var(--c);
      transition:transform .4s cubic-bezier(.32,.72,0,1);}
    .gcard:hover .gic{transform:translateY(-2px) scale(1.04);}
    .gcard .gic svg{width:28px;height:28px;stroke:currentColor;}
    .gcard h3{font-size:20px;font-weight:800;color:var(--deep);}
    .gcard p{font-size:14px;color:var(--text-soft);line-height:1.5;flex:1;}
    .gcard .ge{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700;color:var(--c);}
    .gcard .ge svg{width:18px;height:18px;transition:transform .4s;} .gcard:hover .ge svg{transform:translateX(-4px);}
    .gcard .tagx{position:absolute;top:14px;left:14px;font-size:10.5px;font-weight:700;color:var(--text-soft);background:#F1F4F5;padding:4px 10px;border-radius:999px;}
    .gcard.soon{opacity:.62;cursor:default;}
    .headrow{display:flex;align-items:center;justify-content:center;gap:14px;margin:30px 0 26px;}
    .headrow h2{font-size:clamp(20px,2.6vw,26px);font-weight:800;color:var(--deep);}
    .step[hidden]{display:none;}
    .foot{margin-top:34px;font-size:12.5px;color:var(--text-soft);letter-spacing:.04em;text-align:center;}
  </style>
</head>
<body>
  <img class="scene-bg" src="../avnei-yesod/underwater-app/assets/scene-stage-3-bg.png" alt="" aria-hidden="true" onerror="this.style.display='none'">
  <div class="veil" aria-hidden="true"></div>

  <main class="wrap">
    <div class="brand">
      <span class="gm"><svg viewBox="0 0 24 24" fill="none" stroke="#0F7E72" stroke-width="2.3" stroke-linecap="round"><path d="M6 18v-5"/><path d="M12 18V7"/><path d="M18 18v-8"/></svg></span>
      <span class="wm"><h1>אבני יסוד</h1><span>בית ספר אימפקט · מערכת חינוכית לכיתה א׳</span></span>
    </div>

    <section class="step" id="stepJourney" style="width:100%;max-width:1060px;margin-top:30px;">
      <button id="startJourney" class="card" style="width:100%;text-align:right;cursor:pointer;font-family:inherit;
        border-radius:22px;padding:22px 26px;display:flex;align-items:center;gap:18px;
        transition:transform .4s cubic-bezier(.32,.72,0,1),box-shadow .4s;"
        onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 14px 30px rgba(38,80,92,.12)'"
        onmouseout="this.style.transform='none';this.style.boxShadow=''">
        <span style="width:56px;height:56px;border-radius:15px;display:grid;place-items:center;background:#DDF3EC;color:#0F7E72;flex:0 0 auto;font-size:26px;"><span class="tic" data-ic="sparkle"></span></span>
        <span style="flex:1;">
          <span style="display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:#2E7A66;background:#EFF6F3;padding:4px 12px;border-radius:999px;">מסע מודרך</span>
          <span style="display:block;font-size:24px;font-weight:900;margin-top:11px;line-height:1.2;color:var(--deep);">יום אחד עם איתי — תלמיד · מורה · מנהלת</span>
          <span style="display:block;font-size:14px;color:var(--text-soft);margin-top:6px;font-weight:500;">אותו ילד, שלושה מבטים: איך למידה ורגש נפגשים — בלי תיוג, עם צעד הבא אחד ברור.</span>
        </span>
        <span style="display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;background:#5FBFA4;color:#fff;padding:13px 22px;border-radius:13px;white-space:nowrap;">התחל מסע ‹</span>
      </button>
      <div style="text-align:center;color:var(--text-soft);font-size:13px;margin:20px 0 2px;font-weight:600;">— או היכנסו ידנית לפי תפקיד —</div>
    </section>

    <section class="step" id="stepRole">
      <div class="head"><h2>בחרו את סוג המשתמש</h2><p>לכל בעל תפקיד מסך משלו, מותאם לעבודה היומיומית.</p></div>
      <div class="grid" id="roleGrid"></div>
    </section>

    <section class="step" id="stepSpace" hidden>
      <div class="headrow"><button class="btn btn-soft btn-sm" id="backBtn">‹ חזרה</button><h2 id="spaceTitle">בחרו מרחב</h2></div>
      <div class="grid spaces" id="spaceGrid"></div>
    </section>

    <div class="foot">אבני יסוד · בית ספר אימפקט · גרסת הדגמה — כל הנתונים להמחשה בלבד</div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    var S='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">';
    var IC={
      student:S+'<path d="M22 9 12 4 2 9l10 5 10-5Z"/><path d="M6 11.2v4.8c0 1.1 2.7 2.5 6 2.5s6-1.4 6-2.5v-4.8"/><path d="M22 9v5.5"/></svg>',
      teacher:S+'<rect x="3" y="4" width="18" height="12" rx="1.6"/><path d="M12 16v4"/><path d="M8.5 20h7"/><path d="M7 12l3-3 2 2 4.5-4.5"/></svg>',
      principal:S+'<circle cx="12" cy="12" r="9"/><path d="M15.6 8.4 13 13l-4.6 2.6L11 11l4.6-2.6Z"/></svg>',
      parent:S+'<path d="M12 19.5C7 16 4 12.7 4 9.6 4 7.4 5.8 5.7 8 5.7c1.4 0 2.7.7 3.4 1.8l.6.9.6-.9c.7-1.1 2-1.8 3.4-1.8 2.2 0 4 1.7 4 3.9 0 3.1-3 6.4-8 9.9Z"/></svg>',
      book:S+'<path d="M12 6.6C10.4 5.2 7.6 4.7 4 5.2v13c3.6-.5 6.4 0 8 1.4 1.6-1.4 4.4-1.9 8-1.4v-13c-3.6-.5-6.4 0-8 1.4Z"/><path d="M12 6.6V20"/></svg>',
      pulse:S+'<path d="M3 12h4l2.2-6.2 4 13L15.4 12H21"/></svg>',
      link:S+'<path d="M10.5 13.5a4 4 0 0 0 5.7 0l2.3-2.3a4 4 0 0 0-5.7-5.7l-1.2 1.2"/><path d="M13.5 10.5a4 4 0 0 0-5.7 0l-2.3 2.3a4 4 0 0 0 5.7 5.7l1.2-1.2"/></svg>',
      chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>'
    };
    var COL={
      student:['#5FBFA4','#E7F5F0'],teacher:['#7C9BD0','#EAF0F7'],principal:['#E8A55F','#FBF0E4'],parent:['#9b8fd6','#EEEBF8'],
      book:['#5FBFA4','#E7F5F0'],pulse:['#E08FAF','#FBEBF2'],link:['#9b8fd6','#EEEBF8']
    };
    var PU='../pulse-grade1/';
    var ROLES=[
      {role:'student',ic:'student',nm:'תלמידה / תלמיד',ds:'כניסה לעולם הלמידה האישי'},
      {role:'teacher',ic:'teacher',nm:'מורה',ds:'תמונת בוקר ופעולות מוכנות לכיתה'},
      {role:'principal',ic:'principal',nm:'מנהלת',ds:'מבט-על בית-ספרי: למידה, רגש ומענים'},
      {role:'parent',ic:'parent',nm:'הורה',ds:'עדכון קצר על שלום הילד'}
    ];
    var ROUTES={
      student:{title:'איפה לומדים היום?',spaces:[
        {ic:'book',nm:'אבני יסוד · קריאה',ds:'מסע אישי של אותיות, צלילים וקריאה',url:'student-avnei.html'},
        {ic:'pulse',nm:'פולס · רגשי-חברתי',ds:'צ׳ק-אין קצר ונעים',url:PU+"pulse-questionnaire.html?class=א'1"}]},
      teacher:{title:'מה לפתוח?',spaces:[
        {ic:'book',nm:'אבני יסוד · קריאה',ds:'מה הכיתה צריכה היום + פעולות',url:'teacher-avnei.html'},
        {ic:'pulse',nm:'פולס · רגשי-חברתי',ds:'תמונת מצב רגשית של הכיתה',url:PU+'pulse-dashboard.html?seed=1'},
        {ic:'link',nm:'מבט משולב',ds:'למידה ורגש יחד, על אותו ילד',url:'mavat-meshulav.html'}]},
      principal:{title:'מה לראות?',spaces:[
        {ic:'book',nm:'אבני יסוד · קריאה',ds:'תמונת בית הספר: התקדמות ומענים',url:'principal-avnei.html'},
        {ic:'pulse',nm:'פולס · רגשי-חברתי',ds:'תמונת רווחה של כל כיתות א׳',url:PU+'pulse-principal-dashboard.html'},
        {ic:'link',nm:'מבט משולב',ds:'למידה ורגש יחד, בית-ספרי',url:'mavat-meshulav.html'}]},
      parent:{direct:PU+'pulse-parent-monthly.html?child=דניאל'}
    };
    function card(ic,nm,ds,soon){var c=COL[ic];
      return '<button class="card gcard'+(soon?' soon':'')+'" style="position:relative;--c:'+c[0]+';--w:'+c[1]+'">'+
        (soon?'<span class="tagx">בקרוב</span>':'')+
        '<span class="gic">'+IC[ic]+'</span><h3>'+nm+'</h3><p>'+ds+'</p>'+
        '<span class="ge">כניסה '+IC.chev+'</span></button>';
    }
    var rg=document.getElementById('roleGrid');
    rg.innerHTML=ROLES.map(function(r){return card(r.ic,r.nm,r.ds,false);}).join('');
    Array.prototype.forEach.call(rg.children,function(b,i){b.addEventListener('click',function(){
      var cfg=ROUTES[ROLES[i].role];if(cfg.direct){location.href=cfg.direct;return;}showSpaces(cfg);});});

    var stepRole=document.getElementById('stepRole'),stepSpace=document.getElementById('stepSpace'),
        spaceGrid=document.getElementById('spaceGrid'),spaceTitle=document.getElementById('spaceTitle');
    document.getElementById('backBtn').innerHTML=IC.chev+' חזרה';
    function showSpaces(cfg){spaceTitle.textContent=cfg.title;
      spaceGrid.innerHTML=cfg.spaces.map(function(s){return card(s.ic,s.nm,s.ds,s.soon||!s.url);}).join('');
      Array.prototype.forEach.call(spaceGrid.children,function(b,i){var s=cfg.spaces[i];
        if(!(s.soon||!s.url))b.addEventListener('click',function(){location.href=s.url;});});
      stepRole.hidden=true;stepSpace.hidden=false;}
    document.getElementById('backBtn').addEventListener('click',function(){stepSpace.hidden=true;stepRole.hidden=false;});

    // ===== guided journey launch =====
    document.getElementById('startJourney').addEventListener('click',function(){
      sessionStorage.setItem('avnei-journey','1');
      sessionStorage.setItem('avnei-journey-child','איתי כ.');
      location.href='student-avnei.html';
    });
    // closing toast when the journey completes
    if(location.search.indexOf('journey-done=1')>-1){
      var tEl=document.getElementById('toast');
      if(tEl){tEl.textContent='המסע הושלם — כך נראית מערכת חיה: אותו ילד, מלמידה ועד מענה.';
        tEl.classList.add('show');setTimeout(function(){tEl.classList.remove('show');},6000);}
    }
  </script>
</body>
</html>
