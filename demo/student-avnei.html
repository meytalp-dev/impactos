<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>מי משחק היום? · בית ספר אימפקט</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;800;900&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#143A42;--soft:#577179;--mut:#8AA0A6;--line:#E7EDEE;--ease:cubic-bezier(.32,.72,0,1);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Heebo',sans-serif;color:var(--ink);min-height:100dvh;overflow-x:hidden;}
    .wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px clamp(18px,4vw,48px) 88px;}
    .eyebrow{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:999px;
      padding:7px 16px 7px 9px;font-size:11px;font-weight:700;letter-spacing:.2em;color:var(--soft);text-transform:uppercase;
      box-shadow:0 6px 18px -10px rgba(20,58,66,.25);animation:fadeUp .9s var(--ease) both;}
    .eyebrow img{width:22px;height:22px;object-fit:contain;}
    h1{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:clamp(40px,7vw,72px);color:var(--ink);margin:22px 0 0;
      animation:fadeUp 1s var(--ease) .08s both;text-align:center;}
    .sub{font-size:clamp(15px,2vw,19px);color:var(--soft);margin:16px 0 40px;text-align:center;animation:fadeUp 1s var(--ease) .16s both;}
    .grid{display:grid;gap:18px;grid-template-columns:repeat(3,minmax(220px,1fr));max-width:780px;width:100%;}
    @media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:480px){.grid{grid-template-columns:1fr;}}
    .kid{position:relative;cursor:pointer;font-family:inherit;text-align:center;background:#fff;border:1px solid var(--line);
      border-radius:24px;padding:26px 18px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;
      box-shadow:0 1px 3px rgba(38,80,92,.05);transition:transform .6s var(--ease),box-shadow .6s var(--ease),border-color .6s var(--ease);
      animation:fadeUp .8s var(--ease) both;}
    .kid:hover{transform:translateY(-8px);box-shadow:0 18px 36px -18px rgba(20,58,66,.28);border-color:#DCE4E5;}
    .kid:nth-child(1){animation-delay:.05s;}.kid:nth-child(2){animation-delay:.1s;}.kid:nth-child(3){animation-delay:.15s;}
    .kid:nth-child(4){animation-delay:.2s;}.kid:nth-child(5){animation-delay:.25s;}.kid:nth-child(6){animation-delay:.3s;}
    .av{width:78px;height:78px;border-radius:50%;display:grid;place-items:center;color:var(--c2);font-weight:800;font-size:32px;
      font-family:'Frank Ruhl Libre',serif;background:var(--c);
      transition:transform .6s var(--ease);}
    .kid:hover .av{transform:scale(1.06);}
    .tile{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto;
      transition:transform .6s var(--ease);}
    .tile .tic svg,.tile svg{width:24px;height:24px;}
    .plays{display:flex;gap:9px;margin-top:2px;}
    .kid:hover .tile{transform:translateY(-2px);}
    .nm{font-size:20px;font-weight:800;color:var(--ink);}
    .go{font-size:13.5px;font-weight:600;color:var(--soft);display:flex;align-items:center;gap:6px;}
    .go svg{width:15px;height:15px;}
    .back{margin-top:34px;display:inline-flex;align-items:center;gap:8px;height:46px;padding:0 20px;cursor:pointer;background:#fff;
      border:1px solid var(--line);border-radius:999px;color:var(--soft);font-family:inherit;font-weight:600;font-size:15px;text-decoration:none;
      transition:all .5s var(--ease);box-shadow:0 6px 18px -12px rgba(20,58,66,.3);animation:fadeUp 1s var(--ease) .35s both;}
    .back:hover{transform:translateX(4px);}
    .back svg{width:18px;height:18px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  </style>
  <script src="journey.js" defer></script>
</head>
<body>
  <main class="wrap">
    <span class="eyebrow"><img src="../avnei-yesod/underwater-app/assets/noni-happy.png" alt="" onerror="this.style.display='none'"> אבני יסוד · קריאה</span>
    <h1>מי משחק היום?</h1>
    <p class="sub">בחרו את עצמכם כדי להתחיל</p>
    <div class="grid" id="grid"></div>
    <a class="back" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg> חזרה</a>
  </main>

  <script>
    var ARW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>';
    var IS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">';
    var IC={
      book:  IS+'<path d="M12 6.6C10.4 5.2 7.6 4.7 4 5.2v13c3.6-.5 6.4 0 8 1.4 1.6-1.4 4.4-1.9 8-1.4v-13c-3.6-.5-6.4 0-8 1.4Z"/><path d="M12 6.6V20"/></svg>',
      heart: IS+'<path d="M12 19s-6-3.8-8-7.2C2.4 8.7 3.8 5.8 6.6 5.8c1.6 0 2.8.9 3.4 1.9.6-1 1.8-1.9 3.4-1.9 2.8 0 4.2 2.9 2.6 6C18 15.2 12 19 12 19Z"/></svg>',
      star:  IS+'<path d="M12 4.5l2.3 4.7 5.2.8-3.8 3.7.9 5.1-4.6-2.4-4.6 2.4.9-5.1L4.5 10l5.2-.8L12 4.5Z"/></svg>'
    };
    // pastel tile pairs per card — [bg, fg] מהפלטה המאוחדת
    var TILE=[['#DDF3EC','#0F7E72'],['#EEEBF8','#6A59B8'],['#FBF0E4','#B5611F'],['#EAF0F7','#41689A'],['#FBEBF2','#B05A86']];
    /* c = רקע פסטל · c2 = צבע האות */
    var KIDS=[
      {nm:'נֹעָה',id:'s-noa',c:'#DDF3EC',c2:'#0F7E72'},
      {nm:'מָאיָה',id:'s-maya',c:'#FBEBF2',c2:'#B05A86'},
      {nm:'אִיתַי',id:'s-itai',c:'#EAF0F7',c2:'#41689A'},
      {nm:'דָּנִי',id:'s-dani',c:'#EEEBF8',c2:'#6A59B8'},
      {nm:'שִׁירָה',id:'s-shira',c:'#FBF0E4',c2:'#B5611F'},
      {nm:'יָעֵל',id:'s-yael',c:'#DDF3EC',c2:'#0F7E72'}
    ];
    var g=document.getElementById('grid');
    KIDS.forEach(function(k,i){
      var first=k.nm.replace(/[^א-ת]/g,'').charAt(0);
      var t1=TILE[i%TILE.length], t2=TILE[(i+3)%TILE.length];
      var d=document.createElement('button');d.className='kid';d.style.setProperty('--c',k.c);d.style.setProperty('--c2',k.c2);
      d.innerHTML='<span class="av">'+first+'</span><span class="nm">'+k.nm+'</span>'+
        '<span class="plays">'+
          '<span class="tile" style="background:'+t1[0]+';color:'+t1[1]+'" title="משחק קריאה" aria-label="משחק קריאה">'+IC.book+'</span>'+
          '<span class="tile" style="background:'+t2[0]+';color:'+t2[1]+'" title="איך אני מרגיש" aria-label="איך אני מרגיש">'+IC.heart+'</span>'+
          '<span class="tile" style="background:#FBF0E4;color:#B5611F" title="לשחק" aria-label="לשחק">'+IC.star+'</span>'+
        '</span>'+
        '<span class="go">'+ARW+' המשך לשחק</span>';
      d.addEventListener('click',function(){
        try{localStorage.setItem('avnei-yesod-current-student',k.id);}catch(e){}
        window.location.href='../avnei-yesod/underwater-app/map.html?presentation=1&skip-picker=1';
      });
      g.appendChild(d);
    });
  </script>
</body>
</html>
