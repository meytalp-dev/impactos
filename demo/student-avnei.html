<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>מי משחק היום? · בית ספר אימפקט</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- שכבת העיצוב הנעולה של הדמו (רקע לבן · גופן Rubik · כרטיסים שקטים) -->
  <link rel="stylesheet" href="demo.css">
  <style>
    .wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:56px clamp(18px,4vw,48px) 84px;}
    .eyebrow{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:var(--pill);
      padding:7px 16px 7px 9px;font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--text-soft);
      box-shadow:0 1px 3px rgba(38,80,92,.06);animation:fadeUp .9s var(--ease,cubic-bezier(.32,.72,0,1)) both;}
    .eyebrow img{width:24px;height:24px;object-fit:contain;}
    h1{font-family:'Rubik',sans-serif;font-weight:900;font-size:clamp(34px,6vw,56px);color:var(--deep);margin:22px 0 0;
      letter-spacing:-.01em;animation:fadeUp 1s var(--ease,cubic-bezier(.32,.72,0,1)) .08s both;text-align:center;}
    .sub{font-size:clamp(15px,2vw,19px);color:var(--text-soft);margin:14px 0 40px;text-align:center;
      animation:fadeUp 1s var(--ease,cubic-bezier(.32,.72,0,1)) .16s both;}

    .grid{display:grid;gap:18px;grid-template-columns:repeat(3,minmax(210px,1fr));max-width:760px;width:100%;}
    @media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:480px){.grid{grid-template-columns:1fr;}}

    /* כרטיס ילד — שקט, לבן, מסגרת דקה (זהה ל-.card של הדמו) */
    .kid{position:relative;cursor:pointer;font-family:inherit;text-align:center;background:#fff;border:1px solid var(--line);
      border-radius:var(--radius);padding:26px 18px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;
      box-shadow:0 1px 3px rgba(38,80,92,.05);
      transition:transform .5s var(--ease,cubic-bezier(.32,.72,0,1)),box-shadow .5s var(--ease,cubic-bezier(.32,.72,0,1)),border-color .3s;
      animation:fadeUp .8s var(--ease,cubic-bezier(.32,.72,0,1)) both;}
    .kid:hover{transform:translateY(-6px);box-shadow:0 16px 34px -18px rgba(20,58,66,.26);border-color:#DCE4E5;}
    .kid:nth-child(1){animation-delay:.05s;}.kid:nth-child(2){animation-delay:.1s;}.kid:nth-child(3){animation-delay:.15s;}
    .kid:nth-child(4){animation-delay:.2s;}.kid:nth-child(5){animation-delay:.25s;}.kid:nth-child(6){animation-delay:.3s;}

    /* אווטאר ייחודי — חיית-ים בקו-SVG על אריח פסטל בצבע-זהות */
    .av{width:78px;height:78px;border-radius:50%;display:grid;place-items:center;background:var(--c);color:var(--c2);
      flex:0 0 auto;transition:transform .5s var(--ease,cubic-bezier(.32,.72,0,1));}
    .av svg{width:44px;height:44px;display:block;}
    .kid:hover .av{transform:scale(1.06) rotate(-3deg);}

    .nm{font-size:20px;font-weight:800;color:var(--deep);}

    .plays{display:flex;gap:9px;margin-top:2px;}
    .tile{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto;
      transition:transform .5s var(--ease,cubic-bezier(.32,.72,0,1));}
    .tile svg{width:24px;height:24px;}
    .kid:hover .tile{transform:translateY(-2px);}

    .go{font-size:13.5px;font-weight:700;color:var(--text-soft);display:flex;align-items:center;gap:6px;margin-top:2px;}
    .go svg{width:15px;height:15px;transition:transform .4s;}
    .kid:hover .go svg{transform:translateX(-4px);}

    .back{margin-top:34px;display:inline-flex;align-items:center;gap:8px;height:46px;padding:0 20px;cursor:pointer;background:#fff;
      border:1px solid var(--line);border-radius:var(--pill);color:var(--text-soft);font-family:inherit;font-weight:600;font-size:15px;
      text-decoration:none;box-shadow:0 1px 3px rgba(38,80,92,.06);
      transition:transform .5s var(--ease,cubic-bezier(.32,.72,0,1));animation:fadeUp 1s var(--ease,cubic-bezier(.32,.72,0,1)) .35s both;}
    .back:hover{transform:translateX(4px);}
    .back svg{width:18px;height:18px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  </style>
  <script src="journey.js" defer></script>
</head>
<body>
  <main class="wrap">
    <span class="eyebrow"><img src="../avnei-yesod/underwater-app/assets/noni-happy.png" alt="" onerror="this.style.display='none'"> אבני יסוד · קריאה</span>
    <h1>מי משחק היום?</h1>
    <p class="sub">בחרו את עצמכם כדי להתחיל</p>
    <div class="grid" id="grid"></div>
    <a class="back" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg> חזרה</a>
  </main>

  <script>
    var ARW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>';
    var IS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">';

    // ── אווטארים ייחודיים: חיות-ים בקו-SVG (בלי אימוג'י — תואם DESIGN-LOCK) ──
    // תמנון שמור ל"נוני" (המנחה) בלבד ולכן אינו כאן.
    var CREATURE={
      // דג
      fish: IS+'<path d="M12.5 12c-2.4-2.9-6.2-3.4-9.5-1.4 1.3 1 1.3 1.8 0 2.8 3.3 2 7.1 1.5 9.5-1.4Z"/><path d="M12.5 12c1.5-1.4 3.4-2.1 5.5-2.1l-1.6 2.1 1.6 2.1c-2.1 0-4-.7-5.5-2.1Z"/><circle cx="6" cy="11" r=".8" fill="currentColor" stroke="none"/></svg>',
      // מדוזה
      jelly: IS+'<path d="M6 11.5a6 6 0 0 1 12 0V12H6v-.5Z"/><path d="M8.2 12.4c-.2 1.3.2 2.6-.2 3.8M10.7 12.6c.1 1.5-.2 2.9.1 4.3M13.3 12.6c-.1 1.5.2 2.9-.1 4.3M15.8 12.4c.2 1.3-.2 2.6.2 3.8"/></svg>',
      // סרטן
      crab: IS+'<path d="M7 13.7a5 3.1 0 0 1 10 0 5 3.3 0 0 1-10 0Z"/><path d="M10 10.9V9.2M14 10.9V9.2"/><circle cx="10" cy="8.7" r=".7" fill="currentColor" stroke="none"/><circle cx="14" cy="8.7" r=".7" fill="currentColor" stroke="none"/><path d="M7.4 12.9c-1.8-.7-3.1-.3-3.5 1 .4.6 1.1.8 2 .5M16.6 12.9c1.8-.7 3.1-.3 3.5 1-.4.6-1.1.8-2 .5"/><path d="M8.2 15.7 6.9 17.4M15.8 15.7l1.3 1.7M10.7 16.3l-.4 1.6M13.3 16.3l.4 1.6"/></svg>',
      // כוכב ים
      star: IS+'<path d="M12 3.6l2.1 4.6 5 .5-3.7 3.4 1 4.9-4.4-2.4-4.4 2.4 1-4.9L4.9 8.7l5-.5L12 3.6Z"/><circle cx="12" cy="11.6" r="1.1"/></svg>',
      // צב
      turtle: IS+'<path d="M6.5 14a5.5 4 0 0 1 11 0"/><path d="M6.6 14h10.8"/><path d="M17.5 12.9c1.3-.4 2.3-.1 2.8.7"/><circle cx="19.7" cy="13.1" r=".55" fill="currentColor" stroke="none"/><path d="M8 14.3 6.9 16.4M16 14.3l1.1 2.1M10.6 14.5l-.4 2.2M13.4 14.5l.4 2.2"/><path d="M12 10.4v3.4M9.7 11.4l1 2.2M14.3 11.4l-1 2.2"/></svg>',
      // לווייתן
      whale: IS+'<path d="M4 12.8c0-3.3 3.2-5.4 7.5-5.4 4 0 6.5 2.2 6.5 4.9 0 2-1.6 3.9-4 4.1H6c-1.4 0-2-1.6-2-3.6Z"/><path d="M4 12.8c-1.3.3-2.2 1.3-2.5 2.6 1.4.2 2.7-.3 3.4-1.4"/><path d="M15 8.4c.4-1.4 1.8-2.1 3.3-1.5"/><circle cx="9" cy="11.2" r=".8" fill="currentColor" stroke="none"/><path d="M6.2 15.4c1.6.9 3.6.9 5.1 0"/></svg>'
    };

    /* c = רקע פסטל · c2 = צבע האיור (מהפלטה המאוחדת של demo.css) · cr = חיית-הים */
    var KIDS=[
      {nm:'נֹעָה',   id:'s-noa',   c:'#DDF3EC', c2:'#0F7E72', cr:'fish'},
      {nm:'מָאיָה',  id:'s-maya',  c:'#FBEBF2', c2:'#B05A86', cr:'jelly'},
      {nm:'אִיתַי',  id:'s-itai',  c:'#EAF0F7', c2:'#41689A', cr:'crab'},
      {nm:'דָּנִי',   id:'s-dani',  c:'#EEEBF8', c2:'#6A59B8', cr:'star'},
      {nm:'שִׁירָה', id:'s-shira', c:'#FBF0E4', c2:'#B5611F', cr:'turtle'},
      {nm:'יָעֵל',    id:'s-yael',  c:'#FCEFD9', c2:'#9C6212', cr:'whale'}
    ];

    // אריחי-משחק פסטליים (קריאה · תחושה · לשחק) — קו-SVG בלבד
    var IC={
      book:  IS+'<path d="M12 6.6C10.4 5.2 7.6 4.7 4 5.2v13c3.6-.5 6.4 0 8 1.4 1.6-1.4 4.4-1.9 8-1.4v-13c-3.6-.5-6.4 0-8 1.4Z"/><path d="M12 6.6V20"/></svg>',
      heart: IS+'<path d="M12 19s-6-3.8-8-7.2C2.4 8.7 3.8 5.8 6.6 5.8c1.6 0 2.8.9 3.4 1.9.6-1 1.8-1.9 3.4-1.9 2.8 0 4.2 2.9 2.6 6C18 15.2 12 19 12 19Z"/></svg>',
      star:  IS+'<path d="M12 4.5l2.3 4.7 5.2.8-3.8 3.7.9 5.1-4.6-2.4-4.6 2.4.9-5.1L4.5 10l5.2-.8L12 4.5Z"/></svg>'
    };
    var TILE=[['#DDF3EC','#0F7E72'],['#EEEBF8','#6A59B8'],['#FBF0E4','#B5611F'],['#EAF0F7','#41689A'],['#FBEBF2','#B05A86']];

    var g=document.getElementById('grid');
    KIDS.forEach(function(k,i){
      var t1=TILE[i%TILE.length], t2=TILE[(i+3)%TILE.length];
      var d=document.createElement('button');d.className='kid';d.style.setProperty('--c',k.c);d.style.setProperty('--c2',k.c2);
      d.innerHTML='<span class="av">'+(CREATURE[k.cr]||CREATURE.fish)+'</span>'+
        '<span class="nm">'+k.nm+'</span>'+
        '<span class="plays">'+
          '<span class="tile" style="background:'+t1[0]+';color:'+t1[1]+'" title="משחק קריאה" aria-label="משחק קריאה">'+IC.book+'</span>'+
          '<span class="tile" style="background:'+t2[0]+';color:'+t2[1]+'" title="איך אני מרגיש" aria-label="איך אני מרגיש">'+IC.heart+'</span>'+
          '<span class="tile" style="background:#FBF0E4;color:#B5611F" title="לשחק" aria-label="לשחק">'+IC.star+'</span>'+
        '</span>'+
        '<span class="go">'+ARW+' המשך לשחק</span>';
      d.addEventListener('click',function(){
        try{localStorage.setItem('avnei-yesod-current-student',k.id);}catch(e){}
        window.location.href='../avnei-yesod/underwater-app/map.html?presentation=1&skip-picker=1';
      });
      g.appendChild(d);
    });
  </script>
</body>
</html>
